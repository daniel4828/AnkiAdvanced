  - type: sentence
    date: "03/19"
    source_de: USA hat hohe Zölle gegen China verhängt.
    folder: am Computer
    simplified: 美国对中国征收了高额关税。
    traditional: 美國對中國徵收了高額關稅。
    pinyin: Měiguó duì Zhōngguó zhēngshōule gāo'é guānshuì.
    english: The USA has imposed high tariffs on China.
    hsk: "超纲"
    grammar_de: |
      Struktur: 美国 + 对 + 中国 + 征收了 + 高额 + 关税.
      对 (duì) markiert das Zielobjekt der Handlung — „gegenüber / gegen jemanden."
      征收 (zhēngshōu) = „erheben / einziehen" — Standardverb für staatliche Abgaben und Zölle.
      了 (le) zeigt den Abschluss der Handlung an — die Zölle wurden bereits verhängt.
      高额 (gāo'é) = „hoher Betrag" — Adjektiv für hohe Geldbeträge.
    examples:
      - zh: 美国对中国进口商品征收了高额关税。
        pinyin: Měiguó duì Zhōngguó jìnkǒu shāngpǐn zhēngshōule gāo'é guānshuì.
        de: Die USA haben hohe Zölle auf chinesische Importwaren erhoben.
      - zh: 高额关税对两国的经济都产生了负面影响。
        pinyin: Gāo'é guānshuì duì liǎng guó de jīngjì dōu chǎnshēngle fùmiàn yǐngxiǎng.
        de: Hohe Zölle haben die Wirtschaft beider Länder negativ beeinflusst.
      - zh: 中国宣布对美国商品采取反制关税措施。
        pinyin: Zhōngguó xuānbù duì Měiguó shāngpǐn cǎiqǔ fǎnzhì guānshuì cuòshī.
        de: China kündigte Gegenzölle auf amerikanische Waren an.
    word_analyses:
      - type: vocabulary
        simplified: 征收
        traditional: 徵收
        pinyin: zhēngshōu
        english: to levy; to collect (taxes, duties)
        hsk: "超纲"
        characters:
          - char: 征
            traditional: 徵
            pinyin: zhēng
            hsk: "5-6"
            detailed_analysis: true
            meaning_in_context: to levy; to collect (from state authority)
            other_meanings:
              - "征税 (zhēng shuì – to levy taxes)"
              - "远征 (yuǎnzhēng – expedition, long campaign)"
              - "征服 (zhēngfú – to conquer)"
              - "象征 (xiàngzhēng – symbol, to symbolize)"
            etymology: |
              The character 征 combines the 彳(chì, step/movement) radical on the left with
              正 (zhèng, upright/correct) as the phonetic component. The movement radical evokes
              marching or advancing, while 正 suggests authority and correctness. Together 征
              originally meant "to march on" or "to go on a military expedition" — the state
              advancing to assert its authority. From military campaigns the meaning extended to
              the state's authority to collect tribute, taxes, and duties. The traditional form
              徵 is more complex but retains the same core components.
            etymology_example:
              zh: 皇帝派兵远征边疆。
              pinyin: Huángdì pài bīng yuǎnzhēng biānjiāng.
              de: Der Kaiser schickte Truppen auf einen Feldzug in die Grenzgebiete.
          - char: 收
            pinyin: shōu
            hsk: "3"
            detailed_analysis: true
            meaning_in_context: to collect; to receive; to take in
            other_meanings:
              - "收入 (shōurù – income, revenue)"
              - "收获 (shōuhuò – harvest, gains)"
              - "接收 (jiēshōu – to receive, to accept)"
              - "收税 (shōu shuì – to collect taxes)"
            etymology: |
              The character 收 combines 丩 (jiū, to entangle/wind) on the left and 攴 (pū, to
              strike/tap lightly) as the right component — a hand performing a gathering action.
              The original image was of harvesting or gathering crops with a light striking
              motion, like beating grain from stalks. From "gathering harvest" the meaning
              extended broadly to "collecting," "receiving," and "taking in" anything — money,
              mail, signals, or taxes. Simplified and traditional forms are identical.
            etymology_example:
              zh: 农民们开始收割庄稼。
              pinyin: Nóngmínmen kāishǐ shōugē zhuāngjia.
              de: Die Bauern begannen mit der Ernte.
      - type: vocabulary
        simplified: 高额
        traditional: 高額
        pinyin: gāo'é
        english: high amount; large sum
        hsk: "超纲"
        characters:
          - char: 高
            pinyin: gāo
            hsk: "1"
            detailed_analysis: false
          - char: 额
            traditional: 額
            pinyin: é
            hsk: "超纲"
            detailed_analysis: true
            meaning_in_context: amount; sum; quota
            other_meanings:
              - "金额 (jīn'é – monetary amount)"
              - "数额 (shù'é – quantity, amount)"
              - "额外 (é wài – extra, additional)"
              - "定额 (dìng'é – fixed quota)"
            etymology: |
              The traditional form 額 uses 頁 (yè, head/page) as the radical and 客 (kè, guest)
              as the phonetic component. The original meaning was "forehead" — the flat surface
              at the top of the face. From "forehead" the meaning extended to "a flat surface
              bearing an inscription" (like a plaque above a door), then to "a fixed amount or
              quota inscribed on such a plaque." In modern Chinese 额 functions as a suffix
              meaning "amount" or "sum." The simplified 额 replaces 頁 with 页.
            etymology_example:
              zh: 她的额头上有一道伤疤。
              pinyin: Tā de étóu shàng yǒu yī dào shāngbā.
              de: Auf ihrer Stirn war eine Narbe.
  - type: sentence
    date: "03/19"
    source_de: Benutzt ihr mehr TikTok oder Instagram?
    folder: am Computer
    simplified: 你们更常用抖音还是Instagram？
    traditional: 你們更常用抖音還是Instagram？
    pinyin: Nǐmen gèng cháng yòng Dǒuyīn háishi Instagram?
    english: Do you (plural) use TikTok or Instagram more?
    hsk: "2-4"
    grammar_de: |
      Struktur: 你们 + 更 + 常 + 用 + A + 还是 + B?
      更 (gèng) = „mehr / noch mehr" — Komparativpartikel. 常 (cháng) = „häufig / oft."
      更常 zusammen = „öfter / mehr." 还是 (háishi) = „oder" in Entscheidungsfragen (A oder B?)
      — nicht zu verwechseln mit 或者 (huòzhě), das in Aussagesätzen „oder" bedeutet.
      TikTok heißt in China 抖音 (Dǒuyīn) — die internationale Version ist in China gesperrt.
      Instagram hat keine feststehende chinesische Übersetzung; umgangssprachlich auch
      ins oder 照片墙 (zhàopiàn qiáng – Fotowand).
    examples:
      - zh: 我每天都刷抖音，但很少用Instagram。
        pinyin: Wǒ měitiān dōu shuā Dǒuyīn, dàn hěn shǎo yòng Instagram.
        de: Ich scrolle jeden Tag durch TikTok, aber benutze Instagram selten.
      - zh: 抖音在中国非常流行，而Instagram在海外更受欢迎。
        pinyin: Dǒuyīn zài Zhōngguó fēicháng liúxíng, ér Instagram zài hǎiwài gèng shòu huānyíng.
        de: TikTok ist in China sehr beliebt, während Instagram im Ausland populärer ist.
      - zh: 很多UP主同时在B站和抖音上发布内容。
        pinyin: Hěn duō UP zhǔ tóngshí zài B zhàn hé Dǒuyīn shàng fābù nèiróng.
        de: Viele Creator veröffentlichen gleichzeitig auf Bilibili und TikTok Inhalte.
    word_analyses:
      - type: vocabulary
        simplified: 常
        pinyin: cháng
        english: often; frequently; usual
        hsk: "3"
        characters:
          - char: 常
            pinyin: cháng
            hsk: "3"
            detailed_analysis: true
            meaning_in_context: often; frequently; usual
            other_meanings:
              - "经常 (jīngcháng – often, regularly)"
              - "平常 (píngcháng – ordinary, usually)"
              - "常识 (chángshí – common sense)"
              - "非常 (fēicháng – very, extremely)"
            etymology: |
              The character 常 combines 巾 (jīn, cloth/kerchief) at the bottom and 尚 (shàng,
              to esteem/above) as the phonetic component on top. The original meaning was a type
              of long ceremonial skirt — something worn regularly and associated with ritual
              constancy. From "regular ceremonial dress" the meaning extended to "constant,"
              "usual," and "often." The idea of something worn habitually every day naturally
              gave rise to the adverbial meaning of frequency. Simplified and traditional forms
              are identical.
            etymology_example:
              zh: 他经常去图书馆看书。
              pinyin: Tā jīngcháng qù túshūguǎn kànshū.
              de: Er geht oft in die Bibliothek zum Lesen.
      - type: vocabulary
        simplified: 抖音
        pinyin: Dǒuyīn
        english: TikTok (Chinese version, lit. "vibrating sound")
        hsk: "超纲"
        characters:
          - char: 抖
            pinyin: dǒu
            hsk: "超纲"
            detailed_analysis: true
            meaning_in_context: to shake; to tremble; evoking pulsing music
            other_meanings:
              - "抖动 (dǒudòng – to shake, to vibrate)"
              - "发抖 (fādǒu – to shiver, to tremble)"
              - "抖擞 (dǒusǒu – to rouse oneself, energetic)"
            etymology: |
              The character 抖 uses the hand radical 扌(shǒu) on the left and 斗 (dǒu, a
              measuring vessel/to fight) as the phonetic component. The hand radical grounds
              the meaning in a quick, jerky shaking motion. In the app name 抖音, 抖 evokes
              the rhythmic, pulsing quality of music that makes you want to move and dance.
              Simplified and traditional forms are identical.
            etymology_example:
              zh: 她冷得直发抖。
              pinyin: Tā lěng de zhí fādǒu.
              de: Sie zitterte vor Kälte.
          - char: 音
            pinyin: yīn
            hsk: "3"
            detailed_analysis: true
            meaning_in_context: sound; music; tone
            other_meanings:
              - "音乐 (yīnyuè – music)"
              - "声音 (shēngyīn – sound, voice)"
              - "音调 (yīndiào – tone, pitch)"
              - "噪音 (zàoyīn – noise)"
            etymology: |
              The character 音 is derived from 言 (yán, speech/words) with an extra stroke
              inside — the image of sound coming out of a mouth, but more refined than mere
              speech. Where 言 depicts articulated words, 音 captures the broader concept of
              musical sound and tone. In classical Chinese poetics, 音 referred specifically to
              musical notes and tonal qualities of language. In 抖音 it pairs with 抖 (vibrate)
              to evoke "vibrating sound" — the pulsing beat of music. Simplified and traditional
              forms are identical.
            etymology_example:
              zh: 这首歌的音调很优美。
              pinyin: Zhè shǒu gē de yīndiào hěn yōuměi.
              de: Die Melodie dieses Liedes ist sehr schön.
      - char_only: 还是
        pinyin: háishi
        hsk: "2"
        detailed_analysis: false