    grammar_de: |
      免不了 ist ein Resultativkomplement (结果补语): 免 (vermeiden) + 不了 (nicht möglich).
      Struktur: Verb + 不了 = „kann nicht [Verb] werden."
      Kontrast: 免得了 (miǎn de liǎo) = kann vermieden werden (mit 得 statt 不).
