          Oracle bone and bronze script depict a weapon (戊, a type of axe) with a sound
          indicator — originally related to completing a military campaign. The radical is
          戈 (gē, spear/weapon). Extended from "completing a military action" to general
          completion and success. Simplified and traditional forms are identical.
        etymology_example:
          zh: 他终于完成了多年的心愿。
