            pinyin: gèlèi
            meaning: various kinds
          - simplified: 分类
            pinyin: fēnlèi
            meaning: to classify, to categorize
        etymology: |
          Traditional 類 combines 頁 (head), 犬 (dog), and 米 (grain/rice) — originally
