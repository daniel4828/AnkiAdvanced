    characters:
      - char: 所
        pinyin: suǒ
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: that which, what is (nominalizer particle)
        other_meanings:
          - "place (场所 chǎngsuǒ)"
          - "measure word for buildings"
          - "used in passive constructions"
        compounds:
          - simplified: 场所
            pinyin: chǎngsuǒ
            meaning: place, venue
          - simplified: 所以
            pinyin: suǒyǐ
            meaning: therefore, so
          - simplified: 所有
            pinyin: suǒyǒu
