    examples:
      - zh: 长途旅行免不了会累。
        pinyin: Cháng tú lǚxíng miǎn bu liǎo huì lèi.
        de: Bei einer langen Reise ist Erschöpfung unvermeidlich.
      - zh: 犯了错误，免不了要受批评。
