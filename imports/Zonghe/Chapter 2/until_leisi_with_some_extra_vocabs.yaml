        pinyin: bù
        hsk: "1"
        detailed_analysis: false
        note: bereits analysiert
      - char: 了
        pinyin: liǎo
        hsk: "1"
        detailed_analysis: false
  - type: vocabulary
    date: "03/16"
    simplified: 货币
    traditional: 貨幣
    pinyin: huòbì
    english: currency / money / coinage
    hsk: "5"
    examples:
      - zh: 欧元是欧洲多国通用的货币。
        pinyin: Ōuyuán shì Ōuzhōu duō guó tōngyòng de huòbì.
        de: Der Euro ist die gemeinsame Währung vieler europäischer Länder.
      - zh: 货币的价值会随着通货膨胀而下降。
        pinyin: Huòbì de jiàzhí huì suízhe tōnghuò péngzhàng ér xiàjiàng.
        de: Der Wert einer Währung sinkt mit der Inflation.
      - zh: 数字货币正在改变全球金融体系。
        pinyin: Shùzì huòbì zhèngzài gǎibiàn quánqiú jīnróng tǐxì.
        de: Digitale Währungen verändern gerade das globale Finanzsystem.
      - zh: 古代中国用贝壳作为最早的货币。
        pinyin: Gǔdài Zhōngguó yòng bèiké zuòwéi zuìzǎo de huòbì.
        de: Im alten China wurden Kaurimuscheln als früheste Währung verwendet.
    characters:
      - char: 货
        traditional: 貨
        pinyin: huò
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: goods, merchandise; currency (in 货币)
        other_meanings:
          - "freight (货物 huòwù)"
          - "to sell (贩货 fànhuò)"
          - "blockhead, jokingly (笨货 bèn huò)"
        compounds:
          - simplified: 货物
            pinyin: huòwù
            meaning: goods, freight
          - simplified: 货币
            pinyin: huòbì
            meaning: currency
          - simplified: 百货
            pinyin: bǎihuò
            meaning: general merchandise (百货公司 = department store)
        etymology: |
          货 has the cowrie shell/money radical 贝/貝 (bèi) at the bottom, directly tying
          the character to ancient Chinese commerce, and the phonetic component 化 (huà,
          to change/transform) on top providing the sound. Goods as things exchanged and
          transformed through trade. Traditional 貨 preserves the full 貝.
        etymology_example:
          zh: 这批货明天就能到达仓库。
          pinyin: Zhè pī huò míngtiān jiù néng dàodá cāngkù.
          de: Diese Warenlieferung kommt morgen im Lager an.
      - char: 币
        traditional: 幣
        pinyin: bì
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: coin, currency
        other_meanings:
          - "coin (硬币 yìngbì)"
          - "banknote (纸币 zhǐbì)"
          - "RMB (人民币 Rénmínbì)"
        compounds:
          - simplified: 硬币
            pinyin: yìngbì
            meaning: coin
          - simplified: 纸币
            pinyin: zhǐbì
            meaning: banknote
          - simplified: 人民币
            pinyin: Rénmínbì
            meaning: Chinese yuan (RMB)
        etymology: |
          币 has the cloth radical 巾 (jīn) at the bottom — cloth was one of the earliest
          forms of currency in ancient China, with lengths of silk used as payment. The
          phonetic component 敝 (bì, worn out) provides the sound. Traditional 幣 preserves
          the full phonetic 敝 above 巾; simplified 币 drastically reduces this. The
          character literally encodes the history of cloth-as-money.
        etymology_example:
          zh: 人民币是中国的法定货币。
          pinyin: Rénmínbì shì Zhōngguó de fǎdìng huòbì.
          de: Der Renminbi ist Chinas gesetzliches Zahlungsmittel.
  - type: vocabulary
    date: "03/16"
    simplified: 俗
    traditional: 俗
    pinyin: sú
    english: common / vulgar / worldly / popular / custom
    hsk: "5"
    examples:
      - zh: 这幅画太俗气，不适合挂在客厅。
        pinyin: Zhè fú huà tài súqì, bù shìhé guà zài kètīng.
        de: Dieses Gemälde ist zu kitschig — es passt nicht ins Wohnzimmer.
      - zh: 入乡随俗是与人相处的智慧。
        pinyin: Rù xiāng suí sú shì yǔ rén xiāngchǔ de zhìhuì.
        de: „Wenn du in ein Dorf kommst, folge seinen Bräuchen" — das ist die Weisheit im Umgang mit Menschen.
      - zh: 雅俗共赏的作品才是真正的好作品。
        pinyin: Yǎ sú gòng shǎng de zuòpǐn cái shì zhēnzhèng de hǎo zuòpǐn.
        de: Ein wirklich gutes Werk ist eines, das sowohl Gebildete als auch einfache Menschen schätzen.
      - zh: 他说话很通俗易懂，老百姓都喜欢听。
        pinyin: Tā shuōhuà hěn tōngsú yì dǒng, lǎobǎixìng dōu xǐhuān tīng.
        de: Er spricht verständlich und volksnah — die einfachen Leute hören ihm gerne zu.
    characters:
      - char: 俗
        pinyin: sú
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: common, popular, worldly; vulgar, kitsch
        other_meanings:
          - "custom, convention (风俗 fēngsú)"
          - "colloquial, accessible (通俗 tōngsú)"
          - "secular, worldly (世俗 shìsú)"
        compounds:
          - simplified: 风俗
            pinyin: fēngsú
            meaning: custom, folk tradition
          - simplified: 通俗
            pinyin: tōngsú
            meaning: popular, accessible, colloquial
          - simplified: 世俗
            pinyin: shìsú
            meaning: secular, worldly
          - simplified: 俗气
            pinyin: súqì
            meaning: vulgar, kitsch, tasteless
        etymology: |
          俗 has the person radical 亻(人, rén) on the left and the phonetic component
          谷 (gǔ, valley) on the right, providing the sound. The valley is where common
          people live, as opposed to the mountain where sages retreat — a subtle social
          geography encoded in the character. Hence "of the common people, worldly,
          conventional." Extended to "vulgar" when contrasted with refinement (雅 yǎ).
          Simplified and traditional forms are identical.
        etymology_example:
          zh: 各地都有自己的风俗习惯。
          pinyin: Gèdì dōu yǒu zìjǐ de fēngsú xíguàn.
          de: Jede Region hat ihre eigenen Sitten und Bräuche.
