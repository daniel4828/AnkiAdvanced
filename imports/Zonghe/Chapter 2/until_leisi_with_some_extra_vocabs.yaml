      - char: 类
        traditional: 類
        pinyin: lèi
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: category, type, kind (in 类似 — of a similar type)
        other_meanings:
          - "human race (人类 rénlèi)"
          - "various kinds (各类 gèlèi)"
          - "to classify"
        compounds:
          - simplified: 人类
            pinyin: rénlèi
            meaning: humankind
