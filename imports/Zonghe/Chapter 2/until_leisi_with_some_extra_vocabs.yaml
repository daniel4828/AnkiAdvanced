          - "meaning, sense"
        compounds:
          - simplified: 无所谓
            pinyin: wúsuǒwèi
            meaning: doesn't matter, indifferent
          - simplified: 所谓
            pinyin: suǒwèi
            meaning: so-called
        etymology: |
          谓 has the speech radical 讠(言, yán) on the left and the phonetic component
          胃 (wèi, stomach) on the right, providing the sound. Originally meant to speak
          to someone directly, to address. Extended to "to name, to call something."
          Traditional 謂 uses the full 言.
        etymology_example:
          zh: 无所谓，怎么都行。
          pinyin: Wúsuǒwèi, zěnme dōu xíng.
          de: Egal, alles ist mir recht.
  - type: vocabulary
