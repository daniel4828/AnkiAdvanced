  - type: sentence
    date: "03/15"
    source_de: Ich habe auf den Tisch gehauen. Ich wollte irgendwie erwachsen wirken.
    simplified: 我拍了桌子。我不知为何想显得成熟。
    traditional: 我拍了桌子。我不知為何想顯得成熟。
    pinyin: Wǒ pāi le zhuōzi. Wǒ bù zhī wèihé xiǎng xiǎnde chéngshú.
    english: I slammed my fist on the table. I somehow wanted to appear grown-up / mature.
    hsk: "3-4"
    grammar_de: |
      Satz 1 — 我拍了桌子：
      Struktur: 我 (Subj.) + 拍 (Verb: schlagen/klatschen) + 了 (Aspektpartikel: abgeschlossen)
      + 桌子 (Obj.). 拍桌子 ist die natürlichste Entsprechung für „auf den Tisch hauen".
      Alternativen je nach Intensität: 敲桌子 (rhythmisch klopfen), 砸桌子 (mit voller Wucht).
      Satz 2 — 我不知为何想显得成熟：
      不知为何 = „irgendwie / ich weiß nicht warum" (wörtlich: weiß nicht weshalb).
      显得 (xiǎnde) = wirken, erscheinen — betont den Eindruck auf andere; Unterschied zu
      看起来 (kànqǐlái), das eher visuelle Wahrnehmung betont.
      成熟 = reif, erwachsen (physisch und psychisch).
      Alternativen: 我想让自己看起来更成熟 (mit Kausativkonstruktion 让);
      我莫名地想表现得成熟一些 (莫名 = unerklärlich).
    examples:
      - zh: 他生气地拍了桌子，大声说："够了！"
        pinyin: Tā shēngqì de pāi le zhuōzi, dàshēng shuō "Gòu le!"
        de: Er schlug wütend auf den Tisch und rief laut „Genug!"
      - zh: 她不知为何想在同事面前显得更自信。
        pinyin: Tā bù zhī wèihé xiǎng zài tóngshì miànqián xiǎnde gèng zìxìn.
        de: Sie wollte aus irgendeinem Grund vor den Kollegen selbstbewusster wirken.
      - zh: 青少年有时会做一些奇怪的事，只是想显得成熟。
        pinyin: Qīngshàonián yǒushí huì zuò yīxiē qíguài de shì, zhǐshì xiǎng xiǎnde chéngshú.
        de: Jugendliche tun manchmal seltsame Dinge, nur um erwachsen zu wirken.
      - zh: 他拍桌子的样子反而让他显得更不成熟。
        pinyin: Tā pāi zhuōzi de yàngzi fǎn'ér ràng tā xiǎnde gèng bù chéngshú.
        de: Sein Auf-den-Tisch-Hauen ließ ihn im Gegenteil noch unreifer wirken.
      - zh: 我莫名地想表现得成熟一些，结果适得其反。
        pinyin: Wǒ mòmíng de xiǎng biǎoxiàn de chéngshú yīxiē, jiéguǒ shìdéqífǎn.
        de: Ich wollte aus irgendeinem Grund reifer wirken — das Gegenteil trat ein.
