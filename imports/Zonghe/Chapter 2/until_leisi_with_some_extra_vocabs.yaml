          of things belonging together in a group. Simplified 类 reduces this significantly,
          retaining 米 at the bottom. Extended to any category or classification.
        etymology_example:
          zh: 人类应该保护濒危动物。
          pinyin: Rénlèi yīnggāi bǎohù bīn wēi dòngwù.
          de: Die Menschheit sollte bedrohte Tierarten schützen.
      - char: 似
        pinyin: sì
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: to resemble, to be similar to
        other_meanings:
          - "seemingly, as if (似乎 sìhū)"
          - "similar (相似 xiāngsì)"
          - "colloquial: like (似的 shìde)"
        compounds:
          - simplified: 似乎
            pinyin: sìhū
            meaning: seemingly, as if
          - simplified: 相似
            pinyin: xiāngsì
            meaning: similar, alike
          - simplified: 类似
            pinyin: lèisì
