        pinyin: zhào
        hsk: "6"
        detailed_analysis: true
        meaning_in_context: omen, sign, portent; mega- prefix for large numbers
        other_meanings:
          - "trillion (in traditional Chinese counting)"
          - "sign, omen (兆头 zhàotou)"
          - "megahertz (兆赫 zhàohè)"
        compounds:
          - simplified: 兆头
            pinyin: zhàotou
