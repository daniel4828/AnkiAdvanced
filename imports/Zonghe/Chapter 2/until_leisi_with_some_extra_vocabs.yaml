entries:
  - type: sentence
    date: "03/15"
    source_de: Ich kann es kaum erwarten
    simplified: 我迫不及待
    traditional: 我迫不及待
    pinyin: Wǒ pò bù jí dài
    english: I can hardly wait / I can't wait
    hsk: "5-6"
    grammar_de: |
      迫不及待 ist ein 成语 (chéngyǔ) — eine vierstellige klassische Redewendung — und bedeutet
      wörtlich „so gedrängt, dass man nicht warten kann". Es wird als Adverbialausdruck verwendet
      und steht häufig vor dem Hauptverb, oft verbunden mit dem Strukturpartikel 地 (de), das
      das Adverbial vom Verb trennt (z.B. 迫不及待地想…).
      Alternative Ausdrücke:
      - 我等不及了 (Wǒ děng bù jí le) — umgangssprachlicher, weniger intensiv
      - 我急不可耐 (Wǒ jí bù kě nài) — ähnlich formal wie 迫不及待
    examples:
      - zh: 他迫不及待地打开了礼物。
        pinyin: Tā pò bù jí dài de dǎkāi le lǐwù.
        de: Er konnte es kaum erwarten, das Geschenk zu öffnen.
      - zh: 我迫不及待地想知道结果。
        pinyin: Wǒ pò bù jí dài de xiǎng zhīdào jiéguǒ.
        de: Ich kann es kaum erwarten, das Ergebnis zu erfahren.
      - zh: 孩子们迫不及待地冲进了游乐园。
        pinyin: Háizimen pò bù jí dài de chōng jìn le yóulèyuán.
        de: Die Kinder stürmten voller Ungeduld in den Freizeitpark.
      - zh: 她迫不及待地分享了这个好消息。
        pinyin: Tā pò bù jí dài de fēnxiǎng le zhège hǎo xiāoxi.
        de: Sie konnte es kaum erwarten, die gute Nachricht zu teilen.
      - zh: 我迫不及待地想回家见我的家人。
        pinyin: Wǒ pò bù jí dài de xiǎng huí jiā jiàn wǒ de jiārén.
        de: Ich kann es kaum erwarten, nach Hause zu fahren und meine Familie zu sehen.
    characters:
      - char: 我
        pinyin: wǒ
        hsk: 1
        detailed_analysis: false
      - char: 迫
        pinyin: pò
        hsk: "5-6"
        detailed_analysis: true
        meaning_in_context: pressed, urgent, forced
        other_meanings:
          - "to approach, to be close to (迫近 pòjìn)"
          - "to compel, to oppress (逼迫 bīpò)"
          - "urgent (紧迫 jǐnpò)"
          - "to persecute (迫害 pòhài)"
          - "to be forced to (被迫 bèipò)"
        compounds:
          - simplified: 紧迫
            pinyin: jǐnpò
            meaning: urgent, pressing
          - simplified: 被迫
            pinyin: bèipò
            meaning: to be forced to
          - simplified: 迫害
            pinyin: pòhài
            meaning: to persecute
          - simplified: 迫近
            pinyin: pòjìn
            meaning: to approach, to close in on
        etymology: |
          迫 consists of the movement radical 辶 (辵, chuò) on the left, suggesting motion
          or approach, and the phonetic component 白 (bái) on the right, which approximates
          the sound (though the tone differs). Originally conveyed the sense of pressing
          close or approaching with urgency; extended to mean being hemmed in, compelled,
          or forced. Simplified and traditional forms are identical.
        etymology_example:
          zh: 敌军迫近城墙。
          pinyin: Díjūn pòjìn chéngqiáng.
          de: Die feindliche Armee näherte sich der Stadtmauer.
      - char: 不
        pinyin: bù
        hsk: 1
        detailed_analysis: false
      - char: 及
        pinyin: jí
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: to reach, to catch up with
        other_meanings:
          - "and (literary usage)"
          - "in time, to make it (来得及 láidejí)"
          - "too late, unable to make it (来不及 láibùjí)"
          - "to involve, to touch upon (涉及 shèjí)"
        compounds:
          - simplified: 及时
            pinyin: jíshí
            meaning: in time, promptly
          - simplified: 来不及
            pinyin: láibùjí
            meaning: too late, unable to make it in time
          - simplified: 涉及
            pinyin: shèjí
            meaning: to involve, to touch upon
        etymology: |
          Oracle bone script depicts a hand reaching out and grasping a person from behind —
          the vivid image of "catching up to" something or someone. The radical is 又 (yòu),
          meaning "hand/again," reinforcing the sense of reaching out. The literary meaning
          "and" developed from the idea of "extending to / reaching as far as." Simplified
          and traditional forms are identical.
        etymology_example:
          zh: 他跑得太快，我根本及不上他。
          pinyin: Tā pǎo de tài kuài, wǒ gēnběn jí bù shàng tā.
          de: Er lief so schnell, dass ich ihn unmöglich einholen konnte.
      - char: 待
        pinyin: dài
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: to wait
        other_meanings:
          - "to treat (待人 dàirén)"
          - "to stay somewhere, colloquial (dāi)"
          - "to receive/entertain guests (招待 zhāodài)"
          - "to treat someone (对待 duìdài)"
          - "to look forward to (期待 qīdài)"
        compounds:
          - simplified: 等待
            pinyin: děngdài
            meaning: to wait
          - simplified: 期待
            pinyin: qīdài
            meaning: to look forward to, to anticipate
          - simplified: 招待
            pinyin: zhāodài
            meaning: to receive/entertain guests
          - simplified: 对待
            pinyin: duìdài
            meaning: to treat (someone)
        etymology: |
          待 consists of the "step/walk" radical 彳 (chì) on the left, suggesting movement
          or pausing mid-movement, and the phonetic component 寺 (sì, temple) on the right,
          which provides the sound. Originally depicted pausing in one's tracks, hence both
          "to wait" and "to attend to / treat someone." The dual reading (dài = wait/treat;
          dāi = to stay, colloquial) reflects this split in meaning. Simplified and traditional
          forms are identical.
        etymology_example:
          zh: 请在此稍待片刻。
          pinyin: Qǐng zài cǐ shāo dài piànkè.
          de: Bitte warten Sie hier einen Moment.
  - type: sentence
    date: "03/15"
    source_de: Ich bin dem Sonnenschein sehr dankbar.
    simplified: 我非常感谢阳光。
    traditional: 我非常感謝陽光。
    pinyin: Wǒ fēicháng gǎnxiè yángguāng.
    english: I am very grateful for the sunshine.
    hsk: "3-4"
    grammar_de: |
      Der deutsche Satz verwendet „jemandem/etwas dankbar sein" — auf Chinesisch wird dies mit
      感谢 (gǎnxiè) + Objekt ausgedrückt, einer direkten Verb-Objekt-Konstruktion ohne Dativ.
      Struktur: 我 (Subj.) + 非常 (Adverbial: sehr) + 感谢 (Verb) + 阳光 (Obj.).
      Alternativen:
      - 我对阳光充满感激。(Wǒ duì yángguāng chōngmǎn gǎnjī.) — mit Präposition 对 (duì),
        poetischer: „Ich bin erfüllt von Dankbarkeit gegenüber dem Sonnenschein."
      - 我很感激有阳光。(Wǒ hěn gǎnjī yǒu yángguāng.) — „Ich bin dankbar, dass es Sonnenschein gibt."
    examples:
      - zh: 我非常感谢你的帮助。
        pinyin: Wǒ fēicháng gǎnxiè nǐ de bāngzhù.
        de: Ich bin dir sehr dankbar für deine Hilfe.
      - zh: 他对大自然充满感激。
        pinyin: Tā duì dàzìrán chōngmǎn gǎnjī.
        de: Er ist der Natur gegenüber voller Dankbarkeit.
      - zh: 我们应该感谢生命中美好的事物。
        pinyin: Wǒmen yīnggāi gǎnxiè shēngmìng zhōng měihǎo de shìwù.
        de: Wir sollten dankbar sein für die schönen Dinge im Leben.
      - zh: 她感激地看着他。
        pinyin: Tā gǎnjī de kànzhe tā.
        de: Sie schaute ihn dankbar an.
      - zh: 我对今天的阳光心存感激。
        pinyin: Wǒ duì jīntiān de yángguāng xīn cún gǎnjī.
        de: Ich trage Dankbarkeit für den heutigen Sonnenschein in meinem Herzen.
    characters:
      - char: 我
        pinyin: wǒ
        hsk: 1
        detailed_analysis: false
        note: bereits analysiert
      - char: 非
        pinyin: fēi
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: not, non- (prefix in 非常 — extraordinary → very)
        other_meanings:
          - "wrong, to violate"
          - "Africa (abbrev. 非洲 Fēizhōu)"
          - "illegal (非法 fēifǎ)"
        compounds:
          - simplified: 非常
            pinyin: fēicháng
            meaning: extremely, very
          - simplified: 是非
            pinyin: shìfēi
            meaning: right and wrong
          - simplified: 非法
            pinyin: fēifǎ
            meaning: illegal
        etymology: |
          Oracle bone script depicts two wings pointing in opposite directions — the image of
          things going against each other, hence "not, contrary to." 非 is its own radical.
          Extended from "going against" to general negation. In 非常 the literal sense is
          "not ordinary/normal" → extraordinary → very. Simplified and traditional forms
          are identical.
        etymology_example:
          zh: 此事是非难断。
          pinyin: Cǐ shì shìfēi nán duàn.
          de: Bei dieser Sache ist Recht und Unrecht schwer zu beurteilen.
      - char: 常
        pinyin: cháng
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: ordinary, normal (in 非常 → extraordinary → very)
        other_meanings:
          - "often, frequently"
          - "constant, always"
          - "usually (通常 tōngcháng)"
        compounds:
          - simplified: 经常
            pinyin: jīngcháng
            meaning: often, regularly
          - simplified: 正常
            pinyin: zhèngcháng
            meaning: normal
          - simplified: 通常
            pinyin: tōngcháng
            meaning: usually, normally
        etymology: |
          常 has the cloth/curtain radical 巾 (jīn) at the bottom and the phonetic component
          尚 (shàng) on top, which provides the sound. Originally referred to a long ceremonial
          cloth or banner; extended to mean "constant, unchanging" → "ordinary, normal" → "often."
          Simplified and traditional forms are identical.
        etymology_example:
          zh: 他经常在早晨散步。
          pinyin: Tā jīngcháng zài zǎochén sànbù.
          de: Er geht oft morgens spazieren.
      - char: 感
        pinyin: gǎn
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: to feel, to sense; gratitude
        other_meanings:
          - "to move emotionally (感动 gǎndòng)"
          - "feeling, emotion (感情 gǎnqíng)"
          - "to catch a cold (感冒 gǎnmào)"
          - "sensation (感觉 gǎnjué)"
        compounds:
          - simplified: 感觉
            pinyin: gǎnjué
            meaning: feeling, sensation
          - simplified: 感动
            pinyin: gǎndòng
            meaning: to be moved (emotionally)
          - simplified: 感情
            pinyin: gǎnqíng
            meaning: emotion, feeling, affection
          - simplified: 感冒
            pinyin: gǎnmào
            meaning: to catch a cold
        etymology: |
          感 has the heart radical 心 (xīn) at the bottom, indicating an emotional or mental
          state, and the phonetic component 咸 (xián) on top, which originally meant "all,
          together" — the idea of the heart being touched by something from outside. The
          character conveys the heart being moved or affected by an external stimulus.
          Simplified and traditional forms are identical.
        etymology_example:
          zh: 这首歌深深地感动了我。
          pinyin: Zhè shǒu gē shēnshēn de gǎndòng le wǒ.
          de: Dieses Lied hat mich tief bewegt.
      - char: 谢
        traditional: 謝
        pinyin: xiè
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: to thank, gratitude
        other_meanings:
          - "to wither/fall (flowers — 凋谢 diāoxiè)"
          - "to decline an offer"
          - "to express thanks (道谢 dàoxiè)"
        compounds:
          - simplified: 谢谢
            pinyin: xièxie
            meaning: thank you
          - simplified: 感谢
            pinyin: gǎnxiè
            meaning: to be grateful
          - simplified: 凋谢
            pinyin: diāoxiè
            meaning: to wither, to fade (flowers)
          - simplified: 道谢
            pinyin: dàoxiè
            meaning: to express thanks
        etymology: |
          谢 has the speech radical 讠(言, yán) on the left, indicating verbal expression,
          and the phonetic component 射 (shè, to shoot) on the right, approximating the sound.
          Traditional form 謝 uses the full 言 radical; simplified 谢 uses the abbreviated 讠.
          Originally meant to speak words of acknowledgment; extended to formal thanks and
          later to "letting go" — as in flowers shedding their petals (凋谢).
        etymology_example:
          zh: 秋风一吹，花儿都凋谢了。
          pinyin: Qiūfēng yī chuī, huār dōu diāoxiè le.
          de: Als der Herbstwind blies, verwelkten alle Blumen.
      - char: 阳
        traditional: 陽
        pinyin: yáng
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: sun, sunlight
        other_meanings:
          - "the sun (太阳 tàiyáng)"
          - "south side of a mountain"
          - "male/positive principle in 阴阳"
          - "balcony (阳台 yángtái)"
        compounds:
          - simplified: 阳光
            pinyin: yángguāng
            meaning: sunshine, sunlight
          - simplified: 太阳
            pinyin: tàiyáng
            meaning: the sun
          - simplified: 阴阳
            pinyin: yīnyáng
            meaning: yin and yang
          - simplified: 阳台
            pinyin: yángtái
            meaning: balcony
        etymology: |
          阳 has the mound/hill radical 阝(阜, fù) on the left, originally relating to elevated
          terrain, and the phonetic component 昜 (yáng) on the right, which depicts the sun
          rising over a horizon with rays — directly evoking sunlight. Traditional 陽 preserves
          the full phonetic 昜; simplified 阳 reduces the right side. Originally referred to
          the sunny (south-facing) side of a hill; extended to sunlight, brightness, and the
          yang principle in Chinese philosophy.
        etymology_example:
          zh: 山的阳面比阴面温暖得多。
          pinyin: Shān de yáng miàn bǐ yīn miàn wēnnuǎn de duō.
          de: Die Südseite des Berges ist viel wärmer als die Nordseite.
      - char: 光
        pinyin: guāng
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: light, rays
        other_meanings:
          - "glory, honor (光荣 guāngróng)"
          - "bare, naked"
          - "to use up completely"
          - "only"
          - "smooth (光滑 guānghuá)"
        compounds:
          - simplified: 光明
            pinyin: guāngmíng
            meaning: bright, radiant; promising
          - simplified: 目光
            pinyin: mùguāng
            meaning: gaze, eyesight
          - simplified: 光荣
            pinyin: guāngróng
            meaning: glory, honor
          - simplified: 光滑
            pinyin: guānghuá
            meaning: smooth
        etymology: |
          Oracle bone and bronze script depict a person (人) kneeling beneath a flame on their
          head — a torch-bearer, symbolizing light. 光 is its own radical. From the concrete
          image of a flame or torch, the meaning extended to all forms of light and brightness,
          and by further extension to glory and honor. Simplified and traditional forms are
          identical.
        etymology_example:
          zh: 火光照亮了黑暗的山洞。
          pinyin: Huǒguāng zhàoliàng le hēiàn de shāndòng.
          de: Das Feuerlicht erhellte die dunkle Höhle.
  - type: vocabulary
    date: "03/15"
    source_de: vorzeitige Sehnsucht
    simplified: 过早的思念
    traditional: 過早的思念
    pinyin: guòzǎo de sīniàn
    english: premature longing / early-onset yearning
    hsk: "4-5"
    examples:
      - zh: 他们还没分离，她心中已涌起过早的思念。
        pinyin: Tāmen hái méi fēnlí, tā xīn zhōng yǐ yǒngqǐ guòzǎo de sīniàn.
        de: Sie hatten sich noch nicht getrennt, doch in ihrem Herzen stieg bereits vorzeitige Sehnsucht auf.
      - zh: 这种过早的思念，比真正的别离更难受。
        pinyin: Zhè zhǒng guòzǎo de sīniàn, bǐ zhēnzhèng de bié lí gèng nán shòu.
        de: Diese vorzeitige Sehnsucht ist schwerer zu ertragen als die eigentliche Trennung.
      - zh: 火车还没开，我就开始思念家乡了。
        pinyin: Huǒchē hái méi kāi, wǒ jiù kāishǐ sīniàn jiāxiāng le.
        de: Der Zug war noch nicht abgefahren, und ich vermisste schon meine Heimat.
      - zh: 预知别离的痛苦，让这份思念更加沉重。
        pinyin: Yù zhī bié lí de tòngkǔ, ràng zhè fèn sīniàn gèng jiā chénzhòng.
        de: Das Wissen um den kommenden Abschied macht diese Sehnsucht noch schwerer.
      - zh: 她望着窗外，心里已经开始过早地想念他。
        pinyin: Tā wàng zhe chuāng wài, xīn lǐ yǐjīng kāishǐ guòzǎo de xiǎngniàn tā.
        de: Sie schaute aus dem Fenster und begann schon vorzeitig, ihn zu vermissen.
    characters:
      - char: 过
        traditional: 過
        pinyin: guò
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: excessively, too (prefix indicating excess, as in 过早 — too early)
        other_meanings:
          - "to pass, to go through (经过 jīngguò)"
          - "the past (过去 guòqù)"
          - "excessive, going too far (过分 guòfèn)"
          - "a mistake/fault"
        compounds:
          - simplified: 经过
            pinyin: jīngguò
            meaning: to pass by, to go through
          - simplified: 过去
            pinyin: guòqù
            meaning: the past; to go over
          - simplified: 过分
            pinyin: guòfèn
            meaning: excessive, going too far
        etymology: |
          过 has the movement/walk radical 辶 (辵, chuò) indicating motion, and the phonetic
          component 咼 (guō/wā) providing the sound. Traditional 過 preserves the full phonetic;
          simplified 过 reduces it. Originally meant "to pass by, to cross over"; extended to
          "excess" (crossing a boundary too far) and "mistake" (going beyond what is correct).
        etymology_example:
          zh: 时间一去不过返，要珍惜当下。
          pinyin: Shíjiān yī qù bù guò fǎn, yào zhēnxī dāngxià.
          de: Die Zeit vergeht und kehrt nicht zurück — man sollte den Moment schätzen.
      - char: 早
        pinyin: zǎo
        hsk: "1"
        detailed_analysis: true
        meaning_in_context: early
        other_meanings:
          - "good morning (早! as greeting)"
          - "long ago, already (早已 zǎoyǐ)"
          - "premature (过早 guòzǎo)"
        compounds:
          - simplified: 早上
            pinyin: zǎoshang
            meaning: morning
          - simplified: 早已
            pinyin: zǎoyǐ
            meaning: long since, already
        note: |
          HSK 1 character, but analysed here due to its role in the compound 过早 and its
          interesting pictographic etymology.
        etymology: |
          Oracle bone script depicts the sun (日) above a plant or stem — the sun just rising
          above vegetation, evoking early morning. The radical is 日 (rì, sun). The image is
          purely pictographic: sunrise = early. Extended to "morning" and then to "ahead of
          time / premature." Simplified and traditional forms are identical.
        etymology_example:
          zh: 太阳早早升起，照亮了山谷。
          pinyin: Tàiyáng zǎozǎo shēngqǐ, zhàoliàng le shāngǔ.
          de: Die Sonne ging früh auf und beleuchtete das Tal.
      - char: 思
        pinyin: sī
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: to think of, to miss, to long for
        other_meanings:
          - "thought, thinking (思想 sīxiǎng)"
          - "to ponder (沉思 chénsī)"
          - "lovesickness (相思 xiāngsī)"
          - "literary inspiration (文思 wénsī)"
        compounds:
          - simplified: 思考
            pinyin: sīkǎo
            meaning: to think, to reflect
          - simplified: 思想
            pinyin: sīxiǎng
            meaning: thought, ideology
          - simplified: 相思
            pinyin: xiāngsī
            meaning: mutual longing, lovesickness
          - simplified: 沉思
            pinyin: chénsī
            meaning: to ponder deeply
        etymology: |
          思 has the heart radical 心 (xīn) at the bottom and the phonetic component 囟 (xìn)
          — the fontanelle (top of the skull), historically associated with the mind — on top.
          The combination of skull (mind) + heart beautifully captures the Chinese understanding
          of thinking as both cognitive and emotional. Simplified and traditional forms are
          identical.
        etymology_example:
          zh: 他沉思良久，终于做出了决定。
          pinyin: Tā chénsī liáng jiǔ, zhōngyú zuòchū le juédìng.
          de: Er grübelte lange und traf schließlich eine Entscheidung.
      - char: 念
        pinyin: niàn
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: to miss, to long for (in 思念)
        other_meanings:
          - "to read aloud (念书 niànshū)"
          - "thought, idea (念头 niàntou)"
          - "to commemorate (纪念 jìniàn)"
          - "belief, conviction (信念 xìnniàn)"
        compounds:
          - simplified: 想念
            pinyin: xiǎngniàn
            meaning: to miss someone
          - simplified: 念书
            pinyin: niànshū
            meaning: to study, to read books
          - simplified: 纪念
            pinyin: jìniàn
            meaning: to commemorate
          - simplified: 信念
            pinyin: xìnniàn
            meaning: belief, conviction
        etymology: |
          念 has the heart radical 心 (xīn) at the bottom and 今 (jīn, now/the present moment)
          on top. The combination suggests "the heart dwelling on the present moment" — what
          the heart is preoccupied with right now. Extended to "to miss" (the heart staying
          with someone or something absent). Simplified and traditional forms are identical.
        etymology_example:
          zh: 他心中只有一个念头：回家。
          pinyin: Tā xīn zhōng zhǐ yǒu yīgè niàntou huí jiā.
