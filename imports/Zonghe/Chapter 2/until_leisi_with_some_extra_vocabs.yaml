        etymology: |
          似 has the person radical 亻(人, rén) on the left and the phonetic component
          以 (yǐ, by means of) on the right providing approximate sound. Originally depicted
          one person resembling another. Extended to any form of resemblance or similarity.
          The reading shì appears in colloquial 似的 (shìde, like/as if). Simplified and
          traditional forms are identical.
        etymology_example:
