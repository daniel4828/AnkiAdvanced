  - type: sentence
    date: "03/16"
    source_de: Morgen würde ich gerne 放假。Ich fahre auf eine Tagung wo ich bei einigen Vorträgen zuhöre, die von meinem Stipendium angeboten werden.
    simplified: 明天我想放假。我要去参加一个研讨会，听几场由我的奖学金项目提供的讲座。
    traditional: 明天我想放假。我要去參加一個研討會，聽幾場由我的獎學金項目提供的講座。
    pinyin: Míngtiān wǒ xiǎng fàngjià. Wǒ yào qù cānjiā yīgè yántǎohuì, tīng jǐ chǎng yóu wǒ de jiǎngxuéjīn xiàngmù tígōng de jiǎngzuò.
    english: Tomorrow I'd like to take a day off. I'm going to a conference where I'll attend some talks offered by my scholarship.
    hsk: "4-5"
    grammar_de: |
      放假 ist eine 离合词 (trennbares Verb-Objekt-Kompositum): 放 (loslassen) + 假 (Urlaub).
      Trennbar: 放了三天假 (drei Tage Urlaub gemacht).
      Satz 2 verwendet einen vorgestellten Relativsatz mit 由...提供:
      由 (yóu) markiert den Handlungsträger (von/durch), ähnlich dem Passiv-„von" im Deutschen.
      由我的奖学金项目提供的讲座 = „die von meinem Stipendiumprogramm angebotenen Vorträge".
      场 (chǎng) ist das Zählwort für Veranstaltungen und Vorträge.
      Alternativen für Tagung: 会议 (huìyì, allg. Konferenz), 学术会议 (xuéshù huìyì, akademisch).
    examples:
      - zh: 这周五开始放假，我打算去旅行。
        pinyin: Zhè zhōuwǔ kāishǐ fàngjià, wǒ dǎsuàn qù lǚxíng.
        de: Ab diesem Freitag habe ich frei — ich plane zu verreisen.
      - zh: 学校放假了，孩子们都在外面玩。
        pinyin: Xuéxiào fàngjià le, háizimen dōu zài wàimiàn wán.
        de: Die Schule hat Ferien und die Kinder spielen alle draußen.
      - zh: 你们公司什么时候放假？
        pinyin: Nǐmen gōngsī shénme shíhou fàngjià?
        de: Wann hat eure Firma Urlaub/frei?
      - zh: 他请假了，不是放假。
        pinyin: Tā qǐngjià le, bù shì fàngjià.
        de: Er hat sich freigenommen — das ist kein offizieller Urlaub.
      - zh: 放假期间我参加了一个学术研讨会。
        pinyin: Fàngjià qījiān wǒ cānjiā le yīgè xuéshù yántǎohuì.
        de: Während der freien Zeit nahm ich an einer Fachtagung teil.
    characters:
      - char: 放
        pinyin: fàng
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: to let go, to release (in 放假 — to release into holiday)
        other_meanings:
          - "to put, to place"
          - "to set free (释放 shìfàng)"
          - "to relax (放松 fàngsōng)"
          - "to give up (放弃 fàngqì)"
          - "to set one's mind at ease (放心 fàngxīn)"
        compounds:
          - simplified: 放松
            pinyin: fàngsōng
            meaning: to relax
          - simplified: 放弃
            pinyin: fàngqì
            meaning: to give up
          - simplified: 释放
            pinyin: shìfàng
            meaning: to release, to set free
          - simplified: 放心
            pinyin: fàngxīn
            meaning: to set one's mind at ease
        etymology: |
          放 has the radical 攴/攵 (pū) on the right — a hand holding a stick, indicating a
          directed action — and the phonetic component 方 (fāng, square/direction) on the left,
          providing the sound. Original meaning: to drive animals out to pasture, releasing
          them into open space. Extended to any act of releasing, placing, or letting go.
          Simplified and traditional forms are identical.
        etymology_example:
          zh: 牧童把牛羊放到山坡上吃草。
          pinyin: Mùtóng bǎ niúyáng fàng dào shānpō shàng chī cǎo.
          de: Der Hirtenjunge trieb das Vieh den Hang hinauf zum Grasen.
      - char: 假
        pinyin: jià / jiǎ
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: holiday, leave, vacation (jià)
        other_meanings:
          - "fake, false, artificial (jiǎ)"
          - "to borrow/use (假借 jiǎjiè)"
          - "hypothetical (假设 jiǎshè)"
          - "to pretend (假装 jiǎzhuāng)"
        compounds:
          - simplified: 假期
            pinyin: jiàqī
            meaning: holiday period, vacation
          - simplified: 请假
            pinyin: qǐngjià
            meaning: to ask for leave
          - simplified: 假装
            pinyin: jiǎzhuāng
            meaning: to pretend
          - simplified: 假设
            pinyin: jiǎshè
            meaning: to suppose, hypothesis
        etymology: |
          假 has the person radical 亻(人, rén) on the left and the phonetic component 叚 (jiǎ)
          on the right, which depicts borrowing or taking something temporarily. The dual
          reading (jiǎ = fake/borrow; jià = holiday) both stem from the core idea of something
          temporary or not fully one's own — a holiday is time "borrowed" from work; fake is
          something pretending to be real. Simplified and traditional forms are identical.
        etymology_example:
          zh: 他请了三天假，回家探亲。
          pinyin: Tā qǐng le sān tiān jià, huí jiā tànqīn.
          de: Er nahm sich drei Tage frei, um nach Hause zu fahren und die Familie zu besuchen.
  - type: sentence
    date: "03/16"
    source_de: Ich habe das gerade gefreestylt — nicht vorbereitet.
    simplified: 我刚才即兴发挥的，没有准备。
    traditional: 我剛才即興發揮的，沒有準備。
    pinyin: Wǒ gāngcái jíxìng fāhuī de, méiyǒu zhǔnbèi.
    english: I just freestyled that — unprepared / off the cuff.
    hsk: "4-5"
    grammar_de: |
      即兴发挥 (jíxìng fāhuī) = improvisieren, freestylen.
      即兴 (jíxìng) — spontan, aus dem Moment heraus (wörtlich: „dem Augenblick folgend").
      发挥 (fāhuī) — entfalten, zum Einsatz bringen.
      刚才 (gāngcái) = gerade eben (abgeschlossene Vergangenheit).
      Das abschließende 的 markiert die Art und Weise einer vergangenen Handlung.
      Alternativen: 我是临时发挥的 (línshí = kurzfristig, auf die Schnelle);
      我没有提前准备，全靠即兴 (tíqián = im Voraus).
    examples:
      - zh: 他的演讲完全是即兴发挥的，听起来却非常流畅。
        pinyin: Tā de yǎnjiǎng wánquán shì jíxìng fāhuī de, tīng qǐlái què fēicháng liúchàng.
        de: Seine Rede war völlig improvisiert, klang aber äußerst flüssig.
      - zh: 我刚才说的话是即兴的，请别太认真。
        pinyin: Wǒ gāngcái shuō de huà shì jíxìng de, qǐng bié tài rènzhēn.
        de: Was ich gerade sagte, war aus dem Stegreif — nimm es nicht zu ernst.
      - zh: jazz音乐家们经常即兴发挥，创造出独特的音乐。
        pinyin: Jazz yīnyuèjiāmen jīngcháng jíxìng fāhuī, chuàngzào chū dútè de yīnyuè.
        de: Jazzmusiker improvisieren oft und erschaffen dabei einzigartige Musik.
      - zh: 她没有准备台词，全靠临时发挥，却赢得了满堂彩。
        pinyin: Tā méiyǒu zhǔnbèi táicí, quán kào línshí fāhuī, què yíngdé le mǎntáng cǎi.
        de: Sie hatte keinen Text vorbereitet, improvisierte alles — und erntete trotzdem stürmischen Applaus.
      - zh: 别担心，我们今天就即兴发挥吧！
        pinyin: Bié dānxīn, wǒmen jīntiān jiù jíxìng fāhuī ba!
        de: Kein Stress — lass uns heute einfach improvisieren!
    characters:
      - char: 即
        pinyin: jí
        hsk: "4-5"
        detailed_analysis: true
        meaning_in_context: immediately, at once (in 即兴 — following the immediate moment)
        other_meanings:
          - "even if (即使 jíshǐ)"
          - "immediately (立即 lìjí)"
          - "about to (即将 jíjiāng)"
          - "namely (即是 jí shì)"
        compounds:
          - simplified: 即使
            pinyin: jíshǐ
            meaning: even if, even though
          - simplified: 立即
            pinyin: lìjí
            meaning: immediately
          - simplified: 即将
            pinyin: jíjiāng
            meaning: about to, on the verge of
        etymology: |
          Oracle bone script depicts a person kneeling before a food vessel, about to eat —
          the image of being right there, present, at the moment of action. Radical: 卩 (jié),
          a kneeling person. Contrast with 既 (jì, already done): 既 shows the person turning
          away after eating; 即 shows leaning in, present. Extended from "being present at"
          to "immediately, at this very moment." Simplified and traditional forms are identical.
        etymology_example:
          zh: 他即将出发，行李已经准备好了。
          pinyin: Tā jíjiāng chūfā, xíngli yǐjīng zhǔnbèi hǎo le.
          de: Er ist im Begriff aufzubrechen — das Gepäck ist schon bereit.
      - char: 兴
        traditional: 興
        pinyin: xìng / xīng
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: mood, inspiration (in 即兴 — spontaneous inspiration; xìng)
        other_meanings:
          - "to rise, to prosper (xīng)"
          - "interest, enthusiasm (兴趣 xìngqù)"
          - "excited (兴奋 xīngfèn)"
          - "revival (复兴 fùxīng)"
        compounds:
          - simplified: 兴趣
            pinyin: xìngqù
            meaning: interest, hobby
          - simplified: 高兴
            pinyin: gāoxìng
            meaning: happy, pleased
          - simplified: 兴奋
            pinyin: xīngfèn
            meaning: excited
          - simplified: 复兴
            pinyin: fùxīng
            meaning: to revive, renaissance
        etymology: |
          Traditional 興 depicts four hands lifting an object together — the image of collective
          effort raising something up. The radical is 臼 (jiù, a mortar), the central object
          being lifted. Simplified 兴 drastically reduces this. From "lifting together" extended
          to rising, prosperity, and the uplifting feeling of enthusiasm or inspiration. Dual
          reading: xīng (to rise/prosper) vs. xìng (mood/inspiration) reflects physical vs.
          emotional dimensions.
        etymology_example:
          zh: 他对音乐很感兴趣，每天都练习。
          pinyin: Tā duì yīnyuè hěn gǎn xìngqù, měitiān dōu liànxí.
          de: Er interessiert sich sehr für Musik und übt täglich.
      - char: 发
        pinyin: fā
        hsk: "3-4"
        detailed_analysis: false
        note: "bereits analysiert — here in 发挥: to emit, to deploy (ones abilities)"
      - char: 挥
        traditional: 揮
        pinyin: huī
        hsk: "4-5"
        detailed_analysis: true
        meaning_in_context: to wield, to deploy, to give full play to (in 发挥)
        other_meanings:
          - "to wave, to brandish (挥手 huīshǒu)"
          - "to conduct, to command (指挥 zhǐhuī)"
          - "to squander (挥霍 huīhuò)"
        compounds:
          - simplified: 发挥
            pinyin: fāhuī
            meaning: to give full play to, to bring into full effect
          - simplified: 指挥
            pinyin: zhǐhuī
            meaning: to conduct, to command
          - simplified: 挥手
            pinyin: huīshǒu
            meaning: to wave one's hand
          - simplified: 挥霍
            pinyin: huīhuò
            meaning: to squander, to spend lavishly
        etymology: |
          挥 has the hand radical 扌(手, shǒu) on the left, indicating a hand motion, and the
          phonetic component 军 (jūn, army) on the right, which approximates the sound and
          hints at the original military context of commanding and directing. Traditional 揮
          preserves the full components; simplified 挥 reduces slightly. Originally depicted
          a commander waving his hand to direct troops; extended to any broad sweeping gesture
          or deployment of force and ability.
        etymology_example:
          zh: 指挥家举起指挥棒，乐团随即开始演奏。
          pinyin: Zhǐhuījiā jǔqǐ zhǐhuībàng, yuètuán suíjí kāishǐ yǎnzòu.
          de: Der Dirigent hob den Taktstock — das Orchester begann sofort zu spielen.
          
