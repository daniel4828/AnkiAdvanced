            pinyin: miǎnyì
            meaning: immunity
        etymology: |
          免 resembles 兔 (tù, rabbit) without the tail dot — originally depicted a person
          giving birth, the child slipping free; hence "to escape, to be freed from."
          The legs radical 儿 at the bottom reinforces the sense of emergence and escape.
          Extended to exemption, avoidance, and being spared. Simplified and traditional
          forms are identical.
        etymology_example:
          zh: 博物馆今天免费开放。
          pinyin: Bówùguǎn jīntiān miǎnfèi kāifàng.
          de: Das Museum hat heute freien Eintritt.
