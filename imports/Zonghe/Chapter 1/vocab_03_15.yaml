  - type: vocabulary
    date: "03/15"
    simplified: 顺其自然
    traditional: 順其自然
    pinyin: shùn qí zìrán
    english: to let nature take its course; go with the flow
    hsk: "超纲"
    pos: idiom (成语-style phrase)
    definition_zh: 按照事物发展的自然规律。
    examples:
      - zh: 感情的事不能强求，顺其自然就好。
        pinyin: Gǎnqíng de shì bù néng qiǎngqiú, shùn qí zìrán jiù hǎo.
        de: In Liebesdingen sollte man nichts erzwingen — lass die Dinge ihren natürlichen Lauf nehmen.
      - zh: 他选择顺其自然，不再为未来焦虑。
        pinyin: Tā xuǎnzé shùn qí zìrán, bù zài wèi wèilái jiāolǜ.
        de: Er entschied sich, die Dinge auf sich zukommen zu lassen, und hörte auf, sich um die Zukunft zu sorgen.
      - zh: 教育孩子要顺其自然，不能拔苗助长。
        pinyin: Jiàoyù háizi yào shùn qí zìrán, bù néng bá miáo zhù zhǎng.
        de: Bei der Kindererziehung sollte man dem natürlichen Verlauf folgen und nicht versuchen, das Wachstum zu erzwingen.
    characters:
      - char: 顺
        traditional: 順
        pinyin: shùn
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: to follow along, to go with
        other_meanings:
          - smooth, without obstruction (顺利 shùnlì)
          - to obey (顺从 shùncóng)
          - along the way (顺便 shùnbiàn)
        compounds:
          - simplified: 顺利
            pinyin: shùnlì
            meaning: smooth, successful
          - simplified: 顺便
            pinyin: shùnbiàn
            meaning: conveniently, by the way
          - simplified: 顺从
            pinyin: shùncóng
            meaning: to comply, to obey
        etymology: |
          The traditional form 順 shows 川 (a river flowing) on the left and 页 (head/page)
          on the right. A head going with the flow of a river — moving without resistance
          in the natural direction of current. The simplified form 顺 retains the meaning
          but simplifies the river component. The core image of effortless downstream
          movement underpins all senses: smooth, compliant, along the way.
        etymology_example:
          zh: 船顺水而行，速度快了很多。
          pinyin: Chuán shùn shuǐ ér xíng, sùdù kuài le hěn duō.
          de: Das Boot fuhr stromabwärts und war dadurch viel schneller.
      - char: 其
        pinyin: qí
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: its, their (referring to the natural process)
        other_meanings:
          - he/she/it/they (formal/classical) (其实 qíshí – in fact)
          - that, those (其他 qítā – other)
        compounds:
          - simplified: 其他
            pinyin: qítā
            meaning: other, the rest
          - simplified: 其实
            pinyin: qíshí
            meaning: actually, in fact
          - simplified: 尤其
            pinyin: yóuqí
            meaning: especially, particularly
        etymology: |
          其 originally depicted a winnowing basket (箕) in oracle-bone script — a flat
          basket used to separate grain from chaff. Over time it was borrowed phonetically
          as a pronoun and particle, losing its pictographic connection. By classical
          Chinese it had become purely a third-person pronoun and demonstrative. Its use
          as a pronoun (its/their/that) is now its primary modern function.
        etymology_example:
          zh: 各有其用，缺一不可。
          pinyin: Gè yǒu qí yòng, quē yī bùkě.
          de: Jedes hat seinen eigenen Nutzen — keines kann fehlen.
      - char: 自
        pinyin: zì
        hsk: "2"
        detailed_analysis: false
      - char: 然
        pinyin: rán
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: natural; so, thus
        other_meanings:
          - correct, right (不以为然 bù yǐwéirán – to disagree)
          - suffix forming adjectives (突然 tūrán – suddenly)
        compounds:
          - simplified: 自然
            pinyin: zìrán
            meaning: nature; natural
          - simplified: 突然
            pinyin: tūrán
            meaning: suddenly
          - simplified: 虽然
            pinyin: suīrán
            meaning: although
        etymology: |
          然 is a compound of 肉/月 (flesh/meat) at the top right, 犬 (dog) at the bottom
          right, and 火 (fire) at the bottom. The original character depicted meat (of a
          dog) being cooked over fire — "to burn/roast." This was then borrowed phonetically
          for abstract grammatical functions: "so, thus, that being the case." The meaning
          "natural" developed from "the way things are" — the natural state. Simplified
          and traditional forms are identical.
        etymology_example:
          zh: 篝火燃烧，众人围坐，天下大事皆付笑谈中。
          pinyin: Gōuhuǒ ránshāo, zhòngrén wéi zuò, tiānxià dàshì jiē fù xiàotán zhōng.
          de: Das Lagerfeuer brannte, alle saßen rundherum, und die großen Angelegenheiten der Welt wurden im Lachen davongetragen.
