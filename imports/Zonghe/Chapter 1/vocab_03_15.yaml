          Traditional 蝸 uses the same components in a more elaborate form.
        etymology_example:
          zh: 蜗牛把自己藏在螺旋形的壳里，躲避天敌。
          pinyin: Wōniú bǎ zìjǐ cáng zài luóxuán xíng de ké lǐ, duǒbì tiāndí.
