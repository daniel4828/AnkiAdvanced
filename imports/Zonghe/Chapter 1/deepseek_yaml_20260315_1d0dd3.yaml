    english: rock hard, very hard, stiff as a board
    pos: adjective (reduplicated form)
    hsk: 超纲
    definition_zh: 形容坚硬结实（含贬义或生动化）。
    examples:
      - zh: 馒头放了一天，变得硬邦邦的。
        pinyin: Mántou fàng le yī tiān, biàn de yìngbāngbāng de.
        de: Das Brötchen wurde nach einem Tag steinhart.
      - zh: 地面冻得硬邦邦的。
        pinyin: Dìmiàn dòng de yìngbāngbāng de.
        de: Der Boden ist hart gefroren.
      - zh: 这块牛肉烤得太久，吃起来硬邦邦的。
        pinyin: Zhè kuài niúròu kǎo de tài jiǔ, chī qǐlái yìngbāngbāng de.
        de: Dieses Rindfleischstück war zu lange im Ofen, es schmeckt zäh und hart.
      - zh: 他的态度硬邦邦的，一点都不友好。
        pinyin: Tā de tàidu yìngbāngbāng de, yīdiǎn dōu bù yǒuhǎo.
        de: Seine Haltung war steif und überhaupt nicht freundlich.
      - zh: 这种面包新鲜的时候很软，隔夜就硬邦邦了。
        pinyin: Zhè zhǒng miànbāo xīnxiān de shíhou hěn ruǎn, gé yè jiù yìngbāngbāng le.
        de: Dieses Brot ist frisch sehr weich, aber über Nacht wird es steinhart.
    characters:
      - char: 硬
        pinyin: yìng
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: hard, stiff, tough
        other_meanings:
          - firm, strong
          - obstinate
        compounds:
          - simplified: 硬币
            pinyin: yìngbì
            meaning: coin
          - simplified: 硬件
            pinyin: yìngjiàn
            meaning: hardware
        etymology: |
          The character 硬 consists of the stone radical 石 (shí) on the left and 更 (gèng) as a phonetic. The stone radical indicates something as hard as stone. The meaning is "hard" or "stiff".
      - char: 邦
        pinyin: bāng
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: (in reduplication) emphasizes the preceding adjective, onomatopoeia-like
        other_meanings:
          - state, nation (邻邦, 友邦)
        compounds:
          - simplified: 联邦
            pinyin: liánbāng
            meaning: federation, federal
          - simplified: 邦交
            pinyin: bāngjiāo
            meaning: diplomatic relations
        etymology: |
          The character 邦 in oracle bone script depicted a field (丰) with a tree planted to mark the boundary of a state. It later added the city radical 阝 (right). Its original meaning is a state or nation. In reduplicated form (邦邦) after adjectives, it acts as a suffix to describe the state or appearance, often with an onomatopoeic quality suggesting a "thumping" hardness.
      - char: 邦
        *bereits analysiert*

  - type: vocabulary
    simplified: 简陋
    pinyin: jiǎnlòu
    english: simple and crude, basic, shabby, rudimentary
    pos: adjective
    hsk: "6"
