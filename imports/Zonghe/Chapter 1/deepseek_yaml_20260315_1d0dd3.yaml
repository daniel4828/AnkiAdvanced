  - type: vocabulary
    simplified: 或许
    pinyin: huòxǔ
    english: perhaps, maybe
    pos: adverb
    hsk: "4"
    definition_zh: 也许
    examples:
      - zh: 或许明天会下雨，我们还是带上伞吧。
        pinyin: Huòxǔ míngtiān huì xiàyǔ, wǒmen háishì dài shàng sǎn ba.
        de: Vielleicht regnet es morgen; wir sollten besser einen Schirm mitnehmen.
      - zh: 他还没来，或许是路上堵车了。
        pinyin: Tā hái méi lái, huòxǔ shì lù shàng dǔchē le.
        de: Er ist noch nicht da, vielleicht steckt er im Stau.
      - zh: 这或许是个好机会，我们应该试试。
        pinyin: Zhè huòxǔ shì gè hǎo jīhuì, wǒmen yīnggāi shì shì.
        de: Das ist vielleicht eine gute Gelegenheit, wir sollten es versuchen.
      - zh: 你再找找，或许它就在你的口袋里。
        pinyin: Nǐ zài zhǎo zhao, huòxǔ tā jiù zài nǐ de kǒudài lǐ.
        de: Such nochmal; vielleicht ist es ja in deiner Tasche.
      - zh: 我不确定，或许他是对的。
        pinyin: Wǒ bù quèdìng, huòxǔ tā shì duì de.
        de: Ich bin mir nicht sicher; vielleicht hat er recht.
    characters:
      - char: 或
        pinyin: huò
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: perhaps, maybe
        other_meanings:
          - or (或者)
          - someone, some people
        compounds:
          - simplified: 或者
            pinyin: huòzhě
            meaning: or, perhaps
          - simplified: 或许
            pinyin: huòxǔ
            meaning: maybe, perhaps
        etymology: |
          The oracle bone script for 或 depicted a city-state (口, a territory) guarded by a spear (戈). It originally meant a state or territory. The sense of "maybe" or "or" came later, perhaps from the idea of "having territory" implying a choice or alternative. It is also the original character for "region" (域).
      - char: 许
        traditional: 許
        pinyin: xǔ
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: (as in 或许) maybe, perhaps
        other_meanings:
          - to allow, to permit (准许)
          - to praise (赞许)
          - approximately (许多, 些许)
        compounds:
          - simplified: 许多
            pinyin: xǔduō
            meaning: many, a lot
          - simplified: 允许
            pinyin: yǔnxǔ
            meaning: to permit
        etymology: |
          The traditional form 許 consists of the speech radical 言 on the left and 午 (wǔ) on the right, which serves as a phonetic. Its original meaning was "to speak in agreement" or "to permit".

