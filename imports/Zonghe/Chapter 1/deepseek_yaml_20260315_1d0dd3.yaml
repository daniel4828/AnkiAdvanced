          The traditional form 驗 consists of the horse radical 馬 (mǎ) on the left and 僉 (qiān) as a phonetic. The original meaning might have been related to the name of a horse, but it came to mean "to examine" or "to test" (perhaps the qualities of a horse). The simplified form 验 keeps the phonetic element simplified as 佥 (qiān).

