        compounds:
          - simplified: 肩膀
            pinyin: jiānbǎng
            meaning: shoulder
          - simplified: 肩负
            pinyin: jiānfù
            meaning: to bear, to shoulder (responsibility)
        etymology: |
          The character 肩 is a pictophonetic compound. The outer part 戶 (hù, door) originally depicted the shape of a shoulder blade, while 月 (rou4, flesh) indicates its relation to the body. It is a pictograph of a shoulder with the flesh radical added.
