  - type: vocabulary
    simplified: 过境处
    traditional: 過境處
    pinyin: guòjìng chù
    english: border crossing point, transit point
    pos: noun (place)
    hsk: 超纲 (likely HSK 5-6 vocabulary components)
    definition_zh: 办理过境手续的地方，例如在边境或机场。
    examples:
      - zh: 请在过境处出示您的护照。
        pinyin: Qǐng zài guòjìng chù chūshì nín de hùzhào.
        de: Bitte zeigen Sie Ihren Pass an der Grenzübergangsstelle vor.
      - zh: 过境处排起了长队。
        pinyin: Guòjìng chù pái qǐ le cháng duì.
        de: An der Grenzabfertigung bildete sich eine lange Schlange.
      - zh: 他们开车经过过境处进入了邻国。
        pinyin: Tāmen kāichē jīngguò guòjìng chù jìnrù le lín guó.
        de: Sie fuhren mit dem Auto durch den Grenzübergang ins Nachbarland.
      - zh: 机场的过境处有免税店。
        pinyin: Jīchǎng de guòjìng chù yǒu miǎnshuì diàn.
        de: Im Transitbereich des Flughafens gibt es Duty-Free-Shops.
      - zh: 在过境处，官员检查了我们的行李。
        pinyin: Zài guòjìng chù, guānyuán jiǎnchá le wǒmen de xíngli.
        de: Am Grenzübergang kontrollierten die Beamten unser Gepäck.
    characters:
      - char: 过
        traditional: 過
        pinyin: guò
        hsk: "2"
        detailed_analysis: false
      - char: 境
        pinyin: jìng
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: border, boundary, territory
        other_meanings:
          - place, area, situation (环境, 境界)
        compounds:
          - simplified: 环境
            pinyin: huánjìng
            meaning: environment
          - simplified: 边境
            pinyin: biānjìng
            meaning: border, frontier
        etymology: |
          The character 境 consists of the earth radical 土 (tǔ) on the left and 竟 (jìng) as a phonetic component. The earth radical suggests territory or land, and 竟 can imply "to end" or "boundary". Thus, 境 means the boundary or limit of a territory.
      - char: 处
        traditional: 處
        pinyin: chù
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: place, location
        other_meanings:
          - to get along with, to deal with (chǔ, 相处, 处理)
          - department, office (办事处)
        compounds:
          - simplified: 到处
            pinyin: dàochù
            meaning: everywhere
          - simplified: 好处
            pinyin: hǎochù
            meaning: benefit, advantage
        etymology: |
          The traditional form 處 consists of a tiger radical 虍 (hǔ) and 処 (chǔ), which itself is related to a place to rest. The simplified 处 is derived from the cursive script and is a common component. The original meaning was a place to stop or rest, hence a location.

  - type: vocabulary
    simplified: 扰乱
