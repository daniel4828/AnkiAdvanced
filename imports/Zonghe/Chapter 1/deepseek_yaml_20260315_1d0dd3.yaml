            pinyin: mócā
            meaning: friction, to rub
          - simplified: 擦干
            pinyin: cāgān
            meaning: to wipe dry
        etymology: |
          The character 擦 combines the hand radical 扌 on the left with 察 (chá, to examine/inspect) as a phonetic. The original meaning is related to rubbing or wiping with the hand.
      - char: 肩
        pinyin: jiān
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: shoulder
        other_meanings:
