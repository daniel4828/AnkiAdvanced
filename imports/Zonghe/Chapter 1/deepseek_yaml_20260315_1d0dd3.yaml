  - type: vocabulary
    simplified: 经费
    traditional: 經費
    pinyin: jīngfèi
    english: funds, expenditure, budget, (operating) expenses
    pos: noun
    hsk: "5"
    definition_zh: （机关、学校等）经常支出的费用。
    examples:
      - zh: 这个项目需要大量的经费支持。
        pinyin: Zhège xiàngmù xūyào dàliàng de jīngfèi zhīchí.
