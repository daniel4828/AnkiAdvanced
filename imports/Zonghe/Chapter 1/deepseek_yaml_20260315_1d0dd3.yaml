            pinyin: bànlǚ
            meaning: companion, mate, partner
        etymology: |
          The character 侣 combines the person radical 亻 on the left with 吕 (lǚ) as a phonetic. 吕 originally depicted two vertebrae stacked, or two mouths, suggesting pairs or companionship. Thus, 侣 means a companion or partner.

  - type: vocabulary
    simplified: 硬邦邦
