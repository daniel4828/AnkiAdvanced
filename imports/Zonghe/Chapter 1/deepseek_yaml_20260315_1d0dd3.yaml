entries:
  - type: vocabulary
    simplified: 时光
    traditional: 時光
    pinyin: shíguāng
    english: time, days, period of time
    pos: noun
    hsk: "4"
    definition_zh: 时间；光阴；日子
    examples:
      - zh: 时光飞逝，转眼间我们已经毕业十年了。
        pinyin: Shíguāng fēishì, zhuǎn yǎn jiān wǒmen yǐjīng bìyè shí nián le.
        de: Die Zeit vergeht wie im Flug; schon sind wir seit zehn Jahren graduiert.
      - zh: 他珍惜和家人在一起的每一寸时光。
        pinyin: Tā zhēnxī hé jiārén zài yīqǐ de měi yī cùn shíguāng.
        de: Er schätzt jede Sekunde der Zeit, die er mit seiner Familie verbringt.
      - zh: 那段快乐的时光永远留在我的记忆里。
        pinyin: Nà duàn kuàilè de shíguāng yǒngyuǎn liú zài wǒ de jìyì lǐ.
        de: Jene glückliche Zeit bleibt für immer in meiner Erinnerung.
      - zh: 为了工作，他牺牲了很多个人时光。
        pinyin: Wèile gōngzuò, tā xīshēng le hěnduō gèrén shíguāng.
        de: Für die Arbeit hat er viel persönliche Zeit geopfert.
      - zh: 午后时光，我喜欢在阳台上看书。
        pinyin: Wǔhòu shíguāng, wǒ xǐhuān zài yángtái shàng kànshū.
        de: Am Nachmittag lese ich gerne auf dem Balkon.
    characters:
      - char: 时
        traditional: 時
        pinyin: shí
        hsk: "1"
        detailed_analysis: false
      - char: 光
        pinyin: guāng
        hsk: "2"
        detailed_analysis: false

  - type: vocabulary
    simplified: 兴冲冲
    traditional: 興沖沖
    pinyin: xìngchōngchōng
    english: with great delight, full of joy, excitedly
    pos: adjective (reduplicated form)
    hsk: 超纲
    definition_zh: 形容兴致很高，心情非常愉快的样子。
    examples:
      - zh: 他兴冲冲地跑回家，告诉妈妈他被大学录取了。
        pinyin: Tā xìngchōngchōng de pǎo huí jiā, gàosu māma tā bèi dàxué lùqǔ le.
        de: Er rannte voller Freude nach Hause, um seiner Mutter zu sagen, dass er an der Universität angenommen wurde.
      - zh: 孩子们兴冲冲地拆开圣诞礼物。
        pinyin: Háizimen xìngchōngchōng de chāikāi Shèngdàn lǐwù.
        de: Die Kinder öffneten die Weihnachtsgeschenke mit großer Begeisterung.
      - zh: 听到周末去郊游的消息，大家都兴冲冲的。
        pinyin: Tīngdào zhōumò qù jiāoyóu de xiāoxī, dàjiā dōu xìngchōngchōng de.
        de: Als sie die Nachricht vom Wochenendausflug hörten, waren alle ganz ausgelassen.
      - zh: 他兴冲冲地向我展示他的新画作。
        pinyin: Tā xìngchōngchōng de xiàng wǒ zhǎnshì tā de xīn huàzuò.
        de: Er zeigte mir aufgeregt sein neues Gemälde.
      - zh: 别这么兴冲冲的，先冷静下来想一想。
        pinyin: Bié zhème xìngchōngchōng de, xiān lěngjìng xiàlái xiǎng yī xiǎng.
        de: Sei nicht so überstürzt vor Freude, beruhige dich erst einmal und denk nach.
    characters:
      - char: 兴
        traditional: 興
        pinyin: xìng
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: excitement, interest, mood (as in 兴致)
        other_meanings:
          - to rise, to prosper (xīng, 兴起, 振兴)
          - to start, to begin (xīng, 兴建)
        compounds:
          - simplified: 兴趣
            pinyin: xìngqù
            meaning: interest (noun)
          - simplified: 高兴
            pinyin: gāoxìng
            meaning: happy, glad
          - simplified: 兴奋
            pinyin: xīngfèn
            meaning: excited
        etymology: |
          The traditional form 興 depicts four hands (舁) together lifting an object, symbolizing a communal effort to rise or begin something. The original meaning is "to lift up" or "to rise," which evolved to mean "to prosper" and later "to become excited" or "interest."
      - char: 冲
        traditional: 衝
        pinyin: chōng
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: (in reduplicated form 冲冲) describes a high, rushing spirit/state
        other_meanings:
          - to charge, to dash, to rush (向前冲)
          - to rinse, to flush (冲洗, 冲咖啡)
          - thoroughfare, important place (要冲)
        compounds:
          - simplified: 冲突
            pinyin: chōngtū
            meaning: conflict
          - simplified: 冲动
            pinyin: chōngdòng
            meaning: impulse, to get excited
        etymology: |
          The simplified character 冲 combines the ice radical 冫 (or water 氵 in traditional 衝) with 中 (zhōng, middle/center) as a phonetic. The original meaning in 衝 was a main road or thoroughfare, hence the idea of "charging through." The meaning "to rinse" comes from a different character (冲/沖) which is identical in simplified form. In reduplication (ABAB form), it intensifies the meaning of the preceding adjective.

  - type: vocabulary
    simplified: 闭门羹
    traditional: 閉門羹
    pinyin: bì mén gēng
    english: cold shoulder, door slammed in one's face, (lit. "door-closing soup")
    pos: idiom (chengyu-style phrase)
    hsk: 超纲
    definition_zh: 被主人拒之门外，或者被婉言拒绝，不让进门。
    examples:
      - zh: 他去拜访那位名人，结果吃了闭门羹。
        pinyin: Tā qù bàifǎng nà wèi míngrén, jiéguǒ chī le bì mén gēng.
        de: Er besuchte diese Berühmtheit, aber am Ende wurde ihm die Tür vor der Nase zugeschlagen.
      - zh: 这家公司不接受没有预约的面试，他去了只能吃闭门羹。
        pinyin: Zhè jiā gōngsī bù jiēshòu méiyǒu yùyuē de miànshì, tā qù le zhǐ néng chī bì mén gēng.
        de: Diese Firma akzeptiert keine Vorstellungsgespräche ohne Termin; wenn er hingeht, bekommt er nur eine Abfuhr.
      - zh: 我已经吃了三次闭门羹了，但还是不想放弃。
        pinyin: Wǒ yǐjīng chī le sān cì bì mén gēng le, dàn háishì bù xiǎng fàngqì.
        de: Ich habe schon dreimal einen Korb bekommen, aber ich will trotzdem nicht aufgeben.
      - zh: 我没带邀请函，恐怕会吃闭门羹。
        pinyin: Wǒ méi dài yāoqǐng hán, kǒngpà huì chī bì mén gēng.
        de: Ich habe meine Einladung nicht dabei, ich fürchte, man wird mich abweisen.
      - zh: 想向银行贷款，结果吃了闭门羹。
        pinyin: Xiǎng xiàng yínháng dàikuǎn, jiéguǒ chī le bì mén gēng.
        de: Er wollte einen Bankkredit, aber man hat ihn abblitzen lassen.
    characters:
      - char: 闭
        traditional: 閉
        pinyin: bì
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: to close, to shut
        other_meanings:
          - to obstruct, to block
          - to end, to conclude
        compounds:
          - simplified: 关闭
            pinyin: guānbì
            meaning: to close, to shut
          - simplified: 封闭
            pinyin: fēngbì
            meaning: to seal off
          - simplified: 闭幕
            pinyin: bìmù
            meaning: (curtain) to close, to conclude
        etymology: |
          The traditional form 閉 consists of the door radical 門 with 才 inside. It depicts a bolt (才) across a door, hence the meaning "to close."
      - char: 门
        traditional: 門
        pinyin: mén
        hsk: "1"
        detailed_analysis: false
      - char: 羹
        pinyin: gēng
        hsk: 超纲
        detailed_analysis: true
        meaning_in_context: (lit. "soup") – part of the idiom 闭门羹, refers to a (rejected) meal
        other_meanings:
          - thick soup, broth (usually made of meat or vegetables)
        compounds:
          - simplified: 羹汤
            pinyin: gēngtāng
            meaning: soup, broth
        etymology: |
          The character 羹 is composed of 羔 (gāo, lamb) on top and 美 (měi, beautiful) or a variant of 火 (fire) at the bottom, originally depicting a delicious lamb soup cooked over a fire. The idiom 闭门羹 originates from the Tang Dynasty story of a courtesan who would serve a soup to unwanted guests as a polite way to refuse them entry.

  - type: vocabulary
    simplified: 恰巧
    pinyin: qiǎqiǎo
    english: by chance, coincidentally, as it happens
    pos: adverb
    hsk: "5"
    definition_zh: 恰好；凑巧
    examples:
      - zh: 我正想找你，你恰巧就来了。
        pinyin: Wǒ zhèng xiǎng zhǎo nǐ, nǐ qiǎqiǎo jiù lái le.
        de: Ich wollte dich gerade suchen, und da kommst du zufällig vorbei.
      - zh: 那天我出门时恰巧带了伞，所以没淋湿。
        pinyin: Nà tiān wǒ chūmén shí qiǎqiǎo dài le sǎn, suǒyǐ méi línshī.
        de: An dem Tag hatte ich zufällig einen Schirm dabei, als ich ausging, und bin deshalb nicht nass geworden.
      - zh: 我们恰巧在同一家公司工作。
        pinyin: Wǒmen qiǎqiǎo zài tóng yī jiā gōngsī gōngzuò.
        de: Wir arbeiten zufällig in derselben Firma.
      - zh: 他经过时，恰巧看到事故的发生。
        pinyin: Tā jīngguò shí, qiǎqiǎo kàndào shìgù de fāshēng.
        de: Als er vorbeikam, wurde er zufällig Zeuge des Unfalls.
      - zh: 我的手机没电了，恰巧附近有家咖啡厅可以充电。
        pinyin: Wǒ de shǒujī méi diàn le, qiǎqiǎo fùjìn yǒu jiā kāfēi tīng kěyǐ chōngdiàn.
        de: Mein Handy-Akku war leer, aber zufällig gab es in der Nähe ein Café, wo ich es aufladen konnte.
    characters:
      - char: 恰
        pinyin: qià
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: exactly, just, appropriate
        other_meanings:
          - just, exactly (恰好)
        compounds:
          - simplified: 恰当
            pinyin: qiàdàng
            meaning: appropriate, suitable
          - simplified: 恰好
            pinyin: qiàhǎo
            meaning: just right, as chance would have it
        etymology: |
          The character 恰 consists of the heart/mind radical 忄 on the left and 合 (hé, to combine, to suit) as a phonetic component, suggesting a feeling of suitability or appropriateness.
      - char: 巧
        pinyin: qiǎo
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: coincidentally, opportunely
        other_meanings:
          - skillful, ingenious (巧妙的办法)
          - cunning, deceitful (花言巧语)
        compounds:
          - simplified: 技巧
            pinyin: jìqiǎo
            meaning: skill, technique
          - simplified: 巧合
            pinyin: qiǎohé
            meaning: coincidence
          - simplified: 巧克力
            pinyin: qiǎokèlì
            meaning: chocolate (transliteration)
        etymology: |
          The character 巧 combines the work/finesse radical 工 (gōng) with 丂 (qiǎo) as a phonetic, originally denoting skillful craftsmanship.

  - type: vocabulary
    simplified: 沮丧
    traditional: 沮喪
    pinyin: jǔsàng
    english: dejected, depressed, dispirited, disheartened
    pos: adjective
    hsk: "5"
    definition_zh: 灰心失望；伤心失意
    examples:
      - zh: 考试没通过，他感到很沮丧。
        pinyin: Kǎoshì méi tōngguò, tā gǎndào hěn jǔsàng.
        de: Er war sehr niedergeschlagen, weil er die Prüfung nicht bestanden hatte.
      - zh: 面对一次又一次的失败，她难免有些沮丧。
        pinyin: Miànduì yī cì yòu yī cì de shībài, tā nánmiǎn yǒuxiē jǔsàng.
        de: Angesichts des wiederholten Scheiterns war sie unweigerlich etwas deprimiert.
      - zh: 他用沮丧的语气说出了这个消息。
        pinyin: Tā yòng jǔsàng de yǔqì shuō chū le zhè ge xiāoxī.
        de: Er überbrachte die Nachricht mit niedergeschlagener Stimme.
      - zh: 别因为一点小事就沮丧。
        pinyin: Bié yīnwèi yīdiǎn xiǎoshì jiù jǔsàng.
        de: Lass dich nicht wegen einer Kleinigkeit entmutigen.
      - zh: 看到他沮丧的样子，我们都想帮他。
        pinyin: Kàndào tā jǔsàng de yàngzi, wǒmen dōu xiǎng bāng tā.
        de: Als wir sahen, wie niedergeschlagen er aussah, wollten wir ihm alle helfen.
    characters:
      - char: 沮
        pinyin: jǔ
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: to stop, to prevent (here, to stop the spirit/emotion)
        other_meanings:
          - (part of 沮丧)
          - to ruin, to destroy
        compounds:
          - simplified: 沮丧
            pinyin: jǔsàng
            meaning: dejected
        etymology: |
          The character 沮 consists of the water radical 氵 on the left and 且 (jǔ) as a phonetic. Its original meaning was related to a river (water) or to stop/block (water). This sense of "obstructing" or "stopping" flow metaphorically applies to emotions.
      - char: 丧
        traditional: 喪
        pinyin: sàng
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: to lose, to be defeated
        other_meanings:
          - mourning, funeral (sāng)
          - to lose (丧命)
        compounds:
          - simplified: 丧失
            pinyin: sàngshī
            meaning: to lose, to forfeit
          - simplified: 丧气
            pinyin: sàngqì
            meaning: disheartened, luckless
        etymology: |
          The traditional form 喪 depicts a mulberry tree 桑 under which funeral rites were performed, with mouths 口 indicating weeping or wailing. The meaning evolved from "funeral/mourning" to "to lose" (especially life or spirit).

  - type: vocabulary
    simplified: 不起眼儿
    pinyin: bù qǐ yǎnr
    english: not conspicuous, not attractive, plain, ordinary, unnoticeable
    pos: adjective (colloquial)
    hsk: 超纲
    definition_zh: 不引人注目；不值得重视；很平常。
    examples:
      - zh: 这家餐馆虽然不起眼儿，但菜做得很好吃。
        pinyin: Zhè jiā cānguǎn suīrán bù qǐ yǎnr, dàn cài zuò de hěn hào chī.
        de: Dieses Restaurant sieht zwar unscheinbar aus, aber das Essen ist sehr gut.
      - zh: 他总是穿着一件不起眼儿的灰色外套。
        pinyin: Tā zǒng shì chuān zhe yī jiàn bù qǐ yǎnr de huīsè wàitào.
        de: Er trägt immer einen unscheinbaren grauen Mantel.
      - zh: 别小看这个不起眼儿的小工具，它非常实用。
        pinyin: Bié xiǎokàn zhège bù qǐ yǎnr de xiǎo gōngjù, tā fēicháng shíyòng.
        de: Unterschätze dieses unscheinbare kleine Werkzeug nicht, es ist sehr praktisch.
      - zh: 她来自一个不起眼儿的小村庄。
        pinyin: Tā láizì yī gè bù qǐ yǎnr de xiǎo cūnzhuāng.
        de: Sie stammt aus einem kleinen, unscheinbaren Dorf.
      - zh: 他的不起眼儿的外表下隐藏着一颗善良的心。
        pinyin: Tā de bù qǐ yǎnr de wàibiǎo xià yǐncáng zhe yī kē shànliáng de xīn.
        de: Unter seinem unscheinbaren Äußeren verbirgt sich ein gütiges Herz.
    characters:
      - char: 不
        pinyin: bù
        hsk: "1"
        detailed_analysis: false
      - char: 起
        pinyin: qǐ
        hsk: "2"
        detailed_analysis: false
      - char: 眼
        pinyin: yǎn
        hsk: "2"
        detailed_analysis: false
      - char: 儿
        traditional: 兒
        pinyin: r (ér)
        hsk: "1"
        detailed_analysis: false

  - type: vocabulary
    simplified: 夕阳
    pinyin: xīyáng
    english: the setting sun, evening sun
    pos: noun
    hsk: "5"
    definition_zh: 傍晚的太阳
    examples:
      - zh: 夕阳西下，染红了半边天。
        pinyin: Xīyáng xī xià, rǎn hóng le bàn biān tiān.
        de: Die untergehende Sonne färbte den halben Himmel rot.
      - zh: 我们在海边欣赏美丽的夕阳。
        pinyin: Wǒmen zài hǎibiān xīnshǎng měilì de xīyáng.
        de: Wir genossen den schönen Sonnenuntergang am Meer.
      - zh: 夕阳的余晖洒在湖面上，波光粼粼。
        pinyin: Xīyáng de yúhuī sǎ zài húmiàn shàng, bōguāng línlín.
        de: Das letzte Licht der Abendsonne fiel auf den See und ließ ihn glitzern.
      - zh: 老年人常被比喻为夕阳红。
        pinyin: Lǎonián rén cháng bèi bǐyù wéi xīyáng hóng.
        de: Ältere Menschen werden oft mit der Abendröte verglichen (Metapher für einen würdevollen und schönen Lebensabend).
      - zh: 夕阳无限好，只是近黄昏。
        pinyin: Xīyáng wúxiàn hǎo, zhǐshì jìn huánghūn.
        de: Unendlich schön ist die Abendsonne, nur dass sie dem Dunkel nah' (Zitat aus einem berühmten Gedicht).
    characters:
      - char: 夕
        pinyin: xī
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: evening, sunset
        other_meanings:
          - night, dusk
          - (used for 夕, eve of a special day: 除夕)
        compounds:
          - simplified: 除夕
            pinyin: chúxī
            meaning: New Year's Eve
          - simplified: 朝夕
            pinyin: zhāoxī
            meaning: morning and evening, constantly
        etymology: |
          The oracle bone script for 夕 was a pictograph of a crescent moon, indicating the time when the moon first appears in the evening. It is similar to the character for moon 月, but with a slight difference in shape (often a shorter line).
      - char: 阳
        traditional: 陽
        pinyin: yáng
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: sun
        other_meanings:
          - positive/active male principle (in philosophy, opposite of 阴 yin)
          - south side of a hill, north side of a river
          - convex
        compounds:
          - simplified: 太阳
            pinyin: tàiyáng
            meaning: sun
          - simplified: 阳光
            pinyin: yángguāng
            meaning: sunlight
          - simplified: 阳性
            pinyin: yángxìng
            meaning: positive, masculine
        etymology: |
          The traditional form 陽 consists of the mound/hill radical 阝 (left) and 昜 (yáng) as a phonetic component which itself includes the sun 日 and rays of light 勿. The original meaning was the sunny side of a hill.

  - type: vocabulary
    simplified: 恋恋不舍
    traditional: 戀戀不捨
    pinyin: liàn liàn bù shě
    english: to hate to see someone go, to be reluctant to part with, to cling to
    pos: idiom (chengyu)
    hsk: "6"
    definition_zh: 非常留恋，舍不得离开。
    examples:
      - zh: 他们在车站恋恋不舍地告别。
        pinyin: Tāmen zài chēzhàn liàn liàn bù shě de gàobié.
        de: Sie verabschiedeten sich am Bahnhof voller Wehmut.
      - zh: 孩子们对夏令营的结束感到恋恋不舍。
        pinyin: Háizimen duì xiàlìngyíng de jiéshù gǎndào liàn liàn bù shě.
        de: Die Kinder konnten sich nur schwer vom Ende des Sommercamps trennen.
      - zh: 他恋恋不舍地离开了故乡。
        pinyin: Tā liàn liàn bù shě de líkāi le gùxiāng.
        de: Er verließ seine Heimat schweren Herzens.
      - zh: 她恋恋不舍地看着远去的火车。
        pinyin: Tā liàn liàn bù shě de kàn zhe yuǎn qù de huǒchē.
        de: Sie blickte dem entschwindenden Zug nach, voller Wehmut.
      - zh: 夕阳西下，我们才恋恋不舍地离开海滩。
        pinyin: Xīyáng xī xià, wǒmen cái liàn liàn bù shě de líkāi hǎitān.
        de: Erst als die Sonne unterging, verließen wir widerstrebend den Strand.
    characters:
      - char: 恋
        traditional: 戀
        pinyin: liàn
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: to feel attached to, to long for
        other_meanings:
          - to love (恋爱)
        compounds:
          - simplified: 恋爱
            pinyin: liàn'ài
            meaning: love, to be in love
          - simplified: 留恋
            pinyin: liúliàn
            meaning: to be reluctant to leave
        etymology: |
          The traditional form 戀 consists of the heart/mind radical 心 at the bottom, and a complex phonetic top (亦 with 言 and 絲) that suggests entanglement or binding. It implies a strong emotional attachment, as if the heart is tied or bound.
      - char: 恋
        *bereits analysiert*
      - char: 不
        pinyin: bù
        hsk: "1"
        detailed_analysis: false
      - char: 舍
        pinyin: shě
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: to give up, to abandon
        other_meanings:
          - house, shed, hut (shè, 宿舍)
          - to give up, to abandon (shě, 舍弃, 舍不得)
        compounds:
