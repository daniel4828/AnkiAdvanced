        de: Sie wohnten in einem primitiven Zelt.
      - zh: 这所学校的教学设备非常简陋。
        pinyin: Zhè suǒ xuéxiào de jiàoxué shèbèi fēicháng jiǎnlòu.
        de: Die Lehrausstattung dieser Schule ist sehr einfach.
      - zh: 虽然条件简陋，但他们学习很刻苦。
        pinyin: Suīrán tiáojiàn jiǎnlòu, dàn tāmen xuéxí hěn kèkǔ.
        de: Obwohl die Bedingungen primitiv waren, lernten sie sehr fleißig.
      - zh: 这家餐馆装修简陋，但菜很好吃。
        pinyin: Zhè jiā cānguǎn zhuāngxiū jiǎnlòu, dàn cài hěn hào chī.
        de: Die Einrichtung dieses Restaurants ist schlicht, aber das Essen ist gut.
    characters:
      - char: 简
        traditional: 簡
        pinyin: jiǎn
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: simple, simplified
        other_meanings:
          - bamboo slips (used for writing in ancient times)
          - letter, correspondence
          - to simplify
        compounds:
          - simplified: 简单
            pinyin: jiǎndān
            meaning: simple, easy
          - simplified: 简直
            pinyin: jiǎnzhí
            meaning: simply, at all
        etymology: |
          The traditional form 簡 consists of the bamboo radical ⺮ (zhú) on top and 間 (jiān, between/interval) as a phonetic. Bamboo slips were used for writing, and they were simple, narrow strips. The meaning evolved to "simple" or "simplified".
      - char: 陋
        pinyin: lòu
        hsk: "6"
        detailed_analysis: true
        meaning_in_context: crude, humble, ugly
        other_meanings:
          - narrow, limited (陋巷)
          - vulgar, corrupt (陋习)
        compounds:
          - simplified: 丑陋
            pinyin: chǒulòu
            meaning: ugly
        etymology: |
          The character 陋 consists of the mound/hill radical 阝 (left) and a component 匚 (fāng, a box) with 内 (nèi, inside) or a similar shape (㕡), providing the phonetic. The mound radical might suggest a low-lying, hidden place, which could be associated with something crude or humble.

  - type: vocabulary
    simplified: 体验
    pinyin: tǐyàn
    english: to experience (for oneself), to learn through practice
    pos: verb/noun
    hsk: "4"
    definition_zh: 通过亲身实践来认识事物；亲身经历。
    examples:
      - zh: 我想去农村体验一下生活。
        pinyin: Wǒ xiǎng qù nóngcūn tǐyàn yīxià shēnghuó.
