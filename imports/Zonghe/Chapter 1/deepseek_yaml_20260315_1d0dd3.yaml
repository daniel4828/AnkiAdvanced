        de: Wenn du aufpasst, wirst du viele interessante Phänomene entdecken.
      - zh: 我并没有留意他今天穿了什么衣服。
        pinyin: Wǒ bìng méiyǒu liúyì tā jīntiān chuān le shénme yīfu.
        de: Ich habe nicht darauf geachtet, was er heute anhatte.
      - zh: 出门前要留意天气预报。
        pinyin: Chūmén qián yào liúyì tiānqì yùbào.
        de: Bevor du ausgehst, solltest du den Wetterbericht beachten.
      - zh: 请稍等，我会留意的。
        pinyin: Qǐng shāo děng, wǒ huì liúyì de.
        de: Bitte warte kurz, ich werde darauf achten.
    characters:
      - char: 留
        pinyin: liú
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: to keep, to remain
        other_meanings:
          - to stay (留下)
          - to reserve (保留)
          - to grow (留胡子)
        compounds:
          - simplified: 保留
            pinyin: bǎoliú
            meaning: to keep, to reserve
          - simplified: 留学
            pinyin: liúxué
            meaning: to study abroad
        etymology: |
          The character 留 is a compound. The top part 卯 (liǔ/mǎo) might have been phonetic, and the bottom part 田 (tián, field) suggests a place where one stays or remains. The meaning is "to remain in a place" or "to keep".
      - char: 意
        pinyin: yì
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: intention, attention, meaning
        other_meanings:
          - meaning, idea (意思)
          - wish, desire (意愿)
          - to expect (意料)
        compounds:
          - simplified: 意思
            pinyin: yìsi
            meaning: meaning, idea
          - simplified: 注意
            pinyin: zhùyì
            meaning: to pay attention to
        etymology: |
          The character 意 consists of 音 (yīn, sound) above the heart radical 心 (xīn). It originally meant "sound in the heart" → "thought" → "intention" or "meaning". 留意 means "keep one's intention/mind on something" → pay attention.

