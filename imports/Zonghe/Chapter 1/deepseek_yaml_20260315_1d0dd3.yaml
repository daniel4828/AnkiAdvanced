        de: Er verpasste den Meistertitel knapp und wurde nur Zweiter.
      - zh: 地铁里人们总是行色匆匆，擦肩而过。
        pinyin: Dìtiě lǐ rénmen zǒng shì xíngsè cōngcōng, cā jiān ér guò.
        de: In der U-Bahn sind die Leute immer in Eile und streifen aneinander vorbei.
