        de: Der Versuch, die öffentliche Ordnung zu stören, ist rechtswidrig.
      - zh: 这些谣言严重扰乱了市场。
        pinyin: Zhèxiē yáoyán yánzhòng rǎoluàn le shìchǎng.
        de: Diese Gerüchte haben den Markt ernsthaft durcheinandergebracht.
      - zh: 别扰乱他，他正在工作。
        pinyin: Bié rǎoluàn tā, tā zhèngzài gōngzuò.
        de: Stör ihn nicht, er arbeitet gerade.
    characters:
      - char: 扰
        traditional: 擾
        pinyin: rǎo
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: to disturb, to harass
        other_meanings:
          - (part of 打扰, 干扰)
        compounds:
          - simplified: 打扰
            pinyin: dǎrǎo
            meaning: to disturb, to bother
          - simplified: 干扰
            pinyin: gānrǎo
            meaning: to interfere, to disturb
        etymology: |
          The traditional form 擾 consists of the hand radical 扌 on the left and 憂 (yōu, worried) on the right, which also provides the phonetic. The hand radical suggests action, and 憂 implies a state of distress, so together it means "to disturb or harass (with the hand/cause distress)".
      - char: 乱
        traditional: 亂
        pinyin: luàn
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: disorder, chaos, confusion
        other_meanings:
          - confused, mixed up
          - arbitrary, random
          - to mix up
        compounds:
          - simplified: 混乱
            pinyin: hùnluàn
            meaning: chaos, disorder
          - simplified: 杂乱
            pinyin: záluàn
            meaning: messy, jumbled
        etymology: |
          The traditional form 亂 is complex, depicting threads being untangled incorrectly, leading to disorder. The simplified form 乱 is a simplified version derived from cursive script. Its core meaning is a state of disorder, lacking proper order.

  - type: vocabulary
    simplified: 留意
    pinyin: liúyì
    english: to be careful, to pay attention to, to keep one's eyes open
    pos: verb
