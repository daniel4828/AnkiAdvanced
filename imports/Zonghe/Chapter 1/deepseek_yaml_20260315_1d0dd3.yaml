      - zh: 我们得控制研究经费。
        pinyin: Wǒmen děi kòngzhì yánjiū jīngfèi.
        de: Wir müssen die Forschungsausgaben kontrollieren.
      - zh: 政府削减了教育经费。
        pinyin: Zhèngfǔ xuējiǎn le jiàoyù jīngfèi.
        de: Die Regierung hat die Bildungsausgaben gekürzt.
      - zh: 经费问题是我们面临的主要困难之一。
        pinyin: Jīngfèi wèntí shì wǒmen miànlín de zhǔyào kùnnán zhī yī.
        de: Das Finanzierungsproblem ist eine der Hauptschwierigkeiten, vor denen wir stehen.
    characters:
      - char: 经
        traditional: 經
        pinyin: jīng
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: (in 经费) constant, regular, managing
        other_meanings:
          - to pass through, to undergo (经过)
          - scripture, classic (圣经)
          - warp (in weaving)
        compounds:
          - simplified: 经济
            pinyin: jīngjì
            meaning: economy
          - simplified: 经常
            pinyin: jīngcháng
            meaning: often, regularly
        etymology: |
          The traditional form 經 consists of the silk radical 糸 (mì) on the left and 巠 (jīng) as a phonetic. The silk radical relates to weaving, and 巠 originally depicted threads on a loom. The warp threads (lengthwise) in weaving are constant and run through the fabric, giving rise to meanings of "to pass through" and "constant".
      - char: 费
        traditional: 費
        pinyin: fèi
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: cost, expense, fee
        other_meanings:
          - to cost, to spend (费钱)
          - to waste (费力)
        compounds:
          - simplified: 费用
            pinyin: fèiyòng
            meaning: cost, expense
          - simplified: 浪费
            pinyin: làngfèi
            meaning: to waste
        etymology: |
          The traditional form 費 consists of the money radical 貝 (bèi, cowry shell = money) on top and a component related to 弗 (fú) which served as a phonetic. It originally meant to spend money (cowry shells). The simplified form uses 贝, the simplified money radical.