          The character 藏 consists of the grass radical 艹 (cǎo) on top, with 臧 (zāng) below acting as a phonetic. Its original meaning was probably related to hiding or storing things in the grass or underground.

  - type: vocabulary
    simplified: 源泉
    pinyin: yuánquán
    english: source, fountainhead, wellspring
    pos: noun
    hsk: "6"
    definition_zh: 水源，比喻事物发生的根源。
    examples:
      - zh: 知识是力量的源泉。
        pinyin: Zhīshi shì lìliang de yuánquán.
        de: Wissen ist die Quelle der Kraft.
      - zh: 黄河是中华民族的源泉之一。
        pinyin: Huáng Hé shì Zhōnghuá Mínzú de yuánquán zhī yī.
        de: Der Gelbe Fluss ist eine der Quellen der chinesischen Nation.
      - zh: 他的灵感源泉来自大自然。
        pinyin: Tā de línggǎn yuánquán láizì dàzìrán.
        de: Die Quelle seiner Inspiration ist die Natur.
      - zh: 家庭是爱的源泉。
        pinyin: Jiātíng shì ài de yuánquán.
        de: Die Familie ist die Quelle der Liebe.
      - zh: 我们要保护地下水的源泉。
        pinyin: Wǒmen yào bǎohù dìxià shuǐ de yuánquán.
        de: Wir müssen die Quellen des Grundwassers schützen.
    characters:
      - char: 源
        pinyin: yuán
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: source (of a river), origin
        other_meanings:
          - cause, source
        compounds:
          - simplified: 来源
            pinyin: láiyuán
            meaning: source, origin
          - simplified: 资源
            pinyin: zīyuán
            meaning: resources
        etymology: |
          The character 源 consists of the water radical 氵 (shuǐ) on the left and 原 (yuán, origin/plain) on the right, which also provides the phonetic. The water radical indicates it originally referred to the source of a river (water). 原 itself means "origin," so together it strongly emphasizes the idea of origin or source.
      - char: 泉
        pinyin: quán
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: spring (water)
        other_meanings:
          - fountain
          - (archaic) coin, money (泉币)
        compounds:
          - simplified: 温泉
            pinyin: wēnquán
            meaning: hot spring
          - simplified: 泉水
            pinyin: quánshuǐ
            meaning: spring water
        etymology: |
          The oracle bone script for 泉 is a pictograph of water (like 水) flowing from a cave or a source. It originally depicted a spring of water flowing out of a hole in the ground. The modern form still carries the essence of "water coming from the ground".

