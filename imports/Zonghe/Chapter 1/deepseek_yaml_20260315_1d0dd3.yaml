      - zh: 他亲身体验了创业的艰辛。
        pinyin: Tā qīnshēn tǐyàn le chuàngyè de jiānxīn.
        de: Er hat die Mühsal der Unternehmensgründung am eigenen Leib erfahren.
      - zh: 新员工需要先体验一下公司的环境。
        pinyin: Xīn yuángōng xūyào xiān tǐyàn yīxià gōngsī de huánjìng.
        de: Neue Mitarbeiter müssen erst die Unternehmensumgebung kennenlernen.
    characters:
      - char: 体
        traditional: 體
        pinyin: tǐ
        hsk: "2"
        detailed_analysis: false
      - char: 验
        traditional: 驗
        pinyin: yàn
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: to examine, to test, to check
        other_meanings:
          - effect, result (效验)
          - to prove
        compounds:
          - simplified: 经验
            pinyin: jīngyàn
            meaning: experience
          - simplified: 考验
            pinyin: kǎoyàn
