  - type: vocabulary
    simplified: 讨价还价
    traditional: 討價還價
    pinyin: tǎo jià huán jià
    english: to haggle, to bargain; to negotiate a price
    hsk: "5"
    pos: idiom / verb (成语/动词)
    definition_zh: 卖主讨价，买主还价，指买卖双方商议商品售价；也比喻讨论条件，互相谈判。
    examples:
      - zh: 在菜市场买东西可以讨价还价，超市里一般不行。
        pinyin: Zài càishìchǎng mǎi dōngxi kěyǐ tǎojià huánjià, chāoshì lǐ yìbān bùxíng.
        de: Auf dem Gemüsemarkt kann man handeln, im Supermarkt geht das normalerweise nicht.
      - zh: 他不善于讨价还价，每次都多花了钱。
        pinyin: Tā bù shànyú tǎojià huánjià, měi cì dōu duō huā le qián.
        de: Er ist kein guter Verhandler – jedes Mal bezahlt er zu viel.
      - zh: 买二手车时，讨价还价的技巧非常重要。
        pinyin: Mǎi èrshǒu chē shí, tǎojià huánjià de jìqiǎo fēicháng zhòngyào.
        de: Beim Kauf eines Gebrauchtwagens sind Verhandlungsgeschick und Feilschen sehr wichtig.
      - zh: 她讨价还价了半小时，终于把价格压下来了。
        pinyin: Tā tǎojià huánjià le bàn xiǎoshí, zhōngyú bǎ jiàgé yā xiàlái le.
        de: Sie feilschte eine halbe Stunde lang und drückte den Preis schließlich herunter.
    characters:
      - char: 讨
        traditional: 討
        pinyin: tǎo
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: to demand, to ask for (a price); to seek
        other_meanings:
          - to demand (讨债 tǎo zhài – to demand repayment of a debt)
          - to seek, to ask for (讨好 tǎohǎo – to curry favor)
          - to send a punitive expedition (讨伐 tǎofá – to send troops against)
          - annoying (讨厌 tǎoyàn – annoying, to dislike)
        compounds:
          - simplified: 讨论
            pinyin: tǎolùn
            meaning: to discuss, discussion
          - simplified: 讨厌
            pinyin: tǎoyàn
            meaning: annoying, to dislike
          - simplified: 讨好
            pinyin: tǎohǎo
            meaning: to curry favor, to please
          - simplified: 探讨
            pinyin: tàntǎo
            meaning: to explore, to investigate
        etymology: |
          The traditional form 討 is a phono-semantic compound. Left: 言/讠 (speech
          radical), indicating it involves speaking or verbal communication. Right:
          寸 (cùn – inch/hand, indicating measurement and control). Together, 討
          originally meant to verbally demand or request something in a measured,
          deliberate way. In ancient texts, it was used for military demands and
          punitive expeditions (to "demand" surrender). The everyday meaning of
          "asking for a price" or "seeking" derives from this core of verbal demanding.
        etymology_example:
          zh: 他们花了一个小时讨论这个问题，最终达成了共识。
          pinyin: Tāmen huā le yī gè xiǎoshí tǎolùn zhège wèntí, zuìzhōng dáchéng le gòngshí.
          de: Sie diskutierten eine Stunde lang über das Problem und kamen schließlich zu einem Konsens.
      - char: 价
        traditional: 價
        pinyin: jià
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: price, value
        other_meanings:
          - value (价值 jiàzhí – value, worth)
          - price (价格 jiàgé – price)
          - valence (化合价 huàhéjià – chemical valence)
        compounds:
          - simplified: 价格
            pinyin: jiàgé
            meaning: price
          - simplified: 价值
            pinyin: jiàzhí
            meaning: value, worth
          - simplified: 讨价
            pinyin: tǎojià
            meaning: to ask a price (seller's side)
          - simplified: 降价
            pinyin: jiàngjià
            meaning: to lower the price
        etymology: |
          The traditional form 價 is a phono-semantic compound. Left: 亻 (person radical).
          Right: 賈 (gǔ/jiǎ – merchant, trader; also phonetic). 賈 itself contains 贝/貝
          (shell/money) and 西 (west; originally a storage bag), depicting a merchant
          with goods. Together, 價 depicted the price set by a merchant – the monetary
          value assigned by a trader to goods. The simplified form 价 dramatically
          reduces complexity while preserving the person radical.
        etymology_example:
          zh: 这幅画的价值在于它的历史意义，而不是市场价格。
          pinyin: Zhè fú huà de jiàzhí zàiyú tā de lìshǐ yìyì, ér bùshì shìchǎng jiàgé.
          de: Der Wert dieses Gemäldes liegt in seiner historischen Bedeutung, nicht im Marktpreis.
      - char: 还
        traditional: 還
        pinyin: huán
        hsk: "2"
        detailed_analysis: false
        note: Here pronounced huán (to return/give back a counter-price), not the common hái (still/yet). Different tone and meaning in this idiom.

  - type: vocabulary
    simplified: 崩溃
    traditional: 崩潰
    pinyin: bēng kuì
    english: to collapse, to break down; (emotionally) to fall apart, to lose control
    hsk: "5-6"
    pos: verb (动词)
    definition_zh: 完全破坏；垮掉。也指人受到刺激或过于悲伤，超过心理承受极限，情绪失控。
    examples:
      - zh: 地震导致大坝崩溃，洪水淹没了下游的村庄。
        pinyin: Dìzhèn dǎozhì dàbà bēngkuì, hóngshuǐ yānmò le xiàyóu de cūnzhuāng.
        de: Das Erdbeben ließ den Staudamm brechen und das Hochwasser überflutete die Dörfer flussabwärts.
      - zh: 他听到这个消息之后精神完全崩溃了。
        pinyin: Tā tīngdào zhège xiāoxi zhīhòu jīngshén wánquán bēngkuì le.
        de: Als er diese Nachricht hörte, erlitt er einen vollständigen Nervenzusammenbruch.
      - zh: 考试前一天，她因为压力太大而崩溃大哭。
        pinyin: Kǎoshì qián yī tiān, tā yīnwèi yālì tài dà ér bēngkuì dà kū.
        de: Am Tag vor der Prüfung brach sie unter dem Druck zusammen und weinte bitterlich.
      - zh: 那家公司的资金链断裂，导致整个项目崩溃。
        pinyin: Nà jiā gōngsī de zījīn liàn duànliè, dǎozhì zhěnggè xiàngmù bēngkuì.
        de: Die Kapitalstruktur des Unternehmens brach zusammen, was zum Scheitern des gesamten Projekts führte.
    characters:
      - char: 崩
        pinyin: bēng
        hsk: "5-6"
        detailed_analysis: true
        meaning_in_context: to collapse, to crumble, to burst apart
        other_meanings:
          - death of an emperor (崩逝 bēngshì – imperial death, classical)
          - to burst (崩裂 bēngliè – to burst apart)
        compounds:
          - simplified: 崩溃
            pinyin: bēngkuì
            meaning: to collapse, to break down
          - simplified: 崩裂
            pinyin: bēngliè
            meaning: to burst apart, to fracture
          - simplified: 山崩
            pinyin: shānbēng
            meaning: landslide
        etymology: |
          崩 consists of 山 (shān – mountain radical) on top and 朋 (péng – friend,
          companions; phonetic) below. In oracle bone script, 朋 depicted two strings
          of shells (an ancient unit of currency) – things strung together. The mountain
          radical on top with 朋 below creates the image of a mountain splitting apart,
          its components (like strings of shells) separating and falling. The original
          meaning was a mountain collapsing – an overwhelming, sudden failure of something
          solid and massive. This metaphor was extended to the death of emperors (mountains
          of authority collapsing) and then to any total collapse.
        etymology_example:
          zh: 那次山崩摧毁了山脚下的整个村庄。
          pinyin: Nà cì shānbēng cuīhuǐ le shān jiǎo xià de zhěnggè cūnzhuāng.
          de: Jener Erdrutsch zerstörte das gesamte Dorf am Fuß des Berges.
      - char: 溃
        traditional: 潰
        pinyin: kuì
        hsk: "5-6"
        detailed_analysis: true
        meaning_in_context: to burst, to break through (like a dike); to rout, to collapse
        other_meanings:
          - to fester, to ulcerate (溃烂 kuìlàn – to ulcerate, to fester)
          - to be routed (溃败 kuìbài – to be routed, to suffer a crushing defeat)
        compounds:
          - simplified: 溃败
            pinyin: kuìbài
            meaning: to be routed, crushing defeat
          - simplified: 溃烂
            pinyin: kuìlàn
            meaning: to fester, to ulcerate
          - simplified: 决溃
            pinyin: juékuì
            meaning: (of a dike) to burst and collapse
        etymology: |
          溃 is a phono-semantic compound. Left: 氵 (water radical), indicating it
          relates to water or fluid. Right: 贵/貴 (guì – valuable, noble; phonetic in
          simplified; traditional uses 𢈔). The original image was of a dike or flood
          barrier bursting under water pressure – water breaking through a barrier in
          an uncontrolled rush. From this physical image of water breaking through came
          the meanings of routing an army (breaking through defenses) and emotional
          breakdown (defenses of the mind collapsing under pressure).
        etymology_example:
          zh: 洪水冲垮了堤坝，河水四处溃散。
          pinyin: Hóngshuǐ chōng kuǎ le dīdà, héshuǐ sìchù kuì sàn.
          de: Das Hochwasser durchbrach den Deich und das Wasser ergoss sich in alle Richtungen.

  - type: vocabulary
    simplified: 进退两难
    traditional: 進退兩難
    pinyin: jìn tuì liǎng nán
    english: in a dilemma; caught between advancing and retreating; damned if you do, damned if you don't
    hsk: "5-6"
    pos: idiom (成语)
    definition_zh: 前进和后退都不好，形容处境困难，两种选择都有问题。
    examples:
      - zh: 他进退两难——辞职怕找不到新工作，不辞又忍受不了。
        pinyin: Tā jìntuì liǎngnán — cízhí pà zhǎo bù dào xīn gōngzuò, bù cí yòu rěnshòu bù liǎo.
        de: Er steckt in der Klemme – kündigen und riskieren, keine neue Stelle zu finden, oder bleiben und leiden.
      - zh: 面对这个问题，她感到进退两难，不知道该怎么办。
        pinyin: Miànduì zhège wèntí, tā gǎndào jìntuì liǎngnán, bù zhīdào gāi zěnme bàn.
        de: Angesichts dieses Problems fühlte sie sich in einem Dilemma und wusste nicht, was sie tun sollte.
      - zh: 公司进退两难：涨价会失去顾客，不涨价又亏本。
        pinyin: "Gōngsī jìntuì liǎngnán: zhǎngjià huì shīqù gùkè, bù zhǎngjià yòu kuīběn."
        de: "Das Unternehmen steckt in der Klemme: Preiserhöhung bedeutet Kundenverlust, keine Erhöhung Verlust."
      - zh: 他进退两难地站在那里，不知道该支持谁。
        pinyin: Tā jìntuì liǎngnán de zhàn zài nàlǐ, bù zhīdào gāi zhīchí shuí.
        de: Er stand ratlos da und wusste nicht, wen er unterstützen sollte.
    characters:
      - char: 进
        traditional: 進
        pinyin: jìn
        hsk: "1-2"
        detailed_analysis: false
      - char: 退
        pinyin: tuì
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: to retreat, to move backward, to withdraw
        other_meanings:
          - to return something (退货 tuìhuò – to return goods)
          - to resign, to withdraw from (退出 tuìchū – to withdraw, to exit)
          - to fade (褪色 tuìsè – to fade in color)
        compounds:
          - simplified: 退出
            pinyin: tuìchū
            meaning: to withdraw, to exit
          - simplified: 退休
            pinyin: tuìxiū
            meaning: to retire
          - simplified: 退货
            pinyin: tuìhuò
            meaning: to return goods
          - simplified: 后退
            pinyin: hòutuì
            meaning: to step back, to retreat
        etymology: |
          The traditional form 進 consists of 辶 (walking radical, indicating movement)
          and 隹 (zhuī – short-tailed bird; phonetic). A bird moving forward. The
          simplified 退 uses 辶 (movement) and 艮 (gèn – to stop, stubborn; phonetic),
          depicting movement being stopped – retreating. The pairing of 进 (forward
          movement) and 退 (backward movement, stopped movement) creates a natural
          antonym pair that is foundational to Chinese spatial reasoning.
        etymology_example:
          zh: 谈判破裂后，双方都选择了退出。
          pinyin: Tánpàn pòliè hòu, shuāngfāng dōu xuǎnzé le tuìchū.
          de: Nach dem Scheitern der Verhandlungen zogen sich beide Seiten zurück.
      - char: 两
        traditional: 兩
        pinyin: liǎng
        hsk: "1"
        detailed_analysis: false
      - char: 难
        traditional: 難
        pinyin: nán
        hsk: "2"
        detailed_analysis: false

  - type: vocabulary
    simplified: 盘算
