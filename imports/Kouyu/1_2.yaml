    hsk: "5"
    pos: verb (动词)
    definition_zh: 考虑或计划（某件事）；也带有暗中谋划的含义。
    examples:
      - zh: 她盘算了好几天，终于决定要换工作。
        pinyin: Tā pánsuan le hǎo jǐ tiān, zhōngyú juédìng yào huàn gōngzuò.
