        pinyin: Tā yīzhí zài pánsuan zhe zěnme kāikǒu tí jiāxīn.
        de: Er überlegte die ganze Zeit, wie er das Thema Gehaltserhöhung ansprechen sollte.
      - zh: 别总是盘算着占便宜，要诚实做人。
        pinyin: Bié zǒngshì pánsuan zhe zhàn piányí, yào chénshí zuòrén.
        de: Denk nicht immer daran, wie du Vorteile erlangen kannst – sei ehrlich.
      - zh: 他在脑子里仔细盘算了一遍，觉得这个计划可行。
        pinyin: Tā zài nǎozi lǐ zǐxì pánsuan le yī biàn, juéde zhège jìhuà kěxíng.
        de: Er ging den Plan im Kopf sorgfältig durch und fand ihn machbar.
    characters:
      - char: 盘
        pinyin: pán
        hsk: "4"
        detailed_analysis: false
        note: bereits analysiert (见 盘点)
      - char: 算
        pinyin: suàn
        hsk: "2-3"
        detailed_analysis: true
        meaning_in_context: to calculate, to plan, to figure out
        other_meanings:
          - to count as, to regard as (算是 suànshì – to count as, to be considered)
          - calculation (计算 jìsuàn – to calculate)
          - abacus (算盘 suànpán – abacus)
          - to plan, to scheme (打算 dǎsuàn – to plan, to intend)
        compounds:
          - simplified: 计算
            pinyin: jìsuàn
            meaning: to calculate, computation
          - simplified: 打算
            pinyin: dǎsuàn
            meaning: to plan, to intend
          - simplified: 算盘
            pinyin: suànpán
            meaning: abacus
          - simplified: 合算
            pinyin: hésuàn
            meaning: worthwhile, cost-effective
        etymology: |
          算 consists of 竹 (zhú – bamboo radical) on top and 具 (jù – tool, implement)
          below, with 目 (mù – eye) as a component of 具. The bamboo radical refers to
          bamboo counting rods (算筹 suànchóu) – the ancient Chinese calculating tool
          used before the abacus. These bamboo sticks were laid out and manipulated to
          perform arithmetic. The character literally depicts "using bamboo implements
          to count/calculate." From physical calculation came the sense of mental
          calculation, planning, and scheming.
        etymology_example:
          zh: 他打算明年出国留学，已经开始准备了。
          pinyin: Tā dǎsuàn míngnián chūguó liúxué, yǐjīng kāishǐ zhǔnbèi le.
          de: Er plant, nächstes Jahr zum Studieren ins Ausland zu gehen, und hat schon angefangen, sich vorzubereiten.
