entries:

  - type: vocabulary
    simplified: 多寡
    traditional: 多寡
    pinyin: duō guǎ
    english: amount, quantity; more or less
    hsk: "5-6"
    pos: noun (名词)
    definition_zh: 数量的大小。
    examples:
      - zh: 捐款多寡不限，心意最重要。
        pinyin: Juānkuǎn duōguǎ bù xiàn, xīnyì zuì zhòngyào.
        de: Die Spendenhöhe ist nicht begrenzt – der gute Wille zählt am meisten.
      - zh: 参加人数多寡不等，每次活动都不一样。
        pinyin: Cānjiā rénshù duōguǎ bù děng, měi cì huódòng dōu bù yīyàng.
        de: Die Teilnehmerzahl variiert – jede Veranstaltung ist anders.
      - zh: 成功与否不在于资源的多寡，而在于如何使用。
        pinyin: Chénggōng yǔfǒu bú zàiyú zīyuán de duōguǎ, ér zàiyú rúhé shǐyòng.
        de: Erfolg hängt nicht von der Menge der Ressourcen ab, sondern davon, wie man sie einsetzt.
      - zh: 无论财富多寡，每个人都值得被尊重。
        pinyin: Wúlùn cáifù duōguǎ, měi gè rén dōu zhíde bèi zūnzhòng.
        de: Unabhängig vom Reichtum verdient jeder Mensch Respekt.
    characters:
      - char: 多
        pinyin: duō
        hsk: "1"
        detailed_analysis: false
      - char: 寡
        pinyin: guǎ
        hsk: "5-6"
        detailed_analysis: true
        meaning_in_context: few, scarce, little
        other_meanings:
          - widowed (寡妇 guǎfù – widow)
          - tasteless, bland (寡淡 guǎdàn – bland, insipid)
          - alone, isolated (孤寡 gūguǎ – solitary and widowed)
        compounds:
          - simplified: 寡妇
            pinyin: guǎfù
            meaning: widow
          - simplified: 孤寡
            pinyin: gūguǎ
            meaning: solitary and widowed; lonely
          - simplified: 寡不敌众
            pinyin: guǎ bù dí zhòng
            meaning: the few cannot withstand the many
          - simplified: 沉默寡言
            pinyin: chénmò guǎyán
            meaning: taciturn, a person of few words
        etymology: |
          寡 consists of 宀 (mián – roof/house radical) on top and 颁/分 components below,
          with 页 (head/person) at the base. In oracle bone and bronze script, 寡 depicted
          a person alone under a roof – someone living in a house without companions,
          specifically a widow (a woman left alone). The original meaning was "alone,
          solitary" and by extension "few, scarce" – just as a widow is left with few
          family members. The character captures both social isolation and numerical
          scarcity. The compound 多寡 pairs the two extremes of quantity: many and few.
        etymology_example:
          zh: 她年轻守寡，独自把孩子抚养成人。
          pinyin: Tā niánqīng shǒuguǎ, dúzì bǎ háizi fǔyǎng chéngrén.
          de: Sie wurde jung zur Witwe und zog ihre Kinder alleine groß.

  - type: vocabulary
    simplified: 干扰
    traditional: 干擾
    pinyin: gān rǎo
    english: to disturb, to interfere with, to disrupt
    hsk: "5"
    pos: verb (动词)
    definition_zh: 扰乱；打扰。
    examples:
      - zh: 请不要干扰正在学习的同学。
        pinyin: Qǐng bùyào gānrǎo zhèngzài xuéxí de tóngxué.
        de: Bitte stört die Mitschüler nicht beim Lernen.
      - zh: 噪音严重干扰了他的工作效率。
        pinyin: Zàoyīn yánzhòng gānrǎo le tā de gōngzuò xiàolǜ.
        de: Lärm beeinträchtigte seine Arbeitseffizienz erheblich.
      - zh: 手机信号受到干扰，打不了电话。
        pinyin: Shǒujī xìnhào shòudào gānrǎo, dǎ bù liǎo diànhuà.
        de: Das Handysignal wird gestört – man kann keine Anrufe tätigen.
      - zh: 她关掉手机，不让任何事干扰自己的思考。
        pinyin: Tā guān diào shǒujī, bù ràng rènhé shì gānrǎo zìjǐ de sīkǎo.
        de: Sie schaltete ihr Handy aus, damit nichts ihr Denken störte.
    characters:
      - char: 干
        traditional: 干／幹
        pinyin: gān
        hsk: "2-3"
        detailed_analysis: true
        meaning_in_context: to interfere with, to affect (here in verbal sense)
        other_meanings:
          - to do, to work (干活 gàn huó – to do work)
          - dry (干燥 gānzào – dry)
          - trunk, main part (树干 shùgàn – tree trunk)
        note: |
          干 is a simplified form that merges three traditional characters: 干 (gān –
          a shield/weapon; dry), 幹 (gàn – trunk; to do), and 乾 (qián – heaven in
          I Ching; dry). Context determines meaning. Here in 干扰, it means "to
          touch/interfere with."
        compounds:
          - simplified: 干扰
            pinyin: gānrǎo
            meaning: to disturb, to interfere
          - simplified: 干燥
            pinyin: gānzào
            meaning: dry, arid
          - simplified: 干涉
            pinyin: gānshè
            meaning: to interfere, to meddle
          - simplified: 骨干
            pinyin: gǔgàn
            meaning: backbone, core member
        etymology: |
          The original 干 depicted a forked stick or weapon used to ward off or strike.
          In oracle bone script, it showed a simple Y-shaped tool – a primitive weapon
          or shield. From "weapon/to strike" came the extended sense of "to touch, to
          interfere with, to affect." The traditional 幹 (trunk, to do) is a separate
          character that was merged into 干 in simplified Chinese, creating the polysemy
          seen today.
        etymology_example:
          zh: 他干涉了别人的私事，引起了很多矛盾。
          pinyin: Tā gānshè le biéren de sīshì, yǐnqǐ le hěnduō máodùn.
          de: Er mischte sich in die Privatangelegenheiten anderer ein und verursachte viele Konflikte.
      - char: 扰
        traditional: 擾
        pinyin: rǎo
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: to disturb, to cause chaos, to agitate
        other_meanings:
          - to trouble someone (打扰 dǎrǎo – to bother, excuse me)
          - to cause chaos (扰乱 rǎoluàn – to disrupt, disturb)
        compounds:
          - simplified: 打扰
            pinyin: dǎrǎo
            meaning: "to bother, to disturb (polite: excuse me for interrupting)"
          - simplified: 扰乱
            pinyin: rǎoluàn
            meaning: to disrupt, to throw into confusion
          - simplified: 骚扰
            pinyin: sāorǎo
            meaning: to harass
        etymology: |
          The traditional form 擾 is a phono-semantic compound. Left: 扌 (hand radical),
          indicating a physical action. Right: 憂/夒 (a complex phonetic component
          originally depicting a monkey or agitated movement). The image of a restless,
          agitated creature combined with the hand radical conveyed the sense of stirring
          up and causing unrest. The simplified form 扰 retains the hand radical and
          uses 尤 (yóu – outstanding, excessive) as a simplified phonetic, preserving
          the sense of excessive disturbance.
        etymology_example:
          zh: 对不起，打扰您一下，请问附近有没有药店？
          pinyin: Duìbuqǐ, dǎrǎo nín yīxià, qǐngwèn fùjìn yǒu méiyǒu yàodiàn?
          de: Entschuldigung für die Störung – gibt es in der Nähe eine Apotheke?

  - type: vocabulary
    simplified: 认知
    traditional: 認知
    pinyin: rèn zhī
    english: cognition; to recognize and understand; cognitive
    hsk: "5-6"
    pos: verb / noun (动词/名词)
    definition_zh: 通过思维活动认识、了解。
    examples:
      - zh: 儿童的认知能力随年龄增长而不断发展。
        pinyin: Értóng de rènzhī nénglì suí niánlíng zēngzhǎng ér bùduàn fāzhǎn.
        de: Die kognitiven Fähigkeiten von Kindern entwickeln sich mit zunehmendem Alter weiter.
      - zh: 我们对这个问题的认知还不够深入。
        pinyin: Wǒmen duì zhège wèntí de rènzhī hái bùgòu shēnrù.
        de: Unser Verständnis dieses Problems ist noch nicht tiefgründig genug.
      - zh: 断舍离改变了很多人对物品的认知。
        pinyin: Duàn shě lí gǎibiàn le hěnduō rén duì wùpǐn de rènzhī.
        de: Danshari hat die Wahrnehmung vieler Menschen gegenüber Besitztümern verändert.
      - zh: 他通过阅读提升了自己的认知水平。
        pinyin: Tā tōngguò yuèdú tíshēng le zìjǐ de rènzhī shuǐpíng.
        de: Durch Lesen verbesserte er sein kognitives Niveau.
    characters:
      - char: 认
        traditional: 認
        pinyin: rèn
        hsk: "2"
        detailed_analysis: false
      - char: 知
        pinyin: zhī
        hsk: "2"
        detailed_analysis: false
        note: |
          Although both characters are HSK 1–2 individually, the compound 认知 is
          a formal academic/psychological term (cognition) that goes beyond the
          basic meaning of its parts. 认 (to recognize) + 知 (to know) = the
          cognitive process of recognizing and knowing.

  - type: vocabulary
    simplified: 囤物倾向
    traditional: 囤物傾向
    pinyin: tún wù qīng xiàng
    english: hoarding tendency; the habit of accumulating and stockpiling things
    hsk: 超纲
    pos: noun phrase (名词短语)
    definition_zh: 喜欢储存物品的习惯。
    examples:
      - zh: 她有严重的囤物倾向，家里堆满了几十年都不会用的东西。
        pinyin: Tā yǒu yánzhòng de tún wù qīngxiàng, jiā lǐ duī mǎn le jǐ shí nián dōu bù huì yòng de dōngxi.
        de: Sie hat eine ausgeprägte Hortungstendenz – ihr Zuhause ist voll mit Dingen, die sie jahrzehntelang nicht benutzen wird.
      - zh: 囤物倾向在老一辈中很常见，因为他们经历过物资匮乏的年代。
        pinyin: Tún wù qīngxiàng zài lǎo yī bèi zhōng hěn chángjiàn, yīnwèi tāmen jīnglì guò wùzī kuìfá de niándài.
        de: Hortungstendenzen sind bei der älteren Generation häufig, da sie Zeiten des Mangels erlebt haben.
      - zh: 断舍离可以帮助有囤物倾向的人重新审视自己与物品的关系。
        pinyin: Duàn shě lí kěyǐ bāngzhù yǒu tún wù qīngxiàng de rén chóngxīn shěnshì zìjǐ yǔ wùpǐn de guānxi.
        de: Danshari kann Menschen mit Hortungstendenz helfen, ihre Beziehung zu Besitztümern neu zu überdenken.
      - zh: 他意识到自己的囤物倾向之后，开始有意识地减少购买。
        pinyin: Tā yìshídào zìjǐ de tún wù qīngxiàng zhīhòu, kāishǐ yǒu yìshí de jiǎnshǎo gòumǎi.
        de: Nachdem er seine Hortungstendenz erkannte, begann er, bewusster weniger einzukaufen.
    characters:
      - char: 囤
        pinyin: tún
        hsk: 超纲
        detailed_analysis: true
        meaning_in_context: to hoard, to stockpile
        other_meanings:
          - a grain bin, storage bin (also read dùn – a round grain storage structure)
          - to store up (囤积 túnjī – to hoard and accumulate)
        compounds:
          - simplified: 囤积
            pinyin: túnjī
            meaning: to hoard, to stockpile (especially goods)
          - simplified: 囤货
            pinyin: túnhuò
            meaning: to stockpile goods
        etymology: |
          囤 is a compound of 囗 (wéi – enclosure radical, a box/container) surrounding
          屯 (tún – to station troops, to gather; also phonetic). The enclosure radical
          represents a container or bin. 屯 in oracle bone script depicted a sprouting
          plant pushing through the earth – something stored and ready to emerge. Together,
          囤 depicts goods gathered and enclosed in a container, i.e., stockpiled. The
          character originally referred to a grain storage bin and by extension the act
          of storing grain for future use.
        etymology_example:
          zh: 疫情期间很多人开始囤积生活必需品。
          pinyin: Yìqíng qījiān hěnduō rén kāishǐ túnjī shēnghuó bìxūpǐn.
          de: Während der Pandemie begannen viele Menschen, Lebensnotwendigkeiten zu horten.
      - char: 物
        pinyin: wù
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: thing, object, item
        other_meanings:
          - matter, substance (物质 wùzhì – matter, material)
          - creature (动物 dòngwù – animal)
          - content, substance (言之有物 yán zhī yǒu wù – substantial speech)
        compounds:
          - simplified: 物品
            pinyin: wùpǐn
            meaning: item, article, goods
          - simplified: 物质
            pinyin: wùzhì
            meaning: matter, material, materialistic
          - simplified: 动物
            pinyin: dòngwù
            meaning: animal
          - simplified: 人物
            pinyin: rénwù
            meaning: person, figure, character
        etymology: |
          物 is a phono-semantic compound. Left: 牛 (niú – cow/ox radical), historically
          representing cattle as the most important form of property and wealth. Right:
          勿 (wù – phonetic, originally a pictograph of a flag with streaming colors,
          meaning "do not"). Together, 物 originally referred to cattle with different
          colored markings, and by extension to all distinguishable things and objects.
          The ox radical reflects how cattle were the primary measure of wealth and
          property in ancient China – "things" were first understood in terms of livestock.
        etymology_example:
          zh: 这家博物馆展出了许多珍贵的历史文物。
          pinyin: Zhè jiā bówùguǎn zhǎnchū le xǔduō zhēnguì de lìshǐ wénwù.
          de: Dieses Museum stellt viele wertvolle historische Artefakte aus.
      - char: 倾
        traditional: 傾
        pinyin: qīng
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: tendency, inclination; to lean toward
        other_meanings:
          - to pour out (倾诉 qīngsù – to pour out one's feelings)
          - to collapse, to topple (倾倒 qīngdǎo – to fall over)
          - to admire greatly (倾慕 qīngmù – to admire)
        compounds:
          - simplified: 倾向
            pinyin: qīngxiàng
            meaning: tendency, inclination, to tend toward
          - simplified: 倾诉
            pinyin: qīngsù
            meaning: to pour out one's heart
          - simplified: 倾斜
            pinyin: qīngxié
            meaning: to tilt, to slant
          - simplified: 倾听
            pinyin: qīngtīng
            meaning: to listen attentively
        etymology: |
          The traditional form 傾 consists of 亻 (person radical) on the left and 頃
          (qǐng – a unit of land area; also "a moment"; phonetic) on the right. The
          original image was of a person leaning to one side – tilting or inclining.
          From physical tilting came the sense of "leaning toward" something mentally
          or emotionally, hence "tendency" and "inclination." The simplified form 倾
          retains the person radical and simplifies the right component.
        etymology_example:
          zh: 他倾听了她所有的烦恼，没有打断她一次。
          pinyin: Tā qīngtīng le tā suǒyǒu de fánnǎo, méiyǒu dǎduàn tā yī cì.
          de: Er hörte all ihren Sorgen aufmerksam zu, ohne sie einmal zu unterbrechen.
      - char: 向
        pinyin: xiàng
        hsk: "2"
        detailed_analysis: false

  - type: vocabulary
    simplified: 息息相关
    traditional: 息息相關
    pinyin: xī xī xiāng guān
    english: closely interrelated; intimately connected
    hsk: "5-6"
    pos: idiom (成语)
    definition_zh: 形容关系非常密切（息：呼吸）。每一次呼吸都相互关联，比喻关系极为紧密。
    examples:
      - zh: 环境保护与人类的健康息息相关。
        pinyin: Huánjìng bǎohù yǔ rénlèi de jiànkāng xīxī xiāngguān.
        de: Umweltschutz und die Gesundheit der Menschen sind eng miteinander verbunden.
      - zh: 个人的幸福与社会的稳定息息相关。
        pinyin: Gèrén de xìngfú yǔ shèhuì de wěndìng xīxī xiāngguān.
        de: Das persönliche Glück ist eng mit der gesellschaftlichen Stabilität verknüpft.
      - zh: 饮食习惯与健康息息相关，不可忽视。
        pinyin: Yǐnshí xíguàn yǔ jiànkāng xīxī xiāngguān, bùkě hūshì.
        de: Ernährungsgewohnheiten und Gesundheit sind eng miteinander verbunden – das darf man nicht ignorieren.
      - zh: 囤物倾向与心理健康息息相关。
        pinyin: Tún wù qīngxiàng yǔ xīnlǐ jiànkāng xīxī xiāngguān.
        de: Hortungstendenzen und psychische Gesundheit stehen in engem Zusammenhang.
    characters:
      - char: 息
        pinyin: xī
        hsk: "4"
        detailed_analysis: true
        meaning_in_context: breath, breathing; (reduplicated) with every breath = very closely
        other_meanings:
          - to rest (休息 xiūxi – to rest)
          - news, information (消息 xiāoxi – news)
          - interest (on money) (利息 lìxī – interest)
          - to cease (息灭 xīmiè – to extinguish)
        compounds:
          - simplified: 休息
            pinyin: xiūxi
            meaning: to rest
          - simplified: 消息
            pinyin: xiāoxi
            meaning: news, information
          - simplified: 利息
            pinyin: lìxī
            meaning: interest (financial)
          - simplified: 叹息
            pinyin: tànxī
            meaning: to sigh
        etymology: |
          息 is composed of 自 (zì – self, nose; in oracle bone script a pictograph of a
          nose) on top and 心 (xīn – heart) below. The nose is the organ of breathing,
          and the heart is the seat of life and emotion. Together, 息 originally depicted
          "the breath from the self/nose reaching the heart" – the act of breathing.
          From breathing came the sense of "resting" (catching one's breath) and
          "ceasing." The reduplication in 息息相关 (every single breath connected)
          intensifies the closeness to an inseparable degree.
        etymology_example:
          zh: 工作了一整天，他终于可以休息了。
          pinyin: Gōngzuò le yī zhěng tiān, tā zhōngyú kěyǐ xiūxi le.
          de: Nach einem ganzen Arbeitstag konnte er endlich ruhen.
      - char: 相
        pinyin: xiāng
        hsk: "3"
        detailed_analysis: true
        meaning_in_context: mutually, each other, with one another
        other_meanings:
          - appearance, looks (外相 wàixiàng – outward appearance)
          - to observe (相面 xiàngmiàn – to read faces)
          - Prime Minister (宰相 zǎixiàng – Prime Minister, historical)
        compounds:
          - simplified: 相互
            pinyin: xiānghù
            meaning: mutual, each other
          - simplified: 相同
            pinyin: xiāngtóng
            meaning: identical, the same
          - simplified: 相信
            pinyin: xiāngxìn
            meaning: to believe, to trust
          - simplified: 相关
            pinyin: xiāngguān
            meaning: related, relevant, connected
        etymology: |
          相 consists of 木 (mù – tree/wood) on the left and 目 (mù – eye) on the right.
          The original meaning was "to look at a tree carefully" – the act of inspection
          and observation. From careful observation came the sense of seeing something
          clearly, leading to its use as an adverb meaning "mutually" (two parties
          observing each other). In oracle bone script, the character clearly showed
          an eye looking at a tree. Both the "appearance" meaning and the "mutual"
          meaning derive from this core of careful, reciprocal observation.
        etymology_example:
          zh: 他们相互帮助，共同度过了困难时期。
          pinyin: Tāmen xiānghù bāngzhù, gòngtóng dùguò le kùnnán shíqī.
          de: Sie halfen sich gegenseitig und überstanden gemeinsam die schwierige Zeit.
      - char: 关
        traditional: 關
        pinyin: guān
        hsk: "2"
        detailed_analysis: false

  - type: vocabulary
    simplified: 耗费
    traditional: 耗費
    pinyin: hào fèi
    english: to consume, to expend, to use up (time, energy, resources)
    hsk: "5"
    pos: verb (动词)
    definition_zh: 花费掉；用掉（多指时间、精力、资源等）。
    examples:
      - zh: 整理这些旧物耗费了她整整一个下午。
        pinyin: Zhěnglǐ zhèxiē jiù wù hàofèi le tā zhěngzhěng yī gè xiàwǔ.
        de: Das Sortieren dieser alten Sachen kostete sie einen ganzen Nachmittag.
      - zh: 这项工程耗费了大量的人力和资源。
        pinyin: Zhè xiàng gōngchéng hàofèi le dàliàng de rénlì hé zīyuán.
        de: Dieses Bauprojekt verbrauchte enorme Mengen an Arbeitskraft und Ressourcen.
      - zh: 不必要的会议耗费了员工大量的精力。
        pinyin: Bù bìyào de huìyì hàofèi le yuángōng dàliàng de jīnglì.
        de: Unnötige Meetings verschwendeten enorme Mengen an Energie der Mitarbeiter.
      - zh: 囤积物品不仅耗费金钱，还耗费空间和心力。
        pinyin: Túnjī wùpǐn bùjǐn hàofèi jīnqián, hái hàofèi kōngjiān hé xīnlì.
        de: Das Horten von Gegenständen kostet nicht nur Geld, sondern auch Platz und Nerven.
    characters:
      - char: 耗
        pinyin: hào
        hsk: "5"
        detailed_analysis: true
        meaning_in_context: to consume, to deplete, to use up
        other_meanings:
          - to drag out, to while away (耗时 hàoshí – time-consuming)
          - news (音耗 yīnhào – news of someone, archaic)
          - rat (老鼠 as 耗子 hàozi – colloquial for rat/mouse)
        compounds:
          - simplified: 消耗
            pinyin: xiāohào
            meaning: to consume, to deplete
          - simplified: 损耗
            pinyin: sǔnhào
            meaning: wear and tear, loss through use
          - simplified: 耗尽
            pinyin: hàojìn
            meaning: to exhaust completely, to drain
          - simplified: 耗时
            pinyin: hàoshí
            meaning: time-consuming
        etymology: |
