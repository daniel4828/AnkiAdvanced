- type: sentence
  date: "03/26"
  source_de: Wir verlernen, wie man selbst Essen macht.
  simplified: 我们在忘记如何自己做饭。
  traditional: 我們在忘記如何自己做飯。
  pinyin: Wǒmen zài wàngjì rúhé zìjǐ zuòfàn.
  english: We are unlearning / forgetting how to cook for ourselves.
  hsk: "3-4"
  explanations: |
    Die deutsche Konstruktion „verlernen, wie man etwas macht“ wird im Chinesischen auf mehrere Arten übersetzt:
    
    - 忘记如何 (wàngjì rúhé) – wörtlich „vergessen, wie“ (am nächsten an „verlernen“)
    - 不再会 (bù zài huì) – „nicht mehr können“
    - 渐渐失去 (jiànjiàn shīqù) – „allmählich verlieren“ (die Fähigkeit)
    
  grammar_structures:
    - structure: 忘记如何 + 动词
      explanation: "忘记"表示遗忘，"如何"表示方式
      example: 忘记如何自己做饭
    - structure: 代词"人"（man）的省略或用自己表达
      explanation: 通常省略或用"自己"（zìjǐ）来表达
      example: 如何自己做饭
    - structure: "忘记"作为过程的时态标记
      explanation: |
        在忘记（zài wàngjì）= 正在忘记
        正在忘记（zhèngzài wàngjì）= 正在经历忘记的过程
      example: 我们正在忘记如何自己做饭
    - structure: 动词"做饭"的组成
      explanation: "做"（zuò）= 做，"饭"（fàn）= 吃的东西，合起来 = 做吃的
      example: 做饭 = 准备食物/做饭

  similar_sentences: #just two
    - zh: 年轻人正在忘记如何自己做饭。
      pinyin: Niánqīng rén zhèngzài wàngjì rúhé zìjǐ zuòfàn.
      de: Junge Menschen verlernen / vergessen, wie man selbst kocht.
    - zh: 在快餐时代，我们渐渐失去了烹饪的能力。
      pinyin: Zài kuàicān shídài, wǒmen jiànjiàn shīqù le pēngrèn de nénglì.
      de: Im Fast-Food-Zeitalter verlieren wir allmählich die Fähigkeit zu kochen.
