      - char: 忘
        simplified: 忘
        traditional: 忘
        pinyin: wàng
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: vergessen
        other_meanings:
          - "vergessen, aus dem Gedächtnis verlieren"
        compounds:
          - simplified: 忘记
            pinyin: wàngjì
            meaning: vergessen
          - simplified: 遗忘
            pinyin: yíwàng
            meaning: vergessen (formell)
          - simplified: 难忘
            pinyin: nánwàng
            meaning: unvergesslich
        etymology: |
          Das Zeichen 忘 besteht aus dem Radikal 心 (Herz, Gefühl) unten und der phonetischen Komponente 亡 (wáng, sterben, verschwinden) oben. Wörtlich bedeutet es „etwas stirbt im Herzen“ → vergessen. Diese bildhafte Zusammensetzung zeigt, dass Vergessen als emotionaler Verlust verstanden wurde.
      - char: 记
        simplified: 记
        traditional: 記
        pinyin: jì
        hsk: "3-4"
        detailed_analysis: true
        meaning_in_context: sich erinnern, aufzeichnen (in 忘记)
        other_meanings:
          - "sich erinnern (记得 jìde)"
          - "aufschreiben, notieren (记录 jìlù)"
          - "Zeichen, Markierung (记号 jìhào)"
        compounds:
          - simplified: 记得
            pinyin: jìde
            meaning: sich erinnern
          - simplified: 记录
            pinyin: jìlù
            meaning: aufzeichnen, Rekord
          - simplified: 记忆
            pinyin: jìyì
            meaning: Gedächtnis, Erinnerung
        etymology: |
          Das traditionelle Zeichen 記 besteht aus dem Radikal 言 (Wort, sprechen) und der phonetischen Komponente 己 (jǐ, selbst). Ursprünglich bedeutete es „Worte aufzeichnen“ → aufschreiben, sich merken. Im vereinfachten 记 wurde 言 zu 讠 vereinfacht. In 忘记 bildet 记 das Gegenteil zu 忘: „erinnern“ vs. „vergessen“.
