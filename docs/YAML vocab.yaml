    - char: 绝
      simplified: 绝
      traditional: 絕
      pinyin: jué
      hsk: "5" #one value!!!
      detailed_analysis: true
      meaning_in_context: hoffnungslos, völlig (in 绝望 – Hoffnung verlieren)
      compounds: #also create a joint table with Words DB
        - hanzi: 绝对
          pinyin: juéduì
          deutsch: absolut, völlig
        - hanzi: 绝迹
          pinyin: juéjì
          deutsch: aufhören, enden
        - hanzi: 绝妙
          pinyin: juémiào
          deutsch: einzigartig
        - hanzi: 绝技
          pinyin: juéjì
          deutsch: ausgezeichnet  compounds
        - simplified: 绝望
          pinyin: juéwàng
          meaning: verzweifelt, hoffnungslos
        - simplified: 绝对
          pinyin: juéduì
          meaning: absolut, unbedingt
        - simplified: 拒绝
          pinyin: jùjué
          meaning: ablehnen, verweigern
        - simplified: 绝路
          pinyin: juélù
          meaning: Sackgasse, Weg ohne Ausweg
      etymology: |
        Das traditionelle Zeichen 絕 besteht aus dem Radikal 糸 (Seide) und der Komponente 刀 (Messer) mit 卩 (Siegel).
        Ursprünglich bedeutete es „Seide mit einem Messer durchtrennen“ → abbrechen, aufhören, enden.
        Daraus entwickelte sich die Bedeutung „äußerst, absolut“ (da etwas Endgültiges extrem ist) und in
        Zusammensetzungen wie 绝望 (Hoffnung endet) die Bedeutung „hoffnungslos, verzweifelt“.
        Das vereinfachte 绝 ist eine abstrakte, leichter schreibbare Form.
    - char: 望
      simplified: 望
      traditional: 望
      pinyin: wàng
      hsk: "3-4"
      detailed_analysis: true
      meaning_in_context: Hoffnung (in 绝望 – Hoffnungslosigkeit)
      compounds:
        - simplified: 希望
          pinyin: xīwàng
          meaning: Hoffnung, hoffen
        - simplified: 愿望
          pinyin: yuànwàng
          meaning: Wunsch, Verlangen
        - simplified: 盼望
          pinyin: pànwàng
          meaning: sehnsüchtig erwarten
        - simplified: 失望
          pinyin: shīwàng
          meaning: enttäuscht sein
      etymology: |
        Das Zeichen 望 besteht ursprünglich aus den Komponenten 月 (Mond) und 王 (König) sowie 亡 (entfernt).
        Ursprünglich bedeutete es „zum Mond hinaufblicken“ – der König (王) blickt in die Ferne zum Mond (月).
        Daraus entwickelten sich die Bedeutungen „blicken, schauen“ und übertragen „erwarten, hoffen“ (man blickt
        in die Zukunft). In 绝望 (keine Hoffnung) steht 望 für die Hoffnung, die durch 绝 (enden) zunichte gemacht wird.