- type: word
  date: "03/27"
  simplified: 平行
  traditional: 平行
  pinyin: píngxíng
  english: parallel / simultaneous / concurrent
  hsk: "5"
  register: neutral
  note: |
    Used for both spatial and temporal parallelism. Spatially: lines, roads, or objects that run parallel. Temporally: events, processes, or tasks that occur simultaneously or independently.
    
    **Common Expressions:**
    - 平行线 (píngxíngxiàn) — parallel lines
    - 平行世界 (píngxíng shìjiè) — parallel world
    - 平行发展 (píngxíng fāzhǎn) — parallel development
    - 平行进行 (píngxíng jìnxíng) — to proceed in parallel
    
    **Cultural Note:**
    平行 has two distinct usage contexts:
    
    **Spatial** (geometry, layout):
    - 这两条路是平行的 (These two roads are parallel)
    - 平行停车 (píngxíng tíngchē) — parallel parking
    
    **Temporal** (simultaneous, concurrent):
    - 两个项目平行进行 (Two projects are running in parallel)
    - 平行处理 (píngxíng chǔlǐ) — parallel processing
    
    For temporal "parallel" with a stronger sense of "running alongside simultaneously," 并行 (bìngxíng) is also common:
    - 并行不悖 (bìngxíng bùbèi) — to run in parallel without conflict
    - 两者可以并行 (liǎngzhě kěyǐ bìngxíng) — the two can coexist/run in parallel
    
    The distinction:
    - 平行 focuses on the concept of being parallel (like lines never meeting)
    - 并行 emphasizes "running together simultaneously"
  examples:
    - zh: 这两条铁路线是平行的，永远不会相交。
      pinyin: Zhè liǎng tiáo tiělù xiàn shì píngxíng de, yǒngyuǎn bù huì xiāngjiāo.
      english: These two railway lines are parallel and will never meet.
    - zh: 两个会议平行进行，分别在两个会议室。
      pinyin: Liǎng gè huìyì píngxíng jìnxíng, fēnbié zài liǎng gè huìyìshì.
      english: The two meetings are running in parallel, in two different meeting rooms.
    - zh: 他在平行世界里过着另一种人生。
      pinyin: Tā zài píngxíng shìjiè lǐ guòzhe lìng yī zhǒng rénshēng.
      english: In a parallel world, he lives a different life.
    - zh: 这两个方案可以平行推进，互不干扰。
      pinyin: Zhè liǎng gè fāng'àn kěyǐ píngxíng tuījìn, hù bù gānrǎo.
      english: These two plans can be advanced in parallel without interfering with each other.
  synonyms:
