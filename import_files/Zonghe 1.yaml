- type: word
  date: "03/27"
  simplified: 小看
  traditional: 小看
  pinyin: xiǎokàn
  english: to underestimate / to look down on / to belittle
  hsk: "5"
  register: spoken
  note: |
    A colloquial verb meaning "to underestimate" or "to look down on someone." 小 (small) + 看 (to look) — literally "to see as small." Used when someone underestimates another's abilities, worth, or potential.
    
    **Common Expressions:**
    - 别小看人 (bié xiǎokàn rén) — don't underestimate people / don't look down on others
    - 小看他了 (xiǎokàn tā le) — underestimated him
    - 可别小看这个问题 (kě bié xiǎokàn zhège wèntí) — don't underestimate this problem
    - 小看不得 (xiǎokàn bùdé) — cannot afford to underestimate / should not be looked down upon
    
    **Cultural Note:**
    The concept of 小看 reflects a cultural value of not judging based on appearances. Chinese proverbs and idioms often warn against underestimating others:
    - 人不可貌相 (rén bùkě màoxiàng) — you can't judge a person by appearance
    - 高手在民间 (gāoshǒu zài mínjiān) — masters often appear among ordinary people
    
    小看 implies a slight against someone's abilities or status. It is commonly used in negative constructions (别小看, 不能小看, 不可小看) as a warning against underestimation. The opposite concept is 高看 (gāokàn — to think highly of).
    
    In social contexts, being told "别小看我" (don't underestimate me) is a mild challenge, asserting that one is capable despite appearances. In competitive contexts (games, sports, business), 小看对手 (underestimating the opponent) is considered a fatal mistake.
  examples:
    - zh: 别小看他，他虽然年轻，但很有经验。
      pinyin: Bié xiǎokàn tā, tā suīrán niánqīng, dàn hěn yǒu jīngyàn.
      english: Don't underestimate him. Though he's young, he's very experienced.
    - zh: 我当初小看了这个项目的难度，现在后悔了。
      pinyin: Wǒ dāngchū xiǎokànle zhège xiàngmù de nándù, xiànzài hòuhuǐ le.
      english: I underestimated the difficulty of this project back then, and now I regret it.
    - zh: 你太谦虚了，不要小看自己的能力。
      pinyin: Nǐ tài qiānxū le, bùyào xiǎokàn zìjǐ de nénglì.
      english: You're too modest; don't underestimate your own abilities.
    - zh: 这个对手不可小看，他们刚刚赢了上届冠军。
      pinyin: Zhège duìshǒu bùkě xiǎokàn, tāmen gānggāng yíngle shàngjiè guànjūn.
      english: This opponent shouldn't be underestimated; they just beat last year's champion.
  synonyms:
    - word: 低估
      pinyin: dīgū
      meaning: to underestimate (more formal)
    - word: 轻视
      pinyin: qīngshì
      meaning: to despise, to look down on
  antonyms:
