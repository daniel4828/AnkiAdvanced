- type: word
  date: "03/27"
  simplified: 钓鱼
  traditional: 釣魚
  pinyin: diàoyú
  english: to fish / fishing / angling
  hsk: "4"
  register: neutral
  note: |
    A common verb meaning "to fish" or "angling." Used literally for fishing as a leisure activity or profession. Also appears in figurative expressions and modern slang for scams (phishing).
    
    **Common Expressions:**
    - 钓鱼竿 (diàoyúgān) — fishing rod
    - 钓鱼岛 (Diàoyú Dǎo) — Diaoyu Islands / Senkaku Islands
    - 钓鱼执法 (diàoyú zhífǎ) — entrapment (law enforcement)
    - 钓鱼邮件 (diàoyú yóujiàn) — phishing email
    - 姜太公钓鱼——愿者上钩 (Jiāng Tàigōng diàoyú — yuàn zhě shàng gōu) — "Jiang Taigong fishes — only those willing take the bait"
    
    **Cultural Note:**
    Fishing has long been associated with leisure, patience, and philosophy in Chinese culture. The famous idiom "姜太公钓鱼——愿者上钩" comes from a legend about Jiang Ziya (姜子牙), a strategist who used a straight hook without bait while fishing, attracting the attention of King Wen of Zhou. This became a metaphor for waiting for the right opportunity or willing participants.
    
    In modern internet slang, 钓鱼 refers to "trolling" or "baiting" — posting provocative content to lure others into arguments. It also commonly refers to "phishing" scams (钓鱼网站 — phishing websites) in cybersecurity contexts.
    
    The phrase 钓鱼执法 — "fishing law enforcement" — is a controversial term describing entrapment where authorities induce someone to commit a crime they otherwise wouldn't.
  examples:
    - zh: 周末我们经常去河边钓鱼。
      pinyin: Zhōumò wǒmen jīngcháng qù hébiān diàoyú.
      english: We often go fishing by the river on weekends.
    - zh: 他钓了一下午，一条鱼也没钓到。
      pinyin: Tā diàole yī xiàwǔ, yī tiáo yú yě méi diàodào.
      english: He fished all afternoon and didn't catch a single fish.
    - zh: 网上有很多钓鱼网站，要小心。
      pinyin: Wǎngshàng yǒu hěnduō diàoyú wǎngzhàn, yào xiǎoxīn.
      english: There are many phishing websites online; be careful.
    - zh: 姜太公钓鱼，愿者上钩。
      pinyin: Jiāng Tàigōng diàoyú, yuàn zhě shàng gōu.
      english: Jiang Taigong fishes — only those willing take the bait.
