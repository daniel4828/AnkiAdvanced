- type: grammar
  name: 一面...一面...
  level: "4-5"
  structure: 一面 + Verb Phrase 1 + 一面 + Verb Phrase 2
  meaning: while doing A, also doing B / simultaneously / at the same time
  usage: |
    Used to indicate that two actions are happening simultaneously. Can be used with single verbs or longer phrases. More formal/literary than 一边...一边..., which is the common colloquial equivalent.
  examples:
    - zh: 他一面开车，一面听音乐。
      pinyin: Tā yīmiàn kāichē, yīmiàn tīng yīnyuè.
      de: Er fährt Auto und hört gleichzeitig Musik.
      english: He drives while listening to music.
    - zh: 她一面流泪，一面诉说着过去的往事。
      pinyin: Tā yīmiàn liúlèi, yīmiàn sùshuōzhe guòqù de wǎngshì.
      de: Sie weinte, während sie von vergangenen Erlebnissen erzählte.
      english: She wept while recounting stories of the past.
    - zh: 我们一面喝茶，一面聊天，不知不觉过了两个小时。
      pinyin: Wǒmen yīmiàn hē chá, yīmiàn liáotiān, bùzhī bùjué guòle liǎng gè xiǎoshí.
      de: Wir tranken Tee und plauderten, und ohne es zu merken vergingen zwei Stunden.
      english: We drank tea and chatted, and before we knew it, two hours had passed.
  common_patterns:
    - pattern: 一面 + [Verb Phrase 1] + 一面 + [Verb Phrase 2]
      meaning: doing A and B simultaneously
      example: 一面吃饭一面看手机
    - pattern: 一面...一面... (with same subject)
      meaning: the same person does two things at once
      example: 他一面向我道歉，一面偷偷地笑
  grammar_notes: |
    **Comparison: 一面...一面... vs 一边...一边...**
    
    | Feature | 一面...一面... | 一边...一边... |
    |---------|----------------|----------------|
    | Register | Formal, literary | Colloquial, everyday |
    | Frequency | Less common in speech | Very common in speech |
    | Style | Elegant, classical feel | Neutral, natural |
    
    **Usage Notes:**
    - The two actions usually share the same subject
    - Both parts are typically parallel in structure (verb + object)
    - Can be shortened to just 一面 in some contexts: 他一面说，一面笑 (He talked while laughing)
    
    **Related Structure:**
    - 另一方面 (lìng yīmiàn) — on the other hand / the other aspect
    - 一面之词 (yīmiàn zhī cí) — one-sided statement

- type: grammar
  name: 何况
  level: "4-5"
  structure: Clause 1 + 何况 + Clause 2
  meaning: let alone / not to mention / moreover
  usage: |
    Used to introduce a further, more compelling reason or to emphasize that if one situation is true, then another is even more obviously true. Often used in rhetorical questions. Similar to "let alone" or "much less" in English.
  examples:
    - zh: 连大人都不明白，何况小孩子呢？
      pinyin: Lián dàrén dōu bù míngbái, hékuàng xiǎoháizi ne?
      de: Selbst Erwachsene verstehen es nicht, geschweige denn Kinder.
      english: Even adults don't understand it, let alone children.
    - zh: 她平时连楼梯都爬不动，何况爬山呢。
      pinyin: Tā píngshí lián lóutī dōu pá bù dòng, hékuàng pá shān ne.
      de: Normalerweise schafft sie nicht einmal Treppen, geschweige denn einen Berg zu besteigen.
      english: She can't even climb stairs normally, let alone climb a mountain.
    - zh: 今天是周一，大家都很忙，何况还下着雨。
      pinyin: Jīntiān shì zhōuyī, dàjiā dōu hěn máng, hékuàng hái xiàzhe yǔ.
      de: Heute ist Montag, alle sind beschäftigt, und dazu regnet es noch.
      english: Today is Monday, everyone is busy, and on top of that it's raining.
  common_patterns:
    - pattern: 连 + A + 都/也 + 不/没 + Verb，何况 + B + 呢？
      meaning: Even A doesn't/can't (verb), let alone B
      example: 连他都不会，何况我呢？
    - pattern: Clause 1，何况 + Clause 2 (without 呢)
      meaning: Moreover / on top of that
      example: 路很远，何况天也晚了
  grammar_notes: |
    **Comparison: 何况 vs 况且**
    
    | Feature | 何况 | 况且 |
    |---------|------|------|
    | Meaning | "let alone" (escalating logic) | "moreover / besides" (adding reasons) |
    | Structure | Often used with 连...都... | Typically introduces an additional point |
    | Tone | Rhetorical, emphatic | Explanatory, additive |
    | Question form | Frequently ends with 呢 | Rarely used in questions |
    
    **Examples of distinction:**
    - 何况 (let alone): 我都没去过，何况你？ (I haven't even been there, let alone you?)
    - 况且 (moreover): 我没去过，况且我也没有时间。 (I haven't been there, and besides, I don't have time.)
    
    **Related Expressions:**
    - 更不用说 (gèng bùyòng shuō) — not to mention / let alone (even more emphatic)
    - 别说...就连... (bié shuō... jiù lián...) — not to mention... even...

- type: word
  date: "03/27"
  simplified: 表演
  traditional: 表演
  pinyin: biǎoyǎn
  english: to perform / to act / performance / acting
  hsk: "4"
  register: neutral
  note: |
    The most common word for acting or performing on stage, film, or in front of an audience. Covers theater, film, television, and live performances. Can be used as both a verb (to perform) and a noun (a performance).
    
    **Common Expressions:**
    - 表演节目 (biǎoyǎn jiémù) — to perform a program / act
    - 表演艺术 (biǎoyǎn yìshù) — performing arts
    - 表演者 (biǎoyǎnzhě) — performer
    - 精彩表演 (jīngcǎi biǎoyǎn) — wonderful performance
    - 即兴表演 (jíxìng biǎoyǎn) — improvisation / impromptu performance
    
    **Cultural Note:**
    Chinese performing arts have a rich tradition spanning opera (京剧 Beijing opera), regional operas, and modern theater. 表演 is the standard term for any kind of staged performance, whether amateur or professional.
    
    **Related Terms:**
    - 演出 (yǎnchū) — to perform / performance (emphasizes the event/show)
    - 演戏 (yǎnxì) — to act / to play a role (more colloquial, also "to pretend")
    - 扮演 (bànyǎn) — to play the role of (specific character)
