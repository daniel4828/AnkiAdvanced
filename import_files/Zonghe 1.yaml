- type: word
  date: "03/27"
  simplified: 撞车
  traditional: 撞車
  pinyin: zhuàngchē
  english: car crash / collision / (figurative) schedule conflict / to clash (of appointments or events)
  hsk: "5"
  register: spoken
  note: |
    Literally "to crash cars," used for vehicle collisions. Figuratively, it means scheduling conflicts where two appointments or events occur at the same time, or when creative works have overlapping/identical ideas.
    
    **Common Expressions:**
    - 时间撞车 (shíjiān zhuàngchē) — schedule conflict
    - 行程撞车 (xíngchéng zhuàngchē) — itinerary conflict
    - 两个会议撞车了 (liǎng gè huìyì zhuàngchē le) — two meetings conflict
    - 创意撞车 (chuàngyì zhuàngchē) — creative ideas overlapping
    - 撞期 (zhuàngqī) — dates conflict
    
    **Cultural Note:**
    撞车 is a vivid metaphor drawn from traffic accidents. In busy modern life, scheduling conflicts are commonly described as 时间撞车. The term is neutral and can refer to:
    - Appointment conflicts: 我的两个会撞车了 (Two of my meetings collided)
    - Event clashes: 两个电影节撞车了 (Two film festivals clash)
    - Creative overlap: 他的新片和我的构思撞车了 (His new film overlapped with my idea)
    
    In creative industries (film, writing, product design), 撞车 describes the awkward situation where two people independently come up with the same idea at the same time, or a creator accidentally produces something too similar to an existing work.
    
    Related expressions:
    - 撞时间 (zhuàng shíjiān) — to conflict in time
    - 撞日子 (zhuàng rìzi) — to conflict on a date
  examples:
    - zh: 明天下午两个会议撞车了，我得改一个。
      pinyin: Míngtiān xiàwǔ liǎng gè huìyì zhuàngchē le, wǒ děi gǎi yī gè.
      english: Two meetings collided tomorrow afternoon; I have to reschedule one.
    - zh: 他的婚礼和我出差的时间撞车了。
      pinyin: Tā de hūnlǐ hé wǒ chūchāi de shíjiān zhuàngchē le.
      english: His wedding conflicts with my business trip.
    - zh: 这两个电影上映日期撞车了，都在国庆档。
      pinyin: Zhè liǎng gè diànyǐng shàngyìng rìqī zhuàngchē le, dōu zài guóqìng dàng.
      english: These two movies have clashing release dates — both are in the National Day slot.
    - zh: 小心开车，前面有车撞车了。
      pinyin: Xiǎoxīn kāichē, qiánmiàn yǒu chē zhuàngchē le.
      english: Drive carefully; there's been a car crash up ahead.
  synonyms:
    - word: 冲突
      pinyin: chōngtū
      meaning: conflict (formal)
    - word: 重叠
      pinyin: chóngdié
      meaning: to overlap
    - word: 撞期
      pinyin: zhuàngqī
      meaning: dates conflict
  characters:
