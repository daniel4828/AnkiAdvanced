    摞 has the hand radical 扌, indicating the action involves hands, and the phonetic component 累 (lèi, "to accumulate").
    
    Important distinction:
    - 摞: neat stack of flat objects
    - 堆: pile (can be messy, any shape)
    - 叠: to fold; classifier for layers
