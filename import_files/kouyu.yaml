- type: word
  date: "03/27"
  simplified: 盈利
  traditional: 盈利
  pinyin: yínglì
  english: profit / to profit / profitable
  hsk: "5"
  register: neutral
  note: |
    A noun and verb meaning "profit" or "to make a profit." Used in business, finance, and economics to describe financial gain after expenses.
    
    **Common Expressions:**
    - 盈利能力 (yínglì nénglì) — profitability
    - 盈利模式 (yínglì móshì) — profit model
    - 盈利增长 (yínglì zēngzhǎng) — profit growth
    - 扭亏为盈 (niǔ kuī wéi yíng) — to turn losses into profits
    - 非盈利机构 (fēi yínglì jīgòu) — non-profit organization
    
    **Cultural Note:**
    盈利 combines 盈 (full, abundant, surplus) and 利 (profit, benefit). The term has become increasingly important in China's modern market economy.
    
    Important distinction:
    - 盈利 (yínglì) — profit (the result)
    - 营利 (yínglì) — to seek profit (the activity)
    - 非盈利机构 vs 非营利机构 — both used for non-profit organizations
  examples:
    - zh: 这家公司连续三年实现盈利。
      pinyin: Zhè jiā gōngsī liánxù sān nián shíxiàn yínglì.
      english: This company has achieved profitability for three consecutive years.
      de: Dieses Unternehmen erzielt seit drei Jahren in Folge Gewinne.
      fr: Cette entreprise a réalisé des bénéfices pendant trois années consécutives.
    - zh: 他们的盈利模式很清晰，主要靠广告收入。
      pinyin: Tāmen de yínglì móshì hěn qīngxī, zhǔyào kào guǎnggào shōurù.
      english: Their profit model is very clear; it mainly relies on advertising revenue.
      de: Ihr Geschäftsmodell ist sehr klar; es basiert hauptsächlich auf Werbeeinnahmen.
      fr: Leur modèle de rentabilité est très clair ; il repose principalement sur les revenus publicitaires.
  characters:
