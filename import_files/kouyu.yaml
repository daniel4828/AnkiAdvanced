- type: word
  date: "03/27"
  simplified: 线上
  traditional: 線上
  pinyin: xiànshàng
  english: online / on the internet / on the platform
  hsk: "4"
  register: neutral
  note: |
    A term meaning "online" or "on the internet." Literally "on the line" — referring to being connected to a network or platform. The counterpart is 线下 (offline).
    
    **Common Expressions:**
    - 线上购物 (xiànshàng gòuwù) — online shopping
    - 线上课程 (xiànshàng kèchéng) — online courses
    - 线上支付 (xiànshàng zhīfù) — online payment
    - 线上会议 (xiànshàng huìyì) — online meeting
    - 线上平台 (xiànshàng píngtái) — online platform
    
    **Cultural Note:**
    线上 emerged with the rise of the internet. 线 (line) metaphorically represents the network connection. The pair 线上/线下 became especially prominent with e-commerce, education, and remote work. O2O (Online to Offline) business models emphasize 线上线下融合 (online-offline integration).
  examples:
    - zh: 越来越多的人喜欢线上购物。
      pinyin: Yuèláiyuè duō de rén xǐhuān xiànshàng gòuwù.
      english: More and more people like online shopping.
      de: Immer mehr Menschen mögen Online-Shopping.
      fr: De plus en plus de gens aiment les achats en ligne.
    - zh: 这家公司同时提供线上和线下服务。
      pinyin: Zhè jiā gōngsī tóngshí tígōng xiànshàng hé xiànxià fúwù.
      english: This company provides both online and offline services.
      de: Dieses Unternehmen bietet sowohl Online- als auch Offline-Dienste an.
      fr: Cette entreprise propose à la fois des services en ligne et hors ligne.
  characters:
    - char: 线
      simplified: 线
      traditional: 線
      pinyin: xiàn
      hsk: "3"
      detailed_analysis: true
      meaning_in_context: line, network
