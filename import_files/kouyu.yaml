- type: word
  date: "03/27"
  simplified: 天赋
  traditional: 天賦
  pinyin: tiānfù
  english: talent / gift / natural endowment / innate ability
  hsk: "5"
  register: formal_written
  note: |
    A noun meaning "natural talent" or "inborn gift." Refers to abilities that a person is born with, rather than acquired through learning or practice.
    
    **Common Expressions:**
    - 天赋异禀 (tiānfù yìbǐng) — exceptionally gifted
    - 天赋才华 (tiānfù cáihuá) — natural talent
    - 有天赋 (yǒu tiānfù) — to have talent
    - 艺术天赋 (yìshù tiānfù) — artistic talent
    - 音乐天赋 (yīnyuè tiānfù) — musical talent
    
    **Cultural Note:**
    天赋 combines 天 (heaven, nature) and 赋 (to bestow). Literally "bestowed by heaven" — abilities given by nature.
    
    Chinese culture values both 天赋 and 勤奋 (diligence). The idiom 天道酬勤 (heaven rewards hard work) emphasizes effort, while 天赋 acknowledges natural gifts.
  examples:
    - zh: 她在音乐方面很有天赋，五岁就开始学钢琴。
      pinyin: Tā zài yīnyuè fāngmiàn hěn yǒu tiānfù, wǔ suì jiù kāishǐ xué gāngqín.
      english: She has great musical talent; she started learning piano at age five.
      de: Sie hat großes musikalisches Talent; sie begann im Alter von fünf Jahren Klavier zu lernen.
      fr: Elle a un grand talent musical ; elle a commencé à apprendre le piano à cinq ans.
    - zh: 天赋固然重要，但后天的努力同样不可或缺。
      pinyin: Tiānfù gùrán zhòngyào, dàn hòutiān de nǔlì tóngyàng bùkě huòquē.
      english: Talent is certainly important, but hard work is equally indispensable.
      de: Talent ist sicherlich wichtig, aber harte Arbeit ist ebenso unverzichtbar.
      fr: Le talent est certainement important, mais le travail acharné est tout aussi indispensable.
