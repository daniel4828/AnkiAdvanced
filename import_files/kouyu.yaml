  traditional: 截止
  pinyin: jiézhǐ
  english: to close / to stop / to end / deadline
  hsk: "5"
  register: formal_written
  note: |
    A verb meaning "to close," "to stop," primarily used for deadlines, application periods, and time-limited events.
    
    **Common Expressions:**
    - 截止日期 (jiézhǐ rìqī) — deadline
    - 报名截止 (bàomíng jiézhǐ) — registration closed
    - 申请截止 (shēnqǐng jiézhǐ) — application deadline
    - 截止到 (jiézhǐ dào) — by (a certain time)
    - 截止目前 (jiézhǐ mùqián) — up to now
    
    **Cultural Note:**
    截止 combines 截 (to cut off) and 止 (to stop). Important grammar: 截止 is not transitive. Do not say "截止报名" — instead "报名截止" (subject + 截止).
    
    Important distinction:
    - 截止: refers to a deadline or end point
    - 截至: "as of" a specific time (indicates status up to a point)
  examples:
