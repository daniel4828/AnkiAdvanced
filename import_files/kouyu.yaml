  hsk: "5"
  register: formal_written
  note: |
    A noun meaning "ecology" in the scientific sense, and "ecosystem" in a broader figurative sense.
    
    **Common Expressions:**
    - 生态环境 (shēngtài huánjìng) — ecological environment
    - 生态系统 (shēngtài xìtǒng) — ecosystem
    - 生态平衡 (shēngtài pínghéng) — ecological balance
    - 生态保护 (shēngtài bǎohù) — ecological protection
    - 商业生态 (shāngyè shēngtài) — business ecosystem
    
    **Cultural Note:**
    生态 combines 生 (life) and 态 (state). Originally from biology, it now extends to business, technology, and social contexts.
    
    In Chinese policy, 生态文明 (ecological civilization) is a key term promoting sustainable development and harmony between humans and nature.
