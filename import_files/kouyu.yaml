      pinyin: Guòdù láolèi huì jiājù bìngqíng, yīdìng yào zhùyì xiūxi.
      english: Overwork can worsen the condition; you must pay attention to rest.
      de: Überarbeitung kann den Zustand verschlimmern; achten Sie unbedingt auf Ruhe.
      fr: Le surmenage peut aggraver l'état ; il faut absolument faire attention au repos.
