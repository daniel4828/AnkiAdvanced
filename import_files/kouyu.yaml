- type: word
  date: "03/27"
  simplified: 线下
  traditional: 線下
  pinyin: xiànxià
  english: offline / in person / physical (as opposed to online)
  hsk: "4"
  register: neutral
  note: |
    A term meaning "offline" or "in the physical world." Literally "under the line" — referring to activities that happen in person or in physical spaces rather than online.
    
    **Common Expressions:**
    - 线下活动 (xiànxià huódòng) — offline events
    - 线下门店 (xiànxià méndiàn) — physical stores
    - 线下体验 (xiànxià tǐyàn) — offline experience
    - 线下教学 (xiànxià jiàoxué) — in-person teaching
    - 线下交流 (xiànxià jiāoliú) — face-to-face communication
    
    **Cultural Note:**
    线下 emerged as the counterpart to 线上. 下 (under) contrasts with 上 (on/above). In China's e-commerce ecosystem, 线下实体店 (offline physical stores) complement online platforms. After the pandemic, the distinction between 线上 and 线下 became significant in work, education, and social contexts.
  examples:
    - zh: 我们下周有一个线下见面会，欢迎大家参加。
      pinyin: Wǒmen xià zhōu yǒu yī gè xiànxià jiànmiànhuì, huānyíng dàjiā cānjiā.
      english: We have an in-person meetup next week; everyone is welcome to attend.
      de: Wir haben nächste Woche ein persönliches Treffen; alle sind willkommen.
      fr: Nous avons une rencontre en personne la semaine prochaine ; tous sont invités.
    - zh: 这个品牌既有线上店铺，也有线下实体店。
      pinyin: Zhège pǐnpái jì yǒu xiànshàng diànpù, yě yǒu xiànxià shítǐ diàn.
      english: This brand has both online stores and physical brick-and-mortar stores.
      de: Diese Marke hat sowohl Online-Shops als auch physische Geschäfte.
