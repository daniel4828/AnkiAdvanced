- type: word
  date: "03/27"
  simplified: 渠道
  traditional: 渠道
  pinyin: qúdào
  english: channel / canal / (figurative) distribution channel / means / medium
  hsk: "5"
  register: neutral
  note: |
    A noun meaning "channel" in both literal and figurative senses. Literally: a man-made canal. Figuratively: a means, medium, or route through which something flows — information, goods, resources, communication.
    
    **Common Expressions:**
    - 销售渠道 (xiāoshòu qúdào) — sales channel
    - 分销渠道 (fēnxiāo qúdào) — distribution channel
    - 沟通渠道 (gōutōng qúdào) — communication channel
    - 官方渠道 (guānfāng qúdào) — official channel
    - 正规渠道 (zhèngguī qúdào) — legitimate channel
    - 渠道畅通 (qúdào chàngtōng) — smooth/unimpeded channel
    
    **Cultural Note:**
    渠道 combines 渠 (canal, ditch) and 道 (path, road). The literal meaning is an artificial water channel. This physical image naturally extends to modern business and communication contexts.
    
    In business, it refers to distribution and sales channels. In communication, it refers to how information flows. In government contexts, it refers to official procedures and access.
  examples:
    - zh: 我们需要开拓新的销售渠道。
      pinyin: Wǒmen xūyào kāituò xīn de xiāoshòu qúdào.
      english: We need to develop new sales channels.
      de: Wir müssen neue Vertriebskanäle erschließen.
      fr: Nous devons développer de nouveaux canaux de vente.
    - zh: 请通过官方渠道获取最新信息。
      pinyin: Qǐng tōngguò guānfāng qúdào huòqǔ zuìxīn xìnxī.
      english: Please obtain the latest information through official channels.
      de: Bitte beziehen Sie die neuesten Informationen über offizielle Kanäle.
      fr: Veuillez obtenir les dernières informations par les canaux officiels.
  characters:
