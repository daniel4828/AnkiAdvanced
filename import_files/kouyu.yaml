# Entries from 合理 onwards (with French translations)

- type: word
  date: "03/27"
  simplified: 合理
  traditional: 合理
  pinyin: hélǐ
  english: reasonable / rational / logical / fair / equitable
  hsk: "4"
  register: neutral
  note: |
    An adjective meaning "reasonable," "logical," or "fair." Used to describe arguments, prices, arrangements, or any situation that conforms to logic or fairness.
    
    **Common Expressions:**
    - 合理价格 (hélǐ jiàgé) — reasonable price
    - 合理解释 (hélǐ jiěshì) — reasonable explanation
    - 合理分配 (hélǐ fēnpèi) — fair distribution
    - 合情合理 (héqíng hélǐ) — fair and reasonable (idiom)
    - 不合理 (bù hélǐ) — unreasonable
    
    **Cultural Note:**
    合理 combines 合 (to fit, to conform) and 理 (logic, principle, reason). Together they mean "conforming to reason" — something that makes logical sense or is justifiable.
    
    In everyday conversation, 合理 is used in many contexts:
    - Business: discussing prices, contracts, terms
    - Law: evaluating whether a claim or action is justified
    - Academia: assessing logical arguments
    - Daily life: justifying decisions or arrangements
    
    The opposite is 不合理 (unreasonable). The idiom 合情合理 (héqíng hélǐ) — "conforming to emotion and reason" — describes something that is both emotionally appropriate and logically sound, considered the ideal balance in Chinese culture.
  examples:
    - zh: 这个价格很合理，我决定买了。
      pinyin: Zhège jiàgé hěn hélǐ, wǒ juédìng mǎi le.
      english: This price is very reasonable; I've decided to buy it.
      de: Dieser Preis ist sehr angemessen; ich habe beschlossen, ihn zu kaufen.
      fr: Ce prix est très raisonnable ; j'ai décidé de l'acheter.
    - zh: 他的要求合情合理，我们应该接受。
      pinyin: Tā de yāoqiú héqíng hélǐ, wǒmen yīnggāi jiēshòu.
      english: His request is fair and reasonable; we should accept it.
      de: Seine Bitte ist fair und vernünftig; wir sollten sie annehmen.
      fr: Sa demande est juste et raisonnable ; nous devrions l'accepter.
    - zh: 这个方案虽然合理，但执行起来有难度。
      pinyin: Zhège fāng'àn suīrán hélǐ, dàn zhíxíng qǐlái yǒu nándù.
      english: Although this plan is reasonable, it's difficult to implement.
      de: Obwohl dieser Plan vernünftig ist, ist er schwer umzusetzen.
      fr: Bien que ce plan soit raisonnable, il est difficile à mettre en œuvre.
  synonyms:
    - word: 公道
      pinyin: gōngdao
      meaning: fair, just
    - word: 理性
      pinyin: lǐxìng
      meaning: rational
  antonyms:
    - word: 不合理
      pinyin: bù hélǐ
      meaning: unreasonable
  characters:
    - char: 合
      simplified: 合
      traditional: 合
      pinyin: hé
      hsk: "3"
      detailed_analysis: true
      meaning_in_context: to fit, to conform to, to match
      compounds:
        - simplified: 合作
          pinyin: hézuò
          meaning: to cooperate
        - simplified: 合适
          pinyin: héshì
          meaning: suitable
        - simplified: 合理
          pinyin: hélǐ
          meaning: reasonable
      etymology: |
        Pictographic. The oracle bone script depicted a lid covering a container, representing "to close, to join, to unite." Extended to mean "to conform to, to fit."
    - char: 理
      simplified: 理
      traditional: 理
      pinyin: lǐ
      hsk: "3"
      detailed_analysis: true
      meaning_in_context: logic, reason, principle
