- type: word
  date: "03/27"
  simplified: 语素
  traditional: 語素
  pinyin: yǔsù
  english: morpheme / minimal meaningful unit in language
  hsk: "6"
  register: formal_written
  note: |
    A noun meaning "morpheme" — the smallest grammatical unit in a language that carries meaning. Used in linguistics, language education, and Chinese language studies.
    
    **Common Expressions:**
    - 自由语素 (zìyóu yǔsù) — free morpheme
    - 黏着语素 (niánzhuó yǔsù) — bound morpheme
    - 词根语素 (cígēn yǔsù) — root morpheme
    - 语素分析 (yǔsù fēnxī) — morphemic analysis
    
    **Cultural Note:**
    语素 combines 语 (language) and 素 (element). In Chinese linguistics, the concept is important because Chinese characters often represent morphemes, but the mapping is not always one-to-one.
    
    Important distinction:
    - 语素: smallest meaningful unit
    - 词: word
    - 字: character (written)
  examples:
    - zh: 语素是语言中最小的音义结合单位。
      pinyin: Yǔsù shì yǔyán zhōng zuì xiǎo de yīn yì jiéhé dānwèi.
      english: A morpheme is the smallest unit in language that combines sound and meaning.
      de: Ein Morphem ist die kleinste Einheit in der Sprache, die Laut und Bedeutung verbindet.
      fr: Un morphème est la plus petite unité linguistique qui combine un son et un sens.
    - zh: 在汉语中，大多数语素都是单音节的。
      pinyin: Zài Hànyǔ zhōng, dàduōshù yǔsù dōu shì dān yīnjié de.
      english: In Chinese, most morphemes are monosyllabic.
      de: Im Chinesischen sind die meisten Morpheme einsilbig.
      fr: En chinois, la plupart des morphèmes sont monosyllabiques.
