  hsk: "5"
  register: neutral
  note: |
    An adjective meaning "appropriate," "suitable," or "proper." Used to describe actions, measures, arrangements, or conditions that fit a particular situation.
    
    **Common Expressions:**
    - 适当的时候 (shìdàng de shíhou) — at the appropriate time
    - 适当的措施 (shìdàng de cuòshī) — appropriate measures
    - 适当的安排 (shìdàng de ānpái) — proper arrangement
    - 适当处理 (shìdàng chǔlǐ) — to handle appropriately
    - 适当调整 (shìdàng tiáozhěng) — to adjust appropriately
    
    **Cultural Note:**
    适当 combines 适 (to fit) and 当 (proper). Emphasizes a perfect fit between action and situation.
    
    Important distinction:
    - 适当: appropriate in a formal, situational sense
    - 合适: suitable, fitting (for people, things, personal preferences)
