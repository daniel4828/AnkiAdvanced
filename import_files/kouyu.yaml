- type: word
  date: "03/27"
  simplified: 足以
  traditional: 足以
  pinyin: zúyǐ
  english: sufficient to / enough to / can be used to
  hsk: "5"
  register: formal_written
  note: |
    A formal adverb meaning "sufficient to" or "enough to." Indicates that a certain condition, quality, or amount is adequate to produce a particular result.
    
    **Common Expressions:**
    - 足以证明 (zúyǐ zhèngmíng) — sufficient to prove
    - 足以说明 (zúyǐ shuōmíng) — enough to show
    - 足以应对 (zúyǐ yìngduì) — sufficient to handle
    - 足以媲美 (zúyǐ pìměi) — enough to rival
    - 足以致命 (zúyǐ zhìmìng) — enough to be fatal
    
    **Cultural Note:**
    足以 combines 足 (enough) and 以 (in order to). This construction is common in classical Chinese and remains prevalent in formal modern writing.
    
    Important distinction:
    - 足以: formal, used before verbs to indicate "sufficient to (do something)"
    - 足够: can be adjective or verb
  examples:
    - zh: 他的努力足以让他取得优异的成绩。
      pinyin: Tā de nǔlì zúyǐ ràng tā qǔdé yōuyì de chéngjì.
      english: His hard work is sufficient to enable him to achieve excellent results.
      de: Seine harte Arbeit ist ausreichend, um ihm hervorragende Ergebnisse zu ermöglichen.
      fr: Son travail acharné est suffisant pour lui permettre d'obtenir d'excellents résultats.
    - zh: 这些证据足以证明他的清白。
      pinyin: Zhèxiē zhèngjù zúyǐ zhèngmíng tā de qīngbái.
      english: This evidence is sufficient to prove his innocence.
      de: Diese Beweise sind ausreichend, um seine Unschuld zu beweisen.
      fr: Ces preuves sont suffisantes pour prouver son innocence.
