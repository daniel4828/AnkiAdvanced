- type: word
  date: "03/27"
  simplified: 拓宽
  traditional: 拓寬
  pinyin: tuòkuān
  english: to broaden / to widen / to expand
  hsk: "6"
  register: formal_written
  note: |
    A verb meaning "to broaden" or "to widen." Used both literally (for roads, paths) and figuratively (for channels, opportunities, knowledge, horizons).
    
    **Common Expressions:**
    - 拓宽道路 (tuòkuān dàolù) — to widen a road
    - 拓宽渠道 (tuòkuān qúdào) — to expand channels
    - 拓宽视野 (tuòkuān shìyě) — to broaden one's horizons
    - 拓宽知识面 (tuòkuān zhīshi miàn) — to broaden one's knowledge
    - 拓宽市场 (tuòkuān shìchǎng) — to expand the market
    - 拓宽思路 (tuòkuān sīlù) — to broaden one's thinking
    
    **Cultural Note:**
    拓宽 combines 拓 (to open up, to expand) and 宽 (wide, broad). Used for infrastructure (widening roads), business (expanding sales channels, markets), and personal development (broadening horizons, knowledge, networks).
  examples:
