- type: word
  date: "03/27"
  simplified: 客观
  traditional: 客觀
  pinyin: kèguān
  english: objective / impartial / (philosophy) objective reality
  hsk: "5"
  register: formal_written
  note: |
    An adjective meaning "objective" — based on facts rather than personal feelings or opinions. Used in academic, professional, and philosophical contexts.
    
    **Common Expressions:**
    - 客观事实 (kèguān shìshí) — objective fact
    - 客观存在 (kèguān cúnzài) — objective existence
    - 客观条件 (kèguān tiáojiàn) — objective conditions
    - 客观分析 (kèguān fēnxī) — objective analysis
    - 客观评价 (kèguān píngjià) — objective evaluation
    
    **Cultural Note:**
    客观 combines 客 (guest, outsider) and 观 (to view). Literally "outsider's perspective" — someone not personally involved sees without bias.
    
    In Chinese philosophy and Marxist theory, 客观 (objective) is paired with 主观 (subjective). This distinction is fundamental:
    - 客观: things that exist independently of human consciousness
    - 主观: personal consciousness, opinions, and perceptions
  examples:
    - zh: 我们要客观地分析这个问题，不能带个人感情。
      pinyin: Wǒmen yào kèguān de fēnxī zhège wèntí, bùnéng dài gèrén gǎnqíng.
      english: We need to analyze this problem objectively, without bringing in personal feelings.
      de: Wir müssen dieses Problem objektiv analysieren, ohne persönliche Gefühle einzubringen.
      fr: Nous devons analyser ce problème objectivement, sans y mêler nos sentiments personnels.
    - zh: 这是一个客观事实，无法否认。
      pinyin: Zhè shì yī gè kèguān shìshí, wúfǎ fǒurèn.
      english: This is an objective fact that cannot be denied.
      de: Dies ist eine objektive Tatsache, die nicht geleugnet werden kann.
      fr: C'est un fait objectif qui ne peut être nié.
  characters:
    - char: 客
      simplified: 客
      traditional: 客
