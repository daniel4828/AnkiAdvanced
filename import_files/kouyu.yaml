  hsk: "6"
  register: spoken
  note: |
    A verb and measure word meaning "to pile up" or "a stack/pile." Used for flat objects that can be stacked — books, papers, bowls, plates, bricks.
    
    **Common Expressions:**
    - 一摞书 (yī luò shū) — a stack of books
    - 一摞碗 (yī luò wǎn) — a stack of bowls
    - 一摞盘子 (yī luò pánzi) — a stack of plates
    - 摞起来 (luò qǐlai) — to stack up
    - 摞得整整齐齐 (luò de zhěngzhěngqíqí) — stacked neatly
    
