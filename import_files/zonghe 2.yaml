          meaning: fur, superficial knowledge
        - simplified: 皮包
          pinyin: píbāo
          meaning: leather bag, briefcase
      etymology: |
        Pictographic. The oracle bone script depicts a hand flaying an animal hide, representing the skin or hide of an animal. 
        The original meaning is "animal hide, leather, skin." Extended to mean "outer layer, surface" of various things. 
        In compounds like 橡皮, it indicates the rubber material — an elastic, flexible outer material similar to skin or leather.
    - char: 筋
      simplified: 筋
      traditional: 筋
      pinyin: jīn
      hsk: "6"
      detailed_analysis: true
      meaning_in_context: tendon, sinew; elastic band, string
      compounds:
        - simplified: 筋骨
          pinyin: jīngǔ
          meaning: muscles and bones; physique
        - simplified: 筋疲力尽
          pinyin: jīnpílìjìn
          meaning: exhausted, drained
        - simplified: 青筋
          pinyin: qīngjīn
          meaning: vein (visible under skin)
        - simplified: 牛筋
          pinyin: niújīn
          meaning: beef tendon (food)
      etymology: |
        Phono-semantic compound. Consists of the radical ⺮ (bamboo) and the phonetic component 月 (muscle/flesh) with 力 (strength). 
        The bamboo radical originally represented the strength and flexibility of bamboo fibers. 
        The original meaning is "tendon, sinew" — the fibrous tissue connecting muscle to bone. 
        Extended to mean "something with tensile strength and flexibility" — like rubber bands or elastic. 
        The character evokes the idea of a strong, flexible, fibrous material that can stretch and return to its shape.
  etymology_note: |
    The compound 橡皮筋 combines three characters to create a vivid image: 
    - 橡 (rubber, originally oak tree) + 皮 (skin, outer layer) = 橡皮 (rubber)
    - 筋 (tendon, sinew) = something flexible and elastic like a tendon
    
    The imagery is quite descriptive: a rubber band is like a "rubber tendon" — a flexible, stretchy cord that returns to its original shape, much like a biological tendon.
    
    Cultural note: 跳橡皮筋 (tiào xiàngpíjīn) — elastic jump rope — was an extremely popular children's game in China from the 1970s through the 1990s. Two children would hold a long elastic band at ankle, knee, or waist height while others jumped in and out of the patterns, chanting rhymes. For many Chinese people, 橡皮筋 evokes strong childhood memories of playing with friends after school.
    
    In modern usage, the word is still common for hair ties, office rubber bands, and the elastic in clothing. The shortened form 皮筋 (píjīn) is equally common in casual speech.

- type: word
  date: "03/27"
  simplified: 灰姑娘
