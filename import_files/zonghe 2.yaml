  pinyin: huī gūniang
  english: Cinderella
  german: Cinderella
  hsk: "5"
  register: spoken_neutral
  note: |
    The Chinese name for the fairy tale character Cinderella. Literally "灰" (ash, grey) + "姑娘" (girl) — "the ash girl." The name directly translates the essence of the original story: a girl who sits among the cinders. Used both for the fairy tale character and metaphorically to describe someone who goes from obscurity to sudden success or recognition.
  examples:
    - zh: 灰姑娘的故事是全世界最著名的童话之一。
      pinyin: Huīgūniang de gùshi shì quán shìjiè zuì zhùmíng de tónghuà zhī yī.
      english: Cinderella is one of the most famous fairy tales in the world.
    - zh: 她从一个普通职员变成了公司经理，简直是现实版的灰姑娘。
      pinyin: Tā cóng yī gè pǔtōng zhíyuán biànchéngle gōngsī jīnglǐ, jiǎnzhí shì xiànshí bǎn de huīgūniang.
      english: She went from an ordinary employee to company manager — she's like a real-life Cinderella.
    - zh: 这部电影是灰姑娘故事的现代改编。
      pinyin: Zhè bù diànyǐng shì huīgūniang gùshi de xiàndài gǎibiān.
      english: This film is a modern adaptation of the Cinderella story.
    - zh: 每个女孩心里都住着一个灰姑娘的梦。
      pinyin: Měi gè nǚhái xīnli dōu zhùzhe yī gè huīgūniang de mèng.
      english: Every girl has a Cinderella dream in her heart.
  measure_word:
    - simplified: 个
      pinyin: gè
      meaning: for stories, fairy tales
    - simplified: 版
      pinyin: bǎn
      meaning: version (of the story)
  synonyms:
    - word: 辛德瑞拉
      pinyin: Xīndéruìlā
      meaning: Cinderella (transliteration)
  characters:
    - char: 灰
      simplified: 灰
      traditional: 灰
      pinyin: huī
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: ash, cinder; grey
      compounds:
        - simplified: 灰色
          pinyin: huīsè
          meaning: grey color
        - simplified: 灰尘
          pinyin: huīchén
          meaning: dust
        - simplified: 灰烬
          pinyin: huījìn
          meaning: ashes, cinders
