- type: word
  date: "03/27"
  simplified: 白
  traditional: 白
  pinyin: bái
  english: (in this usage) to glare at / to give a dirty look / to stare coldly
  german: (in this usage) to glare at / to give a dirty look / to stare coldly
  hsk: "1"
  register: spoken_neutral
  note: |
    When used as a verb with 了一眼, 白 means "to glare at" or "to give someone a dirty look." 
    The full construction is 白了一眼 (báile yī yǎn) — "glanced with the whites of the eyes." 
    This usage emphasizes turning the eyes upward or sideways to show disdain, disapproval, or annoyance.
  examples:
    - zh: 他说完那句话，她白了他一眼。
      pinyin: Tā shuō wán nà jù huà, tā báile tā yī yǎn.
      english: After he said that, she gave him a dirty look.
    - zh: 别白我！我又没做错什么。
      pinyin: Bié bái wǒ! Wǒ yòu méi zuòcuò shénme.
      english: Don't glare at me! I didn't do anything wrong.
    - zh: 老师白了他一眼，他立刻安静下来。
      pinyin: Lǎoshī báile tā yī yǎn, tā lìkè ānjìng xiàlái.
      english: The teacher shot him a glare, and he immediately fell silent.
    - zh: 听到这个荒唐的建议，她忍不住白了他一眼。
      pinyin: Tīng dào zhège huāngtáng de jiànyì, tā rěnbùzhù báile tā yī yǎn.
      english: Upon hearing this absurd suggestion, she couldn't help but give him a dirty look.
  synonyms:
    - word: 瞪
      pinyin: dèng
      meaning: to stare angrily, to glare
    - word: 翻白眼
      pinyin: fān báiyǎn
      meaning: to roll one's eyes
  characters:
    - char: 白
      simplified: 白
      traditional: 白
      pinyin: bái
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: the white of the eye / to glare
      compounds:
        - simplified: 白色
          pinyin: báisè
          meaning: white color
        - simplified: 白天
          pinyin: báitiān
          meaning: daytime
        - simplified: 明白
          pinyin: míngbai
          meaning: to understand, clear
        - simplified: 白费
          pinyin: báifèi
          meaning: wasted, in vain
      etymology: |
        Pictographic. The oracle bone script depicts the shape of a grain of rice or a flame, representing the color white. 
        Another interpretation: the character shows the tip of a thumb (with nail), which appears white. 
        The original meaning is the color white, symbolizing clarity, purity, and brightness.
        
        The verb usage meaning "to glare" derives from the phrase 白眼 (báiyǎn) — "the white of the eye." 
        Giving someone "the whites of the eyes" by turning them upward or sideways is a gesture of contempt, disdain, or disapproval. 
        This idiom dates back to ancient times; the Jin Dynasty poet Ruan Ji was famous for treating people he liked with 青眼 
        (qīngyǎn — "black eyes," i.e., looking straight) and people he disliked with 白眼 (báiyǎn — "white eyes," i.e., turning away coldly).
        
        Thus, 白 as a verb means "to show the whites of the eyes at someone" — a non-verbal expression of scorn or annoyance.

- type: word
