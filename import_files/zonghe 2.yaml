        In the dish name, 树 (tree) metaphorically refers to the glass noodles (粉丝), which resemble tree branches.
  etymology_note: |
    The dish name 蚂蚁上树 (ants climbing a tree) is a classic example of Chinese culinary poetry — turning a simple home-style dish into a vivid, imaginative image.
    
    **The Story Behind the Name:**
    
    Several folk legends explain the origin of this name. One popular story involves Dou E (窦娥), the heroine of a famous Yuan dynasty opera. According to legend, Dou E was a poor young woman caring for her sick mother-in-law. With little money and only a small piece of pork, she minced it finely and stir-fried it with glass noodles. The tiny bits of dark minced meat clinging to the translucent noodles looked like ants climbing tree branches. Her mother-in-law loved the dish and asked its name; Dou E replied, "Ants climbing a tree."
    
    **The Visual Metaphor:**
    - The glass noodles (粉丝, fěnsī) = tree branches — translucent, long, delicate
    - The minced pork (肉末, ròumò) = ants — tiny, dark bits that "cling" to the noodles
    
    **Culinary Notes:**
    The dish is a staple of Sichuan home cooking. Key characteristics:
    - Uses fermented bean paste (豆瓣酱, dòubànjiàng) for depth
    - Often includes ginger, garlic, scallions, and chili
    - The noodles should absorb the sauce while remaining separate
    - Proper execution ensures the "ants" stay on the "branches" — the minced pork clings to the noodles
    
    **Cultural Significance:**
    蚂蚁上树 represents the creativity of Chinese home cooking — turning humble ingredients (pork, noodles, simple seasonings) into a dish with a memorable name and satisfying flavor. It's often served as part of a multi-dish family meal and is beloved for being both economical and delicious. The name itself has become so iconic that it's often used as a cultural reference point when discussing creative dish names in Chinese cuisine.