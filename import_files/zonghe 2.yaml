      etymology: |
        Phono-semantic compound. Consists of the radical 火 (fire) and the phonetic component 又 (hand). 
        The fire radical indicates the meaning relates to fire or burning. The original meaning is "ashes" — the residue left after burning. 
        Extended to mean "dust" and the color "grey" (the color of ashes). 
        In 灰姑娘, it directly translates the original "Cinderella" — "little cinder girl" — from the French "Cendrillon" (cinder).
    - char: 姑
      simplified: 姑
      traditional: 姑
      pinyin: gū
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: girl, young woman; paternal aunt
      compounds:
        - simplified: 姑娘
          pinyin: gūniang
          meaning: girl, young woman
        - simplified: 姑姑
          pinyin: gūgu
          meaning: aunt (father's sister)
        - simplified: 姑妈
          pinyin: gūmā
          meaning: aunt (father's sister)
        - simplified: 尼姑
          pinyin: nígū
          meaning: Buddhist nun
      etymology: |
        Phono-semantic compound. Consists of the radical 女 (woman) and the phonetic component 古 (gǔ, "ancient"). 
        The female radical indicates it relates to women. The original meaning is "paternal aunt" (father's sister). 
        Extended to mean "young woman" or "girl" in compounds like 姑娘. The character carries a connotation of youth and femininity.
    - char: 娘
      simplified: 娘
      traditional: 娘
      pinyin: niáng
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: young woman, girl; mother
      compounds:
        - simplified: 姑娘
          pinyin: gūniang
          meaning: girl, young woman
        - simplified: 娘亲
          pinyin: niángqīn
          meaning: mother (affectionate)
        - simplified: 新娘
          pinyin: xīnniáng
          meaning: bride
        - simplified: 爹娘
          pinyin: diēniáng
          meaning: parents (father and mother)
      etymology: |
        Phono-semantic compound. Consists of the radical 女 (woman) and the phonetic component 良 (liáng, "good, virtuous"). 
        The female radical indicates it relates to women. The original meaning is "young woman, maiden." 
        Extended to mean "mother" in many dialects. Combined with 姑, 姑娘 means "girl, young woman" — 
        a common and respectful term for an unmarried woman.
  etymology_note: |
    The Chinese translation 灰姑娘 is a direct and elegant adaptation of the Cinderella story's name:
    
    灰 (huī) — "ash, cinder" — captures the original French "cendre" (cinder) and the German "Aschen" (ash) in Aschenputtel.
    姑娘 (gūniang) — "girl, young woman" — conveys the sense of a maiden.
    
    The translation is semantically accurate while sounding natural in Chinese. Unlike many Western names that are transliterated phonetically (e.g., 辛德瑞拉 Xīndéruìlā), 灰姑娘 uses native Chinese words to capture the essence of the character.
    
    Cultural note: The Cinderella story is one of the most widely known fairy tales in China. It has been adapted into numerous Chinese films, TV dramas, and books. The term 灰姑娘 has entered everyday language as a metaphor:
    - A person who rises from poverty/obscurity to wealth/fame
    - An underdog who achieves unexpected success
    - A romantic story where an ordinary person finds love with someone of higher status
    
    The phrase 灰姑娘式 (huīgūniang shì) — "Cinderella-style" — is commonly used in media to describe such stories.
    
    There is also a traditional Chinese story with similar themes — "Ye Xian" (叶限), recorded during the Tang dynasty (9th century), which some scholars consider the earliest known version of the Cinderella story predating the European versions by nearly 1,000 years.

- type: expression
