    - zh: 不要抢别人的功劳。
      pinyin: Bùyào qiǎng biérén de gōngláo.
      english: Don't take credit for other people's work.
    - zh: 他在公司工作多年，立下了不少功劳。
      pinyin: Tā zài gōngsī gōngzuò duō nián, lìxiàle bùshǎo gōngláo.
      english: He has worked at the company for many years and has made many contributions.
    - zh: 这份功劳应该归功于整个团队。
      pinyin: Zhè fèn gōngláo yīnggāi guīgōng yú zhěnggè tuánduì.
      english: The credit for this should go to the entire team.
  synonyms:
