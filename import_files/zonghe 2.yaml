    The phrase appears frequently in Chinese literature, poetry, and romantic descriptions. It evokes the classical 
    aesthetic of含蓄 (hánxù — restraint, subtlety) — the idea that the deepest emotions are not loudly declared 
    but silently conveyed through gesture, expression, and the eyes.

- type: word
  date: "03/27"
  simplified: 文火
  traditional: 文火
  pinyin: wénhuǒ
  english: low heat / slow fire / gentle flame (cooking term)
  german: low heat / slow fire / gentle flame (cooking term)
  hsk: "6"
  register: neutral
  note: |
    A cooking term referring to low, gentle, steady heat — the opposite of 武火 (high heat). Used for slow cooking, simmering, braising, and dishes that require long, gentle cooking to develop flavors without burning. Common in Chinese cuisine, especially for soups, stews, and dishes requiring precise temperature control.
  examples:
    - zh: 煲汤要用文火慢炖两个小时。
      pinyin: Bāo tāng yào yòng wénhuǒ màn dùn liǎng gè xiǎoshí.
      english: To make soup, use low heat and simmer slowly for two hours.
    - zh: 先大火煮沸，再转文火收汁。
      pinyin: Xiān dàhuǒ zhǔfèi, zài zhuǎn wénhuǒ shōuzhī.
      english: First boil over high heat, then reduce to low heat to thicken the sauce.
    - zh: 文火慢炖的肉更加软烂入味。
      pinyin: Wénhuǒ màn dùn de ròu gèngjiā ruǎnlàn rùwèi.
      english: Meat slowly simmered over low heat becomes more tender and flavorful.
    - zh: 这道菜需要用文火熬制三小时。
      pinyin: Zhè dào cài xūyào yòng wénhuǒ áozhì sān xiǎoshí.
      english: This dish requires three hours of slow cooking over low heat.
  measure_word:
    - simplified: 种
      pinyin: zhǒng
      meaning: kind, type (of heat)
  synonyms:
    - word: 小火
      pinyin: xiǎohuǒ
      meaning: small flame, low heat
    - word: 慢火
      pinyin: mànhuǒ
      meaning: slow fire, low heat
  antonyms:
    - word: 武火
      pinyin: wǔhuǒ
      meaning: high heat, strong flame
    - word: 大火
      pinyin: dàhuǒ
      meaning: high heat, strong flame
  characters:
    - char: 文
      simplified: 文
      traditional: 文
      pinyin: wén
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: gentle, mild, subtle (as opposed to martial/forceful)
      compounds:
        - simplified: 文明
          pinyin: wénmíng
          meaning: civilization, cultured
        - simplified: 文化
          pinyin: wénhuà
          meaning: culture
        - simplified: 温柔
          pinyin: wēnróu
          meaning: gentle, tender
        - simplified: 文雅
          pinyin: wényǎ
          meaning: elegant, refined
      etymology: |
        Pictographic. The oracle bone script depicted a person with a tattoo or decorative pattern on their chest. 
        The original meaning was "pattern, decoration." Extended to mean "writing, script" (patterns that convey meaning). 
        Further extended to "culture, civilization" (as opposed to martial/military affairs).
        
        In the compound 文火, 文 carries the meaning "gentle, mild, refined" — the opposite of 武 (martial, forceful). 
        This reflects the Taoist-influenced Chinese culinary philosophy of balancing opposing forces: 
        文火 (gentle fire) vs. 武火 (forceful fire).
    - char: 火
      simplified: 火
      traditional: 火
      pinyin: huǒ
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: fire, heat (in cooking)
      compounds:
        - simplified: 火灾
          pinyin: huǒzāi
          meaning: fire disaster
        - simplified: 火锅
          pinyin: huǒguō
          meaning: hot pot
        - simplified: 火焰
          pinyin: huǒyàn
          meaning: flame
        - simplified: 火药
          pinyin: huǒyào
          meaning: gunpowder
      etymology: |
        Pictographic. The oracle bone script depicted flames rising from a burning object. 
        The original meaning is "fire" — one of the five elements in Chinese philosophy. 
        In cooking terminology, it represents the intensity of heat. The character has evolved from its pictographic origins 
        to the modern form, which still suggests the shape of flames.
  etymology_note: |
    The term 文火 reflects a distinctly Chinese conceptual pairing: 文 (wen) and 武 (wu) represent a fundamental duality in Chinese thought.
    
    文 originally meant "pattern, writing, culture" — associated with refinement, gentleness, and subtle influence.
    武 originally meant "martial, military" — associated with force, strength, and direct action.
    
    In cooking, this philosophical dichotomy is applied to heat control:
    - 文火 (wen huo) — "gentle fire": low, steady, patient heat that transforms ingredients gradually.
    - 武火 (wu huo) — "martial fire": high, strong, rapid heat for quick searing or boiling.
    
    This terminology appears in traditional Chinese medicine, martial arts, and culinary texts. The concept emphasizes that 
    different dishes, different stages of cooking, and different ingredients require the right balance of gentle persistence 
    and forceful intensity — an approach that mirrors broader Chinese philosophical principles of balance and harmony.
    
    In modern kitchens, 文火 remains essential for slow-cooked dishes like soups, braised meats, and stews where time 
    and gentle heat extract maximum flavor and achieve the desired texture.

