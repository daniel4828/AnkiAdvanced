      pinyin: gòngxiàn
      meaning: contribution (more general, often selfless)
    - word: 功绩
      pinyin: gōngjì
      meaning: merit, achievement (formal)
    - word: 功劳
      pinyin: gōngláo
      meaning: credit, contribution (focus on recognition)
  characters:
    - char: 功
      simplified: 功
      traditional: 功
      pinyin: gōng
      hsk: "3"
      detailed_analysis: true
      meaning_in_context: achievement, merit, contribution
      compounds:
        - simplified: 成功
          pinyin: chénggōng
          meaning: success, to succeed
        - simplified: 功夫
          pinyin: gōngfu
          meaning: skill, effort, kung fu
        - simplified: 功能
          pinyin: gōngnéng
          meaning: function
        - simplified: 用功
          pinyin: yònggōng
          meaning: diligent, hardworking
      etymology: |
        Phono-semantic compound. Consists of the radical 力 (strength, effort) and the phonetic component 工 (gōng, "work"). 
        The radical 力 indicates physical effort or labor. 工 provides the sound and also contributes the meaning of "work." 
        Together, they mean "achievement through effort" — the results gained from applying strength to work. 
        The original meaning is "merit, accomplishment, success."
    - char: 劳
      simplified: 劳
      traditional: 勞
      pinyin: láo
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: toil, labor, effort
      compounds:
        - simplified: 劳动
          pinyin: láodòng
          meaning: labor, work
        - simplified: 疲劳
          pinyin: píláo
          meaning: fatigue, tired
        - simplified: 勤劳
          pinyin: qínláo
          meaning: hardworking, industrious
        - simplified: 劳驾
          pinyin: láojià
          meaning: excuse me, may I trouble you
      etymology: |
        Phono-semantic compound. The traditional form 勞 consists of the radical 力 (strength) and two 火 (fire) components above, 
        with 冖 (cover). The original meaning is "to toil, to labor" — the imagery suggests working hard by firelight. 
        The simplified form 劳 simplifies the top to 艹 (grass) with 冖 (cover), retaining the essential meaning of effort and exertion. 
        The character conveys the idea of physical or mental exertion, especially over an extended period.
  etymology_note: |
    The compound 功劳 combines 功 (achievement from effort) and 劳 (toil, labor) to mean "merit gained through hard work."
    
    The distinction between the two characters is subtle but meaningful:
    - 功 emphasizes the result — the achievement, success, or merit itself
    - 劳 emphasizes the process — the effort, toil, and labor expended
    
    Together, they capture the complete idea: recognition (功) for the hard work (劳) that was done. This reflects a traditional Chinese value that achievements should be acknowledged and that credit should go to those who actually did the work.
    
    Common related expressions:
    - 立功劳 (lì gōngláo) — to render meritorious service
    - 抢功劳 (qiǎng gōngláo) — to steal credit (negative)
    - 记一功 (jì yī gōng) — to credit someone for their contribution
    - 功不可没 (gōng bùkě mò) — one's contribution cannot be overlooked
    
    In formal contexts, 功劳 appears in military commendations, work evaluations, and discussions of historical contributions. In everyday use, it's commonly used to acknowledge someone's help or to caution against taking undue credit.

- type: word
