    - zh: 他在上海工作多年，见过大世面。
      pinyin: Tā zài Shànghǎi gōngzuò duō nián, jiànguo dà shìmiàn.
      english: He has worked in Shanghai for many years and has experienced a lot.
    - zh: 这位外交官见多识广，见过各种世面。
      pinyin: Zhè wèi wàijiāoguān jiàn duō shí guǎng, jiànguo gèzhǒng shìmiàn.
