      meaning: elastic band (more technical)
  characters:
    - char: 橡
      simplified: 橡
      traditional: 橡
      pinyin: xiàng
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: rubber (in compounds); oak tree
      compounds:
