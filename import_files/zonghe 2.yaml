    A classic Sichuan dish name that literally means "ants climbing a tree." The dish consists of glass noodles (cellophane noodles, 粉丝) stir-fried with minced pork. The name is descriptive: the small bits of minced pork (ants) cling to the transparent noodles (tree branches). It's a popular home-style dish known for its savory, slightly spicy flavor and appealing texture.
