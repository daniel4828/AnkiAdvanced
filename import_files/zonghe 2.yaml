          meaning: world
        - simplified: 世纪
          pinyin: shìjì
          meaning: century
        - simplified: 世代
          pinyin: shìdài
          meaning: generation, era
        - simplified: 出世
          pinyin: chūshì
          meaning: to be born, to come into the world
      etymology: |
        Pictographic. The oracle bone script depicted three dots or lines representing "thirty" — a generation in ancient China. 
        The original meaning was "thirty years" (one generation). Extended to mean "generation" and then "era, age." 
        Further extended to "the world, society" — the broader scope of human existence across generations. 
        The modern form is a cursive simplification of the ancient character, losing the original pictographic elements but retaining the meaning.
    - char: 面
      simplified: 面
      traditional: 面
      pinyin: miàn
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: aspect, side, face, extent
