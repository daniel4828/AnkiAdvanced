      etymology: |
        Phono-semantic compound. Consists of the radical 火 (fire) and the phonetic component 巨 (jù, "huge, large"). 
        The fire radical indicates it relates to fire or flame. The original meaning is "torch" — a large burning stick used for light. 
        In literary usage, 炬 can also refer to candles, especially in poetic contexts. The character evokes the image of a burning flame that consumes itself while providing light — a classic metaphor for self-sacrifice.
  etymology_note: |
    The compound 蜡炬 combines 蜡 (wax) and 炬 (torch) to mean "wax torch" — i.e., a candle. Though less common than 蜡烛 in everyday speech, 蜡炬 holds a special place in Chinese literary tradition.
    
    The most famous use of 蜡炬 comes from Li Shangyin's (李商隐, c. 813–858) poem "Untitled" (无题):
    
    春蚕到死丝方尽，蜡炬成灰泪始干。
    (The spring silkworm dies only when its silk is spun; the candle turns to ash before its tears are dry.)
    
    Here, the burning candle with its dripping wax ("tears") becomes a powerful metaphor for unrequited love, longing, and self-consuming devotion. The image of a candle burning itself out to give light has since become a classic symbol in Chinese poetry for:
    - Faithful love that endures until death
    - Selfless dedication and sacrifice
    - The scholar's devotion to learning or duty
    - The teacher who gives everything for students
    
    Because of this rich literary heritage, 蜡炬 carries far more poetic weight than the everyday 蜡烛, making it a cherished term in formal writing and classical-style poetry.

- type: word
  date: "03/27"
  simplified: 功劳
  traditional: 功勞
  pinyin: gōngláo
  english: contribution / merit / credit / service
  german: contribution / merit / credit / service
  hsk: "5"
  register: neutral
  note: |
    Refers to contributions, merits, or achievements made through effort, especially in work, military service, or collective endeavors. Often used in contexts of recognition, praise, or attributing credit. Can be used for both significant achievements (like military honors) and everyday contributions.
  examples:
    - zh: 这次项目的成功，他功不可没，有很大的功劳。
      pinyin: Zhè cì xiàngmù de chénggōng, tā gōng bùkě méi, yǒu hěndà de gōngláo.
