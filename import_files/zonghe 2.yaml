- type: chengyu
  simplified: 受宠若惊
  traditional: 受寵若驚
  pinyin: shòu chǒng ruò jīng
  english: to be overwhelmed by favor / to be overwhelmed by unexpected kindness
  german: to be overwhelmed by favor / to be overwhelmed by unexpected kindness
  hsk: "6"
  date: "03/27"
  note: |
    Describes feeling overwhelmed, nervous, or uneasy when receiving unexpected praise, favor, or recognition. Often used to express humble gratitude toward someone's kindness or compliment.
  examples:
    - zh: 对于您的邀请，我真是受宠若惊。
      pinyin: Duìyú nín de yāoqǐng, wǒ zhēnshi shòuchǒngruòjīng.
      english: I am truly overwhelmed by your invitation.
    - zh: 被领导当面表扬，他有些受宠若惊。
      pinyin: Bèi lǐngdǎo dāngmiàn biǎoyáng, tā yǒuxiē shòuchǒngruòjīng.
      english: He was a bit overwhelmed when praised by the leader in person.
  word_analyses:
    - type: word
      simplified: 受宠
      traditional: 受寵
      pinyin: shòuchǒng
      english: to receive favor / to be favored
      hsk: "6"
      characters:
        - char: 受
          simplified: 受
          traditional: 受
          pinyin: shòu
          hsk: "4"
          detailed_analysis: true
          meaning_in_context: to receive, to accept
          compounds:
            - simplified: 接受
              pinyin: jiēshòu
              meaning: to accept, to receive
            - simplified: 忍受
              pinyin: rěnshòu
              meaning: to endure, to bear
            - simplified: 感受
              pinyin: gǎnshòu
              meaning: to feel, feeling
            - simplified: 受伤
              pinyin: shòushāng
              meaning: to be injured
          etymology: |
            Ideographic-phonetic compound. The oracle bone script shows a hand passing an object, meaning "to receive." 
            The original meaning is "to accept, to receive." Extended to "to suffer, to endure" (e.g., 受伤 "to be injured"), 
            and further to "to feel, sensation" (e.g., 感受 "to feel").
        - char: 宠
          simplified: 宠
          traditional: 寵
          pinyin: chǒng
          hsk: "6"
          detailed_analysis: true
          meaning_in_context: favor, affection, to dote on
          compounds:
            - simplified: 宠爱
              pinyin: chǒng'ài
              meaning: to dote on, to favor
            - simplified: 宠物
              pinyin: chǒngwù
              meaning: pet
            - simplified: 得宠
              pinyin: déchǒng
              meaning: to gain favor
            - simplified: 失宠
              pinyin: shīchǒng
              meaning: to lose favor
          etymology: |
            Phono-semantic compound. Composed of the radical 宀 (roof) and the phonetic component 龙 (dragon). 
            The original meaning was "to be exalted, to be in a high position," extended to "to favor, to bestow favor."
            The roof component suggests a high place; the dragon represents a noble creature. Together they mean 
            "a noble person dwelling in a grand house," implying someone who receives favor or bestows it upon others.
    - type: word
      simplified: 若惊
      traditional: 若驚
      pinyin: ruòjīng
      english: as if frightened / as if startled
      characters:
        - char: 若
          simplified: 若
          traditional: 若
          pinyin: ruò
          hsk: "4"
          detailed_analysis: true
          meaning_in_context: as if, like
          compounds:
            - simplified: 若干
              pinyin: ruògān
              meaning: several, a certain number
            - simplified: 若是
              pinyin: ruòshì
              meaning: if
            - simplified: 倘若
              pinyin: tǎngruò
              meaning: if, supposing
            - simplified: 仿佛
              pinyin: fǎngfú
              meaning: as if, seem
          etymology: |
            Pictographic. The oracle bone script depicts a person kneeling with hands arranging their hair, 
            suggesting "to be compliant, to follow." The original meaning was "to comply, to obey," extended 
            to "like, as if" (indicating a comparison), and further to "if" (indicating a hypothesis). 
            In classical Chinese, it was also used as a second-person pronoun "you," but this usage has disappeared.
        - char: 惊
          simplified: 惊
          traditional: 驚
          pinyin: jīng
          hsk: "4"
          detailed_analysis: true
          meaning_in_context: startled, frightened
          compounds:
            - simplified: 惊讶
              pinyin: jīngyà
              meaning: surprised, amazed
            - simplified: 吃惊
              pinyin: chījīng
              meaning: to be startled
            - simplified: 惊恐
              pinyin: jīngkǒng
              meaning: terrified, panic
            - simplified: 惊喜
              pinyin: jīngxǐ
              meaning: pleasantly surprised
          etymology: |
            Phono-semantic compound. The traditional form 驚 consists of the radical 馬 (horse) and the phonetic component 敬.
            The original meaning was "a horse startled by sudden noise," as horses are particularly sensitive to loud sounds.
            Later extended to any creature being startled or frightened. 
            The simplified form 惊 uses the radical 忄 (heart) with the phonetic 京, representing internal emotional agitation.
            Modern meanings include "to be startled, alarmed," and "to be surprised, amazed."

- type: word
  date: "03/27"
  simplified: 宾主
  traditional: 賓主
  pinyin: bīnzhǔ
  english: guest and host / host and guest
  german: guest and host / host and guest
  hsk: "5"
  register: neutral
  note: |
    Refers to the relationship between a host and their guests. Often used in social contexts, business meetings, or formal occasions.
  examples:
    - zh: 宾主双方进行了友好的会谈。
      pinyin: Bīnzhǔ shuāngfāng jìnxíngle yǒuhǎo de huìtán.
      english: The host and guest had a friendly conversation.
    - zh: 宴会上的宾主尽欢。
      pinyin: Yànhuì shàng de bīnzhǔ jìn huān.
      english: Both host and guests thoroughly enjoyed the banquet.
    - zh: 宾主之间气氛融洽。
      pinyin: Bīnzhǔ zhī jiān qìfēn róngqià.
      english: The atmosphere between host and guests was harmonious.
  synonyms:
    - word: 主客
      pinyin: zhǔkè
      meaning: host and guest
  characters:
    - char: 宾
      simplified: 宾
      traditional: 賓
      pinyin: bīn
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: guest
      compounds:
        - simplified: 宾客
          pinyin: bīnkè
          meaning: guests, visitors
        - simplified: 贵宾
          pinyin: guìbīn
          meaning: distinguished guest, VIP
        - simplified: 宾馆
          pinyin: bīnguǎn
          meaning: hotel, guesthouse
        - simplified: 宾语
          pinyin: bīnyǔ
          meaning: object (grammar)
      etymology: |
        Phono-semantic compound. The traditional form 賓 consists of the radical 貝 (shellfish/money) and the phonetic component 𠦜 (a variant of 步). 
        Shellfish were used as currency in ancient China, so 貝 indicates something valuable. The original meaning was "distinguished guest" 
        (someone valuable or honored). The simplified form 宾 uses the radical 宀 (roof) and 兵 (soldier) as phonetic, representing "a guest 
        staying under a roof." The meaning has always been "guest, visitor."
    - char: 主
      simplified: 主
      traditional: 主
      pinyin: zhǔ
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: host
      compounds:
        - simplified: 主人
          pinyin: zhǔrén
          meaning: host, master, owner
        - simplified: 主要
          pinyin: zhǔyào
          meaning: main, primary, major
        - simplified: 主动
          pinyin: zhǔdòng
          meaning: initiative, proactive
        - simplified: 主持
          pinyin: zhǔchí
          meaning: to host, to preside over
      etymology: |
        Pictographic. The oracle bone script resembles a lamp with a flame, representing "that which gives light" or "the core, the main." 
        The original meaning was "master, lord, ruler" — the one who is central or in charge. Extended to mean "host" (as opposed to guest), 
        "primary" (as opposed to secondary), and "to be in charge of." The character has remained stable in form from seal script to modern times.

- type: word
  date: "03/27"
  simplified: 名堂
  traditional: 名堂
  pinyin: míngtang
  english: result / achievement / reason / what lies behind something / trick / variety
  german: result / achievement / reason / what lies behind something / trick / variety
  hsk: "5"
  register: spoken_neutral
  note: |
    A versatile colloquial word with several meanings:
    1. Result or achievement (usually in questions or negatives)
    2. Reason or cause behind something
    3. Trick, scheme, or hidden purpose
    4. Variety or interesting aspects (in 有名堂)
    Often used in the phrase "有什么名堂" (what's the point? / what's behind this?)
  examples:
    - zh: 他学了三年，也没学出什么名堂。
      pinyin: Tā xuéle sān nián, yě méi xuéchū shénme míngtang.
      english: He studied for three years but didn't achieve anything significant.
    - zh: 这背后一定有什么名堂。
      pinyin: Zhè bèihòu yīdìng yǒu shénme míngtang.
      english: There must be something behind this / something fishy is going on.
    - zh: 这个展览有点名堂，值得一看。
      pinyin: Zhège zhǎnlǎn yǒudiǎn míngtang, zhídé yī kàn.
      english: This exhibition has some interesting features; it's worth seeing.
    - zh: 你到底想搞什么名堂？
      pinyin: Nǐ dàodǐ xiǎng gǎo shénme míngtang?
      english: What exactly are you up to? / What trick are you playing?
  synonyms:
    - word: 成果
      pinyin: chéngguǒ
      meaning: achievement, result
    - word: 花样
      pinyin: huāyàng
      meaning: trick, pattern, variety
  characters:
    - char: 名
      simplified: 名
      traditional: 名
      pinyin: míng
      hsk: "1"
      detailed_analysis: true
      compounds:
        - simplified: 名字
          pinyin: míngzi
          meaning: name
        - simplified: 姓名
          pinyin: xìngmíng
          meaning: full name
        - simplified: 出名
          pinyin: chūmíng
          meaning: famous, to become famous
        - simplified: 名声
          pinyin: míngshēng
          meaning: reputation, fame
      etymology: |
        Phono-semantic compound. Composed of 夕 (evening) and 口 (mouth). 
        In ancient times, people identified each other by calling out names in the dark (夕 = evening, when visibility is poor). 
        The original meaning was "to name, to call by name," extended to "name, reputation, fame." 
        In colloquial compounds like 名堂, it adds the sense of "something with a name" → "something significant or noteworthy."
    - char: 堂
      simplified: 堂
      traditional: 堂
      pinyin: táng
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: "hall, room, (in this compound: thing, matter)"
      compounds:
        - simplified: 课堂
          pinyin: kètáng
          meaning: classroom
        - simplified: 礼堂
          pinyin: lǐtáng
          meaning: auditorium, hall
        - simplified: 食堂
          pinyin: shítáng
          meaning: canteen, dining hall
        - simplified: 堂兄弟
          pinyin: tángxiōngdì
          meaning: paternal male cousins
      etymology: |
        Phono-semantic compound. The top component 尚 (shàng) is phonetic, originally meaning "to add, to elevate." 
        The bottom component 土 (earth/ground) suggests foundation. 
        The original meaning was "raised platform" or "great hall," referring to the main hall of a building. 
        Extended to mean "hall, main room" and later "the main or formal aspect of something." 
        In the compound 名堂, 堂 contributes the sense of "a formal or significant thing" — the "hall" of named matters, so to speak.

- type: word
  date: "03/27"
  simplified: 乖乖
  traditional: 乖乖
  pinyin: guāiguāi
  english: well-behaved / obedient / (interjection) oh my! / good heavens! / dear me!
  german: well-behaved / obedient / (interjection) oh my! / good heavens! / dear me!
  hsk: "5"
  register: spoken_neutral
  note: |
    A versatile colloquial word with two main uses:
    1. As an adjective: describes a child or person as obedient, well-behaved, cute
    2. As an interjection: expresses surprise, shock, or admiration (often "乖乖!" or "乖乖隆地咚!")
    Can be used as a term of endearment, especially toward children.
  examples:
    - zh: 这孩子很乖乖，从来不哭闹。
      pinyin: Zhè háizi hěn guāiguāi, cónglái bù kūnào.
      english: This child is very well-behaved and never cries or fusses.
    - zh: 乖乖！你居然考了第一名！
      pinyin: Guāiguāi! Nǐ jūrán kǎole dì yī míng!
      english: Oh my! You actually got first place!
    - zh: 宝宝乖乖，妈妈马上回来。
      pinyin: Bǎobao guāiguāi, māma mǎshàng huílái.
      english: Be good, baby. Mommy will be right back.
    - zh: 乖乖，这东西也太贵了吧！
      pinyin: Guāiguāi, zhè dōngxi yě tài guì le ba!
      english: Good heavens! This thing is way too expensive!
  synonyms:
    - word: 听话
      pinyin: tīng huà
      meaning: obedient, does what told
    - word: 顺从
      pinyin: shùncóng
      meaning: compliant, submissive
  characters:
    - char: 乖
      simplified: 乖
      traditional: 乖
      pinyin: guāi
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: obedient, well-behaved, cute
      compounds:
        - simplified: 乖巧
          pinyin: guāiqiǎo
          meaning: clever and well-behaved, cute
        - simplified: 乖孩子
          pinyin: guāi háizi
          meaning: well-behaved child
        - simplified: 乖张
          pinyin: guāizhāng
          meaning: eccentric, odd (opposite meaning)
        - simplified: 乖离
          pinyin: guāilí
          meaning: to deviate, to diverge
      etymology: |
        Originally meant "to deviate, to be contrary." The character structure combines 北 (north/back-to-back) and 丿 (a stroke indicating divergence). 
        The original meaning was "to go against, to be at odds." This meaning survives in words like 乖张 (eccentric, perverse). 
        However, in colloquial usage, the meaning shifted through a kind of ironic reversal: children who are "deviant" in the sense of 
        not causing trouble — staying out of the way — came to be called "well-behaved." Alternatively, the semantic shift may have come from 
        "being apart (from trouble)" to "peaceful, quiet." The reduplicated form 乖乖 intensifies the meaning and also serves as a term of endearment.

- type: word
  date: "03/27"
  simplified: 鲨鱼
  traditional: 鯊魚
  pinyin: shāyú
  english: shark
  german: shark
  hsk: "5"
  register: neutral
  note: |
    Refers to any shark species. Often used in contexts related to marine life, cuisine (shark fin), or metaphorically to describe a predatory person or entity.
  examples:
    - zh: 海洋里有很多种鲨鱼。
      pinyin: Hǎiyáng lǐ yǒu hěnduō zhǒng shāyú.
      english: There are many species of sharks in the ocean.
    - zh: 这部电影讲的是鲨鱼吃人的故事。
      pinyin: Zhè bù diànyǐng jiǎng de shì shāyú chī rén de gùshi.
      english: This movie is about sharks eating people.
    - zh: 这些放高利贷的人简直就是鲨鱼。
      pinyin: Zhèxiē fàng gāolìdài de rén jiǎnzhí jiùshì shāyú.
      english: These loan sharks are literally like sharks.
  measure_word:
    - simplified: 条
      pinyin: tiáo
      meaning: for fish
    - simplified: 只
      pinyin: zhī
      meaning: for animals
  characters:
    - char: 鲨
      simplified: 鲨
      traditional: 鯊
      pinyin: shā
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: shark
      compounds:
        - simplified: 鲨鱼
          pinyin: shāyú
          meaning: shark
        - simplified: 鲸鲨
          pinyin: jīngshā
          meaning: whale shark
        - simplified: 大白鲨
          pinyin: dàbáishā
          meaning: great white shark
        - simplified: 鲨鱼鳍
          pinyin: shāyú qí
          meaning: shark fin
      etymology: |
        Phono-semantic compound. The traditional form 鯊 consists of the radical 魚 (fish) and the phonetic component 沙 (shā, "sand"). 
        The fish radical indicates it is a type of fish. The phonetic component 沙 (sand) possibly refers to the shark's sandy color or 
        its habitat near sandy bottoms. The simplified form 鲨 uses the same phonetic 沙 with the simplified fish radical 鱼 (⿂→鱼). 
        The character specifically denotes sharks, known in Chinese culture as large, powerful marine predators.
    - char: 鱼
      simplified: 鱼
      traditional: 魚
      pinyin: yú
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: fish
      compounds:
        - simplified: 金鱼
          pinyin: jīnyú
          meaning: goldfish
        - simplified: 钓鱼
          pinyin: diàoyú
          meaning: to fish
        - simplified: 鱼肉
          pinyin: yúròu
          meaning: fish meat
        - simplified: 鱼缸
          pinyin: yúgāng
          meaning: fish tank, aquarium
      etymology: |
        Pictographic. The oracle bone script depicts a fish with head, body, fins, and scales. 
        The traditional form 魚 retains the more complex shape, while the simplified 鱼 is a cursive simplification 
        that reduces the character to a more abstract form while preserving the key elements. 
        The character represents any fish and has remained one of the most stable pictographs in Chinese writing.

- type: word
  date: "03/27"
  simplified: 肉松
  traditional: 肉鬆
  pinyin: ròusōng
  english: pork floss / meat floss / dried meat fibers
  german: pork floss / meat floss / dried meat fibers
  hsk: "5"
  register: neutral
  note: |
    A popular Chinese food product made by simmering pork (or other meat) in soy sauce and spices, then drying and shredding until it becomes fluffy, fibrous strands. Commonly used as a topping for congee, rice, steamed buns, or in pastries.
  examples:
    - zh: 我喜欢在白粥上撒一些肉松。
      pinyin: Wǒ xǐhuān zài báizhōu shàng sā yīxiē ròusōng.
      english: I like to sprinkle some pork floss on plain congee.
    - zh: 肉松面包是很多人的早餐选择。
      pinyin: Ròusōng miànbāo shì hěnduō rén de zǎocān xuǎnzé.
      english: Pork floss bread is a breakfast choice for many people.
    - zh: 这种肉松是用鸡肉做的，味道也不错。
      pinyin: Zhè zhǒng ròusōng shì yòng jīròu zuò de, wèidào yě bùcuò.
      english: This meat floss is made from chicken, and the taste is also pretty good.
  measure_word:
    - simplified: 包
      pinyin: bāo
      meaning: pack, bag
    - simplified: 罐
      pinyin: guàn
      meaning: can, jar
  characters:
    - char: 肉
      simplified: 肉
      traditional: 肉
      pinyin: ròu
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: meat
      compounds:
        - simplified: 猪肉
          pinyin: zhūròu
          meaning: pork
        - simplified: 牛肉
          pinyin: niúròu
          meaning: beef
        - simplified: 鸡肉
          pinyin: jīròu
          meaning: chicken
        - simplified: 肉馅
          pinyin: ròuxiàn
          meaning: meat filling
      etymology: |
        Pictographic. The oracle bone script depicts a cut of meat, showing the shape of a piece of flesh with muscle striations. 
        The original meaning is "animal flesh used as food." Over time, the character evolved from its pictographic form to the modern 
        square shape, but still resembles a piece of meat in outline. In compounds, it indicates something related to meat or the body.
    - char: 松
      simplified: 松
      traditional: 鬆
      pinyin: sōng
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: fluffy, loose, shredded (texture)
      compounds:
        - simplified: 松软
          pinyin: sōngruǎn
          meaning: soft and fluffy
        - simplified: 松散
          pinyin: sōngsǎn
          meaning: loose, scattered
        - simplified: 放松
          pinyin: fàngsōng
          meaning: to relax
        - simplified: 轻松
          pinyin: qīngsōng
          meaning: easy, light
      etymology: |
        The traditional form 鬆 is a phono-semantic compound with the radical 髟 (hair) and the phonetic component 松 (sōng). 
        The hair radical suggests something loose, disheveled, or unbound — like hair hanging freely. 
        The original meaning was "to loosen, to untie, to make slack." 
        The simplified form 松 merges two characters: 松 (pine tree) and 鬆 (loose). 
        In the context of 肉松, the character carries the meaning "loose, fluffy, shredded" — describing the characteristic texture 
        of meat that has been dried and teased apart into fine, airy fibers.

- type: word
  date: "03/27"
  simplified: 唬
  traditional: 唬
  pinyin: hǔ
  english: to bluff / to intimidate / to scare / to fool
  german: to bluff / to intimidate / to scare / to fool
  hsk: "6"
  register: spoken_neutral
  note: |
    A colloquial verb meaning to bluff, threaten, or intimidate someone. Often used in reduplicated form 唬人 (to bluff people) or in the phrase 唬住 (to successfully intimidate/scare someone into submission). It implies deception or exaggeration to frighten or control someone.
  examples:
    - zh: 你别唬我，我早就知道真相了。
      pinyin: Nǐ bié hǔ wǒ, wǒ zǎo jiù zhīdào zhēnxiàng le.
      english: Don't try to bluff me. I already know the truth.
    - zh: 他被警察几句话就唬住了。
      pinyin: Tā bèi jǐngchá jǐ jù huà jiù hǔ zhù le.
      english: He was intimidated by just a few words from the police.
    - zh: 这个人就会唬人，其实没什么本事。
      pinyin: Zhège rén jiù huì hǔ rén, qíshí méi shénme běnshì.
      english: This guy is all bluff; he doesn't actually have any real ability.
    - zh: 别拿这种话唬我，我不吃这套。
      pinyin: Bié ná zhè zhǒng huà hǔ wǒ, wǒ bù chī zhè tào.
      english: Don't try to scare me with that kind of talk. I'm not buying it.
  synonyms:
    - word: 吓唬
      pinyin: xiàhu
      meaning: to scare, to threaten
    - word: 欺骗
      pinyin: qīpiàn
      meaning: to deceive, to cheat
  characters:
    - char: 唬
      simplified: 唬
      traditional: 唬
      pinyin: hǔ
      hsk: "6"
      detailed_analysis: true
      meaning_in_context: to bluff, to intimidate, to scare
      compounds:
        - simplified: 吓唬
          pinyin: xiàhu
          meaning: to scare, to threaten
        - simplified: 唬人
          pinyin: hǔrén
          meaning: to bluff people, to intimidate
        - simplified: 唬住
          pinyin: hǔzhù
          meaning: to successfully intimidate, to bluff someone into submission
        - simplified: 唬弄
          pinyin: hǔnong
          meaning: to fool, to deceive, to bluff one's way through
      etymology: |
        Phono-semantic compound. The character consists of the radical 口 (mouth) and the phonetic component 虎 (hǔ, "tiger"). 
        The mouth radical indicates speech or vocalization. The phonetic component 虎 (tiger) contributes both the sound and a semantic nuance: 
        tigers are fierce, intimidating animals that roar. Together, they create the meaning "to roar like a tiger" → "to threaten verbally, 
        to intimidate with words, to bluff." The character is primarily used in colloquial contexts and often appears in the reduplicated 
        form 吓唬 (xiàhu), which is even more common in everyday speech. The use of the tiger component cleverly conveys the idea of 
        using fierce words to frighten others, even if the threat is empty — much like a tiger's roar can be more intimidating than its actual attack.

- type: chengyu
  simplified: 胡说八道
  traditional: 胡說八道
  pinyin: hú shuō bā dào
  english: to talk nonsense / to speak irresponsibly / sheer nonsense
  german: to talk nonsense / to speak irresponsibly / sheer nonsense
  hsk: "5"
  date: "03/27"
  note: |
    A common idiom meaning "to talk nonsense" or "to speak without basis." 
    胡 refers to the northern/nomadic peoples (perceived as speaking unintelligibly), and 八道 originally referred to the Eightfold Path in Buddhism.
    Combined meaning: speaking like a foreigner (incomprehensibly) or spouting nonsense.
  examples:
    - zh: 他根本不懂这件事，完全是胡说八道。
      pinyin: Tā gēnběn bù dǒng zhè jiàn shì, wánquán shì húshuōbādào.
      english: He doesn't understand this matter at all; he's just talking nonsense.
    - zh: 别听他的，他胡说八道呢。
      pinyin: Bié tīng tā de, tā húshuōbādào ne.
      english: Don't listen to him; he's talking nonsense.
    - zh: 这种谣言纯粹是胡说八道，根本不值得相信。
      pinyin: Zhè zhǒng yáoyán chúncuì shì húshuōbādào, gēnběn bù zhídé xiāngxìn.
      english: This kind of rumor is pure nonsense and not worth believing at all.
  synonyms:
    - word: 胡言乱语
      pinyin: húyán luànyǔ
      meaning: to talk nonsense, to babble
    - word: 瞎说
      pinyin: xiāshuō
      meaning: to talk rubbish
  word_analyses:
    - type: word
      simplified: 胡说
      traditional: 胡說
      pinyin: húshuō
      english: to talk nonsense
      hsk: "5"
      characters:
        - char: 胡
          simplified: 胡
          traditional: 胡
          pinyin: hú
          hsk: "4"
          detailed_analysis: true
          meaning_in_context: "nonsense, recklessly (originally: foreign, northern tribes)"
          compounds:
            - simplified: 胡乱
              pinyin: húluàn
              meaning: carelessly, recklessly
            - simplified: 胡来
              pinyin: húlái
              meaning: to mess around, to act recklessly
            - simplified: 胡闹
              pinyin: húnào
              meaning: to act foolishly, to make trouble
            - simplified: 胡萝卜
              pinyin: húluóbo
              meaning: carrot
          etymology: |
            Originally referred to the northern nomadic peoples (Xiongnu, etc.). During the Han dynasty, 胡 broadly meant "foreigners from the north/west." 
            Because their languages sounded incomprehensible to the Chinese, 胡 came to mean "nonsensical, reckless, wild" — as in 胡说 (foreign talk → nonsense). 
            The character combines 月 (moon/flesh) and 古 (ancient) as phonetic, though its original meaning was "dewlap" (the hanging flesh under an animal's chin).
        - char: 说
          simplified: 说
          traditional: 說
          pinyin: shuō
          hsk: "1"
          detailed_analysis: true
          meaning_in_context: to speak
          compounds:
            - simplified: 说话
              pinyin: shuōhuà
              meaning: to speak, to talk
            - simplified: 说明
              pinyin: shuōmíng
              meaning: to explain, explanation
            - simplified: 听说
              pinyin: tīngshuō
              meaning: to be told, to hear (said)
            - simplified: 小说
              pinyin: xiǎoshuō
              meaning: novel
          etymology: |
            Phono-semantic compound. The traditional form 說 consists of the radical 言 (speech) and the phonetic component 兌 (duì). 
            The simplified form 说 uses the radical 讠 (simplified speech) and the phonetic component 兑 (duì). 
            The original meaning was "to speak, to explain." The character has consistently been used to denote verbal expression.
    - type: word
      simplified: 八道
      traditional: 八道
      pinyin: bā dào
      english: "the Eightfold Path (Buddhist) / (in this idiom: nonsense)"
      characters:
        - char: 八
          simplified: 八
          traditional: 八
          pinyin: bā
          hsk: "1"
          detailed_analysis: true
          meaning_in_context: eight
          compounds:
            - simplified: 八个
              pinyin: bā ge
              meaning: eight (items)
            - simplified: 八月
              pinyin: bāyuè
              meaning: August, eighth month
            - simplified: 十八
              pinyin: shíbā
              meaning: eighteen
            - simplified: 八卦
              pinyin: bāguà
              meaning: the Eight Trigrams; gossip
          etymology: |
            Pictographic. The oracle bone script depicts two curved lines drawn apart, representing the concept of division or separation. 
            Originally meant "to divide, to separate," but was borrowed early on for the number eight due to phonetic similarity. 
            The character has remained largely unchanged for over 3,000 years.
        - char: 道
          simplified: 道
          traditional: 道
          pinyin: dào
          hsk: "1"
          detailed_analysis: true
          meaning_in_context: "path, way, (in Buddhism: the Noble Path)"
          compounds:
            - simplified: 道路
              pinyin: dàolù
              meaning: road, path
            - simplified: 知道
              pinyin: zhīdào
              meaning: to know
            - simplified: 道理
              pinyin: dàolǐ
              meaning: reason, principle
            - simplified: 道歉
              pinyin: dàoqiàn
              meaning: to apologize
          etymology: |
            Phono-semantic compound. Composed of the radical 辶 (walk, movement) and the phonetic component 首 (shǒu, "head"). 
            The original meaning was "to lead, to guide" — a head leading the way. Extended to mean "path, road" (the thing being led along), 
            then to "the Way" (Dao), and further to "to say, to speak" (the words that guide). 
            In Buddhism, 道 translates "marga" (path), as in the Eightfold Path (八正道), the way to enlightenment.
  etymology_note: |
    The term 八道 originally referred to the Buddhist Eightfold Path (正见、正思、正语、正业、正命、正精进、正念、正定). 
    胡说八道 thus originally meant "foreigners (胡) speaking about the Eightfold Path (八道)" — implying they didn't understand it and were 
    talking nonsense about sacred Buddhist doctrine. Over time, the meaning generalized to simply "talking nonsense" or "speaking irresponsibly."

- type: chengyu
  simplified: 虚虚实实
  traditional: 虛虛實實
  pinyin: xū xū shí shí
  english: the intermingling of truth and falsehood / the interplay of reality and illusion / using deception and reality strategically
  german: the intermingling of truth and falsehood / the interplay of reality and illusion / using deception and reality strategically
  hsk: "6"
  date: "03/27"
  note: |
    Describes a situation where truth and falsehood, reality and illusion, are intertwined. Often used in military strategy, deception tactics, or situations where appearances are misleading. Originates from ancient Chinese military philosophy, particularly Sun Tzu's "The Art of War."
  examples:
    - zh: 战场上的虚虚实实，让敌人摸不清我方实力。
      pinyin: Zhànchǎng shàng de xū xū shí shí, ràng dírén mō bù qīng wǒfāng shílì.
      english: The intermingling of truth and deception on the battlefield made it impossible for the enemy to gauge our true strength.
    - zh: 他的讲话虚虚实实，没人知道哪句是真的。
      pinyin: Tā de jiǎnghuà xū xū shí shí, méi rén zhīdào nǎ jù shì zhēn de.
      english: His speech mixed truth with lies; no one knew which sentences were true.
    - zh: 做生意要懂得虚虚实实的策略，既要有诚信，也要有保留。
      pinyin: Zuò shēngyì yào dǒngde xū xū shí shí de cèlüè, jì yào yǒu chéngxìn, yě yào yǒu bǎoliú.
      english: In business, you need to understand the strategy of mixing truth with deception — you need both honesty and discretion.
    - zh: 小说情节虚虚实实，让人分不清是历史还是虚构。
      pinyin: Xiǎoshuō qíngjié xū xū shí shí, ràng rén fēn bù qīng shì lìshǐ háishì xūgòu.
      english: The novel's plot blends fact and fiction so skillfully that it's hard to tell what's history and what's invented.
  synonyms:
    - word: 真真假假
      pinyin: zhēn zhēn jiǎ jiǎ
      meaning: truth interwoven with falsehood
  word_analyses:
    - type: word
      simplified: 虚
      traditional: 虛
      pinyin: xū
      english: empty / false / unreal / weak / humble
      hsk: "4"
      characters:
        - char: 虚
          simplified: 虚
          traditional: 虛
          pinyin: xū
          hsk: "4"
          detailed_analysis: true
          meaning_in_context: false, unreal, deceptive
          compounds:
            - simplified: 虚假
              pinyin: xūjiǎ
              meaning: false, fake
            - simplified: 谦虚
              pinyin: qiānxū
              meaning: humble, modest
            - simplified: 虚弱
              pinyin: xūruò
              meaning: weak, feeble
            - simplified: 空虚
              pinyin: kōngxū
              meaning: empty, hollow
          etymology: |
            Phono-semantic compound. The traditional form 虛 consists of the radical 虍 (tiger) and the phonetic component 丘 (qiū, "hill"). 
            The tiger component originally depicted a tiger's stripes, giving a sense of "empty" or "hollow" (like a tiger's roar without substance, 
            or the tiger's empty lair). The original meaning was "large hill" or "ruin," extended to "empty, void." 
            In military strategy, 虚 means "weak point, empty spot, feint" — a place where the enemy is vulnerable or where deception is used.
    - type: word
      simplified: 实
      traditional: 實
      pinyin: shí
      english: real / true / solid / full / actual
      hsk: "3"
      characters:
        - char: 实
          simplified: 实
          traditional: 實
          pinyin: shí
          hsk: "3"
          detailed_analysis: true
          meaning_in_context: real, true, solid
          compounds:
            - simplified: 实际
              pinyin: shíjì
              meaning: actual, reality, practical
            - simplified: 实在
              pinyin: shízài
              meaning: really, indeed, genuine
            - simplified: 真实
              pinyin: zhēnshí
              meaning: true, authentic
            - simplified: 实力
              pinyin: shílì
              meaning: strength, actual power
          etymology: |
            Phono-semantic compound. The traditional form 實 consists of the radical 宀 (roof) and the phonetic component 貫 (guàn, "string of coins"). 
            The roof radical indicates a house, and the phonetic component represents goods or wealth. Together they mean "a house filled with goods" → 
            "full, abundant, substantial." The original meaning was "full, filled, rich." Extended to mean "real, actual, true" — 
            the opposite of empty or false. In military strategy, 实 means "strong point, solid position, real strength."
  etymology_note: |
    This chengyu originates from ancient Chinese military strategy, most famously articulated in Sun Tzu's "The Art of War" (孙子兵法): 
    "故善战者，致人而不致于人... 虚则实之，实则虚之" — "Therefore the skilled commander moves the enemy and is not moved by the enemy... 
    When weak, appear strong; when strong, appear weak."
    
    The concept of 虚 (emptiness/weakness/false) and 实 (fullness/strength/real) is central to Chinese strategic thought. 
    By alternating between showing strength and weakness, truth and falsehood, a commander keeps the enemy confused and uncertain. 
    The reduplicated form 虚虚实实 emphasizes the continuous, dynamic interplay between these opposites — a constant shifting 
    between deception and reality to maintain the strategic advantage.
    
    Over time, the phrase expanded beyond military contexts to describe any situation where truth and falsehood are deliberately 
    or naturally intertwined — in business, politics, storytelling, or everyday life where appearances can't be trusted.

- type: chengyu
  simplified: 从实招来
  traditional: 從實招來
  pinyin: cóng shí zhāo lái
  english: to confess the truth / to tell the truth under interrogation
  german: to confess the truth / to tell the truth under interrogation
  hsk: "6"
  date: "03/27"
  note: |
    A phrase used in interrogations or confrontations, demanding someone tell the truth honestly. Often used by authority figures (police, judges, parents) when they believe someone is hiding something or lying. Has a classical, somewhat stern tone.
  examples:
    - zh: 罪犯在审讯中终于从实招来。
      pinyin: Zuìfàn zài shěnxùn zhōng zhōngyú cóngshízhāolái.
      english: The criminal finally confessed the truth during interrogation.
    - zh: 还不从实招来？你昨晚到底去哪了？
      pinyin: Hái bù cóngshízhāolái? Nǐ zuówǎn dàodǐ qù nǎ le?
      english: Are you going to confess the truth? Where did you really go last night?
    - zh: 在铁证面前，他只能从实招来。
      pinyin: Zài tiězhèng miànqián, tā zhǐnéng cóngshízhāolái.
      english: Faced with irrefutable evidence, he had no choice but to confess the truth.
    - zh: 法官要求被告从实招来。
      pinyin: Fǎguān yāoqiú bèigào cóngshízhāolái.
      english: The judge demanded that the defendant confess the truth.
  synonyms:
    - word: 坦白
      pinyin: tǎnbái
      meaning: to confess, to be honest
    - word: 招供
      pinyin: zhāogòng
      meaning: to confess, to make a confession (legal term)
  word_analyses:
    - type: word
      simplified: 从实
      traditional: 從實
      pinyin: cóngshí
      english: according to the truth / honestly
      characters:
        - char: 从
          simplified: 从
          traditional: 從
          pinyin: cóng
          hsk: "1"
          detailed_analysis: true
          meaning_in_context: according to, following, from
          compounds:
            - simplified: 从来
              pinyin: cónglái
              meaning: always, at all times
            - simplified: 从前
              pinyin: cóngqián
              meaning: before, formerly
            - simplified: 服从
              pinyin: fúcóng
              meaning: to obey, to follow
            - simplified: 从事
              pinyin: cóngshì
              meaning: to engage in, to undertake
          etymology: |
            The simplified form 从 is one of the oldest characters, depicting two people walking together — one following the other. 
            The oracle bone script shows two figures, representing "to follow, to accompany." 
            The traditional form 從 adds the radical 彳 (step) and 辶 (walk), emphasizing movement. 
            The original meaning was "to follow, to accompany." Extended to mean "from, through, according to" — indicating following a source or standard.
        - char: 实
          simplified: 实
          traditional: 實
          pinyin: shí
          hsk: "3"
          detailed_analysis: true
          meaning_in_context: truth, reality
          compounds:
            - simplified: 实际
              pinyin: shíjì
              meaning: actual, reality
            - simplified: 真实
              pinyin: zhēnshí
              meaning: true, authentic
            - simplified: 事实
              pinyin: shìshí
              meaning: fact
            - simplified: 实在
              pinyin: shízài
              meaning: really, genuine
          etymology: |
            Phono-semantic compound. The traditional form 實 consists of the radical 宀 (roof) and the phonetic component 貫 (guàn, "string of coins"). 
            The roof radical indicates a house, and the phonetic represents goods/wealth. Together they mean "a house filled with goods" → "full, abundant." 
            Extended to mean "real, true" — what is substantial and not empty. The simplified form 实 preserves the roof radical 宀 and simplifies the bottom.
    - type: word
      simplified: 招来
      traditional: 招來
      pinyin: zhāolái
      english: to confess / to admit (under questioning)
      characters:
        - char: 招
          simplified: 招
          traditional: 招
          pinyin: zhāo
          hsk: "4"
          detailed_analysis: true
          meaning_in_context: to confess, to admit, to beckon
          compounds:
            - simplified: 招手
              pinyin: zhāoshǒu
              meaning: to wave, to beckon
            - simplified: 招聘
              pinyin: zhāopìn
              meaning: to recruit, to hire
            - simplified: 招待
              pinyin: zhāodài
              meaning: to entertain, to serve guests
            - simplified: 招供
              pinyin: zhāogòng
              meaning: to confess (legal term)
          etymology: |
            Phono-semantic compound. Composed of the radical 扌 (hand) and the phonetic component 召 (zhào, "to summon"). 
            The hand radical indicates an action involving the hand. The original meaning was "to beckon, to gesture with the hand." 
            Extended to "to summon, to call forth." In legal contexts, it developed the specialized meaning "to confess" — 
            as in "to bring forth the truth" under questioning.
        - char: 来
          simplified: 来
          traditional: 來
          pinyin: lái
          hsk: "1"
          detailed_analysis: true
          meaning_in_context: (particle indicating completion or direction)
          compounds:
            - simplified: 到来
              pinyin: dàolái
              meaning: arrival
            - simplified: 未来
              pinyin: wèilái
              meaning: future
            - simplified: 回来
              pinyin: huílái
              meaning: to come back
            - simplified: 出来
              pinyin: chūlái
              meaning: to come out
          etymology: |
            Pictographic. The traditional form 來 originally depicted a wheat plant (the original meaning was "wheat"). 
            It was borrowed early on for the verb "to come" due to phonetic similarity. The simplified form 来 preserves the essential shape.
            In 招来, 来 functions as a directional complement indicating that the confession is "brought forth" or "comes out."
  etymology_note: |
    This phrase is historically associated with judicial interrogations in imperial China. 
    When magistrates questioned suspects, they would demand they "confess according to the truth" (从实招来). 
    The phrase appears frequently in classical literature like "Water Margin" (水浒传) and other Ming/Qing dynasty novels 
    depicting courtroom scenes. It carries an authoritative, formal tone — often used by figures of authority who are 
    demanding honesty from someone they believe is concealing the truth.
    
    In modern usage, it's used somewhat humorously or dramatically in everyday situations (e.g., parents to children, 
    friends joking about secrets), though it retains its original serious meaning in legal contexts.

- type: word
  date: "03/27"
  simplified: 悲壮
  traditional: 悲壯
  pinyin: bēizhuàng
  english: solemn and stirring / tragic and heroic / moving and heroic
  german: solemn and stirring / tragic and heroic / moving and heroic
  hsk: "6"
  register: formal_written
  note: |
    Describes a scene, event, or death that is both tragic and heroic — evoking a mix of sorrow and admiration. Often used for sacrifices, battles, or moments of noble struggle that end in tragedy but inspire awe. Combines 悲 (sorrow, grief) and 壮 (heroic, grand, powerful).
  examples:
    - zh: 战士们英勇牺牲的场面十分悲壮。
      pinyin: Zhànshìmen yīngyǒng xīshēng de chǎngmiàn shífēn bēizhuàng.
      english: The scene of the soldiers' heroic sacrifice was deeply solemn and stirring.
    - zh: 这部电影以悲壮的结局收尾，令人久久难忘。
      pinyin: Zhè bù diànyǐng yǐ bēizhuàng de jiéjú shōuwěi, lìng rén jiǔjiǔ nánwàng.
      english: This film ends with a tragic and heroic conclusion that lingers in the memory.
    - zh: 他的生命虽然短暂，却活得悲壮而精彩。
      pinyin: Tā de shēngmìng suīrán duǎnzàn, què huó dé bēizhuàng ér jīngcǎi.
      english: Though his life was short, he lived it in a tragic yet magnificent way.
    - zh: 这首悲壮的歌曲让人热血沸腾。
      pinyin: Zhè shǒu bēizhuàng de gēqǔ ràng rén rèxuè fèiténg.
      english: This solemn and stirring song fills one with surging passion.
  synonyms:
    - word: 壮烈
      pinyin: zhuàngliè
      meaning: heroic and tragic (usually for death)
    - word: 慷慨悲歌
      pinyin: kāngkǎi bēigē
      meaning: heroic and mournful
  characters:
    - char: 悲
      simplified: 悲
      traditional: 悲
      pinyin: bēi
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: sorrow, grief, tragic
      compounds:
        - simplified: 悲伤
          pinyin: bēishāng
          meaning: sad, sorrowful
        - simplified: 悲剧
          pinyin: bēijù
          meaning: tragedy
        - simplified: 悲痛
          pinyin: bēitòng
          meaning: grief, sorrow
        - simplified: 慈悲
          pinyin: cíbēi
          meaning: compassion, mercy
      etymology: |
        Phono-semantic compound. Consists of the radical 心 (heart, below) and the phonetic component 非 (fēi, "not"). 
        The heart radical indicates emotion. The phonetic 非 originally meant "to oppose, to be wrong" — carrying a sense of something not right, 
        something contrary to one's wishes. Combined, they express the feeling of sorrow when things go contrary to one's desires. 
        The original meaning is "sadness, grief." In Buddhist contexts, 悲 means "compassion" (feeling others' suffering as one's own).
    - char: 壮
      simplified: 壮
      traditional: 壯
      pinyin: zhuàng
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: heroic, grand, powerful, magnificent
      compounds:
        - simplified: 壮大
          pinyin: zhuàngdà
          meaning: to expand, to grow strong
        - simplified: 强壮
          pinyin: qiángzhuàng
          meaning: strong, robust
        - simplified: 壮观
          pinyin: zhuàngguān
          meaning: magnificent, spectacular
        - simplified: 壮烈
          pinyin: zhuàngliè
          meaning: heroic and tragic
      etymology: |
        Phono-semantic compound. The traditional form 壯 consists of the radical 士 (scholar/warrior) and the phonetic component 爿 (qiáng, "bed" or "wood plank"). 
        The 士 radical originally depicted a battle axe, representing a warrior or strong man. The character's original meaning is "strong, robust, muscular." 
        Extended to mean "grand, magnificent" (as in 壮观) and "heroic, brave" (as in 壮烈). 
        The simplified form 壮 retains the 士 radical and simplifies the phonetic component to 丬.
  etymology_note: |
    The compound 悲壮 brings together sorrow (悲) and heroism (壮) — a combination that creates a uniquely powerful emotional resonance. 
    Unlike pure tragedy (which evokes only pity or fear) or pure heroism (which evokes admiration), 悲壮 describes moments where 
    greatness and tragedy coexist: a noble struggle that ends in sacrifice, a heroic act performed in the face of certain death. 
    
    The concept has deep roots in Chinese culture, from ancient tales of loyal ministers and righteous warriors who died for their principles, 
    to modern narratives of revolutionary martyrs. 悲壮 moments are often remembered precisely because they transform loss into a kind of 
    moral or spiritual victory — sorrow mixed with reverence, grief intertwined with pride.

- type: word
  date: "03/27"
  simplified: 笋
  traditional: 筍
  pinyin: sǔn
  english: bamboo shoot
  german: bamboo shoot
  hsk: "6"
  register: neutral
  note: |
    Refers to the edible young shoot of bamboo, a common ingredient in Chinese cuisine. Can be eaten fresh, dried, or pickled. 
    Also appears in idioms and colloquial expressions. Often paired with 竹 (bamboo) or used in compound words like 春笋 (spring bamboo shoots).
  examples:
    - zh: 春天是吃笋的最佳季节。
      pinyin: Chūntiān shì chī sǔn de zuìjiā jìjié.
      english: Spring is the best season to eat bamboo shoots.
    - zh: 这道菜用的是新鲜竹笋。
      pinyin: Zhè dào cài yòng de shì xīnxiān zhúsǔn.
