- type: word
  date: "04/04"
  simplified: 缩短
  traditional: 縮短
  pinyin: suōduǎn
  english: to shorten / to curtail / to reduce (length, time, distance)
  german: verkürzen / kürzen / reduzieren (Länge, Zeit, Distanz)
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Verb, das das Reduzieren von Länge, Dauer, Distanz oder Umfang beschreibt. 缩短 wird sowohl für konkrete (physische Länge) als auch abstrakte (Zeit, Prozesse) Verkürzungen verwendet.

    **Häufige Ausdrücke:**
    - 缩短时间 (suōduǎn shíjiān) — Zeit verkürzen
    - 缩短距离 (suōduǎn jùlí) — Distanz verkürzen
    - 缩短寿命 (suōduǎn shòumìng) — Lebensdauer verkürzen
    - 缩短差距 (suōduǎn chājù) — den Abstand / die Kluft verringern
    - 大大缩短 (dàdà suōduǎn) — erheblich / drastisch verkürzen

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 缩短 (suōduǎn) — verkürzen (Länge, Zeit, Distanz) — breiteste Verwendung
    - 减少 (jiǎnshǎo) — reduzieren, verringern (Menge, Anzahl)
    - 缩减 (suōjiǎn) — kürzen, reduzieren (formeller, Budget, Personal)
    - 截短 (jiéduǎn) — abschneiden, kürzen (konkret, z. B. Haare, Stoff)
    - 减短 (jiǎnduǎn) — kürzer machen (seltener, meist 缩短)

    **Gegenteil:**
    - 延长 (yáncháng) — verlängern

    **Kulturelle Anmerkung:**
    缩短 setzt sich aus 缩 (suō, "schrumpfen, zusammenziehen") und 短 (duǎn, "kurz") zusammen. Wörtlich: "zusammenziehen und kurz machen". In der modernen chinesischen Gesellschaft wird 缩短 oft im Zusammenhang mit Effizienzsteigerung verwendet: 缩短时间 = Zeit sparen, 缩短流程 = Prozesse verschlanken.
  synonyms:
    - word: 缩减
      pinyin: suōjiǎn
      meaning: kürzen, reduzieren (formeller, Budget, Personal)
    - word: 减短
      pinyin: jiǎnduǎn
      meaning: kürzer machen (seltener)
    - word: 截短
      pinyin: jiéduǎn
      meaning: abschneiden, kürzen (konkret)
    - word: 缩短距离
      pinyin: suōduǎn jùlí
      meaning: Abstand verringern (als Phrase)
  antonyms:
    - word: 延长
      pinyin: yáncháng
      meaning: verlängern
    - word: 加长
      pinyin: jiācháng
      meaning: verlängern, länger machen
    - word: 增加
      pinyin: zēngjiā
      meaning: erhöhen, vergrößern
  examples:
    - zh: 坐高铁可以大大缩短旅行时间。
      pinyin: Zuò gāotiě kěyǐ dàdà suōduǎn lǚxíng shíjiān.
      english: Taking the high-speed train can greatly shorten travel time.
      de: Mit dem Hochgeschwindigkeitszug kann man die Reisezeit erheblich verkürzen.
    - zh: 新的技术缩短了生产周期。
      pinyin: Xīn de jìshù suōduǎn le shēngchǎn zhōuqī.
      english: The new technology shortened the production cycle.
      de: Die neue Technologie hat den Produktionszyklus verkürzt.
    - zh: 我们需要想办法缩短两个部门之间的差距。
      pinyin: Wǒmen xūyào xiǎng bànfǎ suōduǎn liǎng ge bùmén zhī jiān de chājù.
      english: We need to find ways to narrow the gap between the two departments.
      de: Wir müssen Wege finden, die Kluft zwischen den beiden Abteilungen zu verringern.
    - zh: 经常熬夜会缩短寿命。
      pinyin: Jīngcháng áoyè huì suōduǎn shòumìng.
      english: Staying up late often can shorten your lifespan.
      de: Häufiges Aufbleiben bis spät in die Nacht kann die Lebensdauer verkürzen.
  characters:
    - char: 缩
      simplified: 缩
      traditional: 縮
      pinyin: suō
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: schrumpfen, zusammenziehen, verkürzen
      compounds:
        - simplified: 缩小
          pinyin: suōxiǎo
          meaning: verkleinern, reduzieren
        - simplified: 收缩
          pinyin: shōusuō
          meaning: zusammenziehen, schrumpfen
        - simplified: 缩短
          pinyin: suōduǎn
          meaning: verkürzen
        - simplified: 压缩
          pinyin: yāsuō
          meaning: komprimieren, zusammendrücken
        - simplified: 退缩
          pinyin: tuìsuō
          meaning: zurückweichen, sich zurückziehen
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 縮 besteht aus dem Radikal 糸 (Seide, Faden) und der phonetischen Komponente 宿 (sù, "übernachten"). Die ursprüngliche Bedeutung ist "Seide zusammenziehen, aufwickeln". Später erweitert zu "allgemein zusammenziehen, schrumpfen, verkürzen".
    - char: 短
      simplified: 短
      traditional: 短
      pinyin: duǎn
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: kurz (von Länge, Zeit, Distanz)
      compounds:
        - simplified: 长短
          pinyin: chángduǎn
          meaning: Länge (wörtl. lang-kurz)
        - simplified: 短期
          pinyin: duǎnqī
          meaning: kurzfristig
        - simplified: 短暂
          pinyin: duǎnzàn
          meaning: kurz (von Zeit), vergänglich
        - simplified: 缩短
          pinyin: suōduǎn
          meaning: verkürzen
        - simplified: 短处
          pinyin: duǎnchu
          meaning: Schwäche, Nachteil (wörtl. "kurze Stelle")
      etymology: |
        Phonosemantische Verbindung. Besteht aus dem Radikal 矢 (Pfeil) und der phonetischen Komponente 豆 (dòu, "Bohne"). Die ursprüngliche Bedeutung ist "kurz (im Gegensatz zu lang)". Der Pfeil-Radikal (矢) ist ein Längenmaß (ein Pfeil ist etwa 90 cm lang). 短 bezeichnet eine Länge, die unter diesem Maß liegt. Das Gegenteil ist 长 (cháng, "lang").

- type: word
  date: "04/04"
  simplified: 步骤
  traditional: 步驟
  pinyin: bùzhòu
  english: step / procedure / move / stage (in a process)
  german: Schritt / Verfahrensschritt / Phase (in einem Prozess)
  hsk: "5"
  register: neutral
  measure_word:
    - simplified: 个
      pinyin: gè
      meaning: allgemeiner Zähler für Schritte
    - simplified: 步
      pinyin: bù
      meaning: Zähler für Schritte (wörtlich "Schritt")
  note: |
    Ein Nomen, das einen einzelnen Schritt oder eine Phase innerhalb eines größeren Prozesses, Verfahrens oder einer Anleitung beschreibt. 步骤 wird sowohl für konkrete Handlungsabläufe (Kochrezept, Bedienungsanleitung) als auch für abstrakte Prozesse (Entscheidungsfindung, Berechnung) verwendet.

    **Häufige Ausdrücke:**
    - 操作步骤 (cāozuò bùzhòu) — Bedienungsschritte / Vorgehensweise
    - 详细步骤 (xiángxì bùzhòu) — detaillierte Schritte
    - 第一步 / 第二步 (dì yī bù / dì èr bù) — erster Schritt / zweiter Schritt
    - 按照步骤 (ànzhào bùzhòu) — gemäß den Schritten / Schritt für Schritt
    - 步骤简单 (bùzhòu jiǎndān) — die Schritte sind einfach

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 步骤 (bùzhòu) — Schritt (in einem Prozess) — am gebräuchlichsten für Anleitungen
    - 步 (bù) — Schritt (kürzer, Zähler, auch in 一步)
    - 过程 (guòchéng) — Prozess, Verlauf (das Ganze, nicht einzelne Schritte)
    - 程序 (chéngxù) — Verfahren, Programm, Prozedur (formeller, auch Computerprogramm)
    - 阶段 (jiēduàn) — Phase, Stufe (größere Abschnitte eines Prozesses)

    **Kulturelle Anmerkung:**
    步骤 setzt sich aus 步 (bù, "Schritt") und 骤 (zhòu, "galoppieren, schnell") zusammen. Wörtlich: "Schritte (wie beim Galoppieren)". Ursprünglich bezog sich 骤 auf das Rennen von Pferden. Die Kombination betont eine Abfolge von Bewegungen oder Handlungen. In der modernen Sprache ist 步骤 der Standardbegriff für "Schritt" in Arbeitsanweisungen, Tutorials und Prozessbeschreibungen.
  synonyms:
    - word: 步
      pinyin: bù
      meaning: Schritt (kürzere Form)
    - word: 环节
      pinyin: huánjié
      meaning: Glied, Verbindung (in einer Kette von Ereignissen)
    - word: 阶段
      pinyin: jiēduàn
      meaning: Phase, Stufe (größer als ein Schritt)
    - word: 工序
      pinyin: gōngxù
      meaning: Arbeitsschritt, Produktionsschritt (technisch, industriell)
  antonyms: []
  examples:
    - zh: 请按照以下步骤安装软件。
      pinyin: Qǐng ànzhào yǐxià bùzhòu ānzhuāng ruǎnjiàn.
      english: Please follow the steps below to install the software.
      de: Bitte befolgen Sie die folgenden Schritte, um die Software zu installieren.
    - zh: 这个实验需要五个步骤才能完成。
      pinyin: Zhège shíyàn xūyào wǔ ge bùzhòu cáinéng wánchéng.
      english: This experiment requires five steps to complete.
      de: Dieses Experiment benötigt fünf Schritte, um abgeschlossen zu werden.
    - zh: 第一步是打开电源，第二步是按启动按钮。
      pinyin: Dì yī bù shì dǎkāi diànyuán, dì èr bù shì àn qǐdòng ànniǔ.
      english: The first step is to turn on the power, the second step is to press the start button.
      de: Der erste Schritt ist das Einschalten der Stromversorgung, der zweite Schritt ist das Drücken der Starttaste.
    - zh: 你漏掉了一个重要步骤，所以结果不对。
      pinyin: Nǐ lòudiào le yī ge zhòngyào bùzhòu, suǒyǐ jiéguǒ bù duì.
      english: You missed an important step, so the result is incorrect.
      de: Du hast einen wichtigen Schritt ausgelassen, deshalb ist das Ergebnis falsch.
  characters:
    - char: 步
      simplified: 步
      traditional: 步
      pinyin: bù
      hsk: "3"
      detailed_analysis: true
      meaning_in_context: Schritt, Gang, Stufe
      compounds:
        - simplified: 脚步
          pinyin: jiǎobù
          meaning: Fußschritt, Schritt (beim Gehen)
        - simplified: 散步
          pinyin: sànbù
          meaning: spazieren gehen
        - simplified: 步行
          pinyin: bùxíng
          meaning: zu Fuß gehen
        - simplified: 步骤
          pinyin: bùzhòu
          meaning: Schritt (in einem Prozess)
        - simplified: 进一步
          pinyin: jìnyībù
          meaning: weiter, einen Schritt weiter
      etymology: |
        Ideogramm. Die Orakelknochenschrift zeigte zwei Füße (止, zhǐ) hintereinander — einen linken und einen rechten Fuß. Die ursprüngliche Bedeutung ist "einen Schritt machen, gehen". Später erweitert zu "Schritt (Maß für Entfernung)", "Phase, Stufe" und als Zähler für Schritte.
    - char: 骤
      simplified: 骤
      traditional: 驟
      pinyin: zhòu
      hsk: "6"
      detailed_analysis: true
      meaning_in_context: plötzlich, schnell (in 步骤: die Abfolge von Schritten)
      compounds:
        - simplified: 步骤
          pinyin: bùzhòu
          meaning: Schritt, Verfahrensschritt
        - simplified: 骤然
          pinyin: zhòurán
          meaning: plötzlich, unvermittelt
        - simplified: 骤变
          pinyin: zhòubiàn
          meaning: plötzliche Veränderung
        - simplified: 狂风骤雨
          pinyin: kuángfēng zhòuyǔ
          meaning: heftiger Wind und starker Regen (Chengyu)
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 驟 besteht aus dem Radikal 馬 (Pferd) und der phonetischen Komponente 聚 (jù, "sammeln, versammeln"). Die ursprüngliche Bedeutung ist "galoppieren, schnell rennen (von Pferden)". Daraus entwickelte sich die Bedeutung "plötzlich, schnell". In 步骤 (Schritt) ist die ursprüngliche Bedeutung von 骤 ("schnelle Bewegung") noch spürbar — die Abfolge von schnellen Schritten wie beim Galopp.

- type: expression
  date: "04/04"
  simplified: 代我向...问好
  traditional: 代我向...問好
  pinyin: dài wǒ xiàng ... wènhǎo
  english: "Please give my regards to ... / Say hello to ... for me"
  german: "Richten Sie ... liebe Grüße von mir aus / Grüßen Sie ... von mir"
  hsk: "4"
  register: spoken_neutral
  note: |
    Ein höflicher Ausdruck, um jemanden zu bitten, einer dritten Person Grüße auszurichten. Die wörtliche Bedeutung ist: "An meiner Stelle (代我) zu ... (向) gute Wünsche ausrichten (问好)."

    **Strukturen:**
    - 代我向 + [Person] + 问好 — Grüße an [Person] von mir
    - Kann auch mit Namen oder Verwandtschaftsbezeichnung verwendet werden:
      - 代我向你妈妈问好 (dài wǒ xiàng nǐ māma wènhǎo) — Grüße an deine Mutter von mir
      - 代我向李老师问好 (dài wǒ xiàng Lǐ lǎoshī wènhǎo) — Grüße an Frau/Herr Li von mir

    **Ähnliche Ausdrücke:**
    - 向...问好 (xiàng ... wènhǎo) — direkte Grüße (ohne "von mir")
    - 请替我问候... (qǐng tì wǒ wènhòu ...) — formeller
    - 给...带个好 (gěi ... dài ge hǎo) — umgangssprachlich

    **Kulturelle Anmerkung:**
    Grüße auszurichten ist in der chinesischen Kultur sehr wichtig, besonders wenn man jemanden nicht persönlich treffen kann. 问好 (wènhǎo) bedeutet wörtlich "nach dem Wohlsein fragen" und ist die gebräuchlichste Art, Grüße auszurichten. In formelleren Situationen sagt man eher 代我向...致以问候 (dài wǒ xiàng ... zhìyǐ wènhòu).
  synonyms:
    - word: 向...问好
      pinyin: xiàng ... wènhǎo
      meaning: Grüße an ... (ohne "von mir")
    - word: 请替我问候...
      pinyin: qǐng tì wǒ wènhòu ...
      meaning: bitte grüßen Sie ... für mich (formeller)
    - word: 给...带个好
      pinyin: gěi ... dài ge hǎo
      meaning: bring ... einen Gruß (umgangssprachlich)
  antonyms: []
  examples:
    - zh: 代我向你的家人问好。
      pinyin: Dài wǒ xiàng nǐ de jiārén wènhǎo.
      english: Please give my regards to your family.
      de: Richten Sie Ihrer Familie liebe Grüße von mir aus.
    - zh: 见到他时，代我向他问好。
      pinyin: Jiàndào tā shí, dài wǒ xiàng tā wènhǎo.
      english: When you see him, say hello to him for me.
      de: Wenn du ihn siehst, grüße ihn bitte von mir.
    - zh: 代我向你妈妈问好，我下次再去看她。
      pinyin: Dài wǒ xiàng nǐ māma wènhǎo, wǒ xià cì zài qù kàn tā.
      english: Give my regards to your mother. I'll visit her next time.
      de: Richten Sie Ihrer Mutter liebe Grüße von mir aus. Ich werde sie beim nächsten Mal besuchen.
    - zh: 如果你给老王打电话，代我向他问好。
      pinyin: Rúguǒ nǐ gěi Lǎo Wáng dǎ diànhuà, dài wǒ xiàng tā wènhǎo.
      english: If you call Lao Wang, say hello to him for me.
      de: Wenn du Lao Wang anrufst, grüße ihn bitte von mir.
  word_analyses:
