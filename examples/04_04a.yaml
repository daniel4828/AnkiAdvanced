- type: expression
  date: "04/04"
  simplified: 待办事项清单
  traditional: 待辦事項清單
  pinyin: dàibàn shìxiàng qīngdān
  english: to-do list / task list
  german: To-Do-Liste / Aufgabenliste
  hsk: "6"
  register: neutral
  note: |
    Eine Nominalphrase, die eine Liste von noch zu erledigenden Aufgaben oder Dingen bezeichnet. 待办事项清单 ist die formelle und vollständige Bezeichnung für eine To-Do-Liste.

    **Kürzere / gebräuchlichere Varianten:**
    - 待办清单 (dàibàn qīngdān) — To-Do-Liste (kürzer, sehr gebräuchlich)
    - 任务清单 (rènwu qīngdān) — Aufgabenliste
    - 日程表 (rìchéngbiǎo) — Zeitplan, Tagesplan (kann auch To-Dos enthalten)
    - 备忘录 (bèiwànglù) — Merkliste, Notizblock (wörtl. "nicht-vergessen-Notiz")

    **Häufige Ausdrücke:**
    - 列一份待办事项清单 (liè yī fèn dàibàn shìxiàng qīngdān) — eine To-Do-Liste erstellen / aufstellen
    - 检查待办清单 (jiǎnchá dàibàn qīngdān) — die To-Do-Liste überprüfen
    - 完成待办事项 (wánchéng dàibàn shìxiàng) — Aufgaben von der Liste erledigen
    - 从清单上划掉 (cóng qīngdān shang huádiào) — von der Liste streichen

    **Wortbildung:**
    - 待办 (dàibàn) — "noch zu erledigen" (wörtl. "erwarten zu tun")
    - 事项 (shìxiàng) — "Angelegenheit, Punkt, Posten"
    - 清单 (qīngdān) — "Liste, Aufstellung" (wörtl. "klare Liste")

    **Kulturelle Anmerkung:**
    Im modernen chinesischen Alltag (besonders im Arbeitsumfeld) sind To-Do-Listen sehr verbreitet. Viele Menschen nutzen Apps wie 钉钉 (Dīngdīng, chinesisches Slack/Teams), WeChat oder spezielle To-Do-Apps. Die kürzere Version 待办清单 ist im täglichen Sprachgebrauch viel häufiger als die vollständige Form. Im Gespräch sagt man oft einfach 我今天的待办 (wǒ jīntiān de dàibàn) – "meine Aufgaben für heute".
