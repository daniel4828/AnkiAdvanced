              pinyin: dàibiǎo
              meaning: vertreten, Repräsentant
            - simplified: 代替
              pinyin: dàitì
              meaning: ersetzen, anstelle von
            - simplified: 代理
              pinyin: dàilǐ
              meaning: als Vertreter handeln, Stellvertreter
            - simplified: 时代
              pinyin: shídài
              meaning: Zeitalter, Epoche
          etymology: |
            Phonosemantische Verbindung. Besteht aus dem Radikal 亻 (Mensch) und der phonetischen Komponente 弋 (yì). Die ursprüngliche Bedeutung ist "wechseln, an die Stelle treten". Später erweitert zu "an Stelle von, in Vertretung" sowie "Generation, Zeitalter" (als Menschen, die sich ablösen).
