- type: word
  date: "04/04"
  simplified: 贬低
  traditional: 貶低
  pinyin: biǎndī
  english: to belittle / to disparage / to depreciate / to speak down of
  german: abwerten / herabsetzen / schlechtmachen / geringschätzen
  hsk: "6"
  register: neutral
  measure_word: []
  note: |
    Ein Verb, das beschreibt, jemanden oder etwas herabzusetzen, die Bedeutung oder den Wert einer Person oder Sache absichtlich zu verringern. 贬低 wird im zwischenmenschlichen Kontext verwendet, wenn jemand die Fähigkeiten, Leistungen oder den Wert einer anderen Person kleinredet.

    **Häufige Ausdrücke:**
    - 贬低别人 (biǎndī biérén) — andere herabsetzen / schlechtmachen
    - 贬低自己 (biǎndī zìjǐ) — sich selbst herabsetzen (aus Bescheidenheit oder Minderwertigkeit)
    - 贬低他人的成就 (biǎndī tārén de chéngjiù) — die Leistungen anderer schmälern
    - 故意贬低 (gùyì biǎndī) — absichtlich herabsetzen
    - 公开贬低 (gōngkāi biǎndī) — öffentlich herabsetzen / diffamieren

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 贬低 (biǎndī) — herabsetzen, schlechtmachen (Personen, Leistungen, Wert)
    - 贬值 (biǎnzhí) — abwerten (Währung, Vermögenswerte – wirtschaftlich)
    - 贬损 (biǎnsǔn) — verunglimpfen, diffamieren (stärker, oft öffentlich)
    - 轻视 (qīngshì) — geringschätzen, verachten (Einstellung/Haltung)
    - 小看 (xiǎokàn) — unterschätzen, gering schätzen (umgangssprachlich)

    **Kulturelle Anmerkung:**
    贬低 setzt sich aus 贬 (biǎn, "herabsetzen, tadeln") und 低 (dī, "niedrig") zusammen. Wörtlich: "niedrig machen / niedrig bewerten". In der chinesischen Kultur, die Bescheidenheit (谦虚, qiānxū) schätzt, ist es wichtig, andere nicht herabzusetzen. Das Herabsetzen anderer wird als Zeichen von mangelnder Erziehung (没教养, méi jiàoyǎng) angesehen. Konfuzianische Werte betonen Respekt gegenüber anderen und das Vermeiden von übermäßiger Selbstlob, aber auch das Unterlassen von Herabsetzung anderer.
  synonyms:
    - word: 贬损
      pinyin: biǎnsǔn
      meaning: verunglimpfen, diffamieren, herabsetzen (stärker)
    - word: 轻视
      pinyin: qīngshì
      meaning: geringschätzen, verachten (eher Einstellung)
    - word: 小看
      pinyin: xiǎokàn
      meaning: unterschätzen, gering schätzen (umgangssprachlich)
    - word: 瞧不起
      pinyin: qiáo bu qǐ
      meaning: verachten, nichts halten von (umgangssprachlich)
  antonyms:
    - word: 赞扬
      pinyin: zànyáng
      meaning: loben, preisen
    - word: 尊重
      pinyin: zūnzhòng
      meaning: respektieren, achten
    - word: 抬高
      pinyin: táigāo
      meaning: erhöhen, hochschätzen
    - word: 推崇
      pinyin: tuīchóng
      meaning: hochschätzen, verehren
  examples:
    - zh: 他总喜欢贬低别人来抬高自己。
      pinyin: Tā zǒng xǐhuān biǎndī biérén lái táigāo zìjǐ.
      english: He always likes to belittle others to elevate himself.
      de: Er setzt immer andere herab, um sich selbst zu erhöhen.
    - zh: 不要因为嫉妒而贬低同事的成就。
      pinyin: Bùyào yīnwèi jídù ér biǎndī tóngshì de chéngjiù.
      english: Don't belittle your colleagues' achievements out of jealousy.
      de: Setze nicht aus Eifersucht die Leistungen deiner Kollegen herab.
    - zh: 他在会议上公开贬低我的建议。
      pinyin: Tā zài huìyì shang gōngkāi biǎndī wǒ de jiànyì.
      english: He publicly disparaged my suggestion at the meeting.
      de: Er hat meinen Vorschlag in der Besprechung öffentlich herabgesetzt.
    - zh: 真正的朋友不会贬低你，而是会支持你。
      pinyin: Zhēnzhèng de péngyou bù huì biǎndī nǐ, ér shì huì zhīchí nǐ.
      english: True friends won't belittle you; they will support you.
      de: Wahre Freunde setzen dich nicht herab, sondern unterstützen dich.
