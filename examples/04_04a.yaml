  note: |
    Ein Verb (kann auch als Nomen verwendet werden), das das Äußern von Unzufriedenheit, Groll oder Kritik über eine Person, Sache oder Situation beschreibt. 抱怨 hat eine etwas stärkere, emotionalere Konnotation als das neutralere 发牢骚.

    **Häufige Ausdrücke:**
    - 抱怨某人 (bàoyuàn mǒurén) — sich über jemanden beschweren
    - 抱怨某事 (bàoyuàn mǒushì) — sich über etwas beschweren
    - 满腹抱怨 (mǎn fù bàoyuàn) — voller Beschwerden sein (wörtl. "ganzer Bauch voll Beschwerden")
    - 抱怨连连 (bàoyuàn liánlián) — sich endlos beschweren

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 抱怨 (bàoyuàn) — allgemeines "sich beschweren", betont Unmut und Groll
    - 发牢骚 (fā láosāo) — "murren, nörgeln" (neutraler, oft über Kleinigkeiten)
    - 埋怨 (mányuàn) — "Vorwürfe machen, grollen" (persönlicher, oft gegen eine Person)
    - 投诉 (tóusù) — "eine offizielle Beschwerde einreichen" (formell)
    - 诉苦 (sùkǔ) — "sich über sein Leid beklagen" (emotionaler, um Mitgefühl zu suchen)

    **Kulturelle Anmerkung:**
    抱怨 setzt sich aus 抱 (bào, "in den Armen halten, tragen") und 怨 (yuàn, "Groll, Feindseligkeit") zusammen. Wörtlich: "Groll in sich tragen". In der chinesischen Kultur wird häufiges 抱怨 oft als negativ angesehen, da es die Harmonie (和谐, héxié) stört. Direkte Beschwerden sind weniger üblich als indirekte Andeutungen oder nonverbale Kommunikation.
  synonyms:
    - word: 埋怨
      pinyin: mányuàn
      meaning: Vorwürfe machen, grollen (persönlicher, gegen Personen)
    - word: 发牢骚
      pinyin: fā láosāo
      meaning: nörgeln, murren (neutraler, über Kleinigkeiten)
    - word: 诉苦
      pinyin: sùkǔ
      meaning: sich über sein Leid beklagen (um Mitgefühl zu suchen)
  antonyms:
    - word: 感谢
      pinyin: gǎnxiè
      meaning: sich bedanken, dankbar sein
    - word: 赞赏
      pinyin: zànshǎng
      meaning: loben, schätzen
    - word: 满意
      pinyin: mǎnyì
      meaning: zufrieden sein
  examples:
    - zh: 他总是抱怨工作太累，却不愿意换工作。
      pinyin: Tā zǒngshì bàoyuàn gōngzuò tài lèi, què bù yuànyì huàn gōngzuò.
      english: He always complains that work is too tiring, but he doesn't want to change jobs.
      de: Er beschwert sich immer, dass die Arbeit zu anstrengend ist, will aber den Job nicht wechseln.
    - zh: 不要总是抱怨别人，先看看自己有没有问题。
      pinyin: Bùyào zǒngshì bàoyuàn biérén, xiān kànkan zìjǐ yǒu méiyǒu wèntí.
      english: Don't always complain about others. First check whether you yourself have any problems.
      de: Beschwere dich nicht immer über andere. Überprüfe zuerst, ob du selbst Probleme hast.
    - zh: 客户对产品质量提出了很多抱怨。
      pinyin: Kèhù duì chǎnpǐn zhìliàng tíchūle hěn duō bàoyuàn.
      english: Customers made many complaints about product quality.
      de: Kunden äußerten viele Beschwerden über die Produktqualität.
    - zh: 她抱怨说房东从来没有修过热水器。
      pinyin: Tā bàoyuàn shuō fángdōng cónglái méiyǒu xiū guo rèshuǐqì.
      english: She complained that the landlord had never fixed the water heater.
      de: Sie beschwerte sich, dass der Vermieter den Warmwasserbereiter nie repariert habe.
  characters:
