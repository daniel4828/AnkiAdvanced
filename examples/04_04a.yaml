- type: word
  date: "04/04"
  simplified: 探索
  traditional: 探索
  pinyin: tànsuǒ
  english: to explore / to probe / to seek / to investigate
  german: erkunden / erforschen / untersuchen / suchen
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Verb, das das systematische Suchen, Untersuchen oder Erforschen von etwas Unbekanntem beschreibt – sowohl konkrete (Orte, Gebiete) als auch abstrakte (Wahrheit, Wissen, Möglichkeiten).

    **Häufige Ausdrücke:**
