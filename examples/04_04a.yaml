- type: expression
  date: "04/04"
  simplified: 那边
  traditional: 那邊
  pinyin: nà biān
  english: over there / that side / there (in that direction/place)
  german: dort / drüben / auf der anderen Seite / dort drüben
  hsk: "3"
  register: neutral
  note: |
    Ein Ortsausdruck, der eine Position oder einen Ort bezeichnet, der vom Sprecher entfernt ist. 那边 setzt sich aus 那 (nà, "dort/jene") und 边 (biān, "Seite/Rand") zusammen.

    **Häufige Verwendungen:**
    - 那边 als Adverb: "dort drüben" (z. B. 他在那边 — Er ist dort drüben)
    - 在那边 als lokale Präpositionalphrase: "dort drüben"
    - 那边 + Substantiv: "dort drüben bei ..." (z. B. 那边的人 — die Leute dort drüben)

    **Funktion im Satz „其他人那边怎么样?“ (Qítā rén nà biān zěnmeyàng?)**

    In diesem Satz fungiert 那边 als **lokale Partikel**, die an 其他人 (qítā rén, "die anderen Leute") angehängt wird. Die Konstruktion ist:

    **Person + 那边 + 怎么样?** = "Wie sieht es bei [Person] (dort drüben) aus?"

    Genauer: 其他人那边 bedeutet wörtlich "die andere Seite der anderen Leute" oder "bei den anderen (dort)". Der Ausdruck erfragt den Zustand, die Situation oder das Befinden der anderen Personen an ihrem Ort. Diese Konstruktion ist im gesprochenen Chinesisch sehr gebräuchlich:

    - 你那边怎么样? (Nǐ nà biān zěnmeyàng?) — Wie sieht es bei dir aus? / Wie läuft's bei dir?
    - 公司那边呢? (Gōngsī nà biān ne?) — Und bei der Firma (dort)?
    - 家里那边都好吗? (Jiālǐ nà biān dōu hǎo ma?) — Ist alles in Ordnung bei dir zu Hause?

    **Wichtige Unterschiede:**
    - 那边 (nà biān) — dort drüben (allgemein, entfernt)
    - 这边 (zhè biān) — hier drüben (nah beim Sprecher)
    - 那里 (nà lǐ) — dort (allgemeiner Ortspronomen, weniger Richtungsbetonung)
    - 那儿 (nàr) — dort (umgangssprachliche Kurzform von 那里)

    **Kulturelle Anmerkung:**
    Im gesprochenen Chinesisch wird 那边 oft metaphorisch verwendet, um nicht nur einen physischen Ort, sondern auch eine "Seite" einer Situation oder Person zu bezeichnen — ähnlich wie im Deutschen "bei jemandem" im Sinne von "bei jemandem zu Hause", "in jemandes Umgebung" oder "was jemanden betrifft".
  synonyms:
    - word: 那里
      pinyin: nà lǐ
      meaning: dort (allgemeiner, weniger richtungsbetont)
    - word: 那儿
      pinyin: nàr
      meaning: dort (umgangssprachlich, Kurzform)
    - word: 对面
      pinyin: duìmiàn
      meaning: gegenüber, auf der anderen Seite (direkt gegenüber)
  antonyms:
    - word: 这边
      pinyin: zhè biān
      meaning: hier drüben
    - word: 这里
      pinyin: zhè lǐ
      meaning: hier
  examples:
    - zh: 他在那边等你。
      pinyin: Tā zài nà biān děng nǐ.
      english: He is waiting for you over there.
      de: Er wartet dort drüben auf dich.
    - zh: 你那边怎么样？一切都好吗？
      pinyin: Nǐ nà biān zěnmeyàng? Yīqiè dōu hǎo ma?
