      pinyin: Zhè bēi chá tài nóng le, néng jiā diǎn shuǐ ma?
      english: This tea is too strong. Can you add some water?
      de: Dieser Tee ist zu stark. Kannst du etwas Wasser hinzufügen?
    - zh: 深烘咖啡的味道通常比较浓。
      pinyin: Shēn hōng kāfēi de wèidào tōngcháng bǐjiào nóng.
      english: Dark roast coffee usually has a stronger flavor.
      de: Dunkel gerösteter Kaffee hat normalerweise einen stärkeren Geschmack.
    - zh: 早上喝一杯浓咖啡可以提神。
      pinyin: Zǎoshang hē yī bēi nóng kāfēi kěyǐ tíshén.
      english: Drinking a cup of strong coffee in the morning can wake you up.
      de: Eine Tasse starken Kaffee am Morgen kann dich wach machen.
    - zh: 今天的雾很浓，开车要小心。
      pinyin: Jīntiān de wù hěn nóng, kāichē yào xiǎoxīn.
      english: The fog is very thick today. Be careful driving.
