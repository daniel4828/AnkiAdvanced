      de: Dein WeChat-Profilbild ist sehr süß. Ist das deine Katze?
    - zh: 我刚刚换了一个新的头像，你觉得怎么样？
      pinyin: Wǒ gānggāng huànle yī gè xīn de tóuxiàng, nǐ juéde zěnmeyàng?
      english: I just changed my profile picture. What do you think?
