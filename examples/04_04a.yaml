- type: word
  date: "04/04"
  simplified: 不尊重
  traditional: 不尊重
  pinyin: bù zūnzhòng
  english: disrespectful / disrespect / to lack respect
  german: respektlos / Respektlosigkeit / keinen Respekt haben
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Adjektiv/Substantiv (Negation von 尊重, "Respekt haben"), das beschreibt, dass jemandem der gebührende Respekt fehlt – durch Worte, Taten oder Haltung. 不尊重 ist der allgemeinste und gebräuchlichste Ausdruck für "respektlos" im modernen Chinesisch.

    **Weitere Varianten für "respektlos":**
    - 无礼 (wúlǐ) — unhöflich, respektlos (stärker, wörtl. "ohne Etikette")
    - 失礼 (shīlǐ) — unhöflich, taktlos (wörtl. "Etikette verlieren")
    - 轻蔑 (qīngmiè) — verächtlich, geringschätzig (stärker, für Haltung/Blick)
    - 不恭 (bù gōng) — respektlos (formell/literarisch, oft in 玩世不恭 – zynisch)

    **Häufige Ausdrücke:**
    - 不尊重别人 (bù zūnzhòng biérén) — andere nicht respektieren / respektlos gegenüber anderen sein
    - 对...不尊重 (duì ... bù zūnzhòng) — respektlos gegenüber ... sein
    - 感到不尊重 (gǎndào bù zūnzhòng) — sich respektlos behandelt fühlen
    - 一种不尊重 (yī zhǒng bù zūnzhòng) — eine Art von Respektlosigkeit

    **Wichtige Unterschiede:**
    - 不尊重 (bù zūnzhòng) — respektlos / Respektlosigkeit (allgemein, neutral, häufigster)
    - 无礼 (wúlǐ) — unhöflich, respektlos (stärker, fokussiert auf Verhalten/Manieren)
    - 失礼 (shīlǐ) — unhöflich, taktlos (oft für unabsichtliche Fauxpas)
    - 冒犯 (màofàn) — beleidigend, anstößig (betont die Beleidigung)

    **Kulturelle Anmerkung:**
    In der chinesischen Kultur, die stark von konfuzianischen Werten wie 尊重长辈 (zūnzhòng zhǎngbèi, "Respekt gegenüber Älteren") geprägt ist, wird Respektlosigkeit als schwerwiegendes soziales Vergehen betrachtet. Besonders respektlos ist es, älteren Menschen, Eltern, Lehrern oder Vorgesetzten gegenüber unhöflich zu sein. Der Ausdruck 没大没小 (méi dà méi xiǎo, "weder groß noch klein kennen") beschreibt respektloses Verhalten gegenüber Älteren oder Vorgesetzten.

    **Grammatik:**
    - Als Adjektiv: 他很不尊重 – "Er ist sehr respektlos"
    - Als Nomen: Das ist eine Respektlosigkeit – 这是一种不尊重 (zhè shì yī zhǒng bù zūnzhòng)
  synonyms:
