      etymology: |
        Phonosemantische Verbindung. Besteht aus dem Radikal 穴 (Höhle, Loch) und der phonetischen Komponente 工 (gōng, "Arbeit"). Die ursprüngliche Bedeutung ist "leer, hohl". Ausgesprochen als kōng bedeutet es "leer, hohl, Luft". Ausgesprochen als kòng (4. Ton) bedeutet es "freier Raum, ungenutzte Zeit, eine Lücke lassen" – die Bedeutung, die in 有空 verwendet wird. Die Aussprache kòng spezifiziert die Bedeutung von "leerer Raum/Zeit".

- type: word
  date: "04/04"
  simplified: 误会
  traditional: 誤會
  pinyin: wùhuì
  english: misunderstanding / to misunderstand
  german: Missverständnis / missverstehen
  hsk: "5"
  register: neutral
  measure_word:
    - simplified: 个
      pinyin: gè
      meaning: allgemeiner Zähler für Missverständnisse
    - simplified: 场
      pinyin: chǎng
      meaning: Zähler für Ereignisse/Vorfälle (ein Missverständnis als Vorfall)
  note: |
    Ein Wort, das sowohl als Nomen ("Missverständnis") als auch als Verb ("missverstehen") verwendet werden kann. 误会 ist der gebräuchlichste und allgemeinste Begriff für Missverständnisse im zwischenmenschlichen Bereich – von kleinen Alltagsmissverständnissen bis zu ernsteren Konflikten.

    **Häufige Ausdrücke:**
    - 产生误会 (chǎnshēng wùhuì) — ein Missverständnis entsteht / verursachen
    - 消除误会 (xiāochú wùhuì) — ein Missverständnis ausräumen / beseitigen
    - 误会一场 (wùhuì yī chǎng) — ein großes Missverständnis (wörtl. "eine Szene/ein Vorfall von Missverständnis")
    - 别误会 (bié wùhuì) — Versteh mich nicht falsch! / Kein Missverständnis bitte!
    - 纯属误会 (chún shǔ wùhuì) — es handelt sich um ein reines Missverständnis

    **Wichtige Unterschiede:**
    - 误会 (wùhuì) — Missverständnis (zwischen Personen, Alltag, am gebräuchlichsten)
    - 误解 (wùjiě) — Missverständnis / Fehlinterpretation (formeller, oft für Konzepte/Ideen)
    - 歧义 (qíyì) — Ambiguität, Mehrdeutigkeit (sprachliche Unklarheit)

    **Kulturelle Anmerkung:**
    误会 setzt sich aus 误 (wù, "falsch, irrtümlich") und 会 (huì, "verstehen, treffen, sich versammeln") zusammen. Wörtlich: "falsch verstehen / sich irrtümlich treffen". In der chinesischen Kultur, die großen Wert auf Harmonie (和谐, héxié) legt, ist das Ausräumen von Missverständnissen wichtig, um Beziehungen zu bewahren. Die Redewendung 冤家宜解不宜结 (yuānjia yí jiě bù yí jié, "Feindschaft sollte man lösen, nicht weiterführen") gilt auch für Missverständnisse.

    **Typische Konstruktionen:**
    - 误会 + 了 (Verb + 了) — "habe missverstanden" (z. B. 我误会了 – Ich habe es missverstanden)
    - 对...有误会 — ein Missverständnis gegenüber jemandem/etwas haben
    - 误会 + dass-Satz (indirekt, mit 以为 – yǐwéi, "fälschlich denken")
  synonyms:
