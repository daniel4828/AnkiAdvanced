  note: |
    Ein Nomen, das den Titel eines Werkes (Buch, Artikel, Lied, Film), eine Überschrift in einem Dokument oder den Betreff einer Nachricht/E-Mail bezeichnet. 标题 ist der gebräuchlichste allgemeine Begriff für "Titel" im Sinne von Überschrift.

    **Häufige Ausdrücke:**
    - 大标题 (dà biāotí) — Hauptüberschrift, Schlagzeile
    - 副标题 (fù biāotí) — Untertitel, Nebentitel
    - 文章标题 (wénzhāng biāotí) — Artikelüberschrift
    - 邮件标题 (yóujiàn biāotí) — E-Mail-Betreff
    - 标题党 (biāotídǎng) — Clickbait-Überschriften (wörtl. "Titel-Partei")

    **Wichtige Unterschiede zu anderen "Titel"-Wörtern:**
    - 标题 (biāotí) — Überschrift, Betreff, Titel eines Werkes (am gebräuchlichsten)
    - 题目 (tímù) — Titel einer Aufgabe, Prüfungsfrage oder eines Aufsatzes (enger)
    - 头衔 (tóuxián) — persönlicher Titel (Dr., Professor, König) — für Personen
    - 名称 (míngchēng) — Name, Bezeichnung (allgemeiner, formeller)
    - 主题 (zhǔtí) — Thema, Motiv (inhaltlich, nicht als Überschrift)
  synonyms:
    - word: 题目
