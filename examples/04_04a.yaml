  note: |
    Ein Nomen, das ein Gerät oder eine Funktion bezeichnet, die Zeit misst oder zählt – entweder als Countdown (Countdown-Timer) oder als Stoppuhr (Zeitmessung). 计时器 ist der allgemeinste Begriff für Timer aller Art.

    **Häufige Ausdrücke:**
    - 设置计时器 (shèzhì jìshíqì) — einen Timer einstellen
    - 倒计时器 (dào jìshíqì) — Countdown-Timer
    - 厨房计时器 (chúfáng jìshíqì) — Küchentimer
    - 计时器功能 (jìshíqì gōngnéng) — Timer-Funktion
    - 自动计时器 (zìdòng jìshíqì) — automatischer Timer

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 计时器 (jìshíqì) — Timer, Zeitgeber (allgemeinster Begriff)
    - 定时器 (dìngshíqì) — Timer (betont das Einstellen einer Zeit, oft programmierbar)
    - 秒表 (miǎobiǎo) — Stoppuhr (handgehalten, oft im Sport)
    - 闹钟 (nàozhōng) — Wecker (alarmiert zu einer eingestellten Zeit)
    - 时钟 (shízhōng) — Uhr, Klocka (allgemeines Zeitmessgerät)

    **Technische Anmerkung:**
    - 计时器 (jìshíqì) — misst die verstrichene Zeit (Stoppuhr-Funktion)
    - 定时器 (dìngshíqì) — zählt auf einen bestimmten Zeitpunkt herunter (Countdown)

    **Kulturelle Anmerkung:**
    计时器 setzt sich aus 计 (jì, "berechnen, zählen"), 时 (shí, "Zeit") und 器 (qì, "Gerät, Apparat") zusammen. Wörtlich: "Zeit-berechnendes Gerät". Das Wort wird sowohl für physische Timer-Geräte als auch für digitale Timer-Funktionen auf Smartphones, Computern und Küchengeräten verwendet.
