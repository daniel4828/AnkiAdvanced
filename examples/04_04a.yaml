  traditional: 感到被攻擊
  pinyin: gǎndào bèi gōngjī
  english: to feel attacked (emotionally) / to feel under attack / to feel offended
  german: sich angegriffen fühlen (emotional) / sich unter Beschuss fühlen
  hsk: "5"
  register: spoken_neutral
  note: |
    Eine verbale Phrase, die beschreibt, dass sich jemand emotional angegriffen, kritisiert oder vor den Kopf gestoßen fühlt – auch wenn keine physische Attacke vorliegt. Wird häufig in Alltagsgesprächen, sozialen Medien und psychologischen Kontexten verwendet.

    **Struktur:**
    - 感到 (gǎndào) — "fühlen, empfinden" (Verb, gibt das Gefühl an)
    - 被 (bèi) — Passivpartikel ("werden / wird")
    - 攻击 (gōngjī) — "angreifen, attackieren"

    **Häufige Ausdrücke:**
    - 感到被攻击 (gǎndào bèi gōngjī) — sich angegriffen fühlen
    - 我觉得被攻击了 (wǒ juéde bèi gōngjī le) — Ich fühle mich angegriffen
    - 别觉得被攻击 (bié juéde bèi gōngjī) — Fühl dich nicht angegriffen
    - 容易感到被攻击 (róngyì gǎndào bèi gōngjī) — leicht angegriffen fühlen

    **Kürzere / umgangssprachliche Varianten:**
    - 被攻击 (bèi gōngjī) — "angegriffen werden" (kann in kurzen Sätzen 感觉被攻击 heißen)
    - 觉得被攻击 (juéde bèi gōngjī) — "sich angegriffen fühlen" (mit 觉得 statt 感到)

    **Wichtige Unterschiede:**
    - 感到被攻击 — sich angegriffen fühlen (emotional, am gebräuchlichsten)
    - 感到冒犯 (gǎndào màofàn) — sich beleidigt fühlen (betont die Beleidigung)
    - 觉得被针对 (juéde bèi zhēnduì) — sich angegriffen fühlen im Sinne von "sich ins Visier genommen fühlen"

    **Kulturelle Anmerkung:**
    In der chinesischen Online-Kultur wird 感到被攻击 häufig in Diskussionen verwendet, besonders in sozialen Medien. Das verwandte Slang-Wort 玻璃心 (bōli xīn, "Glasharz") beschreibt eine Person, die sich schnell angegriffen fühlt oder leicht beleidigt ist. Im professionellen Kontext sagt man oft neutraler 我觉得有点被冒犯 (wǒ juéde yǒudiǎn bèi màofàn, "Ich fühle mich etwas beleidigt").
