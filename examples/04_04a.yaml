- type: word
  date: "04/04"
  simplified: 浓
  traditional: 濃
  pinyin: nóng
  english: thick / dense / strong / rich / concentrated (of liquids, colors, flavors, emotions)
  german: dickflüssig / stark / kräftig / konzentriert (bei Flüssigkeiten, Farben, Geschmack, Gefühlen)
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Adjektiv, das eine hohe Konzentration oder Intensität beschreibt – bei Flüssigkeiten (Tee, Suppe, Soße), Farben, Gerüchen, Geschmack, Make-up, Nebel, Akzenten und sogar Emotionen (z. B. 浓情 – tiefe Zuneigung).

    **Häufige Ausdrücke:**
    - 浓茶 (nóng chá) — starker Tee
    - 浓汤 (nóng tāng) — dicke/kräftige Suppe
    - 浓咖啡 (nóng kāfēi) — starker Kaffee
    - 浓烟 (nóng yān) — dicker Rauch
    - 浓雾 (nóng wù) — dichter Nebel
    - 浓妆 (nóng zhuāng) — starkes / dickes Make-up
    - 浓墨重彩 (nóng mò zhòng cǎi) — mit dicken Farben (auch fig. für übertriebene Darstellung)

    **Verwendung mit 深烘 (dunkle Röstung):**
    Bei Kaffee beschreibt 浓 die Stärke/Intensität des Geschmacks oder der Flüssigkeit, während 深烘 den Röstgrad der Bohnen angibt. Dunkel gerösteter Kaffee (深烘) ist typischerweise 浓 (stark/kräftig) im Geschmack.

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 浓 (nóng) — stark, dickflüssig, konzentriert (Geschmack, Farbe, Konsistenz)
    - 稠 (chóu) — dickflüssig (eher physikalische Viskosität, z. B. Brei)
    - 厚 (hòu) — dick (Schicht, Blatt, auch fig. für Gastfreundschaft)
    - 烈 (liè) — stark, heftig (Alkohol, Feuer, Persönlichkeit)
    - 重 (zhòng) — schwer, stark (Gewicht, auch Geschmack im Sinne von "schwer/üppig")
    - 浓烈 (nóngliè) — stark und intensiv (verstärkte Form)

    **Kulturelle Anmerkung:**
    In der chinesischen Küche und Teekultur ist 浓 ein wichtiger Geschmacksindikator. Starker Tee (浓茶) wird oft als belebend angesehen, während manche Menschen empfindlichen Magen haben und 淡茶 (dàn chá, "schwacher Tee") bevorzugen. Das Gegenteil von 浓 ist 淡 (dàn, "schwach, dünn, mild").
  synonyms:
    - word: 稠
      pinyin: chóu
      meaning: dickflüssig (physikalische Viskosität, z. B. Brei, Porridge)
    - word: 浓烈
      pinyin: nóngliè
      meaning: stark und intensiv (verstärkte Form)
    - word: 浓厚
      pinyin: nónghòu
      meaning: dick, stark, tief (auch für Interesse, Atmosphäre)
  antonyms:
