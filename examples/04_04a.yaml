- type: word
  date: "04/04"
  simplified: 深烘
  traditional: 深烘
  pinyin: shēn hōng
  english: dark roast (coffee)
  german: dunkle Röstung (Kaffee)
  hsk: "6"
  register: neutral
  measure_word: []
  note: |
    Ein Begriff aus der Kaffeekultur, der eine dunkle Röstung von Kaffeebohnen bezeichnet. 深烘 ist die Kurzform von 深度烘焙 (shēndù hōngbèi, "tiefe/tiefgehende Röstung").

    **Häufige Ausdrücke:**
    - 深烘咖啡 (shēn hōng kāfēi) — dunkel gerösteter Kaffee
    - 深烘豆 (shēn hōng dòu) — dunkel geröstete Bohnen
    - 中烘 (zhōng hōng) — mittlere Röstung
    - 浅烘 (qiǎn hōng) — helle Röstung

    **Röstgrade im Überblick:**
    - 浅烘 (qiǎn hōng) — helle Röstung (Light Roast) — säurebetont, fruchtig
    - 中烘 (zhōng hōng) — mittlere Röstung (Medium Roast) — ausgewogen
    - 深烘 (shēn hōng) — dunkle Röstung (Dark Roast) — kräftig, bitter, weniger Säure

    **Kulturelle Anmerkung:**
    In China hat die Kaffeekultur in den letzten Jahrzehnten stark zugenommen, besonders in Großstädten wie Shanghai, Peking und Shenzhen. Während traditionell Tee dominierte, ist Kaffee besonders bei jungen, urbanen Menschen beliebt. Die Terminologie für Röstgrade (浅烘/中烘/深烘) ist aus dem Englischen/Deutschen übernommen und in Cafés und bei Kaffeeliebhabern allgemein verständlich. Viele chinesische Kaffeebrands bieten eigene Röstprofile an.

    **Wortbildung:**
    深烘 ist eine Abkürzung von 深度烘焙 (shēndù hōngbèi):
    - 深度 (shēndù) — Tiefe, tiefgehend
    - 烘焙 (hōngbèi) — rösten, backen (auch für Brot, Kekse)
  synonyms:
    - word: 深度烘焙
      pinyin: shēndù hōngbèi
      meaning: dunkle Röstung (vollständiger Begriff)
    - word: 深焙
      pinyin: shēn bèi
      meaning: dunkle Röstung (kürzere Variante, seltener)
    - word: 重烘
      pinyin: zhòng hōng
      meaning: schwere/dunkle Röstung (seltener)
  antonyms:
    - word: 浅烘
      pinyin: qiǎn hōng
      meaning: helle Röstung
    - word: 中烘
      pinyin: zhōng hōng
      meaning: mittlere Röstung
  examples:
    - zh: 我比较喜欢深烘咖啡，味道更浓郁。
      pinyin: Wǒ bǐjiào xǐhuān shēn hōng kāfēi, wèidào gèng nóngyù.
      english: I prefer dark roast coffee; the flavor is richer.
      de: Ich mag dunklen Röstkaffee lieber; der Geschmack ist intensiver.
    - zh: 深烘豆的苦味更明显。
      pinyin: Shēn hōng dòu de kǔwèi gèng míngxiǎn.
      english: Dark roast beans have a more pronounced bitterness.
      de: Dunkel geröstete Bohnen haben eine deutlichere Bitterkeit.
    - zh: 这家咖啡店专门卖深烘咖啡。
      pinyin: Zhè jiā kāfēi diàn zhuānmén mài shēn hōng kāfēi.
      english: This coffee shop specializes in dark roast coffee.
      de: Dieses Café ist auf dunklen Röstkaffee spezialisiert.
    - zh: 深烘咖啡的咖啡因含量其实比浅烘低。
      pinyin: Shēn hōng kāfēi de kāfēiyīn hánliàng qíshí bǐ qiǎn hōng dī.
      english: Dark roast coffee actually has less caffeine than light roast.
      de: Dunkler Röstkaffee hat tatsächlich weniger Koffein als heller Röstkaffee.
  characters:
