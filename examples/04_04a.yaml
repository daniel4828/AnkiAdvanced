- type: word
  date: "04/04"
  simplified: 接着
  traditional: 接著
  pinyin: jiēzhe
  english: then / next / afterwards / to continue / to follow
  german: dann / anschließend / weiter / fortsetzen / folgen
  hsk: "4"
  register: spoken_neutral
  measure_word: []
  note: |
    Ein Wort mit zwei Hauptfunktionen: (1) als Konjunktionaladverb ("dann, anschließend") und (2) als Verb ("weitermachen, fortsetzen"). 接着 wird im gesprochenen Chinesisch sehr häufig verwendet, um eine zeitliche oder logische Abfolge zu markieren.

    **Hauptverwendungen:**

    1. **Als Adverb („dann / anschließend“):**
       - 接着 + Handlung — dann / danach / anschließend
       - Betont, dass eine Handlung unmittelbar nach einer anderen folgt.

    2. **Als Verb („weitermachen / fortsetzen“):**
       - 接着 + machen / tun — weitermachen mit
       - 接着 + Verb (z. B. 接着说 — weiterreden)

    **Häufige Ausdrücke:**
    - 接着做 (jiēzhe zuò) — weitermachen mit etwas
    - 接着说 (jiēzhe shuō) — weiterreden, fortfahren zu sprechen
    - 接着看 (jiēzhe kàn) — weiterschauen (z. B. einen Film)
    - 接着来 (jiēzhe lái) — weitermachen, fortfahren (umgangssprachlich)
    - 紧接着 (jǐnjiēzhe) — unmittelbar danach, kurz darauf

    **Wichtige Unterschiede zu ähnlichen Wörtern:**

    - **Als Adverb („dann“):**
      - 接着 (jiēzhe) — dann, anschließend (betont enge zeitliche Abfolge, gesprochen)
      - 然后 (ránhòu) — dann, danach (neutraler, vielseitiger, häufigster)
      - 之后 (zhīhòu) — danach, später (formeller, größerer Zeitabstand möglich)
      - 随后 (suíhòu) — kurz darauf, in der Folge (etwas formeller)

    - **Als Verb („weitermachen“):**
      - 接着 (jiēzhe) — weitermachen (fortsetzen, was unterbrochen war)
      - 继续 (jìxù) — fortsetzen, weitermachen (allgemeiner, neutraler)
      - 持续 (chíxù) — andauern, anhalten (für Zustände/Prozesse)

    **Kulturelle Anmerkung:**
    接着 setzt sich aus 接 (jiē, "verbinden, empfangen, übernehmen") und dem aspektuellen Suffix 着 (zhe, das eine fortlaufende Handlung oder einen Zustand anzeigt) zusammen. Wörtlich: "verbindend (und dann weiter)". Der aspektuelle Partikel 着 verleiht dem Wort den Charakter einer unmittelbar folgenden oder fortgesetzten Handlung. In der Alltagssprache ist 接着 sehr gebräuchlich, während in formelleren Texten eher 然后 oder 随后 verwendet werden.
  synonyms:
    - word: 然后
      pinyin: ránhòu
      meaning: dann, danach (neutraler, vielseitiger)
    - word: 继续
      pinyin: jìxù
      meaning: fortsetzen, weitermachen (als Verb)
    - word: 随后
      pinyin: suíhòu
      meaning: kurz darauf, anschließend (formeller)
    - word: 紧接着
      pinyin: jǐnjiēzhe
      meaning: unmittelbar danach, kurz darauf
  antonyms: []
  examples:
    - zh: 我先去洗澡，接着吃饭。
      pinyin: Wǒ xiān qù xǐzǎo, jiēzhe chīfàn.
      english: I'll take a shower first, then eat.
      de: Ich dusche zuerst, dann esse ich.
    - zh: 他说完这句话，接着就离开了房间。
      pinyin: Tā shuō wán zhè jù huà, jiēzhe jiù líkāi le fángjiān.
      english: After saying these words, he then left the room.
      de: Nachdem er diese Worte gesagt hatte, verließ er dann den Raum.
    - zh: 请接着说，我在听。
      pinyin: Qǐng jiēzhe shuō, wǒ zài tīng.
      english: Please continue speaking. I'm listening.
      de: Bitte sprich weiter. Ich höre zu.
    - zh: 做完作业以后，接着做什么？
      pinyin: Zuò wán zuòyè yǐhòu, jiēzhe zuò shénme?
      english: After finishing homework, what should I do next?
      de: Nachdem ich die Hausaufgaben gemacht habe, was mache ich dann als Nächstes?
    - zh: 他停下来喝了一口水，接着又继续讲。
      pinyin: Tā tíng xiàlái hēle yī kǒu shuǐ, jiēzhe yòu jìxù jiǎng.
      english: He stopped to take a sip of water, then continued speaking.
      de: Er hielt an, um einen Schluck Wasser zu trinken, und fuhr dann mit dem Reden fort.
