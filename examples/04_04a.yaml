- type: word
  date: "04/04"
  simplified: 否则
  traditional: 否則
  pinyin: fǒuzé
  english: otherwise / or else / if not
  german: andernfalls / sonst / anderenfalls
  hsk: "4"
  register: neutral
  measure_word: []
  note: |
    Ein Konjunktionaladverb, das eine negative Konsequenz oder Alternative ausdrückt, falls eine Bedingung nicht erfüllt wird. Wird häufig in Warnungen, Drohungen oder logischen Schlussfolgerungen verwendet.

    **Häufige Strukturen:**
    - (Bedingung), 否则 + Konsequenz — wenn nicht, dann...
    - 否则通常 nach einer positiven oder negativen Aussage

    **Wichtige Unterschiede:**
    - 否则 (fǒuzé) — neutral, vielseitig, auch in formellen Kontexten
    - 不然 (bùrán) — umgangssprachlicher, weicher
    - 要不然 (yào bùrán) — sehr umgangssprachlich

    **Kulturelle Anmerkung:**
    否则 setzt sich aus 否 (fǒu, "verneinen, nicht") und 则 (zé, "dann, Regel") zusammen. Wörtlich: "wenn nicht, dann (folgt die Regel/Konsequenz)".
  synonyms:
    - word: 不然
      pinyin: bùrán
      meaning: sonst, andernfalls (umgangssprachlich)
    - word: 要不然
      pinyin: yào bùrán
      meaning: wenn nicht, sonst (sehr umgangssprachlich)
    - word: 若非如此
      pinyin: ruòfēi rúcǐ
      meaning: wenn dies nicht der Fall wäre (formell, literarisch)
  antonyms: []
  examples:
    - zh: 请准时到达，否则我们会错过火车。
      pinyin: Qǐng zhǔnshí dàodá, fǒuzé wǒmen huì cuòguò huǒchē.
      english: Please arrive on time, otherwise we will miss the train.
      de: Bitte komm pünktlich an, sonst verpassen wir den Zug.
    - zh: 你最好现在道歉，否则他会生气的。
      pinyin: Nǐ zuìhǎo xiànzài dàoqiàn, fǒuzé tā huì shēngqì de.
      english: You'd better apologize now, or else he will get angry.
      de: Du entschuldigst dich besser jetzt, sonst wird er wütend.
    - zh: 努力学习，否则你考试会不及格。
      pinyin: Nǔlì xuéxí, fǒuzé nǐ kǎoshì huì bù jígé.
      english: Study hard, otherwise you will fail the exam.
      de: Lerne fleißig, sonst wirst du die Prüfung nicht bestehen.
    - zh: 我们必须节约用水，否则将来会有水资源短缺。
      pinyin: Wǒmen bìxū jiéyuē yòngshuǐ, fǒuzé jiānglái huì yǒu shuǐzīyuán duǎnquē.
      english: We must save water, otherwise there will be water shortages in the future.
      de: Wir müssen Wasser sparen, sonst wird es in Zukunft Wasserknappheit geben.
  characters:
    - char: 否
      simplified: 否
      traditional: 否
      pinyin: fǒu
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: verneinen, nicht, anders
      compounds:
        - simplified: 是否
          pinyin: shìfǒu
          meaning: ob (ja oder nein)
        - simplified: 否认
          pinyin: fǒurèn
          meaning: verleugnen, bestreiten
        - simplified: 否定
          pinyin: fǒudìng
          meaning: verneinen, negieren
        - simplified: 否则
          pinyin: fǒuzé
          meaning: andernfalls, sonst
      etymology: |
        Phonosemantische Verbindung. Die Orakelknochenschrift zeigt einen Mund (口) über einem Pfeil oder einer Barriere. Die ursprüngliche Bedeutung ist "nein sagen, ablehnen, verneinen". Später erweitert zu "nicht, anders".
    - char: 则
      simplified: 则
      traditional: 則
      pinyin: zé
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: dann, Regel, Norm, Maßstab
      compounds:
        - simplified: 规则
          pinyin: guīzé
          meaning: Regel, Vorschrift
        - simplified: 原则
          pinyin: yuánzé
          meaning: Prinzip
        - simplified: 否则
          pinyin: fǒuzé
          meaning: andernfalls, sonst
        - simplified: 细则
          pinyin: xìzé
          meaning: Detailregeln, Durchführungsbestimmungen
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 則 besteht aus dem Radikal 貝 (Muschel, Geld) und der phonetischen Komponente 刀 (Messer). Die ursprüngliche Bedeutung ist "in Metall oder Holz ritzen, um eine Regel oder ein Gesetz festzuhalten". Später erweitert zu "Regel, Norm, Maßstab" und dann zur Konjunktion "dann, in diesem Fall".

- type: expression
  date: "04/04"
  simplified: 某个时候
  traditional: 某個時候
  pinyin: mǒu gè shíhou
  english: sometime / at some point (in time)
  german: irgendwann / zu einem bestimmten, aber ungenannten Zeitpunkt
  hsk: "4"
  register: neutral
  note: |
    Ein Ausdruck, der einen unbestimmten Zeitpunkt in der Vergangenheit oder Zukunft bezeichnet. Er setzt sich aus 某个 (einem bestimmten, aber ungenannten) und 时候 (Zeitpunkt) zusammen.

    **Häufige Verwendungen:**
    - 某个时候 + Vergangenheit — für einen unbestimmten Zeitpunkt in der Vergangenheit
    - 某个时候 + Zukunft — für einen unbestimmten Zeitpunkt in der Zukunft
    - Kann auch als 某个时间 (mǒu gè shíjiān) verwendet werden, wobei 时间 eher eine Zeitspanne betont

    **Wichtige Unterschiede zu anderen "irgendwann"-Ausdrücken:**
    - 某个时候 (mǒu gè shíhou) — neutral, kann Vergangenheit oder Zukunft sein
    - 总有一天 (zǒng yǒu yī tiān) — betont zukünftige Gewissheit ("eines Tages wird es passieren")
    - 有朝一日 (yǒu zhāo yī rì) — literarisch, oft für zukünftige Hoffnungen oder Bedingungen
    - 改天 (gǎitiān) — umgangssprachlich für nahe Zukunft ("ein andermal")
  synonyms:
    - word: 某个时间
      pinyin: mǒu gè shíjiān
      meaning: irgendwann (betont eher Zeitspanne)
    - word: 某时
      pinyin: mǒushí
      meaning: irgendwann (kürzere Form, etwas formeller)
    - word: 有一天
      pinyin: yǒu yī tiān
      meaning: eines Tages (häufig für Zukunft)
  antonyms: []
  examples:
    - zh: 我某个时候在街上见过他，但记不清具体是哪天了。
      pinyin: Wǒ mǒu gè shíhou zài jiēshàng jiànguò tā, dàn jì bù qīng jùtǐ shì nǎ tiān le.
      english: I saw him on the street sometime, but I can't remember exactly which day.
      de: Ich habe ihn irgendwann auf der Straße gesehen, aber ich kann mich nicht genau erinnern, welcher Tag das war.
    - zh: 我们某个时候应该再见面聊聊。
      pinyin: Wǒmen mǒu gè shíhou yīnggāi zài jiànmiàn liáo liáo.
      english: We should meet up sometime to talk.
      de: Wir sollten uns irgendwann mal treffen und reden.
    - zh: 某个时候，他突然意识到自己做错了。
      pinyin: Mǒu gè shíhou, tā túrán yìshi dào zìjǐ zuò cuò le.
      english: At some point, he suddenly realized that he had made a mistake.
      de: Irgendwann wurde ihm plötzlich bewusst, dass er einen Fehler gemacht hatte.
    - zh: 这个决定会在某个时候产生影响。
      pinyin: Zhège juédìng huì zài mǒu gè shíhou chǎnshēng yǐngxiǎng.
      english: This decision will have an impact at some point.
      de: Diese Entscheidung wird sich irgendwann auswirken.
  word_analyses:
