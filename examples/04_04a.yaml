    **Häufige Ausdrücke:**
    - 更换头像 (gēnghuàn tóuxiàng) — Profilbild ändern
    - 设置头像 (shèzhì tóuxiàng) — Profilbild einstellen
    - 默认头像 (mòrèn tóuxiàng) — Standard-Profilbild
    - 微信头像 (Wēixìn tóuxiàng) — WeChat-Profilbild

    **Wichtige Unterschiede:**
    - 头像 (tóuxiàng) — das Standardwort für Profilbild/Avatar
    - 个人照片 (gèrén zhàopiàn) — persönliches Foto (allgemeiner, nicht nur für Profile)
    - 档案照片 (dàng'àn zhàopiàn) — Profilfoto (formeller, z. B. bei LinkedIn)

    **Kulturelle Anmerkung:**
    In China ist das Profilbild auf Plattformen wie WeChat, QQ, Weibo und Douyin sehr wichtig. Viele Nutzer wählen Landschaftsbilder, Tiere, Anime-Figuren oder ihre Kinder anstatt ihr eigenes Gesicht aus Datenschutzgründen.
