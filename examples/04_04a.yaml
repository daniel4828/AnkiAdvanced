          pinyin: miànduì
          meaning: gegenüberstehen, konfrontiert sein mit
        - simplified: 表面
          pinyin: biǎomiàn
          meaning: Oberfläche, Äußeres
        - simplified: 方面
          pinyin: fāngmiàn
          meaning: Aspekt, Seite, Hinsicht
        - simplified: 页面
          pinyin: yèmiàn
          meaning: Seite, Webseite
        - simplified: 画面
          pinyin: huàmiàn
          meaning: Bild, Szene, Rahmen (Bildschirm)
      etymology: |
        Piktogramm. Die Orakelknochenschrift zeigte ein Auge umgeben von Gesichtskonturen — ein Gesicht. Die ursprüngliche Bedeutung ist "Gesicht". Später erweitert zu "Oberfläche, Seite, Fläche". Die Bedeutung "Nudeln" (ursprünglich 麵, mit Weizenradikal) wurde später mit der vereinfachten Form 面 zusammengelegt.

- type: word
  date: "04/04"
  simplified: 静音
  traditional: 靜音
  pinyin: jìngyīn
  english: mute / silent / to mute / silencing
  german: stumm / lautlos / Stummschaltung / stummschalten
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Verb (kann auch als Nomen verwendet werden), das das Ausschalten oder Unterdrücken von Ton beschreibt — sowohl bei elektronischen Geräten als auch in übertragenem Sinne. 静音 ist der moderne Standardbegriff für die "Stummschalten"-Funktion auf Smartphones, Computern und Fernsehern.

    **Häufige Ausdrücke:**
    - 静音模式 (jìngyīn móshì) — Lautlos-Modus / Stumm-Modus
    - 静音键 (jìngyīn jiàn) — Stummtaste
    - 自动静音 (zìdòng jìngyīn) — automatische Stummschaltung
    - 取消静音 (qǔxiāo jìngyīn) — Stummschaltung aufheben / entstummen
    - 手机静音 (shǒujī jìngyīn) — Handy auf stumm schalten

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 静音 (jìngyīn) — stumm / stummschalten (modern, Gerätefunktion)
    - 无声 (wúshēng) — lautlos, geräuschlos (Zustandsbeschreibung)
    - 安静 (ānjìng) — ruhig, still (allgemeiner Umgebungszustand)
    - 消音 (xiāoyīn) — Schalldämpfung, Geräuschunterdrückung (technisch)
    - 哑 (yǎ) — stumm (für Personen, die nicht sprechen können)

    **Kulturelle Anmerkung:**
    静音 setzt sich aus 静 (jìng, "still, ruhig") und 音 (yīn, "Klang, Ton, Geräusch") zusammen. Wörtlich: "Ton still machen". Das Wort ist ein Produkt der digitalen Ära und wird in allen chinesischsprachigen Regionen für die Stummschaltungsfunktion von Geräten verwendet. In öffentlichen Verkehrsmitteln, Kinos und Restaurants in China wird oft zu 静音 aufgerufen — als Höflichkeitsformel.
  synonyms:
    - word: 无声
      pinyin: wúshēng
      meaning: lautlos, geräuschlos (Zustand)
    - word: 消音
      pinyin: xiāoyīn
      meaning: Geräusch unterdrücken, Schalldämpfung (technisch)
    - word: 沉默
      pinyin: chénmò
      meaning: schweigen, still sein (für Personen)
  antonyms:
    - word: 有声
      pinyin: yǒushēng
      meaning: vertont, mit Ton
    - word: 响铃
      pinyin: xiǎnglíng
      meaning: klingeln, läuten (Klingelton)
    - word: 音量开
      pinyin: yīnliàng kāi
      meaning: Lautstärke an / Ton eingeschaltet
  examples:
    - zh: 开会的时候请把手机调成静音模式。
      pinyin: Kāihuì de shíhou qǐng bǎ shǒujī tiáo chéng jìngyīn móshì.
      english: Please put your phone on silent mode during the meeting.
      de: Bitte schalten Sie Ihr Handy während der Besprechung auf stumm.
    - zh: 我忘了静音，结果在电影院里手机突然响了。
      pinyin: Wǒ wàngle jìngyīn, jiéguǒ zài diànyǐngyuàn lǐ shǒujī tūrán xiǎng le.
      english: I forgot to mute my phone, and it suddenly rang in the cinema.
      de: Ich habe vergessen, mein Handy stummzuschalten, und es klingelte plötzlich im Kino.
    - zh: 这个视频的背景音乐太吵了，你能静音吗？
      pinyin: Zhège shìpín de bèijǐng yīnyuè tài chǎo le, nǐ néng jìngyīn ma?
      english: The background music in this video is too loud. Can you mute it?
      de: Die Hintergrundmusik in diesem Video ist zu laut. Kannst du sie stummschalten?
    - zh: 电脑右下角有一个小喇叭图标，点击它可以静音。
      pinyin: Diànnǎo yòuxià jiǎo yǒu yī ge xiǎo lǎba túbiāo, diǎnjī tā kěyǐ jìngyīn.
      english: There is a small speaker icon in the bottom right corner of the computer. Click it to mute.
      de: In der unteren rechten Ecke des Computers befindet sich ein kleines Lautsprechersymbol. Klicke darauf, um stummzuschalten.
  characters:
    - char: 静
      simplified: 静
      traditional: 靜
      pinyin: jìng
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: still, ruhig, unbewegt
      compounds:
        - simplified: 安静
          pinyin: ānjìng
          meaning: ruhig, still
        - simplified: 平静
          pinyin: píngjìng
