      meaning: schwach, dünn, mild (Geschmack, Farbe, Tee)
    - word: 稀
      pinyin: xī
      meaning: dünnflüssig, wässrig
    - word: 浅
      pinyin: qiǎn
      meaning: flach, hell (Farbe)
  examples:
