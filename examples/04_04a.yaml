- type: word
  date: "04/04"
  simplified: 文本
  traditional: 文本
  pinyin: wénběn
  english: text / written text / document / version (of a text)
  german: Text / schriftlicher Wortlaut / Dokument / Fassung (eines Textes)
  hsk: "5"
  register: neutral
  measure_word:
    - simplified: 个
      pinyin: gè
      meaning: allgemeiner Zähler für Texte
    - simplified: 份
      pinyin: fèn
      meaning: Zähler für Dokumente, schriftliche Stücke
    - simplified: 段
      pinyin: duàn
      meaning: Absatz (für einen Textabschnitt)
  note: |
    Ein Nomen, das einen schriftlichen Text bezeichnet — von einem einzelnen Satz bis zu einem ganzen Buch oder Dokument. 文本 ist der neutralste und gebräuchlichste Begriff für "Text" im technischen, akademischen und alltäglichen Sinne.

    **Häufige Ausdrücke:**
    - 原始文本 (yuánshǐ wénběn) — Originaltext, Quelltext
    - 纯文本 (chún wénběn) — reiner Text (ohne Formatierung)
    - 文本文档 (wénběn wén dàng) — Textdokument
    - 文本分析 (wénběn fēnxī) — Textanalyse
    - 文本编辑器 (wénběn biānjíqì) — Texteditor

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 文本 (wénběn) — allgemeiner Text, Dokument, Version (neutral, technisch)
    - 文字 (wénzì) — Schriftzeichen, Geschriebenes (betont die Zeichen selbst)
    - 文章 (wénzhāng) — Aufsatz, Artikel (literarischer, zusammenhängend)
    - 正文 (zhèngwén) — Haupttext (im Gegensatz zu Anmerkungen, Anhängen)
    - 内容 (nèiróng) — Inhalt, Content (allgemeiner, auch nicht-textlich)

    **Kulturelle Anmerkung:**
    文本 setzt sich aus 文 (wén, "Schrift, Literatur, Kultur") und 本 (běn, "Wurzel, Quelle, Buch") zusammen. Wörtlich: "Wurzel der Schrift" oder "Buch der Schrift". Der Begriff wird besonders in der Linguistik, Literaturwissenschaft und Informatik verwendet. In der Computerterminologie bezeichnet 纯文本 (reiner Text) unformatierten Text im Gegensatz zu Rich Text oder binären Formaten.
  synonyms:
    - word: 文稿
      pinyin: wéngǎo
      meaning: Manuskript, Textentwurf
    - word: 文档
      pinyin: wéndàng
      meaning: Dokument (auch digital)
    - word: 正文
      pinyin: zhèngwén
      meaning: Haupttext (eines Buches/Dokuments)
    - word: 内容
      pinyin: nèiróng
      meaning: Inhalt (allgemeiner)
  antonyms: []
  examples:
    - zh: 请把这段文本复制到剪贴板里。
      pinyin: Qǐng bǎ zhè duàn wénběn fùzhì dào jiǎntiēbǎn lǐ.
      english: Please copy this text to the clipboard.
      de: Bitte kopiere diesen Text in die Zwischenablage.
    - zh: 这两个文本版本之间有很大的区别。
      pinyin: Zhè liǎng ge wénběn bǎnběn zhī jiān yǒu hěn dà de qūbié.
      english: There is a big difference between these two text versions.
      de: Es gibt einen großen Unterschied zwischen diesen beiden Textversionen.
    - zh: 文本分析是文学研究的重要方法。
      pinyin: Wénběn fēnxī shì wénxué yánjiū de zhòngyào fāngfǎ.
      english: Text analysis is an important method in literary research.
      de: Textanalyse ist eine wichtige Methode in der Literaturforschung.
    - zh: 请用纯文本格式保存这个文件。
      pinyin: Qǐng yòng chún wénběn géshi bǎocún zhège wénjiàn.
      english: Please save this file in plain text format.
      de: Bitte speichere diese Datei im Nur-Text-Format.
  characters:
    - char: 文
      simplified: 文
      traditional: 文
      pinyin: wén
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: Schrift, Sprache, Literatur, Kultur
      compounds:
        - simplified: 文化
          pinyin: wénhuà
          meaning: Kultur
        - simplified: 文字
          pinyin: wénzì
          meaning: Schriftzeichen, Schrift
        - simplified: 文章
          pinyin: wénzhāng
          meaning: Aufsatz, Artikel
        - simplified: 文本
          pinyin: wénběn
          meaning: Text, Dokument
        - simplified: 中文
          pinyin: Zhōngwén
          meaning: Chinesisch (Sprache)
      etymology: |
        Piktogramm. Die Orakelknochenschrift zeigte eine Person mit einer Tätowierung oder Verzierung auf der Brust. Die ursprüngliche Bedeutung ist "Muster, Verzierung". Später erweitert zu "Schriftzeichen, Literatur, Kultur" da Schrift als die schönste Verzierung des Menschen galt.
    - char: 本
      simplified: 本
      traditional: 本
      pinyin: běn
      hsk: "2"
      detailed_analysis: true
      meaning_in_context: Wurzel, Quelle, Buch, Grundlage
      compounds:
        - simplified: 书本
          pinyin: shūběn
          meaning: Buch (allgemein)
        - simplified: 根本
          pinyin: gēnběn
          meaning: grundlegend, Fundament
        - simplified: 本来
          pinyin: běnlái
          meaning: ursprünglich, eigentlich
        - simplified: 文本
          pinyin: wénběn
          meaning: Text, Dokument
        - simplified: 版本
          pinyin: bǎnběn
          meaning: Version, Edition
      etymology: |
        Ideogramm. Die Orakelknochenschrift zeigte einen Baum (木) mit einem horizontalen Strich an der Wurzel, um "Wurzel" zu bezeichnen. Später erweitert zu "Grundlage, Quelle" und dann zu "Buch, Heft" (da Bücher die Wurzel/Quelle des Wissens sind). Der Zähler 本 (für gebundene Bücher) kommt von dieser Bedeutung.

- type: word
  date: "04/04"
  simplified: 页面
  traditional: 頁面
  pinyin: yèmiàn
  english: page (of a book, website, or document) / webpage / interface
  german: Seite / Webseite / Bildschirmseite / Oberfläche
  hsk: "5"
  register: neutral
  measure_word:
    - simplified: 个
      pinyin: gè
      meaning: allgemeiner Zähler für Seiten (besonders Webseiten)
    - simplified: 张
      pinyin: zhāng
      meaning: Zähler für flache Objekte, Papierseiten
    - simplified: 页
      pinyin: yè
      meaning: Zähler für Buchseiten (klassisch)
  note: |
    Ein Nomen, das eine Seite bezeichnet — sowohl physisch (Buch, Zeitschrift) als auch digital (Website, App, Dokument). 页面 ist der moderne Standardbegriff für "Webseite" und wird auch für gedruckte Seiten verwendet.

    **Häufige Ausdrücke:**
    - 主页 (zhǔyè) — Startseite, Homepage
    - 网页 (wǎngyè) — Webseite (technischer, spezifischer)
    - 页面加载 (yèmiàn jiāzài) — Seitenladung (Internet)
    - 页面布局 (yèmiàn bùjú) — Seitenlayout
    - 当前页面 (dāngqián yèmiàn) — aktuelle Seite
    - 弹出页面 (tánchū yèmiàn) — Pop-up-Fenster / Pop-up-Seite

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 页面 (yèmiàn) — Seite (modern, digital und gedruckt) — der gebräuchlichste Begriff
    - 页 (yè) — Seite (klassischer Zähler für Buchseiten, kürzer)
    - 网页 (wǎngyè) — Webseite (technisch, spezifisch für Internet)
    - 主页 (zhǔyè) — Startseite, Homepage
    - 版面 (bǎnmiàn) — Layout, Format (Druckwesen)

    **Kulturelle Anmerkung:**
    页面 setzt sich aus 页 (yè, "Seite, Blatt") und 面 (miàn, "Fläche, Seite, Gesicht") zusammen. Wörtlich: "Seitenfläche". Während 页 der klassische Zähler für Buchseiten ist, hat sich 页面 mit dem Aufkommen von Computern und dem Internet als Standardbegriff für "Seite" etabliert — sowohl für gedruckte als auch digitale Seiten.
  synonyms:
    - word: 页
      pinyin: yè
      meaning: Seite (klassisch, Zähler für Buchseiten)
    - word: 网页
      pinyin: wǎngyè
      meaning: Webseite (technisch, spezifisch für Internet)
    - word: 主页
      pinyin: zhǔyè
      meaning: Startseite, Homepage
    - word: 版面
      pinyin: bǎnmiàn
      meaning: Seitenlayout, Format (Druckwesen)
  antonyms: []
  examples:
    - zh: 请刷新页面，内容没有加载出来。
      pinyin: Qǐng shuāxīn yèmiàn, nèiróng méiyǒu jiāzài chūlái.
      english: Please refresh the page. The content didn't load.
      de: Bitte aktualisiere die Seite. Der Inhalt wurde nicht geladen.
    - zh: 这个网站的主页面设计得很简洁。
      pinyin: Zhège wǎngzhàn de zhǔyèmiàn shèjì de hěn jiǎnjié.
      english: The homepage of this website is designed very simply.
      de: Die Startseite dieser Website ist sehr schlicht gestaltet.
    - zh: 请翻到第十页，看页面底部的注释。
      pinyin: Qǐng fān dào dì shí yè, kàn yèmiàn dǐbù de zhùshì.
      english: Please turn to page ten and look at the note at the bottom of the page.
      de: Bitte blättern Sie zu Seite zehn und schauen Sie sich die Anmerkung am unteren Seitenrand an.
    - zh: 这个页面在手机上显示不正常。
      pinyin: Zhège yèmiàn zài shǒujī shàng xiǎnshì bù zhèngcháng.
      english: This page doesn't display correctly on mobile phones.
      de: Diese Seite wird auf dem Handy nicht richtig angezeigt.
  characters:
    - char: 页
      simplified: 页
      traditional: 頁
      pinyin: yè
      hsk: "2"
      detailed_analysis: true
      meaning_in_context: Seite, Blatt
      compounds:
        - simplified: 页面
          pinyin: yèmiàn
          meaning: Seite, Webseite
        - simplified: 网页
          pinyin: wǎngyè
          meaning: Webseite
        - simplified: 主页
          pinyin: zhǔyè
          meaning: Startseite, Homepage
        - simplified: 页码
          pinyin: yèmǎ
          meaning: Seitenzahl
        - simplified: 插页
          pinyin: chāyè
          meaning: eingelegte Seite, Beilage
      etymology: |
        Piktogramm. Die traditionelle Form 頁 zeigt einen Kopf mit markanten Haaren. Die ursprüngliche Bedeutung ist "Kopf". Später wurde dieses Zeichen für die Bedeutung "Seite" entlehnt (vermutlich wegen der Ähnlichkeit mit der Form eines Kopfes oder durch phonetische Entlehnung). Die "Kopf"-Bedeutung lebt in zusammengesetzten Zeichen wie 頭 (tóu, Kopf) oder 領 (lǐng, Kragen, führen) weiter.
    - char: 面
      simplified: 面
      traditional: 面
      pinyin: miàn
