            Ursprünglich ein Pronomen mit der Bedeutung "eine unbestimmte Person oder Sache". Die genaue Etymologie ist unklar. Es wird angenommen, dass 某 aus 甘 (süß) und 木 (Baum) besteht. Später wurde es als Platzhalter für eine unbestimmte, aber bestimmbare Person oder Sache standardisiert.
