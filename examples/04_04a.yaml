- type: word
  date: "04/04"
  simplified: 有空
  traditional: 有空
  pinyin: yǒu kòng
  english: to have free time / to be available / to be free
  german: Zeit haben / frei sein / verfügbar sein
  hsk: "4"
  register: spoken_neutral
  measure_word: []
  note: |
    Ein Verb (Verbalphrase), das beschreibt, dass jemand freie Zeit oder Verfügbarkeit für eine Aktivität hat. 有空 ist die gebräuchlichste und natürlichste Art im gesprochenen Chinesisch zu fragen, ob jemand Zeit hat.

    **Struktur:**
    - 有空 als Zustandsverb: 我有空 (wǒ yǒu kòng) — Ich habe Zeit / Ich bin frei
    - Verneinung: 没空 (méi kòng) — keine Zeit haben
    - Frage: 你有空吗? (nǐ yǒu kòng ma?) — Hast du Zeit?

    **Häufige Ausdrücke:**
    - 有空吗? (yǒu kòng ma?) — Hast du Zeit?
    - 我没空 (wǒ méi kòng) — Ich habe keine Zeit
    - 什么时候有空? (shénme shíhou yǒu kòng?) — Wann hast du Zeit?
    - 有空再说 (yǒu kòng zài shuō) — Wir reden, wenn du Zeit hast (d. h. später/nicht jetzt)

    **Wichtige Unterschiede:**
    - 有空 (yǒu kòng) — Zeit haben / frei sein (gesprochen, gebräuchlich)
    - 有时间 (yǒu shíjiān) — Zeit haben (etwas formeller, allgemeiner)
    - 空闲 (kòngxián) — frei, unbesetzt (eher adjektivisch, z. B. 空闲时间)

    **Kulturelle Anmerkung:**
    有空 ist eine Abkürzung von 有空闲时间 (yǒu kòngxián shíjiān, "freie/leere Zeit haben"). 空 (kòng) bedeutet hier "leer, frei, ungenutzt". Die Phrase wird im Alltag ständig verwendet – von der Terminplanung mit Freunden bis zur Terminabsprache mit Kollegen. Die höflichere Version für formelle Anlässe wäre 您什么时候方便? (Nín shénme shíhou fāngbiàn? — "Wann ist es Ihnen recht/bequem?").
  synonyms:
    - word: 有时间
      pinyin: yǒu shíjiān
      meaning: Zeit haben (etwas formeller)
    - word: 得空
      pinyin: dé kòng
      meaning: Zeit finden, frei werden (regional/umgangssprachlich)
    - word: 有空闲
      pinyin: yǒu kòngxián
      meaning: frei haben, unbesetzt sein
  antonyms:
    - word: 没空
      pinyin: méi kòng
      meaning: keine Zeit haben
    - word: 忙着
      pinyin: mángzhe
      meaning: beschäftigt sein
  examples:
    - zh: 你明天有空吗？我们一起吃午饭吧。
      pinyin: Nǐ míngtiān yǒu kòng ma? Wǒmen yīqǐ chī wǔfàn ba.
      english: Are you free tomorrow? Let's have lunch together.
      de: Hast du morgen Zeit? Lass uns zusammen zu Mittag essen.
    - zh: 抱歉，我今天没空，改天吧。
      pinyin: Bàoqiàn, wǒ jīntiān méi kòng, gǎitiān ba.
      english: Sorry, I don't have time today. Let's do it another day.
      de: Tut mir leid, ich habe heute keine Zeit. Machen wir es ein andermal.
    - zh: 你什么时候有空？我想跟你聊聊。
      pinyin: Nǐ shénme shíhou yǒu kòng? Wǒ xiǎng gēn nǐ liáo liáo.
      english: When do you have time? I'd like to talk with you.
      de: Wann hast du Zeit? Ich möchte mit dir reden.
    - zh: 有空常联系！
      pinyin: Yǒu kòng cháng liánxì!
      english: Keep in touch when you have time!
      de: Melde dich, wenn du Zeit hast!
