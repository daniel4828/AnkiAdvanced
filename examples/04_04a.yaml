        Phonosemantische Verbindung. Besteht aus dem Radikal 扌 (Hand, als 手) und der phonetischen Komponente 包 (bāo). Die ursprüngliche Bedeutung ist "mit den Armen umfassen, an die Brust drücken". Daraus entwickelte sich die übertragene Bedeutung "im Herzen tragen, hegen (von Gefühlen wie Groll, Hoffnung)."
    - char: 怨
