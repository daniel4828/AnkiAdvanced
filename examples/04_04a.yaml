      pinyin: Nǐ zhèyàng shuō hěn méi lǐmào, duì lǎoshī hěn bù zūnzhòng.
      english: Saying that is very impolite and very disrespectful to the teacher.
      de: Das zu sagen ist sehr unhöflich und respektlos dem Lehrer gegenüber.
    - zh: 打断别人说话是一种不尊重的行为。
      pinyin: Dǎduàn biérén shuōhuà shì yī zhǒng bù zūnzhòng de xíngwéi.
      english: Interrupting others while they are speaking is a disrespectful behavior.
      de: Anderen beim Sprechen zu unterbrechen ist ein respektloses Verhalten.
    - zh: 我觉得你刚才的话对我很不尊重。
      pinyin: Wǒ juéde nǐ gāngcái de huà duì wǒ hěn bù zūnzhòng.
      english: I feel that what you just said was very disrespectful to me.
