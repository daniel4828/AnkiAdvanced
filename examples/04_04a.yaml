      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 別 besteht aus dem Radikal 刂 (Messer) und einer phonetischen Komponente (冎, guǎ). Die ursprüngliche Bedeutung ist "mit einem Messer trennen, zerlegen". Daraus entwickelten sich die Bedeutungen "trennen, unterscheiden, anders, nicht".

- type: word
  date: "04/04"
  simplified: 抱怨
  traditional: 抱怨
