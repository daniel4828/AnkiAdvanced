- type: word
  date: "04/04"
  simplified: 补过
  traditional: 補過
  pinyin: bǔguò
  english: to make amends / to correct a mistake / to make up for (a missed celebration or duty)
  german: wiedergutmachen / einen Fehler korrigieren / nachholen (eine verpasste Gelegenheit)
  hsk: "6"
  register: neutral
  measure_word: []
  note: |
    Ein Verb mit zwei Hauptbedeutungen: (1) einen Fehler wiedergutmachen oder korrigieren, (2) eine verpasste Gelegenheit nachholen (z. B. ein Fest oder eine Handlung). Im Kontext von Festen wie Ostern bedeutet 补过, dass man die Feier zu einem späteren Zeitpunkt nachholt.

    **Häufige Strukturen:**
    - 补过 + Objekt — z. B. 补过生日 (Geburtstag nachholen)
    - 一起补过 — gemeinsam nachholen
    - 将功补过 (Jiāng gōng bǔguò) — Fehler durch Verdienste ausgleichen (Chengyu)

    **Wichtige Unterschiede:**
    - 补过 (bǔguò) — betont das Nachholen einer verpassten Handlung oder das Korrigieren eines Fehlers
    - 弥补 (míbǔ) — allgemeiner "ausgleichen, kompensieren"
    - 补上 (bǔshàng) — umgangssprachlicher für "etwas nachholen"

    **Kulturelle Anmerkung:**
    补过 setzt sich aus 补 (bǔ, "ergänzen, reparieren") und 过 (guò, "Fehler, vergehen") zusammen. Wörtlich: "einen Fehler reparieren". Das Chengyu 将功补过 (Fehler durch Verdienste ausgleichen) ist sehr gebräuchlich.
  synonyms:
    - word: 弥补
      pinyin: míbǔ
      meaning: ausgleichen, kompensieren, wiedergutmachen
    - word: 补偿
      pinyin: bǔcháng
      meaning: entschädigen, kompensieren
    - word: 补上
      pinyin: bǔshàng
      meaning: nachholen, ergänzen (umgangssprachlich)
    - word: 将功补过
      pinyin: jiāng gōng bǔguò
      meaning: Fehler durch Verdienste ausgleichen (Chengyu)
  antonyms:
    - word: 犯错
      pinyin: fàncuò
      meaning: einen Fehler machen
    - word: 忽视
      pinyin: hūshì
      meaning: ignorieren, vernachlässigen
  examples:
    - zh: 我们下次见面时一起补过复活节吧。
      pinyin: Wǒmen xià cì jiànmiàn shí yīqǐ bǔguò Fùhuójié ba.
      english: Let's celebrate Easter together next time we meet to make up for missing it.
      de: Lass uns Ostern zusammen nachholen, wenn wir uns das nächste Mal sehen.
    - zh: 他为了补过自己的错误，主动加班完成了任务。
      pinyin: Tā wèile bǔguò zìjǐ de cuòwù, zhǔdòng jiābān wánchéng le rènwu.
      english: To make amends for his mistake, he voluntarily worked overtime to complete the task.
      de: Um seinen Fehler wiedergutzumachen, hat er freiwillig Überstunden gemacht, um die Aufgabe zu erledigen.
    - zh: 虽然错过了生日，但朋友们后来帮我补过了。
      pinyin: Suīrán cuòguò le shēngrì, dàn péngyoumen hòulái bāng wǒ bǔguò le.
      english: Although I missed my birthday, my friends helped me make up for it later.
      de: Obwohl ich meinen Geburtstag verpasst habe, haben mir meine Freunde später geholfen, ihn nachzuholen.
    - zh: 他决定将功补过，主动承担更多责任。
      pinyin: Tā juédìng jiāng gōng bǔguò, zhǔdòng chéngdān gèng duō zérèn.
      english: He decided to make up for his mistakes with good deeds and voluntarily took on more responsibility.
      de: Er beschloss, seine Fehler durch Verdienste auszugleichen, und übernahm freiwillig mehr Verantwortung.
  characters:
    - char: 补
      simplified: 补
      traditional: 補
      pinyin: bǔ
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: ergänzen, reparieren, nachholen
      compounds:
        - simplified: 补充
          pinyin: bǔchōng
          meaning: ergänzen, zusätzlich
        - simplified: 补贴
          pinyin: bǔtiē
          meaning: Zuschuss, subventionieren
        - simplified: 补习
          pinyin: bǔxí
          meaning: Nachhilfe nehmen, zusätzlich lernen
        - simplified: 补过
          pinyin: bǔguò
          meaning: wiedergutmachen, nachholen
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 補 besteht aus dem Radikal 衤 (Kleidung) und der phonetischen Komponente 甫 (fǔ). Die ursprüngliche Bedeutung ist "Kleidung flicken". Später erweitert zu "allgemein reparieren, ergänzen, ersetzen".
    - char: 过
      simplified: 过
      traditional: 過
      pinyin: guò
      hsk: "1"
      detailed_analysis: true
      meaning_in_context: Fehler, vergehen, überschreiten
      compounds:
        - simplified: 过去
          pinyin: guòqù
          meaning: Vergangenheit, vorbei
        - simplified: 过程
          pinyin: guòchéng
          meaning: Prozess, Verlauf
        - simplified: 过分
          pinyin: guòfèn
          meaning: übertrieben, übermäßig
        - simplified: 补过
          pinyin: bǔguò
          meaning: wiedergutmachen, nachholen
        - simplified: 过错
          pinyin: guòcuò
          meaning: Fehler, Schuld
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 過 besteht aus dem Radikal 辶 (gehen) und der phonetischen Komponente 咼 (wāi). Die ursprüngliche Bedeutung ist "vorbeigehen, überschreiten". Daraus entwickelte sich die Bedeutung "Fehler" (als etwas, das die Grenze überschreitet).

- type: word
  date: "04/04"
  simplified: 拥抱
  traditional: 擁抱
  pinyin: yōngbào
  english: to embrace / to hug / an embrace
  german: umarmen / Umarmung
  hsk: "4"
  register: neutral
  measure_word:
    - simplified: 个
      pinyin: gè
      meaning: allgemeiner Zähler für eine Umarmung
  note: |
    Ein Verb (und Nomen), das sowohl die wörtliche Umarmung einer Person als auch die übertragene Bedeutung des Annehmens oder Begrüßens (z. B. einer Gelegenheit, Veränderung oder Idee) beschreibt.

    **Häufige Ausdrücke:**
    - 紧紧拥抱 (jǐnjǐn yōngbào) — fest umarmen
    - 热情拥抱 (rèqíng yōngbào) — herzlich umarmen
    - 拥抱变化 (yōngbào biànhuà) — Veränderung annehmen / begrüßen
    - 拥抱机会 (yōngbào jīhuì) — Chancen ergreifen

    **Kulturelle Anmerkung:**
    In China ist Umarmen im öffentlichen Raum weniger verbreitet als im Westen. Es wird typischerweise zwischen engen Freunden, Familienmitgliedern oder in romantischen Beziehungen praktiziert. Unter Männern ist es seltener als unter Frauen oder in gemischten Gruppen. In der Geschäftswelt ist eine Verbeugung oder ein Händedruck üblicher.

    **Übertragene Bedeutung:**
    拥抱 wird in Wirtschaft und Technologie häufig metaphorisch verwendet: 拥抱变化 (Veränderung annehmen) ist ein bekannter Slogan, besonders in der Tech-Branche.
  synonyms:
    - word: 搂抱
      pinyin: lǒubào
      meaning: umarmen, in den Arm nehmen (enger/körperlicher)
    - word: 怀抱
      pinyin: huáibào
      meaning: im Arm halten, umarmen (wärmer, zärtlicher)
    - word: 抱
      pinyin: bào
      meaning: umarmen, halten (kürzer, vielseitiger)
  antonyms:
    - word: 推开
      pinyin: tuīkāi
      meaning: wegstoßen, wegschubsen
    - word: 拒绝
      pinyin: jùjué
      meaning: ablehnen, zurückweisen
  examples:
    - zh: 他们见面时热情地拥抱了彼此。
      pinyin: Tāmen jiànmiàn shí rèqíng de yōngbàole bǐcǐ.
      english: They warmly embraced each other when they met.
      de: Sie umarmten sich herzlich, als sie sich trafen.
    - zh: 母亲紧紧地拥抱了她的孩子。
      pinyin: Mǔqīn jǐnjǐn de yōngbàole tā de háizi.
      english: The mother hugged her child tightly.
      de: Die Mutter umarmte ihr Kind fest.
    - zh: 我们要学会拥抱变化，而不是抗拒它。
      pinyin: Wǒmen yào xuéhuì yōngbào biànhuà, ér bù shì kàngjù tā.
      english: We need to learn to embrace change, not resist it.
      de: Wir müssen lernen, Veränderungen anzunehmen, nicht sie zu bekämpfen.
    - zh: 给他们一个拥抱，胜过千言万语。
      pinyin: Gěi tāmen yī ge yōngbào, shèngguò qiānyán wànyǔ.
      english: Giving them a hug is better than a thousand words.
      de: Eine Umarmung ist besser als tausend Worte.
  characters:
    - char: 拥
      simplified: 拥
      traditional: 擁
      pinyin: yōng
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: umarmen, besitzen, haben
      compounds:
        - simplified: 拥抱
          pinyin: yōngbào
          meaning: umarmen, Umarmung
        - simplified: 拥有
          pinyin: yōngyǒu
          meaning: besitzen, haben
        - simplified: 拥挤
          pinyin: yōngjǐ
          meaning: überfüllt, gedrängt voll
        - simplified: 拥护
          pinyin: yōnghù
          meaning: unterstützen, befürworten
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 擁 besteht aus dem Radikal 扌 (Hand, als 手) und der phonetischen Komponente 雍 (yōng). Die ursprüngliche Bedeutung ist "in den Armen halten, umarmen". Später erweitert zu "besitzen, haben" und "sich versammeln, drängen".
    - char: 抱
      simplified: 抱
      traditional: 抱
      pinyin: bào
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: umarmen, im Arm halten
      compounds:
        - simplified: 拥抱
          pinyin: yōngbào
          meaning: umarmen, Umarmung
        - simplified: 抱抱
          pinyin: bàobao
          meaning: Umarmung, Knuddeln (kindlich/zärtlich)
        - simplified: 抱怨
          pinyin: bàoyuàn
          meaning: sich beschweren, beklagen
        - simplified: 怀抱
          pinyin: huáibào
          meaning: Umarmung, Busen, Schoß
      etymology: |
        Phonosemantische Verbindung. Besteht aus dem Radikal 扌 (Hand, als 手) und der phonetischen Komponente 包 (bāo, "wickeln, einpacken"). Die ursprüngliche Bedeutung ist "mit den Armen umfassen, an die Brust drücken".

- type: word
  date: "04/04"
