- type: word
  date: "04/04"
  simplified: 撤销
  traditional: 撤銷
  pinyin: chèxiāo
  english: to revoke / to cancel / to undo / to repeal / to withdraw
  german: rückgängig machen / widerrufen / aufheben / annullieren / zurückziehen
  hsk: "6"
  register: formal_written
  measure_word: []
  note: |
    Ein Verb, das das Aufheben, Annullieren oder Rückgängigmachen einer vorherigen Aktion, Entscheidung, eines Status oder einer Einstellung beschreibt. Wird häufig in administrativen, rechtlichen, technischen und alltäglichen Kontexten verwendet.

    **Häufige Verwendungen:**
    - 撤销决定 (chèxiāo juédìng) — eine Entscheidung rückgängig machen
    - 撤销指控 (chèxiāo zhǐkòng) — Anklage fallen lassen / zurückziehen
    - 撤销许可证 (chèxiāo xǔkězhèng) — eine Lizenz entziehen
    - 撤销操作 (chèxiāo cāozuò) — eine Aktion rückgängig machen (Software)
    - 撤销职务 (chèxiāo zhíwù) — jemanden von einer Position abberufen

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 撤销 (chèxiāo) — formell, starkes "aufheben/annullieren" (Entscheidungen, Rechte, Ämter, Aktionen)
    - 取消 (qǔxiāo) — neutral, "absagen, streichen" (Termine, Veranstaltungen, Bestellungen)
    - 废除 (fèichú) — "abschaffen" (Gesetze, Systeme, Traditionen — dauerhaft)
    - 删除 (shānchú) — "löschen" (Dateien, Texte, Daten)
    - 还原 (huányuán) — "wiederherstellen, zurücksetzen" (Zustand, Original)

    **Kulturelle Anmerkung:**
    撤销 setzt sich aus 撤 (chè, "zurückziehen, entfernen") und 销 (xiāo, "annullieren, auflösen") zusammen. Wörtlich: "entfernen und annullieren". Das Wort hat eine offizielle, bürokratische Note und wird oft in Nachrichten, Regierungsdokumenten und formellen Mitteilungen verwendet.
  synonyms:
    - word: 取消
      pinyin: qǔxiāo
      meaning: absagen, streichen, annullieren (neutraler)
    - word: 废除
      pinyin: fèichú
      meaning: abschaffen, aufheben (Gesetze, Systeme)
    - word: 撤回
      pinyin: chèhuí
      meaning: zurückziehen (Antrag, Aussage, Truppen)
    - word: 废止
      pinyin: fèizhǐ
      meaning: aufheben, annullieren (formell, von Gesetzen/Verträgen)
  antonyms:
    - word: 建立
      pinyin: jiànlì
      meaning: aufbauen, einrichten
    - word: 保留
      pinyin: bǎoliú
      meaning: behalten, aufbewahren
    - word: 确认
      pinyin: quèrèn
      meaning: bestätigen
  examples:
    - zh: 请撤销上一步操作，我点错了。
      pinyin: Qǐng chèxiāo shàng yī bù cāozuò, wǒ diǎn cuò le.
      english: Please undo the last step. I clicked the wrong button.
      de: Bitte mache den letzten Schritt rückgängig. Ich habe falsch geklickt.
    - zh: 法院决定撤销对他的指控。
      pinyin: Fǎyuàn juédìng chèxiāo duì tā de zhǐkòng.
      english: The court decided to drop the charges against him.
      de: Das Gericht beschloss, die Anklage gegen ihn fallen zu lassen.
    - zh: 公司撤销了我之前的晋升决定。
      pinyin: Gōngsī chèxiāo le wǒ zhīqián de jìnshēng juédìng.
      english: The company revoked my previous promotion decision.
      de: Die Firma hat meine vorherige Beförderungsentscheidung rückgängig gemacht.
    - zh: 如果你撤销更改，所有未保存的数据都会丢失。
      pinyin: Rúguǒ nǐ chèxiāo gēnggǎi, suǒyǒu wèi bǎocún de shùjù dōu huì diūshī.
      english: If you undo the changes, all unsaved data will be lost.
      de: Wenn du die Änderungen rückgängig machst, gehen alle nicht gespeicherten Daten verloren.
    - zh: 政府撤销了这项有争议的法律。
      pinyin: Zhèngfǔ chèxiāo le zhè xiàng yǒu zhēngyì de fǎlǜ.
      english: The government repealed this controversial law.
      de: Die Regierung hat dieses umstrittene Gesetz aufgehoben.
  characters:
    - char: 撤
      simplified: 撤
      traditional: 撤
      pinyin: chè
      hsk: "6"
      detailed_analysis: true
      meaning_in_context: zurückziehen, entfernen, abziehen
      compounds:
        - simplified: 撤退
          pinyin: chètuì
          meaning: sich zurückziehen, evakuieren
        - simplified: 撤离
          pinyin: chèlí
          meaning: abziehen, verlassen (einen Ort)
        - simplified: 撤回
          pinyin: chèhuí
          meaning: zurückziehen (Antrag, Aussage)
        - simplified: 撤销
          pinyin: chèxiāo
          meaning: rückgängig machen, widerrufen
      etymology: |
        Phonosemantische Verbindung. Besteht aus dem Radikal 扌 (Hand, als 手) und der phonetischen Komponente 徹 (chè). Die ursprüngliche Bedeutung ist "wegnehmen, entfernen". Später erweitert zu "sich zurückziehen, abziehen (von Truppen), etwas zurücknehmen".
    - char: 销
      simplified: 销
      traditional: 銷
      pinyin: xiāo
      hsk: "6"
      detailed_analysis: true
      meaning_in_context: annullieren, auflösen, vernichten
      compounds:
        - simplified: 销售
          pinyin: xiāoshòu
          meaning: verkaufen, Vertrieb
        - simplified: 销毁
          pinyin: xiāohuǐ
          meaning: vernichten, zerstören
        - simplified: 报销
          pinyin: bàoxiāo
          meaning: Spesen abrechnen, etwas erstatten bekommen
        - simplified: 撤销
          pinyin: chèxiāo
          meaning: rückgängig machen, widerrufen
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 銷 besteht aus dem Radikal 釒 (Metall, Gold) und der phonetischen Komponente 肖 (xiāo). Die ursprüngliche Bedeutung ist "Metall schmelzen". Daraus entwickelten sich die Bedeutungen "auflösen, vernichten, annullieren" sowie "verkaufen" (wie "Geld zum Schmelzen bringen").

- type: word
  date: "04/04"
  simplified: 类别
  traditional: 類別
  pinyin: lèibié
  english: category / classification / type / class
  german: Kategorie / Rubrik / Art / Klasse
  hsk: "5"
  register: neutral
  measure_word:
    - simplified: 个
      pinyin: gè
      meaning: allgemeiner Zähler für Kategorien
    - simplified: 种
      pinyin: zhǒng
      meaning: Art, Sorte (für Kategorien als Typen)
  note: |
    Ein Nomen, das eine Gruppe oder Klasse von Dingen bezeichnet, die gemeinsame Merkmale teilen. 类别 ist das allgemeinste und gebräuchlichste Wort für "Kategorie" im modernen Chinesisch.

    **Häufige Ausdrücke:**
    - 产品类别 (chǎnpǐn lèibié) — Produktkategorie
    - 价格类别 (jiàgé lèibié) — Preiskategorie
    - 年龄类别 (niánlíng lèibié) — Altersgruppe / Alterskategorie
    - 属于同一类别 (shǔyú tóng yī lèibié) — zur selben Kategorie gehören

    **Wichtige Unterschiede zu ähnlichen Wörtern:**
    - 类别 (lèibié) — allgemeine Kategorie (am gebräuchlichsten)
    - 分类 (fēnlèi) — Klassifizierung, Einteilung (der Vorgang oder das System)
    - 种类 (zhǒnglèi) — Sorte, Art (betont die Vielfalt der Typen)
    - 类型 (lèixíng) — Typ, Genre (betont charakteristische Merkmale)
    - 门类 (ménlèi) — Klasse, Kategorie (formeller, in Wissenschaft/Akademie)

    **Kulturelle Anmerkung:**
    类别 setzt sich aus 类 (lèi, "Klasse, Art") und 别 (bié, "unterscheiden, Trennung") zusammen. Wörtlich: "Klassenunterscheidung" oder "durch Unterscheidung gebildete Klasse". Das Wort wird in allen formellen und informellen Kontexten verwendet, von E-Commerce bis Wissenschaft.
  synonyms:
    - word: 种类
      pinyin: zhǒnglèi
      meaning: Sorte, Art, Kategorie (betont Typenvielfalt)
    - word: 类型
      pinyin: lèixíng
      meaning: Typ, Genre, Kategorie (betont charakteristische Merkmale)
    - word: 分类
      pinyin: fēnlèi
      meaning: Klassifizierung, Kategorie (als System)
    - word: 门类
      pinyin: ménlèi
      meaning: Klasse, Kategorie (formell, akademisch)
  antonyms: []
  examples:
    - zh: 这个产品属于哪个类别？
      pinyin: Zhège chǎnpǐn shǔyú nǎge lèibié?
      english: Which category does this product belong to?
      de: Zu welcher Kategorie gehört dieses Produkt?
    - zh: 请选择您感兴趣的图书类别。
      pinyin: Qǐng xuǎnzé nín gǎn xìngqù de túshū lèibié.
      english: Please select the book category you are interested in.
      de: Bitte wählen Sie die Buchkategorie, die Sie interessiert.
    - zh: 不同类别的商品有不同的折扣。
      pinyin: Bùtóng lèibié de shāngpǐn yǒu bùtóng de zhékòu.
