- type: expression
  date: "04/04"
  simplified: 放在心上
  traditional: 放在心上
  pinyin: fàng zài xīn shang
  english: to take to heart / to care about / to take seriously (usually in negative constructions)
  german: sich zu Herzen nehmen / ernst nehmen / (meist negativ: 别放在心上 – nimm es dir nicht zu Herzen)
  hsk: "5"
  register: spoken_neutral
  note: |
    Ein Ausdruck, der beschreibt, dass man etwas ernst nimmt, sich darüber Gedanken macht oder es sich zu Herzen nimmt. Die Phrase wird sehr häufig in der Negation verwendet: 别放在心上 (bié fàng zài xīn shang) – "Nimm es dir nicht zu Herzen / Mach dir nichts draus".

    **Struktur:**
    - 放 (fàng) — legen, stellen
    - 在 (zài) — in, auf
    - 心上 (xīn shang) — auf dem Herzen / im Herzen
    - Wörtlich: "auf das Herz legen"

    **Häufige Verwendungen:**
    - 别放在心上 (bié fàng zài xīn shang) — Nimm es dir nicht zu Herzen / Mach dir nichts draus
    - 放在心上 (fàng zài xīn shang) — sich zu Herzen nehmen (positiv oder negativ)
    - 没放在心上 (méi fàng zài xīn shang) — nicht ernst genommen / keine Gedanken daran verschwendet
    - 把某事放在心上 (bǎ mǒushì fàng zài xīn shang) — sich etwas sehr zu Herzen nehmen

    **Kulturelle Anmerkung:**
    In der chinesischen Kultur, die Wert auf Harmonie und "Gesicht wahren" (面子, miànzi) legt, ist 别放在心上 eine sehr wichtige höfliche Floskel. Wenn jemand sich entschuldigt oder einen kleinen Fehler macht, sagt man oft 没关系, 别放在心上 (Méi guānxi, bié fàng zài xīn shang) – "Kein Problem, nimm es dir nicht zu Herzen". Es zeigt Großzügigkeit und hilft, Konflikte zu vermeiden.
  synonyms:
    - word: 在意
      pinyin: zàiyì
      meaning: Wert legen auf, sich kümmern um
    - word: 在乎
      pinyin: zàihu
      meaning: sich kümmern um, wichtig finden (umgangssprachlich)
    - word: 当回事
      pinyin: dàng huí shì
      meaning: ernst nehmen (umgangssprachlich)
  antonyms:
    - word: 不在乎
      pinyin: bù zàihu
      meaning: egal sein, sich nichts machen aus
    - word: 无所谓
      pinyin: wúsuǒwèi
      meaning: egal sein
  examples:
    - zh: 他只是开个玩笑，你别放在心上。
      pinyin: Tā zhǐshì kāi ge wánxiào, nǐ bié fàng zài xīn shang.
      english: He was just joking. Don't take it to heart.
      de: Er hat nur einen Scherz gemacht. Nimm es dir nicht zu Herzen.
    - zh: 你的建议我会放在心上的。
      pinyin: Nǐ de jiànyì wǒ huì fàng zài xīn shang de.
      english: I will take your advice to heart.
      de: Ich werde deinen Rat zu Herzen nehmen.
    - zh: 他根本没把这件事放在心上。
      pinyin: Tā gēnběn méi bǎ zhè jiàn shì fàng zài xīn shang.
      english: He didn't take this matter seriously at all.
      de: Er hat diese Angelegenheit überhaupt nicht ernst genommen.
    - zh: 别把别人的批评太放在心上。
      pinyin: Bié bǎ biérén de pīpíng tài fàng zài xīn shang.
      english: Don't take other people's criticism too much to heart.
      de: Nimm dir die Kritik anderer nicht zu sehr zu Herzen.
  word_analyses:
    - type: word
      simplified: 放
      traditional: 放
      pinyin: fàng
      english: to put, to place, to release
      hsk: "3"
      characters:
        - char: 放
          simplified: 放
          traditional: 放
          pinyin: fàng
          hsk: "3"
          detailed_analysis: true
          meaning_in_context: legen, stellen, platzieren
          compounds:
            - simplified: 放心
              pinyin: fàngxīn
              meaning: beruhigt sein, sich keine Sorgen machen
            - simplified: 放弃
              pinyin: fàngqì
              meaning: aufgeben
            - simplified: 放在
              pinyin: fàng zài
              meaning: hinstellen, ablegen
          etymology: |
            Phonosemantische Verbindung. Besteht aus dem Radikal 攵 (Schlag, Handlung) und der phonetischen Komponente 方 (fāng). Die ursprüngliche Bedeutung ist "freilassen, loslassen". Später erweitert zu "legen, stellen, platzieren".
    - type: word
      simplified: 心
      traditional: 心
      pinyin: xīn
      english: heart, mind
      hsk: "1"
