        Ideogramm. Zeigt einen Baum (木) mit einem Strich an der Wurzel. Die ursprüngliche Bedeutung ist "Wurzel". Später erweitert zu "ursprünglich, grundlegend, selbst, dieses (Buch)".
    - char: 身
