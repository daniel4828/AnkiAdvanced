- type: word
  date: "04/04"
  simplified: 忽视
  traditional: 忽視
  pinyin: hūshì
  english: to ignore / to overlook / to neglect / to disregard
  german: ignorieren / übersehen / vernachlässigen / außer Acht lassen
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Verb, das beschreibt, dass man etwas nicht beachtet, übersieht oder ihm keine ausreichende Aufmerksamkeit schenkt – oft mit negativen Konsequenzen. 忽视 kann sowohl absichtlich (ignorieren) als auch unabsichtlich (übersehen, vernachlässigen) sein.

    **Häufige Ausdrücke:**
    - 忽视问题 (hūshì wèntí) — ein Problem ignorieren / übersehen
    - 忽视细节 (hūshì xìjié) — Details vernachlässigen
    - 不可忽视 (bùkě hūshì) — nicht zu ignorieren / nicht zu unterschätzen
    - 长期忽视 (chángqī hūshì) — langfristige Vernachlässigung

    **Wichtige Unterschiede:**
    - 忽视 (hūshì) — ignorieren, übersehen, vernachlässigen (allgemein)
    - 忽略 (hūlüè) — vernachlässigen, außer Acht lassen (oft unabsichtlich)
    - 无视 (wúshì) — ignorieren, missachten (stärker, bewusst)
    - 轻视 (qīngshì) — geringschätzen, unterschätzen

    **Kulturelle Anmerkung:**
