          pinyin: běnlái
          meaning: ursprünglich, eigentlich
        - simplified: 根本
          pinyin: gēnběn
          meaning: grundlegend, überhaupt
        - simplified: 本身
          pinyin: běnshēn
          meaning: selbst, an sich
