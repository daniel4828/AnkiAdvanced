- type: word
  date: "04/04"
  simplified: 否认
  traditional: 否認
  pinyin: fǒurèn
  english: to deny / to repudiate / to disclaim
  german: leugnen / bestreiten / dementieren / abstreiten
  hsk: "6"
  register: formal_written
  measure_word: []
  note: |
    Ein Verb, das das Bestreiten oder Leugnen einer Aussage, Tatsache, Verantwortung oder eines Gerüchts beschreibt. 否认 wird in formelleren Kontexten verwendet, besonders in Nachrichten, Recht und Politik.

    **Häufige Ausdrücke:**
    - 否认事实 (fǒurèn shìshí) — Tatsachen leugnen
    - 否认指控 (fǒurèn zhǐkòng) — Anschuldigungen bestreiten
    - 否认责任 (fǒurèn zérèn) — Verantwortung ablehnen
    - 无法否认 (wúfǎ fǒurèn) — nicht leugnen können / unbestreitbar

    **Wichtige Unterschiede:**
    - 否认 (fǒurèn) — leugnen, bestreiten (formell, oft für Tatsachen/Verantwortung)
    - 否定 (fǒudìng) — verneinen, ablehnen (allgemeiner, auch grammatisch)
    - 拒绝 (jùjué) — ablehnen, verweigern (Handlung, Angebot)
    - 反驳 (fǎnbó) — widerlegen, kontern (Argumentativ)

    **Kulturelle Anmerkung:**
    否认 setzt sich aus 否 (fǒu, "verneinen, nein sagen") und 认 (rèn, "erkennen, anerkennen") zusammen. Wörtlich: "verneinend anerkennen" → "nicht anerkennen". In der öffentlichen Kommunikation (Politik, Wirtschaft) ist 否认 ein häufig verwendetes Wort für Dementis und Richtigstellungen. Ein klassischer Satz ist: 发言人否认了这一传闻 (Fāyánrén fǒurènle zhè yī chuánwén) – "Der Sprecher dementierte dieses Gerücht".
  synonyms:
    - word: 否定
      pinyin: fǒudìng
      meaning: verneinen, ablehnen (allgemeiner)
    - word: 驳斥
      pinyin: bóchì
      meaning: widerlegen, zurückweisen (stärker)
    - word: 不承认
      pinyin: bù chéngrèn
      meaning: nicht zugeben, nicht anerkennen
  antonyms:
    - word: 承认
      pinyin: chéngrèn
      meaning: zugeben, anerkennen
    - word: 确认
      pinyin: quèrèn
      meaning: bestätigen
    - word: 肯定
      pinyin: kěndìng
      meaning: bejahen, bestätigen
  examples:
    - zh: 他否认自己做过这件事。
      pinyin: Tā fǒurèn zìjǐ zuòguo zhè jiàn shì.
      english: He denied having done this.
      de: Er bestritt, diese Sache getan zu haben.
    - zh: 公司发言人否认了裁员传闻。
      pinyin: Gōngsī fāyánrén fǒurènle cáiyuán chuánwén.
      english: The company spokesperson denied the rumor of layoffs.
      de: Der Firmensprecher dementierte das Gerücht über Entlassungen.
    - zh: 他无法否认自己犯了错。
      pinyin: Tā wúfǎ fǒurèn zìjǐ fànle cuò.
      english: He cannot deny that he made a mistake.
      de: Er kann nicht leugnen, dass er einen Fehler gemacht hat.
    - zh: 面对证据，他不得不承认他之前的否认是错的。
      pinyin: Miànduì zhèngjù, tā bùdé bù chéngrèn tā zhīqián de fǒurèn shì cuò de.
      english: Faced with the evidence, he had to admit that his previous denial was wrong.
      de: Angesichts der Beweise musste er zugeben, dass sein vorheriges Leugnen falsch war.
