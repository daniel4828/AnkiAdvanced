              pinyin: shuōhuà
              meaning: sprechen, reden
            - simplified: 说明
              pinyin: shuōmíng
              meaning: erklären
          etymology: |
            Phonosemantische Verbindung. Die traditionelle Form 說 besteht aus dem Radikal 言 (Sprache) und der phonetischen Komponente 兌 (duì). Die ursprüngliche Bedeutung ist "sprechen, erklären".
