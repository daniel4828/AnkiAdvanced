        Piktogramm. Die Orakelknochenschrift zeigte einen menschlichen Körper mit Armen, Beinen und einem markanten Bauch. Die ursprüngliche Bedeutung ist "Körper, Rumpf". Später erweitert zu "Person, selbst, Lebenszeit".

- type: word
  date: "04/04"
  simplified: 以为
  traditional: 以為
  pinyin: yǐwéi
  english: to mistakenly believe / to think (falsely) / to assume (incorrectly)
  german: fälschlicherweise glauben / denken (dass etwas der Fall ist, obwohl es nicht stimmt)
  hsk: "4"
  register: neutral
  measure_word: []
  note: |
    Ein Verb, das ausdrückt, dass jemand etwas glaubt oder denkt, das sich später als falsch herausstellt. 以为 wird verwendet, um eine falsche Annahme oder ein Missverständnis zu beschreiben. Es ist eines der wichtigsten Verben, um Irrtümer auszudrücken.

    **Struktur:**
    - 以为 + [Satz] — fälschlicherweise glauben, dass ...
    - 还以为 (hái yǐwéi) — (immer noch) fälschlich glauben

    **Wichtige Unterschiede:**
    - 以为 (yǐwéi) — fälschlicherweise glauben (Annahme erweist sich als falsch)
    - 认为 (rènwéi) — der Meinung sein, glauben (neutral, muss nicht falsch sein)
    - 觉得 (juéde) — finden, meinen (subjektive Meinung)
    - 认为 vs 以为: 认为 ist neutral, 以为 impliziert, dass die Annahme falsch war

    **Kulturelle Anmerkung:**
    以为 setzt sich aus 以 (yǐ, "mit, durch, aufgrund") und 为 (wéi, "tun, sein, halten für") zusammen. Wörtlich: "aufgrund (von etwas) halten für". In der Alltagssprache ist 以为 sehr gebräuchlich, besonders wenn man Missverständnisse oder Fehler eingesteht: z. B. 我以为你知道 (wǒ yǐwéi nǐ zhīdào) – "Ich dachte, du wüsstest es" (aber du wusstest es nicht).
  synonyms:
    - word: 误以为
      pinyin: wù yǐwéi
      meaning: irrtümlicherweise glauben (stärkerer Irrtum)
    - word: 错以为
      pinyin: cuò yǐwéi
      meaning: falsch glauben (umgangssprachlich)
  antonyms:
    - word: 认为
      pinyin: rènwéi
      meaning: der Meinung sein (neutral)
    - word: 知道
      pinyin: zhīdào
      meaning: wissen (Tatsache)
  examples:
    - zh: 我以为你今天不来了，没想到你来了。
      pinyin: Wǒ yǐwéi nǐ jīntiān bù lái le, méi xiǎng dào nǐ lái le.
      english: I thought you weren't coming today. I didn't expect you to come.
      de: Ich dachte, du kommst heute nicht. Ich hätte nicht gedacht, dass du kommst.
    - zh: 别以为你什么都知道。
      pinyin: Bié yǐwéi nǐ shénme dōu zhīdào.
      english: Don't think you know everything (because you don't).
      de: Glaub nicht, dass du alles weißt (denn das tust du nicht).
    - zh: 我还以为你生气了，原来你没有。
      pinyin: Wǒ hái yǐwéi nǐ shēngqì le, yuánlái nǐ méiyǒu.
      english: I thought you were angry, but it turns out you weren't.
      de: Ich dachte, du wärst wütend, aber du warst es gar nicht.
    - zh: 她以为门锁了，其实没锁。
      pinyin: Tā yǐwéi mén suǒ le, qíshí méi suǒ.
      english: She thought the door was locked, but actually it wasn't.
      de: Sie dachte, die Tür sei abgeschlossen, aber sie war es nicht.
  characters:
    - char: 以
      simplified: 以
      traditional: 以
      pinyin: yǐ
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: aufgrund von, mit, durch, um zu
      compounds:
        - simplified: 以为
          pinyin: yǐwéi
          meaning: fälschlich glauben
        - simplified: 所以
          pinyin: suǒyǐ
          meaning: deshalb, daher
        - simplified: 以前
          pinyin: yǐqián
          meaning: vorher, früher
        - simplified: 以及
          pinyin: yǐjí
          meaning: sowie, und auch
      etymology: |
        Piktogramm. Ursprünglich ein Bild einer Sichel oder eines Werkzeugs. Später wurde es zu einer Präposition mit den Bedeutungen "mit, durch, aufgrund von" und dann zu einem Konjunktionspartikel.
    - char: 为
      simplified: 为
      traditional: 爲
      pinyin: wéi
      hsk: "2"
      detailed_analysis: true
      meaning_in_context: sein, halten für, tun
      compounds:
        - simplified: 以为
          pinyin: yǐwéi
          meaning: fälschlich glauben
        - simplified: 认为
          pinyin: rènwéi
          meaning: der Meinung sein
        - simplified: 成为
          pinyin: chéngwéi
          meaning: werden zu
        - simplified: 因为
          pinyin: yīnwèi
          meaning: weil
      etymology: |
        Piktogramm. Die traditionelle Form 爲 zeigt eine Hand, die einen Elefanten führt, was "tun, handeln" bedeutet. Später erweitert zu "sein, als etwas fungieren, halten für".

- type: word
  date: "04/04"
  simplified: 认为
  traditional: 認為
  pinyin: rènwéi
  english: to think / to believe / to be of the opinion that / to consider
  german: der Meinung sein / glauben / meinen / halten für
  hsk: "4"
  register: neutral
  measure_word: []
  note: |
    Ein Verb, das eine subjektive Meinung, Überzeugung oder Einschätzung ausdrückt. Im Gegensatz zu 以为 (das eine falsche Annahme impliziert) ist 认为 neutral – es sagt nichts darüber aus, ob die Meinung richtig oder falsch ist.

    **Struktur:**
    - 认为 + [Satz] — der Meinung sein, dass ... / glauben, dass ...
    - 被广泛认为 (bèi guǎngfàn rènwéi) — weithin als ... angesehen werden

    **Wichtige Unterschiede:**
    - 认为 (rènwéi) — der Meinung sein, glauben (neutral, eigene Überzeugung)
    - 以为 (yǐwéi) — fälschlicherweise glauben (impliziert Irrtum)
    - 觉得 (juéde) — finden, meinen (subjektiv, weniger überzeugt)
    - 以为 vs 认为: Verwende 认为 für neutrale Meinungen, 以为 für falsche Annahmen

    **Kulturelle Anmerkung:**
    认为 setzt sich aus 认 (rèn, "erkennen, anerkennen") und 为 (wéi, "sein, halten für") zusammen. Wörtlich: "erkennen und halten für". In Diskussionen und Aufsätzen wird 认为 häufig verwendet, um die eigene Position oder Interpretation auszudrücken. In formellen Texten ist 认为 gebräuchlicher als 觉得.
  synonyms:
    - word: 觉得
      pinyin: juéde
      meaning: finden, meinen (subjektiver, weniger bestimmt)
    - word: 以为
      pinyin: yǐwéi
      meaning: fälschlich glauben (impliziert Irrtum)
    - word: 相信
      pinyin: xiāngxìn
      meaning: glauben, vertrauen (stärker)
    - word: 主张
      pinyin: zhǔzhāng
      meaning: vertreten die Ansicht, plädieren für (formeller)
  antonyms: []
  examples:
    - zh: 我认为学习外语非常重要。
      pinyin: Wǒ rènwéi xuéxí wàiyǔ fēicháng zhòngyào.
      english: I think learning a foreign language is very important.
      de: Ich bin der Meinung, dass das Lernen einer Fremdsprache sehr wichtig ist.
    - zh: 很多人认为他是一个天才。
      pinyin: Hěnduō rén rènwéi tā shì yī ge tiāncái.
      english: Many people consider him a genius.
      de: Viele Leute halten ihn für ein Genie.
    - zh: 你认为这个方案可行吗？
      pinyin: Nǐ rènwéi zhège fāng'àn kěxíng ma?
      english: Do you think this plan is feasible?
      de: Glaubst du, dass dieser Plan umsetzbar ist?
    - zh: 专家认为，气候变化是当前最大的挑战。
      pinyin: Zhuānjiā rènwéi, qìhòu biànhuà shì dāngqián zuìdà de tiǎozhàn.
      english: Experts believe that climate change is the biggest challenge at present.
      de: Experten sind der Meinung, dass der Klimawandel die größte Herausforderung der Gegenwart ist.
  characters:
    - char: 认
      simplified: 认
      traditional: 認
      pinyin: rèn
