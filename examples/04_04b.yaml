          pinyin: jiēchù
          meaning: Kontakt, berühren
        - simplified: 触摸
          pinyin: chùmō
          meaning: berühren, tasten
        - simplified: 触动
          pinyin: chùdòng
          meaning: berühren, bewegen (emotional)
        - simplified: 触及
          pinyin: chùjí
          meaning: berühren, ansprechen
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 觸 besteht aus dem Radikal 角 (Horn) und der phonetischen Komponente 蜀 (shǔ). Die ursprüngliche Bedeutung ist "mit den Hörnern stoßen" (wie ein Tier). Später erweitert zu "berühren, antasten, in Kontakt kommen".
    - char: 及
      simplified: 及
