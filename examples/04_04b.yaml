            Piktogramm. Zeigt ein Herz mit Kammern. Die ursprüngliche Bedeutung ist "Herz". Im übertragenen Sinne auch "Gemüt, Seele, Gefühl".

- type: word
  date: "04/04"
  simplified: 本身
  traditional: 本身
  pinyin: běnshēn
  english: itself / oneself / per se / in itself / as such
  german: selbst / an sich / per se / als solches
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Pronomen/Adverb, das verwendet wird, um die grundlegende, eigenständige Natur einer Sache oder Person zu betonen, unabhängig von anderen Faktoren. 本身 wird nach einem Substantiv oder Pronomen platziert.

    **Struktur:**
    - [Substantiv/Pronomen] + 本身 — [etwas] selbst / an sich
    - Wörtlich: "Wurzel-Körper" / "ursprünglicher Körper"

    **Häufige Verwendungen:**
    - 事情本身 (shìqing běnshēn) — die Sache selbst / an sich
    - 问题本身 (wèntí běnshēn) — das Problem an sich
    - 我本身 (wǒ běnshēn) — ich selbst (betont)
    - 本身就是 (běnshēn jiùshì) — ist an sich schon / ist bereits von sich aus

    **Wichtige Unterschiede:**
    - 本身 (běnshēn) — selbst, an sich (betont die eigenständige Natur)
    - 自己 (zìjǐ) — selbst (reflexiv, für Personen)
    - 亲自 (qīnzì) — persönlich, selbst (Handlung durch die Person selbst)
    - 自身 (zìshēn) — sich selbst (formeller, oft für abstrakte Dinge)

    **Kulturelle Anmerkung:**
    本身 setzt sich aus 本 (běn, "Wurzel, ursprünglich") und 身 (shēn, "Körper, Person") zusammen. Wörtlich: "ursprünglicher Körper / die Sache selbst". Der Begriff wird häufig in philosophischen, akademischen und alltäglichen Diskussionen verwendet, um das Wesen einer Sache zu betonen, ohne äußere Einflüsse.
  synonyms:
    - word: 自身
      pinyin: zìshēn
      meaning: sich selbst, an sich (formeller)
    - word: 自己
      pinyin: zìjǐ
      meaning: selbst (reflexiv, für Personen)
    - word: 本质上
      pinyin: běnzhì shang
      meaning: im Wesentlichen
  antonyms: []
  examples:
    - zh: 这件事本身并不复杂，只是被我们想复杂了。
      pinyin: Zhè jiàn shì běnshēn bìng bù fùzá, zhǐshì bèi wǒmen xiǎng fùzá le.
      english: This matter itself is not complicated; we just made it complicated in our minds.
      de: Die Sache an sich ist nicht kompliziert; wir haben sie nur kompliziert gemacht.
    - zh: 这个理论本身有问题，需要重新审视。
      pinyin: Zhège lǐlùn běnshēn yǒu wèntí, xūyào chóngxīn shěnshì.
      english: This theory itself has problems; it needs to be re-examined.
      de: Die Theorie an sich hat Probleme; sie muss neu überdacht werden.
    - zh: 我本身对这件事没有意见。
      pinyin: Wǒ běnshēn duì zhè jiàn shì méiyǒu yìjiàn.
      english: I myself have no objection to this matter.
      de: Ich selbst habe nichts gegen diese Angelegenheit.
    - zh: 学习本身就是一个不断进步的过程。
      pinyin: Xuéxí běnshēn jiùshì yī ge bùduàn jìnbù de guòchéng.
      english: Learning itself is a process of continuous improvement.
      de: Lernen an sich ist ein Prozess der kontinuierlichen Verbesserung.
  characters:
