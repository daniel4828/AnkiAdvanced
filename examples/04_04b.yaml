        - simplified: 涉及
          pinyin: shèjí
          meaning: betreffen, sich beziehen auf
        - simplified: 触及
          pinyin: chùjí
          meaning: berühren, ansprechen
      etymology: |
        Ideogramm. Die Orakelknochenschrift zeigte eine Hand (又), die eine Person von hinten erreicht. Die ursprüngliche Bedeutung ist "erreichen, bis zu". Später erweitert zu "sowie, und" (als Konjunktion).

- type: expression
  date: "04/04"
  simplified: 说到底
  traditional: 說到底
  pinyin: shuō dào dǐ
  english: at the end of the day / ultimately / when it comes down to it / in the final analysis
  german: im Grunde genommen / letztendlich / wenn man es auf den Punkt bringt
  hsk: "6"
  register: spoken_neutral
  note: |
    Ein feststehender Ausdruck, der verwendet wird, um eine Schlussfolgerung oder den Kern einer Sache zu präsentieren. Er leitet oft eine Vereinfachung oder die grundlegende Wahrheit eines komplexen Themas ein.

    **Struktur:**
    - 说到底 + [Aussage] — Letztendlich / Im Grunde genommen ...

    **Wörtliche Bedeutung:**
    - 说 (shuō) — sagen, sprechen
    - 到 (dào) — bis zu, erreichen
    - 底 (dǐ) — Boden, Grund, Ende
    - Zusammen: "bis zum Ende / bis auf den Grund sagen"

    **Häufige Verwendungen:**
    - 说到底，还是... (shuō dào dǐ, háishì...) — Letztendlich geht es um...
    - 说到底，他只是个孩子 (shuō dào dǐ, tā zhǐshì ge háizi) — Letztendlich ist er nur ein Kind

    **Ähnliche Ausdrücke:**
    - 归根到底 (guīgēn dàodǐ) — letztendlich, im Grunde genommen (formeller)
    - 毕竟 (bìjìng) — schließlich, letztendlich (neutraler)
    - 总之 (zǒngzhī) — kurz gesagt, zusammengefasst

    **Kulturelle Anmerkung:**
    说到底 ist ein sehr gebräuchlicher Ausdruck in der gesprochenen Sprache und in lockeren Diskussionen. Er signalisiert, dass der Sprecher jetzt den Kern oder die essentielle Wahrheit eines Themas ausdrücken möchte. Der Ausdruck hat eine konfessionelle, oft überzeugende Note.
  synonyms:
    - word: 归根到底
      pinyin: guīgēn dàodǐ
      meaning: letztendlich, im Grunde genommen (formeller)
    - word: 毕竟
      pinyin: bìjìng
      meaning: schließlich, letztendlich (neutraler)
    - word: 总之
      pinyin: zǒngzhī
      meaning: kurz gesagt, zusammengefasst
    - word: 本质上
      pinyin: běnzhì shang
      meaning: im Wesentlichen
  antonyms: []
  examples:
    - zh: 说到底，这个问题还是钱的问题。
      pinyin: Shuō dào dǐ, zhège wèntí háishì qián de wèntí.
      english: At the end of the day, this problem is still about money.
      de: Im Grunde genommen geht es bei diesem Problem doch um Geld.
    - zh: 说到底，他只是害怕失败而已。
      pinyin: Shuō dào dǐ, tā zhǐshì hàipà shībài éryǐ.
      english: When it comes down to it, he's just afraid of failure.
      de: Letztendlich hat er nur Angst vor dem Scheitern.
    - zh: 说到底，每个人都要为自己的选择负责。
      pinyin: Shuō dào dǐ, měi ge rén dōu yào wèi zìjǐ de xuǎnzé fùzé.
      english: In the final analysis, everyone must take responsibility for their own choices.
      de: Letztendlich muss jeder für seine eigenen Entscheidungen Verantwortung übernehmen.
    - zh: 说到底，幸福很简单，就是知足常乐。
      pinyin: Shuō dào dǐ, xìngfú hěn jiǎndān, jiùshì zhīzú chánglè.
      english: At the end of the day, happiness is simple: know contentment and you'll always be happy.
      de: Im Grunde genommen ist Glück einfach: Wer zufrieden ist, ist immer glücklich.
  word_analyses:
    - type: word
