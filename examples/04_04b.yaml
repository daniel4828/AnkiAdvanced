- type: word
  date: "04/04"
  simplified: 故意
  traditional: 故意
  pinyin: gùyì
  english: deliberately / intentionally / on purpose / willfully
  german: absichtlich / vorsätzlich / mit Absicht
  hsk: "5"
  register: neutral
  measure_word: []
  note: |
    Ein Adverb/Adjektiv, das beschreibt, dass eine Handlung mit Absicht, bewusst oder geplant ausgeführt wird – im Gegensatz zu einem Unfall oder Versehen. 故意 wird sowohl in positiven als auch (häufiger) in negativen Kontexten verwendet.

    **Häufige Ausdrücke:**
    - 故意做某事 (gùyì zuò mǒushì) — etwas absichtlich tun
    - 故意伤害 (gùyì shānghài) — vorsätzliche Körperverletzung
    - 不是故意的 (bùshì gùyì de) — nicht absichtlich / unabsichtlich
    - 故意隐瞒 (gùyì yǐnmán) — absichtlich verschweigen

    **Wichtige Unterschiede:**
    - 故意 (gùyì) — absichtlich (betont Vorsatz, bewusste Handlung)
    - 有意 (yǒuyì) — absichtlich, bewusst (neutraler, auch "geneigt sein")
    - 存心 (cúnxīn) — absichtlich, vorsätzlich (stärker, oft böswillig)

    **Kulturelle Anmerkung:**
    故意 setzt sich aus 故 (gù, "absichtlich, bewusst, daher") und 意 (yì, "Absicht, Gedanke") zusammen. Wörtlich: "bewusste Absicht". Im Rechtssystem ist 故意 ein wichtiger Begriff (z. B. 故意杀人 – vorsätzlicher Mord). Im Alltag sagt man oft 我不是故意的 (wǒ bùshì gùyì de) – "Ich habe es nicht absichtlich gemacht".
  synonyms:
    - word: 有意
      pinyin: yǒuyì
      meaning: absichtlich, bewusst (neutraler)
    - word: 存心
      pinyin: cúnxīn
      meaning: vorsätzlich, absichtlich (stärker, oft negativ)
    - word: 蓄意
      pinyin: xùyì
      meaning: vorsätzlich, geplant (formell, juristisch)
  antonyms:
    - word: 无意
      pinyin: wúyì
      meaning: unabsichtlich, ohne Absicht
    - word: 不小心
      pinyin: bù xiǎoxīn
      meaning: unvorsichtig, versehentlich
  examples:
    - zh: 他不是故意踩你的脚的，别生气了。
      pinyin: Tā bùshì gùyì cǎi nǐ de jiǎo de, bié shēngqì le.
      english: He didn't step on your foot on purpose. Don't be angry.
      de: Er ist dir nicht absichtlich auf den Fuß getreten. Sei nicht böse.
    - zh: 她故意不理我，因为她在生气。
      pinyin: Tā gùyì bù lǐ wǒ, yīnwèi tā zài shēngqì.
      english: She intentionally ignored me because she was angry.
      de: Sie hat mich absichtlich ignoriert, weil sie wütend war.
    - zh: 这是故意破坏公共财产的行为。
      pinyin: Zhè shì gùyì pòhuài gōnggòng cáichǎn de xíngwéi.
      english: This is an act of willful destruction of public property.
      de: Dies ist eine vorsätzliche Zerstörung von öffentlichem Eigentum.
    - zh: 如果你故意撒谎，大家都会对你不信任。
      pinyin: Rúguǒ nǐ gùyì sāhuǎng, dàjiā dōu huì duì nǐ bù xìnrèn.
      english: If you lie on purpose, everyone will lose trust in you.
      de: Wenn du absichtlich lügst, werden dir alle misstrauen.
  characters:
    - char: 故
      simplified: 故
      traditional: 故
      pinyin: gù
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: absichtlich, bewusst, daher, Grund
      compounds:
        - simplified: 故意
          pinyin: gùyì
          meaning: absichtlich
        - simplified: 原因
          pinyin: yuányīn
          meaning: Grund, Ursache (in 缘故)
        - simplified: 故事
          pinyin: gùshi
          meaning: Geschichte
        - simplified: 故乡
          pinyin: gùxiāng
          meaning: Heimat
      etymology: |
        Phonosemantische Verbindung. Besteht aus dem Radikal 攵 (Schlag, Handlung) und der phonetischen Komponente 古 (gǔ, "alt"). Die ursprüngliche Bedeutung ist "Grund, Ursache". Später erweitert zu "daher, deshalb" und dann zu "absichtlich, bewusst" (als etwas, das einen Grund hat).
    - char: 意
      simplified: 意
      traditional: 意
      pinyin: yì
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: Absicht, Gedanke, Bedeutung
      compounds:
        - simplified: 意思
          pinyin: yìsi
          meaning: Bedeutung, Meinung, Absicht
        - simplified: 意见
          pinyin: yìjiàn
          meaning: Meinung
        - simplified: 故意
          pinyin: gùyì
          meaning: absichtlich
        - simplified: 注意
          pinyin: zhùyì
          meaning: aufpassen, beachten
      etymology: |
        Phonosemantische Verbindung. Besteht aus dem Radikal 心 (Herz) und der phonetischen Komponente 音 (yīn, "Klang"). Die ursprüngliche Bedeutung ist "Gedanke im Herzen, Absicht".

- type: word
  date: "04/04"
  simplified: 无意识
  traditional: 無意識
  pinyin: wú yìshi
  english: unconscious / unaware / without awareness / involuntary
  german: unbewusst / unabsichtlich / ohne Bewusstsein / ohne es zu merken
  hsk: "6"
  register: neutral
  measure_word: []
  note: |
    Ein Adjektiv, das beschreibt, dass eine Handlung, ein Gedanke oder ein Zustand ohne bewusste Kontrolle oder Wahrnehmung stattfindet. 无意识 kann sowohl medizinisch (bewusstlos) als auch psychologisch (unbewusst, automatisch) verwendet werden.

    **Häufige Ausdrücke:**
    - 无意识的行为 (wú yìshi de xíngwéi) — unbewusstes Verhalten
    - 无意识地做某事 (wú yìshi de zuò mǒushì) — etwas unbewusst tun
    - 完全无意识 (wánquán wú yìshi) — völlig bewusstlos
    - 集体无意识 (jítǐ wú yìshi) — kollektives Unbewusstes (psychologischer Fachbegriff)

    **Wichtige Unterschiede:**
    - 无意识 (wú yìshi) — unbewusst, ohne Bewusstsein (Zustand oder Handlung)
    - 下意识 (xiàyìshi) — unterbewusst, instinktiv (schnelle, automatische Reaktion)
    - 潜意识 (qiányìshi) — das Unterbewusstsein (psychologisch, tief liegend)
    - 无意 (wúyì) — unabsichtlich (ohne Absicht, nicht unbedingt unbewusst)

    **Kulturelle Anmerkung:**
    无意识 setzt sich aus 无 (wú, "ohne") und 意识 (yìshi, "Bewusstsein") zusammen. In der Psychologie ist 无意识 (das Unbewusste) ein wichtiger Begriff, der durch Freud und Jung auch in die chinesische Fachsprache eingeführt wurde. Im Alltag wird es häufiger im Sinne von "unbewusst / ohne es zu merken" verwendet: z. B. 他无意识地摸了摸鼻子 – "Er berührte unbewusst seine Nase".
  synonyms:
    - word: 下意识
      pinyin: xiàyìshi
      meaning: unterbewusst, instinktiv (automatische Reaktion)
    - word: 无意
      pinyin: wúyì
      meaning: unabsichtlich (ohne Absicht)
    - word: 不自觉
      pinyin: bù zìjué
      meaning: unbewusst, unfreiwillig
  antonyms:
    - word: 有意识
      pinyin: yǒu yìshi
      meaning: bewusst, absichtlich
    - word: 故意
      pinyin: gùyì
      meaning: absichtlich
  examples:
    - zh: 他无意识地哼着歌，自己都没发现。
      pinyin: Tā wú yìshi de hēngzhe gē, zìjǐ dōu méi fāxiàn.
      english: He was humming unconsciously, not even noticing it himself.
      de: Er summte unbewusst vor sich hin, ohne es selbst zu bemerken.
    - zh: 病人摔倒后短暂失去了意识。
      pinyin: Bìngrén shuāidǎo hòu duǎnzàn shīqùle yìshi.
      english: The patient briefly lost consciousness after the fall.
      de: Der Patient verlor nach dem Sturz kurzzeitig das Bewusstsein.
    - zh: 这是一种无意识的习惯动作。
      pinyin: Zhè shì yī zhǒng wú yìshi de xíguàn dòngzuò.
      english: This is an unconscious habitual action.
      de: Das ist eine unbewusste Gewohnheitshandlung.
    - zh: 无意识的偏见会影响我们的判断。
      pinyin: Wú yìshi de piānjiàn huì yǐngxiǎng wǒmen de pànduàn.
      english: Unconscious bias can affect our judgment.
      de: Unbewusste Vorurteile können unser Urteilsvermögen beeinflussen.
  characters:
    - char: 无
      simplified: 无
      traditional: 無
      pinyin: wú
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: ohne, nicht haben, nicht
      compounds:
        - simplified: 无论
          pinyin: wúlùn
          meaning: egal, unabhängig von
        - simplified: 无限
          pinyin: wúxiàn
          meaning: unendlich, grenzenlos
        - simplified: 无意识
          pinyin: wú yìshi
          meaning: unbewusst, ohne Bewusstsein
      etymology: |
        Piktogramm. Die traditionelle Form 無 zeigte ursprünglich einen tanzenden Schamanen mit Tierfellen. Später wurde es zur Negationspartikel für "nicht haben, ohne". Die vereinfachte Form 无 ist kalligrafischen Ursprungs.
    - char: 意
      simplified: 意
      traditional: 意
      pinyin: yì
      hsk: "4"
      detailed_analysis: true
      meaning_in_context: Bewusstsein, Gedanke
      compounds: []
      etymology: |
        Siehe 故意 für die Etymologie von 意.
    - char: 识
      simplified: 识
      traditional: 識
      pinyin: shi
      hsk: "5"
      detailed_analysis: true
      meaning_in_context: Wissen, Erkennen
      compounds: []
      etymology: |
        Phonosemantische Verbindung. Die traditionelle Form 識 besteht aus dem Radikal 言 (Sprache) und der phonetischen Komponente 戠 (zhí). Die ursprüngliche Bedeutung ist "wissen, erkennen".

- type: word
  date: "04/04"
  simplified: 触及
  traditional: 觸及
  pinyin: chùjí
  english: to touch / to reach / to involve / to cover (a topic)
  german: berühren / anrühren / (fig.) ansprechen / sich befassen mit
  hsk: "6"
  register: formal_written
  measure_word: []
  note: |
    Ein Verb, das sowohl wörtliches Berühren als auch übertragenes Ansprechen oder Behandeln eines Themas beschreibt. 触及 wird oft in formelleren Kontexten verwendet, besonders in Politik, Recht und Wissenschaft.

    **Häufige Ausdrücke:**
    - 触及问题 (chùjí wèntí) — ein Problem ansprechen / berühren
    - 触及底线 (chùjí dǐxiàn) — die rote Linie berühren / überschreiten
    - 触及灵魂 (chùjí línghún) — die Seele berühren (fig.)
    - 触及法律 (chùjí fǎlǜ) — das Gesetz berühren / gegen das Gesetz verstoßen

    **Wichtige Unterschiede:**
    - 触及 (chùjí) — berühren, ansprechen (formeller, oft abstrakt)
    - 触摸 (chùmō) — berühren, anfassen (konkret, mit der Hand)
    - 碰 (pèng) — anstoßen, berühren (umgangssprachlich)
    - 涉及 (shèjí) — betreffen, sich beziehen auf (eher inhaltlich)

    **Kulturelle Anmerkung:**
    触及 setzt sich aus 触 (chù, "berühren, stoßen") und 及 (jí, "erreichen, bis zu") zusammen. Wörtlich: "berühren und erreichen". In politischen Kontexten wird 触及 oft für heikle Themen verwendet: z. B. 触及敏感话题 – "ein sensibles Thema ansprechen".
  synonyms:
    - word: 涉及
      pinyin: shèjí
      meaning: betreffen, sich beziehen auf
    - word: 触摸
      pinyin: chùmō
      meaning: berühren (physisch)
    - word: 碰到
      pinyin: pèngdào
      meaning: auf etwas stoßen, berühren (umgangssprachlich)
  antonyms:
    - word: 避免
      pinyin: bìmiǎn
      meaning: vermeiden
    - word: 避开
      pinyin: bìkāi
      meaning: ausweichen, umgehen
  examples:
    - zh: 这个问题触及了很多人关心的利益。
      pinyin: Zhège wèntí chùjíle hěnduō rén guānxīn de lìyì.
      english: This issue touches on the interests of many people.
      de: Dieses Problem berührt die Interessen vieler Menschen.
    - zh: 他的话直接触及了我的底线。
      pinyin: Tā de huà zhíjiē chùjíle wǒ de dǐxiàn.
      english: His words directly touched my bottom line.
      de: Seine Worte haben direkt meine rote Linie berührt.
    - zh: 这篇文章触及了当代社会的核心问题。
      pinyin: Zhè piān wénzhāng chùjíle dāngdài shèhuì de héxīn wèntí.
      english: This article touches on the core issues of contemporary society.
      de: Dieser Artikel berührt die Kernprobleme der heutigen Gesellschaft.
    - zh: 他的手轻轻触及了她的手背。
      pinyin: Tā de shǒu qīngqīng chùjíle tā de shǒubèi.
      english: His hand lightly touched the back of her hand.
      de: Seine Hand berührte leicht ihren Handrücken.
  characters:
    - char: 触
      simplified: 触
      traditional: 觸
      pinyin: chù
      hsk: "6"
      detailed_analysis: true
      meaning_in_context: berühren, stoßen, antasten
